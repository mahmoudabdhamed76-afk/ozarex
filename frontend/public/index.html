  alerts.push({
    type: 'success',
    icon: '✓',
    title: 'تحديث النظام',
    text: 'تم تحديث النظام بنجاح',
    time: 'منذ يوم'
  });

  // Stock summary (top 5 products by quantity)
  const topStock = DB.data.products.slice().sort((a,b) => (b.quantity||0) - (a.quantity||0)).slice(0, 5);
  const stockIcons = ['📦','📄','📑','📋','🗂','📚'];

  /* ============== SMART ALERTS BAR (نابض) ============== */
  // Helper: classify a product by name into category
  function categorizeProduct(p) {
    const n = (p.name || '').toLowerCase() + ' ' + (p.type || '').toLowerCase();
    if (n.includes('حبر') || n.includes('ink') || n.includes('toner') || n.includes('خرطوش')) return 'ink';
    if (n.includes('ورق') || n.includes('paper') || n.includes('a4') || n.includes('a3') || n.includes('فرخ') || n.includes('ريم')) return 'paper';
    return 'other';
  }

  // Group products by category
  const paperProducts = DB.data.products.filter(p => categorizeProduct(p) === 'paper');
  const inkProducts = DB.data.products.filter(p => categorizeProduct(p) === 'ink');
  const paperList = paperProducts.length > 0 ? paperProducts : DB.data.products.filter(p => categorizeProduct(p) !== 'ink');
  const inkList = inkProducts;

  // Helper: pulse level from quantity thresholds
  function pulseFromQty(qty, lowThreshold, midThreshold) {
    if (qty < lowThreshold) return { level: 'danger', label: 'قرب ينفذ', status: 'مخزون منخفض' };
    if (qty < midThreshold) return { level: 'warning', label: 'مستوى متوسط', status: 'يحتاج مراقبة' };
    return { level: 'success', label: 'مستوى آمن', status: 'مخزون جيد' };
  }

  // Helper: last movement (most recent stockMove) for a set of products
  function lastMovement(products) {
    const pids = new Set(products.map(p => p.id));
    const moves = (DB.data.stockMoves || []).filter(m => pids.has(m.productId)).sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
    if (moves.length === 0) return null;
    const m = moves[0];
    const prod = DB.data.products.find(x => x.id === m.productId);
    return {
      type: m.type === 'out' ? 'بيع' : m.type === 'in' ? 'شراء/استلام' : 'تعديل',
      qty: m.quantity,
      unit: prod?.unit || '',
      productName: prod?.name || ''
    };
  }

  // Helper: main supplier for a category (based on purchase expenses descriptions matching product names)
  function mainSupplier(products) {
    if (products.length === 0) return '—';
    const productNames = products.map(p => (p.name || '').toLowerCase());
    const supplierTotals = {};
    (DB.data.expenses || []).filter(e => e.kind === 'purchase' && e.supplierId).forEach(e => {
      const desc = (e.description || '').toLowerCase();
      const matches = productNames.some(n => n && (desc.includes(n) || n.includes(desc.slice(0, 4))));
      if (matches) {
        supplierTotals[e.supplierId] = (supplierTotals[e.supplierId] || 0) + (e.amount || 0);
      }
    });
    let bestId = null, bestTotal = 0;
    for (const [sid, total] of Object.entries(supplierTotals)) {
      if (total > bestTotal) { bestTotal = total; bestId = sid; }
    }
    if (!bestId) {
      // Fallback: any supplier with at least one purchase
      const anyExp = (DB.data.expenses || []).find(e => e.kind === 'purchase' && e.supplierId);
      bestId = anyExp?.supplierId;
    }
    const sup = bestId ? DB.data.suppliers.find(s => s.id === bestId) : null;
    return sup ? sup.name : '—';
  }

  // 1) PAPER
  const paperTotalQty = paperList.reduce((s, p) => s + (p.quantity || 0), 0);
  const paperPulseInfo = pulseFromQty(paperTotalQty, 5000, 10000);
  const paperUnit = paperList[0]?.unit || 'ورقة';
  const paperLastMove = lastMovement(paperList);
  const paperSupplier = mainSupplier(paperList);
  // Remaining % vs safe threshold (10K = full safe)
  const paperRemainPct = Math.min(100, Math.round((paperTotalQty / 10000) * 100));

  // 2) INK
  const inkTotalQty = inkList.reduce((s, p) => s + (p.quantity || 0), 0);

  // 3) INVOICES (overdue by 2+ days)
  const twoDaysAgo = new Date(); twoDaysAgo.setDate(twoDaysAgo.getDate() - 2);

  let invoicePulse, invoiceLabel, invoiceCount;

      invoiceCount = 0;

  // Invoice details

    return { number: inv.number, customer: c?.name || 'عميل', amount: inv.total - (inv.paid || 0), date: inv.date };
  })();

  // Store popover data globally for click handlers
  window.__smartAlertDetails = {
    paper: {
      level: paperPulseInfo.level,
      title: 'تفاصيل الورق',
      totalQty: paperTotalQty,

      lastMove: paperLastMove,
      status: paperPulseInfo.status,
      supplier: paperSupplier,
      remainPct: paperRemainPct,
      productCount: paperList.length
    },
    ink: {
      level: inkPulseInfo.level,
      title: 'تفاصيل الحبر',
      totalQty: inkTotalQty,
      unit: inkUnit,
      lastMove: inkLastMove,
      status: inkPulseInfo.status,
      supplier: inkSupplier,
      remainPct: inkRemainPct,
      productCount: inkList.length
    },
    invoices: {
      level: invoicePulse,
      title: 'تفاصيل الفواتير',
      overdueCount: overdueInvoicesList.length,
      daysSinceOldest: daysSinceOverdue,
      totalUnpaid: totalUnpaid,
      topDebtor: topDebtorInv,
      cur: curShort
    }
  };

  // 4) Today's collection
  const todayCollection = (DB.data.payments || []).filter(p => p.date === today).reduce((s, p) => s + (p.amount || 0), 0);

  root.innerHTML = `

          </span>
          <span class="qa-label">فاتورة جديدة</span>
        </button>

        <button class="qa-card qa-customer" onclick="openCustomerForm()">
          <span class="qa-glow"></span>
          <span class="qa-ico">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
          </span>
          <span class="qa-label">عميل جديد</span>

        <button class="qa-card qa-issuance" onclick="openIssuanceForm()">

            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>

    <!-- Smart Alerts Bar (نابض) -->
    <div class="smart-alerts-bar" id="smart-alerts-bar">
      <div class="smart-alert pulse-${paperPulseInfo.level}" data-card="paper" title="اضغط للتفاصيل">

/* ========================= CENTERS DROPDOWN WIDGET ========================= */
function buildCentersWidget() {
  // Aggregate per customer based on issuances
  const isss = DB.data.issuances || [];

  const colors = ['#0f766e','#0891b2','#2563eb','#7c3aed','#db2777','#dc2626','#d97706','#059669','#0284c7','#6d28d9','#be123c','#a16207'];

  // Build summary per customer
  const map = {};
  isss.forEach(i => {
    if (!map[i.customerId]) {
      const c = DB.data.customers.find(x => x.id === i.customerId);
      map[i.customerId] = {
        id: i.customerId,
        name: i.customerName || (c?c.name:'-'),
        phone: c ? c.phone : '',
        balance: c ? (c.balance || 0) : 0,
        totalQty: 0,
        totalValue: 0,
        totalPaid: 0,
        count: 0,
        lastDate: '',
        items: []
      };
    }
    const m = map[i.customerId];
    m.totalQty += i.quantity;
    m.totalValue += i.total;
    m.totalPaid += (i.paid || 0);
    m.count += 1;
    if (!m.lastDate || i.date > m.lastDate) m.lastDate = i.date;
    m.items.push(i);
  });

  const centers = Object.values(map).sort((a,b) => b.totalQty - a.totalQty);
  const totalCenters = centers.length;
  const totalSheets = centers.reduce((s,c) => s + c.totalQty, 0);
  const totalMoney = centers.reduce((s,c) => s + c.totalValue, 0);

  // Open by default first time
  if (window._centersOpen === undefined) window._centersOpen = true;

  return `
    <div class="centers-widget" style="margin-bottom:22px">
      <div class="centers-widget-header" onclick="toggleCentersWidget()">
        <div class="centers-widget-title">
          <div class="icon-circle">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          </div>
          <div>
            <div>توريدات المراكز</div>
            <div style="font-size:11px;font-weight:500;color:var(--text-muted);margin-top:2px">
              ${totalCenters} مركز • إجمالي ${fmt(totalSheets)} ورقة • ${fmtCurrency(totalMoney)}
            </div>
          </div>
        </div>
        <div class="centers-widget-toggle ${window._centersOpen?'open':''}" id="cw-toggle">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>
      <div class="centers-widget-body ${window._centersOpen?'open':''}" id="cw-body">
        <div class="centers-widget-content">
          ${centers.length === 0 ? `
            <div class="no-centers">
              <div class="icon">📭</div>
              <p>لسه مفيش مراكز اتعمللها صرف ورق</p>
              <button class="btn btn-primary" style="margin-top:14px" onclick="navigate('issuances');setTimeout(openIssuanceForm,100)">📄 ابدأ صرف ورق</button>
            </div>
          ` : centers.map((c, idx) => {
            const color = colors[idx % colors.length];
            const initial = (c.name || 'م').charAt(0);
            return `
              <div class="center-row" id="cr-${c.id}">
                <div class="center-row-main" onclick="toggleCenterRow('${c.id}')">
                  <div class="center-avatar" style="background:${color}">${escapeHtml(initial)}</div>
                  <div class="center-name-block">
                    <div class="name">${escapeHtml(c.name)}</div>
                    <div class="sub">${c.phone ? escapeHtml(c.phone) + ' • ' : ''}${c.count} عملية صرف • آخر صرف: ${c.lastDate || '-'}</div>
                  </div>
                  <div class="center-metric">
                    <div class="v" style="color:${color}">${fmt(c.totalQty)}</div>
                    <div class="l">ورقة</div>
                  </div>
                  <div class="center-metric">
                    <div class="v" style="color:var(--success)">${fmtCurrency(c.totalValue)}</div>
                    <div class="l">إجمالي</div>
                  </div>
                  <div class="center-metric">
                    <div class="v" style="color:${c.balance>0?'var(--danger)':'var(--success)'}">${fmtCurrency(c.balance)}</div>
                    <div class="l">رصيد</div>
                  </div>
                  <div class="center-expand-icon">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
                  </div>
                </div>
                <div class="center-row-detail">
                  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px">

   CASH FLOW WIDGET (dashboard)
   Stacked bar chart: inflows (collections) vs outflows
   (expenses + supplier payments) grouped by day or week.

/* =========================================================
   TODAY'S PULSE — Live activity dashboard for today's operations.
   Shows: real-time stats, comparison with yesterday & weekly avg,
   top customer/product of the day, an hourly heatmap, and an
   activity timeline of every action that happened today.
========================================================= */
function renderTodayPulse() {
  const container = document.getElementById('today-pulse-container');
  if (!container) return;

  const today = todayStr();
  const yesterday = (() => {
    const d = new Date(); d.setDate(d.getDate() - 1);
    return d.toISOString().slice(0, 10);
  })();
  // Last 7 days for weekly avg
  const last7Days = [];
  for (let i = 1; i <= 7; i++) {
    const d = new Date(); d.setDate(d.getDate() - i);
    last7Days.push(d.toISOString().slice(0, 10));
  }

  /* Gather today's activities — issuances + invoices + payments + expenses + supplier payments */
  const todayActivities = [];
  let todayRevenue = 0, todayCollections = 0, todayExpenses = 0, todayPaperQty = 0;
  const customerStats = {}; // {id: {name, total, count}}
  const productStats = {};  // {id: {name, qty, total}}
  const hourlyActivity = new Array(24).fill(0);

  (DB.data.issuances || []).filter(i => i.date === today).forEach(i => {
    todayRevenue += i.total || 0;
    todayPaperQty += i.quantity || 0;
    const ts = i.createdAt || new Date(today).getTime();
    todayActivities.push({
      type: 'issuance', icon: '📄', color: '#10b981',
      title: `صرف ${i.productName}`,
      subtitle: `${i.customerName} • ${fmt(i.quantity)} ${i.unit||''}`,
      amount: i.total || 0, ts,
      onClick: `viewIssuance('${i.id}')`
    });
    const hr = new Date(ts).getHours();
    hourlyActivity[hr]++;
    if (i.customerId) {
      if (!customerStats[i.customerId]) customerStats[i.customerId] = { name: i.customerName, total: 0, count: 0 };
      customerStats[i.customerId].total += i.total || 0;
      customerStats[i.customerId].count++;
    }
    if (i.productId) {
      if (!productStats[i.productId]) productStats[i.productId] = { name: i.productName, qty: 0, total: 0 };
      productStats[i.productId].qty += i.quantity || 0;
      productStats[i.productId].total += i.total || 0;
    }
  });

  (DB.data.invoices || []).filter(x => x.date === today && !x.sourceIssuanceId).forEach(inv => {
    todayRevenue += inv.total || 0;
    const ts = inv.createdAt || new Date(today).getTime();
    todayActivities.push({
      type: 'invoice', icon: '🧾', color: '#06b6d4',
      title: `فاتورة #${inv.number}`,
      subtitle: inv.customerName || '-',
      amount: inv.total || 0, ts,
      onClick: `viewInvoice('${inv.id}')`
    });
    hourlyActivity[new Date(ts).getHours()]++;
  });

  (DB.data.payments || []).filter(p => p.date === today).forEach(p => {
    todayCollections += p.amount || 0;
    const ts = p.createdAt || new Date(today).getTime();
    todayActivities.push({
      type: 'payment', icon: '💰', color: '#059669',
      title: `تحصيل ${escapeHtml(p.method||'')}`,
      subtitle: p.customerName || '-',
      amount: p.amount || 0, ts,
      onClick: `navigate('payments')`
    });
    hourlyActivity[new Date(ts).getHours()]++;
  });

  (DB.data.expenses || []).filter(e => e.date === today && e.kind !== 'purchase').forEach(e => {
    todayExpenses += e.amount || 0;
    const ts = e.createdAt || new Date(today).getTime();
    todayActivities.push({
      type: 'expense', icon: '📤', color: '#ea580c',
      title: `مصروف: ${escapeHtml(e.category||'')}`,
      subtitle: e.description || '-',
      amount: -(e.amount || 0), ts,
      onClick: `navigate('expenses')`
    });
    hourlyActivity[new Date(ts).getHours()]++;
  });

  (DB.data.supplierPayments || []).filter(p => p.date === today).forEach(p => {
    const ts = p.createdAt || new Date(today).getTime();
    const sup = (DB.data.suppliers || []).find(s => s.id === p.supplierId);
    todayActivities.push({
      type: 'supplier-pay', icon: '🏭', color: '#7c3aed',
      title: `سداد لمورد`,
      subtitle: sup ? sup.name : '-',
      amount: -(p.amount || 0), ts,
      onClick: `navigate('suppliers')`
    });
    hourlyActivity[new Date(ts).getHours()]++;
  });

  /* Sort timeline descending (newest first) */
  todayActivities.sort((a, b) => b.ts - a.ts);

  /* Compare with yesterday & weekly average */
  function calcDayRevenue(dateStr) {
    let r = 0;
    (DB.data.issuances || []).filter(i => i.date === dateStr).forEach(i => r += (i.total||0));
    (DB.data.invoices || []).filter(x => x.date === dateStr && !x.sourceIssuanceId).forEach(i => r += (i.total||0));
    return r;
  }
  const yesterdayRevenue = calcDayRevenue(yesterday);
  const last7Revenue = last7Days.reduce((s, d) => s + calcDayRevenue(d), 0);
  const weeklyAvgRevenue = last7Revenue / 7;
  const diffYesterday = yesterdayRevenue > 0
    ? ((todayRevenue - yesterdayRevenue) / yesterdayRevenue) * 100
    : (todayRevenue > 0 ? 100 : 0);
  const diffWeekly = weeklyAvgRevenue > 0
    ? ((todayRevenue - weeklyAvgRevenue) / weeklyAvgRevenue) * 100
    : (todayRevenue > 0 ? 100 : 0);

  /* Top customer & product of the day */
  const topCust = Object.entries(customerStats).sort((a,b) => b[1].total - a[1].total)[0];
  const topProd = Object.entries(productStats).sort((a,b) => b[1].qty - a[1].qty)[0];

  /* Peak hour */
  const peakHour = hourlyActivity.indexOf(Math.max(...hourlyActivity));
  const peakCount = hourlyActivity[peakHour];

  /* Net cash today */
  const todayNet = todayCollections - todayExpenses;

  /* Helper: hour to label */
  function hourLabel(h) {
    if (h === 0) return '12 ص';
    if (h < 12) return `${h} ص`;
    if (h === 12) return '12 م';
    return `${h - 12} م`;
  }

  /* Helper: time ago */
  function activityTimeAgo(ts) {
    const diff = Date.now() - ts;
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return 'الآن';
    if (mins < 60) return `منذ ${mins} د`;
    const hrs = Math.floor(mins / 60);
    return `منذ ${hrs} س`;
  }

  /* Diff badge HTML */
  function diffPill(pct) {
    if (Math.abs(pct) < 0.5) return '<span class="pulse-pill pulse-pill-stable">— ثابت</span>';
    const isUp = pct > 0;
    return `<span class="pulse-pill ${isUp ? 'pulse-pill-up' : 'pulse-pill-down'}">${isUp ? '▲' : '▼'} ${Math.abs(pct).toFixed(1)}%</span>`;
  }

  /* Render */
  if (todayActivities.length === 0) {
    container.innerHTML = `
      <div class="pulse-empty">
        <div class="pulse-empty-icon">☕</div>
        <div class="pulse-empty-title">لسه مفيش حركة النهارده</div>
        <div class="pulse-empty-sub">أول ما تضيف فاتورة أو تعمل تحصيل، هتلاقي النشاط هنا فوراً</div>
      </div>`;
    return;
  }

  const maxHourly = Math.max(...hourlyActivity, 1);

  container.innerHTML = `
    <!-- Hero stats: revenue + comparison -->
    <div class="pulse-hero">
      <div class="pulse-hero-main">
        <div class="pulse-hero-label">💰 إيرادات النهارده</div>
        <div class="pulse-hero-value">${fmtCurrency(todayRevenue)}</div>
        <div class="pulse-hero-compare">
          <span class="pulse-compare-item">
            <span class="pulse-compare-lbl">vs أمس</span>
            ${diffPill(diffYesterday)}
          </span>
          <span class="pulse-compare-item">
            <span class="pulse-compare-lbl">vs متوسط الأسبوع</span>
            ${diffPill(diffWeekly)}
          </span>
        </div>
      </div>
      <div class="pulse-hero-side">
        <div class="pulse-side-stat ${todayNet >= 0 ? 'positive' : 'negative'}">
          <span class="pulse-side-icon">${todayNet >= 0 ? '📈' : '📉'}</span>
          <div>
            <div class="pulse-side-lbl">صافي اليوم</div>
            <div class="pulse-side-val">${todayNet >= 0 ? '+' : ''}${fmtCurrency(todayNet)}</div>
          </div>
        </div>
        <div class="pulse-side-stat">
          <span class="pulse-side-icon">⚙️</span>
          <div>
            <div class="pulse-side-lbl">عدد العمليات</div>
            <div class="pulse-side-val">${todayActivities.length}</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Top performers row -->
    <div class="pulse-top-row">
      ${topCust ? `
        <div class="pulse-top-card pulse-top-customer">
          <span class="pulse-top-badge">🏆 أعلى عميل اليوم</span>
          <div class="pulse-top-name">${escapeHtml(topCust[1].name)}</div>
          <div class="pulse-top-meta">${topCust[1].count} عملية • <b>${fmtCurrency(topCust[1].total)}</b></div>
        </div>
      ` : ''}
      ${topProd ? `
        <div class="pulse-top-card pulse-top-product">
          <span class="pulse-top-badge">⭐ أكثر منتج صرف</span>
          <div class="pulse-top-name">${escapeHtml(topProd[1].name)}</div>
          <div class="pulse-top-meta"><b>${fmt(topProd[1].qty)}</b> قطعة • ${fmtCurrency(topProd[1].total)}</div>
        </div>
      ` : ''}
      ${peakCount > 0 ? `
        <div class="pulse-top-card pulse-top-peak">
          <span class="pulse-top-badge">🕐 ساعة الذروة</span>
          <div class="pulse-top-name">${hourLabel(peakHour)}</div>
          <div class="pulse-top-meta">${peakCount} عملية في الساعة دي</div>
        </div>
      ` : ''}
    </div>

    <!-- Hourly mini-chart (24 bars) -->
    <div class="pulse-hourly">
      <div class="pulse-hourly-title">📊 توزيع النشاط على مدار اليوم</div>
      <div class="pulse-hourly-bars">
        ${hourlyActivity.map((cnt, h) => {
          const heightPct = (cnt / maxHourly) * 100;
          const isPeak = h === peakHour && cnt > 0;
          const showLabel = (h % 4 === 0); // show every 4 hours
          return `
            <div class="pulse-hour-bar ${isPeak ? 'is-peak' : ''}" title="${hourLabel(h)}: ${cnt} عملية">
              <div class="pulse-hour-fill" style="--target-h:${heightPct}%"></div>
              ${showLabel ? `<div class="pulse-hour-label">${hourLabel(h)}</div>` : '<div class="pulse-hour-label">·</div>'}
            </div>`;
        }).join('')}
      </div>
    </div>

    <!-- Activity timeline -->
    <div class="pulse-timeline-section">
      <div class="pulse-timeline-title">
        <span>⏱️ سجل اللي حصل النهارده</span>
        <span class="pulse-timeline-count">${todayActivities.length} عملية</span>
      </div>
      <div class="pulse-timeline">
        ${todayActivities.slice(0, 12).map(a => `
          <div class="pulse-tl-item" onclick="${a.onClick}">
            <div class="pulse-tl-dot" style="background:${a.color}"></div>
            <div class="pulse-tl-icon" style="background:${a.color}20;color:${a.color}">${a.icon}</div>
            <div class="pulse-tl-body">
              <div class="pulse-tl-title">${escapeHtml(a.title)}</div>
              <div class="pulse-tl-sub">${escapeHtml(a.subtitle)}</div>
            </div>
            <div class="pulse-tl-right">
              <div class="pulse-tl-amount ${a.amount >= 0 ? 'amt-pos' : 'amt-neg'}">
                ${a.amount >= 0 ? '+' : ''}${fmtCurrency(a.amount)}
              </div>
              <div class="pulse-tl-time">${activityTimeAgo(a.ts)}</div>
            </div>
          </div>
        `).join('')}
        ${todayActivities.length > 12 ? `<div class="pulse-tl-more">و ${todayActivities.length - 12} عملية أخرى...</div>` : ''}
      </div>
    </div>
  `;
}

function renderCashFlow(periodDays) {
  const container = document.getElementById('cashflow-container');
  const sel = document.getElementById('cashflow-period');
  if (!container) return;
  const days = parseInt(periodDays || (sel && sel.value) || 30) || 30;

  const today = new Date();
  const startDate = new Date(today); startDate.setDate(today.getDate() - days + 1);
  const startStr = startDate.toISOString().slice(0, 10);

  // Group by day or week depending on period
  const groupByWeek = days >= 60;

  function bucketKey(dateStr) {
    if (!groupByWeek) return dateStr;
    const d = new Date(dateStr);
    const startOfWeek = new Date(d);
    startOfWeek.setDate(d.getDate() - d.getDay());
    return startOfWeek.toISOString().slice(0, 10);
  }

  function bucketLabel(key) {
    const d = new Date(key);
    if (groupByWeek) {
      const end = new Date(d); end.setDate(d.getDate() + 6);
      return `${d.getDate()}/${d.getMonth()+1} - ${end.getDate()}/${end.getMonth()+1}`;
    }
    return `${d.getDate()}/${d.getMonth()+1}`;
  }

  // Initialize buckets for ALL days in range so no gaps
  const buckets = {};
  for (let i = 0; i < days; i++) {
    const d = new Date(startDate); d.setDate(startDate.getDate() + i);
    const dateStr = d.toISOString().slice(0,10);
    const k = bucketKey(dateStr);
    if (!buckets[k]) buckets[k] = { key: k, label: bucketLabel(k), inflow: 0, outflow: 0 };
  }

  // INFLOWS: customer payments + bank inflows
  (DB.data.payments || []).forEach(p => {
    if (!p.date || p.date < startStr) return;
    const k = bucketKey(p.date);
    if (buckets[k]) buckets[k].inflow += (p.amount || 0);
  });
  (DB.data.bankTransfers || []).forEach(t => {
    if (!t.date || t.date < startStr) return;
    if (t.type === 'in' || t.type === 'deposit' || !t.type) {
      const k = bucketKey(t.date);
      if (buckets[k]) buckets[k].inflow += (t.amount || 0);
    }
  });

  // OUTFLOWS: expenses (non-purchase) + cash purchases + supplier payments + bank outflows
  (DB.data.expenses || []).forEach(e => {
    if (!e.date || e.date < startStr) return;
    const isPurchase = e.kind === 'purchase';
    // Only count outflow if it's an actual cash outflow (not credit purchase that just creates a debt)
    if (isPurchase && e.paymentMethod === 'credit') return;
    const k = bucketKey(e.date);
    if (buckets[k]) buckets[k].outflow += (e.amount || 0);
  });
  (DB.data.supplierPayments || []).forEach(p => {
    if (!p.date || p.date < startStr) return;
    const k = bucketKey(p.date);
    if (buckets[k]) buckets[k].outflow += (p.amount || 0);
  });
  (DB.data.bankTransfers || []).forEach(t => {
    if (!t.date || t.date < startStr) return;
    if (t.type === 'out' || t.type === 'withdrawal') {
      const k = bucketKey(t.date);
      if (buckets[k]) buckets[k].outflow += (t.amount || 0);
    }
  });

  const arr = Object.values(buckets).sort((a, b) => a.key.localeCompare(b.key));
  const totalIn = arr.reduce((s, b) => s + b.inflow, 0);
  const totalOut = arr.reduce((s, b) => s + b.outflow, 0);
  const netFlow = totalIn - totalOut;
  const maxBar = Math.max(...arr.map(b => Math.max(b.inflow, b.outflow)), 1);
  const avgDailyNet = days > 0 ? netFlow / days : 0;

  const cur = (DB.data.settings.currency || 'جنيه');
  const curShort = cur === 'جنيه' ? 'ج.م' : cur === 'ريال' ? 'ر.س' : cur === 'درهم' ? 'د.إ' : cur.slice(0, 3);

  // 30-day forecast prediction
  let forecastMsg = '';
  if (avgDailyNet !== 0) {
    const projected30 = avgDailyNet * 30;
    if (projected30 > 0) {
      forecastMsg = `🔮 على هذا المعدل، سيدخل خلال 30 يوم القادمة <b style="color:#059669">${fmtCurrency(projected30)}</b> صافي.`;
    } else {
      forecastMsg = `⚠️ على هذا المعدل، سينقص الكاش بـ <b style="color:#dc2626">${fmtCurrency(Math.abs(projected30))}</b> خلال 30 يوم — راجع المصروفات.`;
    }
  }

  container.innerHTML = `
    <div class="cf-summary-row">
      <div class="cf-summary-card cf-in">
        <div class="cf-summary-label">📥 إجمالي الداخل</div>
        <div class="cf-summary-val">${fmtCurrency(totalIn)}</div>
        <div class="cf-summary-sub">${(DB.data.payments||[]).filter(p=>p.date>=startStr).length} عملية تحصيل</div>
      </div>
      <div class="cf-summary-card cf-out">
        <div class="cf-summary-label">📤 إجمالي الخارج</div>
        <div class="cf-summary-val">${fmtCurrency(totalOut)}</div>
        <div class="cf-summary-sub">مصروفات + سدادات موردين</div>
      </div>
      <div class="cf-summary-card ${netFlow >= 0 ? 'cf-net-pos' : 'cf-net-neg'}">
        <div class="cf-summary-label">${netFlow >= 0 ? '✅' : '⚠️'} صافي التدفق</div>
        <div class="cf-summary-val">${netFlow >= 0 ? '+' : ''}${fmtCurrency(netFlow)}</div>
        <div class="cf-summary-sub">متوسط يومي: ${avgDailyNet >= 0 ? '+' : ''}${fmtCurrency(avgDailyNet)}</div>
      </div>
    </div>

    <div class="cf-chart">
      <div class="cf-chart-axis-labels">
        <div class="cf-chart-legend">
          <span class="cf-leg-item"><i class="cf-leg-dot cf-leg-in"></i>داخل</span>
          <span class="cf-leg-item"><i class="cf-leg-dot cf-leg-out"></i>خارج</span>
        </div>
      </div>
      <div class="cf-chart-bars">
        ${arr.map(b => {
          const inH = (b.inflow / maxBar) * 100;
          const outH = (b.outflow / maxBar) * 100;
          const net = b.inflow - b.outflow;
          return `
            <div class="cf-bar-col" title="${b.label}\n📥 داخل: ${fmt(b.inflow).split('.')[0]} ${curShort}\n📤 خارج: ${fmt(b.outflow).split('.')[0]} ${curShort}\n${net >= 0 ? '✅' : '⚠️'} صافي: ${net >= 0 ? '+' : ''}${fmt(net).split('.')[0]} ${curShort}">
              <div class="cf-bar-group">
                <div class="cf-bar cf-bar-in" style="--target-h:${inH}%"></div>
                <div class="cf-bar cf-bar-out" style="--target-h:${outH}%"></div>
              </div>
              <div class="cf-bar-label">${b.label}</div>
            </div>
          `;
        }).join('')}
      </div>
    </div>

    ${forecastMsg ? `<div class="cf-forecast">${forecastMsg}</div>` : ''}
  `;
}

/* =========================================================
   MONTHLY ISSUANCE BREAKDOWN (dashboard widget)
   - User picks a month from dropdown
   - Shows total quantity issued + breakdown per product type
   - Horizontal animated bar chart
========================================================= */
function renderMonthlyBreakdown(monthKey) {
  const sel = document.getElementById('mb-month-select');
  const container = document.getElementById('mb-container');
  if (!sel || !container) return;

  const arabicMonths = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
  const now = new Date();

  // Build month options if empty (last 12 months)
  if (!sel.options.length) {
    const opts = [];
    for (let i = 0; i < 12; i++) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      const ms = d.toISOString().slice(0, 7);
      const label = `${arabicMonths[d.getMonth()]} ${d.getFullYear()}` + (i === 0 ? ' (الحالي)' : '');
      opts.push(`<option value="${ms}">${label}</option>`);
    }
    sel.innerHTML = opts.join('');
  }

  const ms = monthKey || sel.value || now.toISOString().slice(0, 7);
  if (sel.value !== ms) sel.value = ms;

  // Aggregate this month's issuances by product
  const monthIss = (DB.data.issuances || []).filter(i => (i.date || '').slice(0, 7) === ms);
  const byProduct = {};
  monthIss.forEach(iss => {
    const pid = iss.productId;
    if (!byProduct[pid]) {
      const prod = DB.data.products.find(p => p.id === pid);
      byProduct[pid] = {
        productId: pid,
        name: iss.productName || (prod ? prod.name : 'منتج محذوف'),
        unit: prod ? prod.unit : 'وحدة',
        type: prod ? (prod.type || '') : '',
        qty: 0,
        total: 0,
        count: 0
      };
    }
    byProduct[pid].qty += (iss.quantity || 0);
    byProduct[pid].total += (iss.total || 0);
    byProduct[pid].count += 1;
  });

  const rows = Object.values(byProduct).sort((a, b) => b.qty - a.qty);
  const totalQty   = rows.reduce((s, r) => s + r.qty, 0);
  const totalValue = rows.reduce((s, r) => s + r.total, 0);
  const totalOps   = rows.reduce((s, r) => s + r.count, 0);
  const maxQty     = Math.max(...rows.map(r => r.qty), 1);

  const cur = (DB.data.settings.currency || 'جنيه');
  const curShort = cur === 'جنيه' ? 'ج.م' : cur === 'ريال' ? 'ر.س' : cur === 'درهم' ? 'د.إ' : cur.slice(0, 3);

  // Compare to previous month
  const [yy, mm] = ms.split('-').map(Number);
  const prevDate = new Date(yy, mm - 2, 1);
  const prevMs = prevDate.toISOString().slice(0, 7);
  const prevQty = (DB.data.issuances || [])
    .filter(i => (i.date || '').slice(0, 7) === prevMs)
    .reduce((s, i) => s + (i.quantity || 0), 0);
  const diffPct = prevQty > 0 ? ((totalQty - prevQty) / prevQty) * 100 : (totalQty > 0 ? 100 : 0);
  const dirIcon = Math.abs(diffPct) < 1 ? '➡️' : (diffPct > 0 ? '📈' : '📉');
  const dirClass = Math.abs(diffPct) < 1 ? 'stable' : (diffPct > 0 ? 'up' : 'down');

  // Build bar colors palette (rotates per row)
  const palette = ['#10b981', '#8b5cf6', '#ea580c', '#06b6d4', '#dc2626', '#3b82f6', '#db2777', '#f59e0b', '#84cc16', '#0ea5e9'];

  // Top product highlight
  const top = rows[0];

  container.innerHTML = `
    ${rows.length === 0 ? `
      <div class="mb-empty">
        <div class="mb-empty-icon">📭</div>
        <div class="mb-empty-text">لا توجد عمليات صرف في ${arabicMonths[mm-1]} ${yy}</div>
        <div class="mb-empty-sub">جرب تختار شهر تاني من القائمة</div>
      </div>
    ` : `
      <!-- Summary chips -->
      <div class="mb-summary">
        <div class="mb-stat mb-stat-primary">
          <div class="mb-stat-label">إجمالي الكمية</div>
          <div class="mb-stat-val" id="mb-total-qty" data-target="${totalQty}">0</div>
          <div class="mb-stat-sub">${totalOps} عملية صرف</div>
        </div>
        <div class="mb-stat mb-stat-value">
          <div class="mb-stat-label">القيمة المالية</div>
          <div class="mb-stat-val" id="mb-total-val" data-target="${totalValue}">0</div>
          <div class="mb-stat-sub">${curShort}</div>
        </div>
        <div class="mb-stat mb-stat-trend mb-trend-${dirClass}">
          <div class="mb-stat-label">vs الشهر السابق</div>
          <div class="mb-stat-val">${dirIcon} ${diffPct >= 0 ? '+' : ''}${diffPct.toFixed(1)}%</div>
          <div class="mb-stat-sub">${prevQty > 0 ? prevQty.toLocaleString('ar-EG') + ' في ' + arabicMonths[prevDate.getMonth()] : 'مفيش بيانات سابقة'}</div>
        </div>
      </div>

      <!-- Horizontal bar breakdown -->
      <div class="mb-bars">
        ${rows.map((r, i) => {
          const pct = (r.qty / maxQty) * 100;
          const sharePct = totalQty > 0 ? (r.qty / totalQty) * 100 : 0;
          const color = palette[i % palette.length];
          return `
            <div class="mb-bar-row" style="--bar-color:${color}">
              <div class="mb-bar-info">
                <span class="mb-bar-name" title="${escapeHtml(r.name)}">${escapeHtml(r.name)}</span>
                ${r.type ? `<span class="mb-bar-type">${escapeHtml(r.type)}</span>` : ''}
              </div>
              <div class="mb-bar-track">
                <div class="mb-bar-fill" style="--target-w:${pct}%">
                  <span class="mb-bar-share">${sharePct.toFixed(1)}%</span>
                </div>
              </div>
              <div class="mb-bar-qty">
                <b>${r.qty.toLocaleString('ar-EG')}</b>
                <small>${escapeHtml(r.unit || 'وحدة')}</small>
              </div>
            </div>`;
        }).join('')}
      </div>

      ${top ? `
        <div class="mb-top-product">
          <span class="mb-top-icon">🏆</span>
          <span>أكثر منتج توريداً: <b>${escapeHtml(top.name)}</b> (${top.qty.toLocaleString('ar-EG')} ${escapeHtml(top.unit||'')})</span>
        </div>
      ` : ''}
    `}
  `;

  // Animate the summary numbers
  if (rows.length > 0) {
    animatePaperCounter('mb-total-qty', totalQty, 900);
    animatePaperCounter('mb-total-val', totalValue, 900);
  }
}

/* Number counter animation (eased) — used by widgets */
function animatePaperCounter(id, target, duration) {
  const el = document.getElementById(id);
  if (!el) return;
  target = Math.round(target);
  if (target === 0) { el.textContent = '0'; return; }
  const start = performance.now();
  function tick(now) {
    const elapsed = now - start;
    const t = Math.min(1, elapsed / (duration || 1200));
    const eased = 1 - Math.pow(1 - t, 3);
    const val = Math.round(target * eased);
    el.textContent = val.toLocaleString('ar-EG');
    if (t < 1) requestAnimationFrame(tick);
    else el.textContent = target.toLocaleString('ar-EG');
  }
  requestAnimationFrame(tick);
}

function timeAgo(ts) {
  const diff = Date.now() - ts;
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'الآن';
  if (mins < 60) return `منذ ${mins} د`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `منذ ${hrs} س`;
  const days = Math.floor(hrs / 24);
  if (days < 30) return `منذ ${days} يوم`;
  return new Date(ts).toLocaleDateString('ar-EG');
}

function renderNotesList() {

  const filtered = q ? notes.filter(n => n.text.toLowerCase().includes(q)) : notes;
  // Sort: pinned first, then not-done, then by createdAt desc
  filtered.sort((a, b) => {
    if (a.pinned !== b.pinned) return a.pinned ? -1 : 1;
    if (a.done !== b.done) return a.done ? 1 : -1;
    return b.createdAt - a.createdAt;

  const sub = document.getElementById('notes-sub');

    const active = notes.filter(n => !n.done).length;

/* ============== SMART ALERT POPOVER WIRING ============== */
function setupSmartAlertPopovers() {
  const bar = document.getElementById('smart-alerts-bar');
  const pop = document.getElementById('smart-alert-popover');
  if (!bar || !pop) return;

  const cards = bar.querySelectorAll('.smart-alert[data-card]');
  let activeCard = null;

  function closePopover() {
    pop.style.display = 'none';
    if (activeCard) activeCard.classList.remove('is-active');
    activeCard = null;
  }

  function openPopover(card) {
    const cardType = card.getAttribute('data-card');
    const data = (window.__smartAlertDetails || {})[cardType];
    if (!data) return;
    pop.innerHTML = buildPopoverHTML(cardType, data);
    pop.className = 'smart-alert-popover pop-' + data.level + ' show';
    pop.style.display = 'block';

    // Position: under the clicked card, aligned to right edge (RTL)
    const cardRect = card.getBoundingClientRect();
    const barRect = bar.getBoundingClientRect();
    const popContent = pop.firstElementChild;
    // Place into the bar's wrapper (popover is sibling of bar in flow)
    // We use position:absolute relative to bar's parent (page-content)
    const parent = bar.parentElement;
    const parentRect = parent.getBoundingClientRect();
    pop.style.position = 'absolute';
    pop.style.top = (cardRect.bottom - parentRect.top + 12) + 'px';
    // Arrow position: center of card
    const arrowOffsetFromRight = (parentRect.right - cardRect.right) + (cardRect.width / 2) - 14;
    pop.style.right = (parentRect.right - cardRect.right - 20) + 'px';
    pop.style.left = 'auto';
    pop.style.setProperty('--arrow-offset', arrowOffsetFromRight + 'px');

    // After insertion, check if popover overflows right of viewport
    requestAnimationFrame(() => {
      const popRect = pop.getBoundingClientRect();
      if (popRect.left < 8) {
        // Shift right
        const shift = 8 - popRect.left;
        pop.style.right = (parseFloat(pop.style.right) - shift) + 'px';
      }
    });

    if (activeCard) activeCard.classList.remove('is-active');
    activeCard = card;
    card.classList.add('is-active');
  }

  cards.forEach(card => {
    card.addEventListener('click', (e) => {
      e.stopPropagation();
      if (activeCard === card) {
        closePopover();
      } else {
        openPopover(card);
      }
    });
  });

  // Close on outside click
  document.addEventListener('click', (e) => {
    if (!pop.contains(e.target) && !bar.contains(e.target)) {
      closePopover();
    }
  });
  // Close on ESC
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closePopover();
  });
}

/* ============== DASHBOARD HEATMAP (خريطة المبيعات اليومية) ============== */
function renderDashHeatmap(period) {
  const container = document.getElementById('heat-container');
  if (!container) return;

  const cur = (DB.data.settings.currency || 'جنيه');
  const curShort = cur === 'جنيه' ? 'ج.م' : cur === 'ريال' ? 'ر.س' : cur === 'درهم' ? 'د.إ' : cur.slice(0, 3);

  // Aggregate daily sales (issuances + standalone invoices) into dailyTotals map
  const dailyTotals = {};
  (DB.data.issuances || []).forEach(iss => {
    dailyTotals[iss.date] = (dailyTotals[iss.date] || 0) + (iss.total || 0);
  });
  DB.data.invoices.filter(i => !i.sourceIssuanceId).forEach(inv => {
    dailyTotals[inv.date] = (dailyTotals[inv.date] || 0) + (inv.total || 0);
  });

  // Determine date range based on period
  const today_ = new Date();
  let startDate, endDate, weeksCount;
  if (period === 'prev') {
    // Last month: from 1st of last month to last day of last month
    startDate = new Date(today_.getFullYear(), today_.getMonth() - 1, 1);
    endDate = new Date(today_.getFullYear(), today_.getMonth(), 0); // last day of last month
  } else if (period === '60') {
    // Last 60 days
    endDate = new Date(today_);
    startDate = new Date(today_); startDate.setDate(startDate.getDate() - 59);
  } else {
    // 'month' (default): from 1st of current month to today
    startDate = new Date(today_.getFullYear(), today_.getMonth(), 1);
    endDate = new Date(today_);
  }

  // Day index function: Sat=0, Sun=1, ... Fri=6
  function dayIndex(d) { return (d.getDay() + 1) % 7; }

  // Find the Saturday on or before startDate (start of first week-row)
  const gridStart = new Date(startDate);
  gridStart.setDate(gridStart.getDate() - dayIndex(gridStart));

  // Find the Friday on or after endDate (end of last week-row)
  const gridEnd = new Date(endDate);
  gridEnd.setDate(gridEnd.getDate() + (6 - dayIndex(gridEnd)));

  // Build weeks
  const totalDays = Math.floor((gridEnd - gridStart) / 86400000) + 1;
  weeksCount = Math.ceil(totalDays / 7);
  const grid = [];
  let maxVal = 0;
  for (let w = 0; w < weeksCount; w++) {
    const row = [];
    for (let d = 0; d < 7; d++) {
      const cellDate = new Date(gridStart);
      cellDate.setDate(gridStart.getDate() + w * 7 + d);
      const ds = dateStr(cellDate);
      // Mark as inactive if outside [startDate, endDate] or in the future
      const isInRange = cellDate >= startDate && cellDate <= endDate;
      const isFuture = cellDate > today_;
      const val = isInRange ? (dailyTotals[ds] || 0) : null;
      if (val != null && val > maxVal) maxVal = val;
      row.push({ ds, val, isInRange, isFuture, day: cellDate.getDate(), month: cellDate.getMonth() + 1 });
    }
    grid.push(row);
  }
  if (maxVal === 0) maxVal = 1;

  function heatLevel(v) {
    if (v == null || v === 0) return 0;
    const r = v / maxVal;
    if (r < 0.2) return 1;
    if (r < 0.4) return 2;
    if (r < 0.6) return 3;
    if (r < 0.8) return 4;
    return 5;
  }

  const heatDays = ['السبت', 'الأحد', 'الاثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة'];

  // Stats footer
  const allCells = grid.flat().filter(c => c.isInRange && !c.isFuture);
  const total = allCells.reduce((s, c) => s + (c.val || 0), 0);
  const activeDays = allCells.filter(c => c.val > 0).length;
  const avgPerActiveDay = activeDays > 0 ? total / activeDays : 0;
  const bestCell = allCells.slice().sort((a, b) => (b.val || 0) - (a.val || 0))[0];

  // ===== AI-style heatmap insights =====
  const heatInsights = [];
  if (activeDays > 0) {
    // 1) Best day of week (avg sales)
    const byDay = [0, 0, 0, 0, 0, 0, 0].map(() => ({ total: 0, count: 0 }));
    allCells.forEach(c => {
      if (c.val == null) return;
      const cellDate = new Date(c.ds);
      const di = (cellDate.getDay() + 1) % 7;
      byDay[di].total += c.val;
      byDay[di].count += 1;
    });
    const dayAvgs = byDay.map((b, i) => ({ day: heatDays[i], avg: b.count > 0 ? b.total / b.count : 0 }));
    const bestDow = dayAvgs.slice().sort((a, b) => b.avg - a.avg)[0];
    const worstDow = dayAvgs.filter(d => d.avg > 0).sort((a, b) => a.avg - b.avg)[0];
    if (bestDow && bestDow.avg > 0) {
      heatInsights.push({
        icon: '🏆',
        type: 'success',
        text: `أقوى يوم في الأسبوع: <b>${bestDow.day}</b> بمتوسط <b>${fmt(bestDow.avg).split('.')[0]} ${curShort}</b>`
      });
    }
    if (worstDow && worstDow.day !== (bestDow && bestDow.day) && worstDow.avg > 0) {
      heatInsights.push({
        icon: '😴',
        type: 'warning',
        text: `أضعف يوم: <b>${worstDow.day}</b> (متوسط <b>${fmt(worstDow.avg).split('.')[0]} ${curShort}</b>)`
      });
    }

    // 2) Streak detection — consecutive days with sales
    let curStreak = 0, maxStreak = 0;
    const sortedCells = allCells.slice().sort((a, b) => a.ds.localeCompare(b.ds));
    sortedCells.forEach(c => {
      if (c.val > 0) { curStreak++; if (curStreak > maxStreak) maxStreak = curStreak; }
      else curStreak = 0;
    });
    if (maxStreak >= 3) {
      heatInsights.push({
        icon: '🔥',
        type: 'success',
        text: `أطول سلسلة أيام نشاط متواصل: <b>${maxStreak} يوم</b>`
      });
    }

    // 3) Average per active day
    if (avgPerActiveDay > 0) {
      heatInsights.push({
        icon: '📊',
        type: 'info',
        text: `متوسط مبيعات اليوم النشط: <b>${fmt(avgPerActiveDay).split('.')[0]} ${curShort}</b>`
      });
    }

    // 4) Coverage / activity ratio
    const ratio = (activeDays / allCells.length) * 100;
    if (ratio < 40) {
      heatInsights.push({
        icon: '⚠️',
        type: 'warning',
        text: `نسبة الأيام النشطة <b>${ratio.toFixed(0)}%</b> فقط — في فجوات كتير ممكن تستغلها`
      });
    } else if (ratio >= 70) {
      heatInsights.push({
        icon: '💪',
        type: 'success',
        text: `نسبة نشاط ممتازة: <b>${ratio.toFixed(0)}%</b> من الأيام فيها مبيعات`
      });
    }
  }

  container.innerHTML = `
    <table class="dash-heat-table">
      <thead>
        <tr>
          <th></th>
          ${heatDays.map(d => `<th>${d}</th>`).join('')}
        </tr>
      </thead>
      <tbody>
        ${grid.map((week, wi) => `
          <tr>
            <td class="weekrow">أ${wi + 1}</td>
            ${week.map(cell => {
              if (!cell.isInRange) return `<td class="lvl-0" style="opacity:.3"></td>`;
              if (cell.isFuture) return `<td class="future"></td>`;
              const lvl = heatLevel(cell.val);
              const valStr = cell.val > 0 ? `${fmt(cell.val).split('.')[0]} ${curShort}` : 'لا مبيعات';
              const title = `${cell.day}/${cell.month} • ${valStr}`;
              const showDay = cell.val > 0 && lvl >= 3 ? cell.day : '';
              return `<td class="lvl-${lvl}" title="${title}">${showDay}</td>`;
            }).join('')}
          </tr>
        `).join('')}
      </tbody>
    </table>
    <div class="dash-heat-legend">
      <span><i class="lv-low"  style="background:#fee2e2"></i> منخفض</span>
      <span><i class="lv-med"  style="background:#fde68a"></i> متوسط</span>
      <span><i class="lv-good" style="background:#bbf7d0"></i> جيد</span>
      <span><i class="lv-best" style="background:#4ade80"></i> ممتاز</span>
    </div>
    <div style="margin-top:14px;padding-top:14px;border-top:1px dashed var(--border);display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;font-size:11.5px;color:var(--text-muted)">
      <span>إجمالي: <strong style="color:var(--text);font-weight:800">${fmt(total).split('.')[0]} ${curShort}</strong></span>
      <span>أيام نشطة: <strong style="color:var(--text);font-weight:800">${activeDays}</strong></span>
      <span>أفضل يوم: <strong style="color:var(--success);font-weight:800">${bestCell && bestCell.val > 0 ? `${bestCell.day}/${bestCell.month}` : '—'}</strong></span>
    </div>
    ${heatInsights.length === 0 ? '' : `
      <div class="ai-insights-bar" style="margin-top:14px">
        <div class="ai-insights-header">
          <span class="ai-badge">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 2l1.5 4.5L18 8l-4.5 1.5L12 14l-1.5-4.5L6 8l4.5-1.5z"/><path d="M5 17l.75 2.25L8 20l-2.25.75L5 23l-.75-2.25L2 20l2.25-.75z"/></svg>
            تحليل ذكي
          </span>
        </div>
        <div class="ai-insights-grid">
          ${heatInsights.map(i => `
            <div class="ai-insight ai-${i.type}">
              <span class="ai-icon">${i.icon}</span>
              <span class="ai-text">${i.text}</span>
            </div>
          `).join('')}
        </div>
      </div>
    `}
  `;

  // Bind period menu (idempotent)
  const trigger = document.getElementById('heat-period-trigger');
  const menu = document.getElementById('heat-period-menu');
  const label = document.getElementById('heat-period-label');
  if (trigger && menu && !trigger.__bound) {
    trigger.__bound = true;
    trigger.onclick = (e) => {
      e.stopPropagation();
      menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
    };
    document.addEventListener('click', () => { menu.style.display = 'none'; });
    menu.querySelectorAll('div[data-period]').forEach(opt => {
      opt.onclick = (e) => {
        e.stopPropagation();
        const p = opt.getAttribute('data-period');
        const lblText = opt.textContent.trim();
        if (label) label.textContent = lblText;
        menu.style.display = 'none';
        renderDashHeatmap(p);
      };
    });
  }
}

function saveCustomer(id) {
  const form = document.getElementById('cust-form');
  const fd = new FormData(form);
  const d = {};
  const customPrices = {};
  for (const [k, v] of fd.entries()) {
    if (k.startsWith('custprice_')) {
      const pid = k.replace('custprice_', '');
      const num = parseFloat(v);
      if (!isNaN(num) && num > 0) customPrices[pid] = num;
    } else {
      d[k] = v;
    }
  }
  if (!d.name || !d.name.trim()) { toast('اسم العميل مطلوب', 'error'); return; }
  d.creditLimit = parseFloat(d.creditLimit) || 0;
  d.balance = parseFloat(d.balance) || 0;
  d.customPrices = customPrices;
  let before = null;
  let record;
  if (id) {
    const c = DB.data.customers.find(x=>x.id===id);
    if (!c) return;
    before = JSON.parse(JSON.stringify(c));
    Object.assign(c, d);
    record = c;
  } else {
    record = { id:'c_'+uid(), ...d, createdAt: Date.now() };
    DB.data.customers.push(record);
  }
  DB.save();
  // Audit trail
  logAudit({
    operation: id ? 'edit' : 'add',
    table: 'customers',
    recordId: record.id,
    recordLabel: record.name,
    before, after: JSON.parse(JSON.stringify(record)),
    reason: window._pendingAuditReason || ''
  });
  delete window._pendingAuditReason;
  closeModal();
  notify({ type:'success',
    title: id ? 'تم تحديث العميل' : 'تم إضافة العميل',
    message: id ? `تم تحديث بيانات العميل <b>"${escapeHtml(record.name)}"</b> بنجاح` : `تم إضافة العميل <b>"${escapeHtml(record.name)}"</b> بنجاح` });
  renderCustomers();
  renderSidebar();
  updateNotifBadge();
}

function deleteCustomer(id) {
  const c = DB.data.customers.find(x=>x.id===id);
  if (!c) return;
  const hasInvoices = DB.data.invoices.some(i => i.customerId === id);
  if (hasInvoices) { toast('لا يمكن حذف عميل له فواتير', 'error'); return; }
  confirmDialog(`هل أنت متأكد من حذف العميل "${c.name}"؟`, () => {
    const before = JSON.parse(JSON.stringify(c));
    DB.data.customers = DB.data.customers.filter(x=>x.id!==id);
    DB.save();
    logAudit({
      operation: 'delete', table: 'customers',
      recordId: id, recordLabel: c.name,
      before, after: null,
      reason: 'حذف عميل من قِبل المستخدم'
    });
    toast('تم حذف العميل');
    renderCustomers();
    renderSidebar();
  });
}

function viewCustomerStatement(id) {
  const c = DB.data.customers.find(x=>x.id===id);
  if (!c) return;
  const invs = DB.data.invoices.filter(i => i.customerId === id).sort((a,b)=>a.createdAt-b.createdAt);
  const isss = (DB.data.issuances||[]).filter(i => i.customerId === id).sort((a,b)=>a.createdAt-b.createdAt);
  const pays = DB.data.payments.filter(p => p.customerId === id).sort((a,b)=>a.createdAt-b.createdAt);

  // Build transactions
  const txs = [];
  invs.forEach(i => txs.push({ date: i.date, type:'فاتورة', ref:'#'+i.number, debit: i.total, credit: 0, ts: i.createdAt, link: i.id }));
  isss.forEach(i => txs.push({ date: i.date, type:'صرف ورق', ref:'#'+i.number+' - '+(i.productName||''), debit: i.total, credit: 0, ts: i.createdAt }));
  pays.forEach(p => txs.push({ date: p.date, type:'تحصيل', ref: p.method, debit: 0, credit: p.amount, ts: p.createdAt }));
  txs.sort((a,b)=>a.ts-b.ts);

  const totalDebit = txs.reduce((s,t)=>s+t.debit, 0);
  const totalCredit = txs.reduce((s,t)=>s+t.credit, 0);
  const totalSheets = isss.reduce((s,i)=>s+i.quantity, 0);
  let running = 0;

  const lastPay = pays.length ? pays[pays.length-1] : null;

  const html = `
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:16px">
      <div class="kpi"><div class="l">إجمالي المديونية</div><div class="v">${fmtCurrency(totalDebit)}</div></div>
      <div class="kpi"><div class="l">إجمالي المدفوع</div><div class="v" style="color:var(--success)">${fmtCurrency(totalCredit)}</div></div>
      <div class="kpi"><div class="l">الرصيد المستحق</div><div class="v" style="color:${c.balance>0?'var(--danger)':'var(--success)'}">${fmtCurrency(c.balance)}</div></div>
      <div class="kpi"><div class="l">إجمالي الورق المصروف</div><div class="v" style="color:var(--info)">${fmt(totalSheets)}</div></div>
    </div>
    <div style="margin-bottom:12px;padding:12px;background:var(--surface-2);border-radius:var(--radius)">
      <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;font-size:13px">
        <div><b>الشركة:</b> ${escapeHtml(c.company||'-')}</div>
        <div><b>الهاتف:</b> ${escapeHtml(c.phone||'-')}</div>
        <div><b>العنوان:</b> ${escapeHtml(c.address||'-')}</div>
        <div><b>الحد الائتماني:</b> ${fmtCurrency(c.creditLimit)}</div>
      </div>
    </div>

    ${isss.length > 0 ? `
    <div style="margin-bottom:12px">
      <h4 style="margin:0 0 8px;font-size:14px">📄 سجل صرف الورق (${isss.length} عملية - إجمالي ${fmt(totalSheets)} ورقة)</h4>
      <div class="table-scroll" style="max-height:200px;overflow-y:auto">
        <table class="data-table">
          <thead><tr><th>التاريخ</th><th>نوع الورق</th><th>الكمية</th><th>سعر الوحدة</th><th>الإجمالي</th></tr></thead>
          <tbody>
            ${isss.slice().reverse().map(i => `<tr>
              <td>${i.date}</td>
              <td><b>${escapeHtml(i.productName)}</b></td>
              <td>${fmt(i.quantity)}</td>
              <td>${fmtCurrency(i.unitPrice)}</td>
              <td><b style="color:var(--success)">${fmtCurrency(i.total)}</b></td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>` : ''}

    <h4 style="margin:0 0 8px;font-size:14px">📊 كشف الحساب الكامل</h4>
    <div class="table-scroll" style="max-height:300px;overflow-y:auto">
      <table class="data-table">
        <thead><tr><th>التاريخ</th><th>البيان</th><th>المرجع</th><th>مدين</th><th>دائن</th><th>الرصيد</th></tr></thead>
        <tbody>
          ${txs.length === 0 ? '<tr><td colspan="6" class="empty-state">لا توجد حركات</td></tr>' :
            txs.map(t => {
              running += t.debit - t.credit;
              return `<tr>
                <td>${t.date}</td>
                <td><b>${t.type}</b></td>
                <td>${escapeHtml(t.ref)}</td>
                <td>${t.debit ? fmtCurrency(t.debit) : '—'}</td>
                <td style="color:var(--success)">${t.credit ? fmtCurrency(t.credit) : '—'}</td>
                <td><b>${fmtCurrency(running)}</b></td>
              </tr>`;
            }).join('')
          }
        </tbody>
      </table>
    </div>
  `;
  openModal('كشف حساب: ' + c.name, html,
    `<button class="btn btn-success" onclick="closeModal();openPaymentForm('${c.id}')">💰 تسجيل تحصيل</button>
     ${c.phone ? `<button class="btn" style="background:linear-gradient(135deg,#25d366,#128c7e);color:white" onclick="sendCustomerStatementWhatsApp('${c.id}')">📲 إرسال على واتساب</button>` : ''}
     <button class="btn btn-secondary" onclick="closeModal()">إغلاق</button>`, 'large');
}

let invoiceFilters = { search: '', status: '', from: '', to: '', showArchived: false, customerId: '' };
function renderInvoices() {
  const root = document.getElementById('page-content');
  let list = DB.data.invoices.slice();

  // Hide archived (consolidated-source) invoices by default unless toggled
  if (!invoiceFilters.showArchived) {
    list = list.filter(inv => !inv.archived);
  }

  // Filter by selected customer
  if (invoiceFilters.customerId) {
    list = list.filter(inv => inv.customerId === invoiceFilters.customerId);
  }

  if (invoiceFilters.search) {
    const qRaw = invoiceFilters.search.trim();
    const q = normalizeArabic(qRaw);
    list = list.filter(inv => {
      const c = DB.data.customers.find(x=>x.id===inv.customerId);
      const numberMatch = String(inv.number).includes(qRaw);
      const nameMatch = c && normalizeArabic(c.name).includes(q);
      const phoneMatch = c && c.phone && c.phone.replace(/\s+/g,'').includes(qRaw.replace(/\s+/g,''));
      return numberMatch || nameMatch || phoneMatch;
    });
  }
  if (invoiceFilters.status) list = list.filter(i => i.status === invoiceFilters.status);
  if (invoiceFilters.from) list = list.filter(i => i.date >= invoiceFilters.from);
  if (invoiceFilters.to) list = list.filter(i => i.date <= invoiceFilters.to);
  list.sort((a,b)=>b.createdAt-a.createdAt);

  const total = list.reduce((s,i)=>s+i.total, 0);
  const paid = list.reduce((s,i)=>s+i.paid, 0);

      <div class="kpi"><div class="l">المحصل</div><div class="v" style="color:var(--success)">${fmtCurrency(paid)}</div></div>
      <div class="kpi"><div class="l">المتبقي</div><div class="v" style="color:var(--danger)">${fmtCurrency(total-paid)}</div></div>

                if (inv.archived) badges += `<span class="inv-arch-badge" title="مؤرشفة - تم تجميعها في فاتورة #${inv.consolidatedIntoNumber||''}">📦 مؤرشفة</span>`;

      const cursorPos = e.target.selectionStart;
      invoiceFilters.search = val;
      renderInvoices();
      // Restore focus + cursor after re-render
      const newInput = document.getElementById('inv-search');
      if (newInput) {
        newInput.focus();
        try { newInput.setSelectionRange(cursorPos, cursorPos); } catch (err) {}
      }
    });
    // If page had a search query, focus the input on render
    if (invoiceFilters.search) {
      setTimeout(() => {
        const el = document.getElementById('inv-search');
        if (el && document.activeElement !== el) {
          // Only focus if user didn't click somewhere else
          const pos = invoiceFilters.search.length;
          if (document.activeElement === document.body) {
            el.focus();
            try { el.setSelectionRange(pos, pos); } catch (err) {}
          }
        }
      }, 0);
    }
  }
  document.getElementById('inv-status').addEventListener('change', e => { invoiceFilters.status = e.target.value; renderInvoices(); });
  document.getElementById('inv-from').addEventListener('change', e => { invoiceFilters.from = e.target.value; renderInvoices(); });
  document.getElementById('inv-to').addEventListener('change', e => { invoiceFilters.to = e.target.value; renderInvoices(); });
}

  if (!can('invoices')) { toast('ليس لديك صلاحية', 'error'); return; }

  const customers = DB.data.customers.slice().sort((a, b) => a.name.localeCompare(b.name));

  openModal('🧾 إنشاء فاتورة مجمعة', `

function onConsolidateFiltersChange() {
  const customerId = document.getElementById('cons-customer').value;
  const from = document.getElementById('cons-from').value;
  const to = document.getElementById('cons-to').value;
  const listHost = document.getElementById('cons-invoice-list');

  if (!customerId || !from || !to) {
    listHost.innerHTML = `
      <div class="cons-empty">
        <div class="cons-empty-icon">👆</div>
        <div class="cons-empty-text">اختر العميل والفترة فوق لعرض الفواتير المتاحة للتجميع</div>
      </div>`;
    document.getElementById('cons-summary').style.display = 'none';
    document.getElementById('cons-create-btn').disabled = true;
    return;
  }

  // Filter eligible invoices
  const eligible = DB.data.invoices.filter(inv =>
    inv.customerId === customerId &&
    inv.date >= from &&
    inv.date <= to &&
    !inv.consolidatedIntoId &&  // not already consolidated
    !inv.isConsolidated &&      // not a consolidated invoice itself
    !inv.archived                // not archived
  ).sort((a, b) => (a.date || '').localeCompare(b.date || ''));

  if (eligible.length === 0) {
    listHost.innerHTML = `
      <div class="cons-empty">
        <div class="cons-empty-icon">📭</div>
        <div class="cons-empty-text">لا توجد فواتير قابلة للتجميع للعميل في الفترة المحددة</div>
        <div class="cons-empty-sub">جرب توسيع نطاق التاريخ أو اختيار عميل آخر</div>
      </div>`;
    document.getElementById('cons-summary').style.display = 'none';
    document.getElementById('cons-create-btn').disabled = true;
    return;
  }

  // Render the list with checkboxes
  listHost.innerHTML = `
    <div class="cons-list-header">
      <label class="cons-list-checkall">
        <input type="checkbox" id="cons-check-all" onchange="toggleAllConsolidateInvoices(this.checked)" checked>
        <span>تحديد الكل (${eligible.length} فاتورة)</span>
      </label>
      <span class="cons-list-hint">شيل علامة الصح من أي فاتورة عايز تستبعدها</span>
    </div>
    <div class="cons-invoice-rows">
      ${eligible.map(inv => {
        const itemsCount = (inv.items || []).length;
        const remaining = (inv.total || 0) - (inv.paid || 0);
        const statusClass = inv.status === 'paid' ? 'cir-paid' : inv.status === 'partial' ? 'cir-partial' : 'cir-unpaid';
        const statusLabel = inv.status === 'paid' ? '✅ مدفوعة' : inv.status === 'partial' ? '🟡 جزئية' : '🔴 آجلة';
        return `
          <label class="cons-invoice-row" data-inv-id="${inv.id}">
            <input type="checkbox" class="cons-inv-check" checked onchange="onConsolidateRowToggle()" data-inv-id="${inv.id}">
            <div class="cir-info">
              <div class="cir-title">
                <span class="cir-num">#${inv.number}</span>
                <span class="cir-status ${statusClass}">${statusLabel}</span>
              </div>
              <div class="cir-meta">
                📅 ${inv.date} • ${itemsCount} بند • ${escapeHtml(inv.paymentMethod || '-')}
              </div>
            </div>
            <div class="cir-amounts">
              <div class="cir-total">${fmtCurrency(inv.total)}</div>
              ${(inv.paid||0) > 0 ? `<div class="cir-paid">مدفوع ${fmtCurrency(inv.paid)}</div>` : ''}
              ${remaining > 0 ? `<div class="cir-remaining">متبقي ${fmtCurrency(remaining)}</div>` : ''}
            </div>
          </label>
        `;
      }).join('')}
    </div>
  `;

  // Cache the eligible invoices for save
  window._consolidateEligible = eligible;
  document.getElementById('cons-summary').style.display = 'block';
  onConsolidateRowToggle();
}

function toggleAllConsolidateInvoices(checked) {
  document.querySelectorAll('.cons-inv-check').forEach(cb => cb.checked = checked);
  onConsolidateRowToggle();
}

function onConsolidateRowToggle() {
  const checks = document.querySelectorAll('.cons-inv-check');
  const selectedIds = Array.from(checks).filter(c => c.checked).map(c => c.dataset.invId);
  const selectedInvoices = (window._consolidateEligible || []).filter(inv => selectedIds.includes(inv.id));

  // Update row styling
  document.querySelectorAll('.cons-invoice-row').forEach(row => {
    const cb = row.querySelector('.cons-inv-check');
    row.classList.toggle('cons-invoice-row-selected', cb.checked);
  });

  // Sync "check all"
  const checkAll = document.getElementById('cons-check-all');
  if (checkAll) checkAll.checked = checks.length > 0 && selectedIds.length === checks.length;

  // Update summary
  const total = selectedInvoices.reduce((s, i) => s + (i.total || 0), 0);
  const paid = selectedInvoices.reduce((s, i) => s + (i.paid || 0), 0);
  const remaining = total - paid;

  document.getElementById('cons-count').textContent = selectedInvoices.length;
  document.getElementById('cons-total').textContent = fmtCurrency(total);
  document.getElementById('cons-paid').textContent = fmtCurrency(paid);
  document.getElementById('cons-remaining').textContent = fmtCurrency(remaining);

  document.getElementById('cons-create-btn').disabled = selectedInvoices.length < 2;
}

function createConsolidatedInvoice() {
  const customerId = document.getElementById('cons-customer').value;
  const c = DB.data.customers.find(x => x.id === customerId);
  if (!c) { toast('العميل غير موجود', 'error'); return; }

  const from = document.getElementById('cons-from').value;
  const to = document.getElementById('cons-to').value;
  const note = document.getElementById('cons-note').value.trim();
  const archiveOriginals = document.getElementById('cons-archive-originals').checked;

  const checks = document.querySelectorAll('.cons-inv-check');
  const selectedIds = Array.from(checks).filter(c => c.checked).map(c => c.dataset.invId);
  const selectedInvoices = (window._consolidateEligible || []).filter(inv => selectedIds.includes(inv.id));

  if (selectedInvoices.length < 2) {
    toast('اختر فاتورتين على الأقل للتجميع', 'warning');
    return;
  }

  // Build merged items: combine same-product items, keep separate items per source invoice
  const mergedItems = [];
  selectedInvoices.forEach(inv => {
    (inv.items || []).forEach(it => {
      // Build a row that traces back to its source
      mergedItems.push({
        productId: it.productId,
        productName: it.productName,
        qty: it.qty,
        price: it.price,
        total: it.total,
        sourceInvoiceNumber: inv.number,
        sourceInvoiceDate: inv.date
      });
    });
  });

  const subtotal = mergedItems.reduce((s, i) => s + (i.total || 0), 0);
  const totalPaid = selectedInvoices.reduce((s, i) => s + (i.paid || 0), 0);
  const total = subtotal; // No additional discount/tax on consolidated by default
  const remaining = total - totalPaid;

  // Generate new invoice number
  if (!DB.data.counters) DB.data.counters = {};
  DB.data.counters.invoice = (DB.data.counters.invoice || 1000) + 1;
  const newNumber = DB.data.counters.invoice;

  const today = todayStr();
  const consolidatedInv = {
    id: 'inv_cons_' + uid(),
    number: newNumber,
    customerId: c.id,
    customerName: c.name,
    date: today,
    items: mergedItems,
    subtotal,
    discount: 0,
    taxRate: 0,
    tax: 0,
    total,
    paid: totalPaid,
    status: totalPaid >= total ? 'paid' : totalPaid > 0 ? 'partial' : 'unpaid',
    paymentMethod: 'آجل',
    notes: note || `فاتورة مجمّعة من ${selectedInvoices.length} فاتورة (${from} إلى ${to})`,
    // Special markers
    isConsolidated: true,
    consolidationPeriod: { from, to },
    sourceInvoiceIds: selectedInvoices.map(i => i.id),
    sourceInvoiceNumbers: selectedInvoices.map(i => i.number),
    sourceInvoicesCount: selectedInvoices.length,
    createdAt: Date.now()
  };

  // Mark source invoices as consolidated (DON'T delete them — preserve audit trail)
  selectedInvoices.forEach(inv => {
    inv.consolidatedIntoId = consolidatedInv.id;
    inv.consolidatedIntoNumber = consolidatedInv.number;
    if (archiveOriginals) inv.archived = true;
  });

  DB.data.invoices.push(consolidatedInv);
  DB.save();

  // Log audit
  logAudit({
    operation: 'add',
    table: 'invoices',
    recordId: consolidatedInv.id,
    recordLabel: `فاتورة مجمعة #${newNumber} - ${c.name} (${selectedInvoices.length} فاتورة)`,
    before: null,
    after: JSON.parse(JSON.stringify(consolidatedInv)),
    reason: `تجميع ${selectedInvoices.length} فاتورة (#${selectedInvoices.map(i=>i.number).join(', #')}) من ${from} إلى ${to}`
  });

  closeModal();
  playTone('save');
  celebrate();
  toast(`✓ تم إنشاء فاتورة مجمعة #${newNumber} - ${selectedInvoices.length} فاتورة بإجمالي ${fmtCurrency(total)}`, 'success');
  renderInvoices();
  renderSidebar();

  // Open the new consolidated invoice for viewing
  setTimeout(() => viewInvoice(consolidatedInv.id), 400);
}

/* Un-consolidate: restore source invoices and delete the consolidated one */
function unconsolidateInvoice(id) {
  if (currentUser.role !== 'admin') {
    toast('فقط الأدمن يقدر يفك تجميع الفواتير', 'error');
    return;
  }
  const inv = DB.data.invoices.find(x => x.id === id);
  if (!inv || !inv.isConsolidated) return;

  promptAuditReason({
    title: 'سبب فك تجميع الفاتورة',
    description: `فك تجميع فاتورة #${inv.number} وإرجاع ${inv.sourceInvoicesCount} فاتورة لحالتها الأصلية`,
    suggestedReasons: [
      'تم تجميع فواتير خطأ',
      'العميل طلب فصل الفواتير',
      'تصحيح بيانات قبل التجميع',
      'إعادة هيكلة الفواتير'
    ]
  }).then(reason => {
    confirmDialog(
      `هل أنت متأكد من فك تجميع الفاتورة #${inv.number}؟\n\nسيتم:\n- حذف الفاتورة المجمعة\n- إرجاع ${inv.sourceInvoicesCount} فاتورة لحالتها الأصلية`,
      () => {
        const before = JSON.parse(JSON.stringify(inv));

        // Restore source invoices
        (inv.sourceInvoiceIds || []).forEach(srcId => {
          const src = DB.data.invoices.find(x => x.id === srcId);
          if (src) {
            delete src.consolidatedIntoId;
            delete src.consolidatedIntoNumber;
            delete src.archived;
          }
        });

        // Delete the consolidated invoice
        DB.data.invoices = DB.data.invoices.filter(x => x.id !== id);
        DB.save();

        logAudit({
          operation: 'delete',
          table: 'invoices',
          recordId: id,
          recordLabel: `فاتورة مجمعة #${inv.number}`,
          before, after: null,
          reason
        });

        toast(`✓ تم فك التجميع وإرجاع ${inv.sourceInvoicesCount} فاتورة`);
        renderInvoices();
        renderSidebar();
      }
    );
  }).catch(() => {});
}

function addInvoiceRow() {
  const tbody = document.getElementById('invoice-rows');
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td>
      <select class="form-control row-product" onchange="updateInvoiceRow(this)">
        <option value="">-- اختر المنتج --</option>
        ${DB.data.products.map(p => `<option value="${p.id}" data-price="${p.price}">${escapeHtml(p.name)} (${p.quantity} ${p.unit} متاح)</option>`).join('')}
      </select>
    </td>
    <td><input class="form-control row-qty" type="number" min="0" step="0.01" value="1" oninput="recalcInvoice()"></td>
    <td><input class="form-control row-price" type="number" min="0" step="0.01" value="0" oninput="recalcInvoice()"></td>
    <td><b class="row-total">0.00</b></td>
    <td><button type="button" class="btn-icon" onclick="this.closest('tr').remove();recalcInvoice()" style="color:var(--danger)">✕</button></td>

function updateInvoiceRow(sel) {
  const opt = sel.options[sel.selectedIndex];
  const price = parseFloat(opt.dataset.price) || 0;
  sel.closest('tr').querySelector('.row-price').value = price;
  recalcInvoice();
}

function recalcInvoice() {
  let subtotal = 0;
  document.querySelectorAll('#invoice-rows tr').forEach(tr => {
    const q = parseFloat(tr.querySelector('.row-qty').value) || 0;
    const p = parseFloat(tr.querySelector('.row-price').value) || 0;
    const t = q * p;
    tr.querySelector('.row-total').innerText = fmt(t);
    subtotal += t;
  });
  const discount = parseFloat(document.querySelector('#invoice-form [name="discount"]').value) || 0;
  const taxRate = parseFloat(document.querySelector('#invoice-form [name="taxRate"]').value) || 0;
  const afterDiscount = Math.max(0, subtotal - discount);
  const tax = afterDiscount * (taxRate/100);
  const total = afterDiscount + tax;
  document.getElementById('t-subtotal').innerText = fmt(subtotal);
  document.getElementById('t-discount').innerText = fmt(discount);
  document.getElementById('t-tax').innerText = fmt(tax);
  const tEl = document.getElementById('t-total');
  tEl.innerText = fmt(total);
  tEl.dataset.value = total;
}

function saveInvoice() {
  const form = document.getElementById('invoice-form');
  const d = Object.fromEntries(new FormData(form));
  if (!d.customerId) { toast('اختر العميل', 'error'); return; }
  const items = [];
  let invalid = false;
  document.querySelectorAll('#invoice-rows tr').forEach(tr => {
    const sel = tr.querySelector('.row-product');
    const pid = sel.value;
    if (!pid) return;
    const qty = parseFloat(tr.querySelector('.row-qty').value) || 0;
    const price = parseFloat(tr.querySelector('.row-price').value) || 0;
    if (qty <= 0 || price < 0) { invalid = true; return; }
    const p = DB.data.products.find(x=>x.id===pid);
    if (qty > p.quantity) { invalid = true; toast(`الكمية المطلوبة من "${p.name}" أكبر من المتاح (${p.quantity})`, 'error'); return; }
    items.push({ productId: pid, productName: p.name, qty, price, total: qty*price });
  });
  if (invalid) return;
  if (items.length === 0) { toast('أضف صنفاً واحداً على الأقل', 'error'); return; }

  const subtotal = items.reduce((s,i)=>s+i.total, 0);
  const discount = parseFloat(d.discount) || 0;
  const taxRate = parseFloat(d.taxRate) || 0;
  const afterDiscount = Math.max(0, subtotal - discount);
  const tax = afterDiscount * (taxRate/100);
  const total = afterDiscount + tax;
  const paid = Math.min(parseFloat(d.paid)||0, total);
  const status = paid >= total ? 'paid' : paid > 0 ? 'partial' : 'unpaid';

  const inv = {
    id: 'inv_' + uid(),
    number: ++DB.data.counters.invoice,
    customerId: d.customerId,
    date: d.date,
    items, subtotal, discount, tax, taxRate, total, paid,
    paymentMethod: d.paymentMethod,
    status,
    createdAt: Date.now()
  };
  DB.data.invoices.push(inv);

  // Update stock
  items.forEach(it => {
    const p = DB.data.products.find(x => x.id === it.productId);
    p.quantity -= it.qty;
    DB.data.stockMoves.push({ id:'sm_'+uid(), productId: it.productId, type:'out', quantity: it.qty, date: d.date, note: 'فاتورة #'+inv.number, createdAt: Date.now() });
  });

  // Update customer balance
  const c = DB.data.customers.find(x=>x.id===d.customerId);
  c.balance += (total - paid);

  // If paid in cash, record payment
  if (paid > 0) {
    DB.data.payments.push({
      id:'pay_'+uid(), customerId: c.id, invoiceId: inv.id, amount: paid, date: d.date, method: d.paymentMethod, note:'دفعة مع الفاتورة #'+inv.number, createdAt: Date.now()
    });
  }

  DB.save();
  // Audit trail
  logAudit({
    operation: 'add',
    table: 'invoices',
    recordId: inv.id,
    recordLabel: `فاتورة #${inv.number} - ${c.name}`,
    before: null,
    after: JSON.parse(JSON.stringify(inv)),
    reason: window._pendingAuditReason || ''
  });
  delete window._pendingAuditReason;
  closeModal();
  celebrate();notify({ type:'success', title:'تم إنشاء الفاتورة', message:`تم إنشاء الفاتورة رقم <b>#${inv.number}</b> بنجاح` });
  renderInvoices();
  renderSidebar();
  updateNotifBadge();
}

        </div>
      </div>`;
  } else if (inv.consolidatedIntoId) {
    const parent = DB.data.invoices.find(x => x.id === inv.consolidatedIntoId);
    consolidationInfo = `
      <div class="cons-archived-banner" onclick="closeModal();setTimeout(()=>viewInvoice('${inv.consolidatedIntoId}'),100)" style="cursor:pointer">

        </div>
      </div>`;
  }

  // Group items by source invoice for consolidated invoices
  let itemsTable;
  if (inv.isConsolidated && inv.items.some(i => i.sourceInvoiceNumber)) {
    const groups = {};
    inv.items.forEach(it => {
      const key = it.sourceInvoiceNumber || 'unknown';
      if (!groups[key]) groups[key] = { date: it.sourceInvoiceDate, items: [], total: 0 };
      groups[key].items.push(it);
      groups[key].total += (it.total || 0);
    });
    const groupRows = Object.entries(groups).sort((a, b) => (a[1].date || '').localeCompare(b[1].date || '')).map(([num, g]) => `

        <td colspan="4" style="background:rgba(124,58,237,.10);font-weight:800;color:#7c3aed;padding:8px 14px">

          ${inv.items.map(i => `<tr><td>${escapeHtml(i.productName)}</td><td>${fmt(i.qty)}</td><td>${fmtCurrency(i.price)}</td><td><b>${fmtCurrency(i.total)}</b></td></tr>`).join('')}
        </tbody>
      </table>`;
  }

  const html = `
    ${consolidationInfo}
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:14px">
      <div class="kpi"><div class="l">رقم الفاتورة</div><div class="v">#${inv.number}</div></div>
      <div class="kpi"><div class="l">التاريخ</div><div class="v" style="font-size:16px">${inv.date}</div></div>
      <div class="kpi"><div class="l">العميل</div><div class="v" style="font-size:16px">${escapeHtml(c?c.name:'-')}</div></div>

    ${itemsTable}
    <div class="invoice-totals">
      <div class="row"><span>الإجمالي قبل الخصم</span><span>${fmtCurrency(inv.subtotal)}</span></div>
      <div class="row"><span>الخصم</span><span style="color:var(--danger)">${fmtCurrency(inv.discount)}</span></div>

      <div class="row"><span>المتبقي</span><span style="color:${(inv.total-inv.paid)>0?'var(--danger)':'inherit'}">${fmtCurrency(inv.total-inv.paid)}</span></div>

  openModal(inv.isConsolidated ? `🧾 فاتورة مجمعة #${inv.number}` : `فاتورة رقم #${inv.number}`, html,
    `<button class="btn btn-primary" onclick="printInvoice('${inv.id}')">🖨 طباعة</button>
     <button class="btn btn-success" onclick="sendInvoiceWhatsApp('${inv.id}')" style="background:linear-gradient(135deg,#25d366,#128c7e)!important;box-shadow:0 6px 16px rgba(37,211,102,.35)!important">
       <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:middle"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893A11.821 11.821 0 0020.885 3.488"/></svg>

     ${inv.status !== 'paid' && can('payments') ? `<button class="btn btn-success" onclick="closeModal();openPaymentForm('${inv.customerId}','${inv.id}')">💰 تحصيل</button>` : ''}
