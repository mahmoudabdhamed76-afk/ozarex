.cf-chart-bars {

}

.cf-forecast {

}
[data-theme="dark"] .cf-forecast { background: rgba(124,58,237,.15); }

.backup-reminder-banner {

/* ============== SMART AUDIT TRAIL - Dark Glassmorphism ============== */
.audit-page {
  display: flex; flex-direction: column;
  gap: 14px;
  padding-bottom: 30px;
}

/* Alert banner (suspicious operations in last 24h) */
.audit-alert-banner {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 18px;
  background: linear-gradient(135deg, rgba(220,38,38,.15), rgba(127,29,29,.10));
  border: 1.5px solid rgba(220,38,38,.40);
  border-radius: 14px;
  backdrop-filter: blur(8px);
  position: relative;
  overflow: hidden;
  animation: auditAlertPulse 2.5s ease-in-out infinite;
}
[data-theme="dark"] .audit-alert-banner {
  background: linear-gradient(135deg, rgba(220,38,38,.20), rgba(127,29,29,.15));
}
@keyframes auditAlertPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(220,38,38,.20); }
  50% { box-shadow: 0 0 0 8px rgba(220,38,38,0); }
}
.audit-alert-banner::before {
  content: '';
  position: absolute;
  top: 0; bottom: 0; inset-inline-start: 0;
  width: 4px;
  background: linear-gradient(180deg, #dc2626, #991b1b);
}
.audit-alert-icon {
  font-size: 28px;
  animation: alertBlink 1.2s ease-in-out infinite;
}
@keyframes alertBlink {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.15); }
}
.audit-alert-body { flex: 1; min-width: 0; }
.audit-alert-title {
  font-size: 14px; font-weight: 900;
  color: #b91c1c;
  letter-spacing: -0.3px;
  margin-bottom: 2px;
}
[data-theme="dark"] .audit-alert-title { color: #fca5a5; }
.audit-alert-msg {
  font-size: 12.5px;
  font-weight: 600;
  color: var(--text);
}
.audit-alert-msg b {
  color: #dc2626;
  font-weight: 900;
  font-size: 13.5px;
}
[data-theme="dark"] .audit-alert-msg b { color: #fca5a5; }
.audit-alert-cta {
  background: linear-gradient(135deg, #dc2626, #991b1b) !important;
  color: white !important;
  font-weight: 800 !important;
  flex-shrink: 0;
  box-shadow: 0 4px 12px rgba(220,38,38,.30);
}
.audit-alert-cta:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 16px rgba(220,38,38,.40);
}

/* KPI Cards Grid */
.audit-kpis {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 12px;
}
.audit-kpi {
  display: flex; align-items: center; gap: 12px;
  padding: 16px;
  border-radius: 16px;
  border: 1.5px solid;
  background: var(--surface);
  position: relative;
  overflow: hidden;
  transition: all .25s;
  backdrop-filter: blur(10px);
}
.audit-kpi::before {
  content: '';
  position: absolute;
  top: -40px; inset-inline-end: -40px;
  width: 140px; height: 140px;
  border-radius: 50%;
  opacity: 0.08;
  pointer-events: none;
}
.audit-kpi:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 32px rgba(15,23,42,.10);
}
[data-theme="dark"] .audit-kpi:hover {
  box-shadow: 0 12px 32px rgba(0,0,0,.40);
}

.audit-kpi-total {
  background: linear-gradient(135deg, rgba(6,182,212,.10), var(--surface) 80%);
  border-color: rgba(6,182,212,.30);
}
.audit-kpi-total::before { background: #06b6d4; }
.audit-kpi-total .audit-kpi-icon { background: linear-gradient(135deg, #06b6d4, #0e7490); color: white; }
.audit-kpi-total .audit-kpi-val { color: #06b6d4; }
[data-theme="dark"] .audit-kpi-total .audit-kpi-val { color: #67e8f9; }

.audit-kpi-normal {
  background: linear-gradient(135deg, rgba(16,185,129,.10), var(--surface) 80%);
  border-color: rgba(16,185,129,.30);
}
.audit-kpi-normal::before { background: #10b981; }
.audit-kpi-normal .audit-kpi-icon { background: linear-gradient(135deg, #10b981, #047857); color: white; }
.audit-kpi-normal .audit-kpi-val { color: #059669; }
[data-theme="dark"] .audit-kpi-normal .audit-kpi-val { color: #34d399; }

.audit-kpi-medium {
  background: linear-gradient(135deg, rgba(245,158,11,.10), var(--surface) 80%);
  border-color: rgba(245,158,11,.30);
}
.audit-kpi-medium::before { background: #f59e0b; }
.audit-kpi-medium .audit-kpi-icon { background: linear-gradient(135deg, #f59e0b, #c2410c); color: white; }
.audit-kpi-medium .audit-kpi-val { color: #c2410c; }
[data-theme="dark"] .audit-kpi-medium .audit-kpi-val { color: #fbbf24; }

.audit-kpi-high {
  background: linear-gradient(135deg, rgba(220,38,38,.12), var(--surface) 80%);
  border-color: rgba(220,38,38,.35);
  animation: highKpiGlow 3s ease-in-out infinite;

@keyframes highKpiGlow {

.emp-name {

/* Audit table */
.audit-table-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  backdrop-filter: blur(10px);
}
[data-theme="dark"] .audit-table-wrap {
  background: rgba(13,19,31,.6);
}
.audit-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12.5px;
}
.audit-table thead th {
  background: var(--surface-2);
  padding: 11px 12px;
  text-align: start;
  font-weight: 800;
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.2px;
  border-bottom: 2px solid var(--border);
  white-space: nowrap;
}
[data-theme="dark"] .audit-table thead th {
  background: rgba(0,0,0,.25);
}
.audit-table tbody td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  vertical-align: top;
}
.audit-row {
  transition: background .15s;
  position: relative;
}
.audit-row::before {
  content: '';
  position: absolute;
  top: 0; bottom: 0; inset-inline-start: 0;
  width: 3px;
  background: transparent;
}
.audit-row:hover { background: var(--surface-2); }
.audit-row-high::before { background: #dc2626; }
.audit-row-medium::before { background: #f59e0b; }
.audit-row-low::before { background: #eab308; }
.audit-row-normal::before { background: transparent; }
.audit-row-high { background: rgba(220,38,38,.04); }
.audit-row-medium { background: rgba(245,158,11,.04); }
[data-theme="dark"] .audit-row-high { background: rgba(220,38,38,.08); }
[data-theme="dark"] .audit-row-medium { background: rgba(245,158,11,.06); }

.audit-time { white-space: nowrap; }
.audit-time-main {
  font-weight: 800;
  font-size: 13px;
  color: var(--text);
}
.audit-time-sub {
  font-size: 10.5px;
  color: var(--text-muted);
  font-weight: 600;
  margin-top: 1px;
}

.audit-user {
  display: flex; align-items: center; gap: 8px;
  white-space: nowrap;
}
.audit-user-avatar {
  width: 28px; height: 28px;

  background: linear-gradient(135deg, #14b8a6, #0d9488);
  color: white;
  display: grid; place-items: center;
  font-weight: 900;
  font-size: 12px;
  flex-shrink: 0;
  box-shadow: 0 2px 6px rgba(20,184,166,.25);
}

.audit-op-badge {
  display: inline-flex;
  align-items: center; gap: 4px;
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 800;
  white-space: nowrap;
}
.audit-op-add {
  background: rgba(16,185,129,.12);
  color: #059669;
  border: 1px solid rgba(16,185,129,.25);
}
.audit-op-edit {
  background: rgba(6,182,212,.12);
  color: #0e7490;
  border: 1px solid rgba(6,182,212,.25);
}

.audit-record b { font-size: 12.5px; color: var(--text); font-weight: 800; }
.audit-before, .audit-after {

}

.audit-after { color: var(--success); font-weight: 700; }

.audit-reason {

}

.audit-sus-badge {

}
.audit-sus-low {
  background: linear-gradient(135deg, #eab308, #ca8a04);

}
.audit-sus-normal {

}
[data-theme="dark"] .audit-sus-normal { background: rgba(255,255,255,.05); }

/* Pagination */
.audit-pagination {

.audit-info-grid {

.audit-changes-section {

.audit-changes-title {

  .rep-tab { flex: 1; min-width: 120px; }
}

/* ╔══════════════════════════════════════════════════════════════════╗
   ║   ✨ DESIGN OVERHAUL v3.0 - Matches reference mockup exactly      ║
   ║   Dark cosmic theme with teal primary + colorful accent KPIs      ║
   ╚══════════════════════════════════════════════════════════════════╝ */

/* ===== BASE / BODY ===== */
[data-theme="dark"] body {
  background: #0c0709;
  background-image:
    radial-gradient(circle at 15% 12%, rgba(219,32,51,.08) 0%, transparent 40%),
    radial-gradient(circle at 85% 18%, rgba(124,58,237,.05) 0%, transparent 42%),
    radial-gradient(circle at 50% 95%, rgba(239,68,88,.05) 0%, transparent 45%),
    linear-gradient(180deg, #0c0709 0%, #14090c 55%, #0c0709 100%);
  background-attachment: fixed;
}

/* ===== SIDEBAR DARK-MODE OVERRIDES (uses unified base styles) ===== */
:root { --sidebar-w: 240px; }
.main-content { margin-right: var(--sidebar-w); }

[data-theme="dark"] .sidebar-brand {
  background: radial-gradient(circle at top right, rgba(16,185,129,.10), transparent 70%);
}
[data-theme="dark"] .brand-logo {
  background: linear-gradient(135deg, #047857 0%, #10b981 100%);
  box-shadow:
    0 8px 20px rgba(16,185,129,.35),
    inset 0 1px 0 rgba(255,255,255,.2);
}
[data-theme="dark"] .nav-item:hover {
  background: rgba(16,185,129,.08);
  color: var(--text);
}
[data-theme="dark"] .nav-item.active::after {
  background: linear-gradient(180deg, #34d399, #10b981);
  box-shadow: 0 0 12px rgba(52,211,153,.6), 0 0 24px rgba(52,211,153,.3);
}

[data-theme="dark"] .sidebar-footer {
  background: rgba(8,13,24,.5);
}
[data-theme="dark"] .user-pill {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px;
}
[data-theme="dark"] .avatar {
  background: linear-gradient(135deg, #14b8a6, #0d9488);
  box-shadow: 0 4px 12px rgba(20,184,166,.3);
}

/* ===== TOPBAR (matches mockup: sleek bar with profile left, menu/search center) ===== */
[data-theme="dark"] .topbar {
  background: rgba(10,14,26,.85);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  height: 70px;
  padding: 0 24px;
}
[data-theme="dark"] .topbar-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--text-muted);
}

[data-theme="dark"] .search-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  width: 320px;
  padding: 10px 16px;
  transition: all .25s ease;
}
[data-theme="dark"] .search-box:focus-within {
  border-color: var(--primary);
  background: var(--surface-2);
  box-shadow: 0 0 0 4px rgba(20,184,166,.15);
}
[data-theme="dark"] .search-box input { color: var(--text); }

[data-theme="dark"] .icon-btn {
  width: 42px; height: 42px;
  border-radius: 12px;
  background: rgba(255,255,255,.02);
  border: 1px solid rgba(255,255,255,.04);
  color: var(--text-muted);
  transition: all .25s ease;
}
[data-theme="dark"] .icon-btn:hover {
  background: rgba(20,184,166,.10);
  border-color: rgba(20,184,166,.30);
  color: var(--primary);
  transform: translateY(-1px);
}
[data-theme="dark"] .icon-btn .notif-dot {
  background: linear-gradient(135deg, #ef4444, #dc2626);
  border-color: var(--bg);
  box-shadow: 0 2px 8px rgba(239,68,68,.4);
}

/* ===== TOPBAR PROFILE PILL (left side, matches mockup) ===== */
.topbar-profile {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 14px 6px 6px;
  border-radius: 999px;
  background: var(--surface);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all .25s ease;
  margin-right: 4px;
}
.topbar-profile:hover {
  background: var(--surface-2);
  border-color: rgba(20,184,166,.3);
}
.topbar-profile .avatar-pic {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, #14b8a6, #0d9488);
  display: grid; place-items: center;
  color: #fff;
  font-weight: 800;
  font-size: 15px;
  flex-shrink: 0;
  border: 2px solid rgba(20,184,166,.3);
}
.topbar-profile .info { display: flex; flex-direction: column; gap: 0; }
.topbar-profile .info .name { font-size: 13px; font-weight: 700; color: var(--text); }
.topbar-profile .info .role { font-size: 11px; color: var(--text-muted); }
.topbar-profile .caret { color: var(--text-soft); margin-left: 4px; }
@media (max-width: 760px) {
  .topbar-profile .info { display: none; }
  .topbar-profile { padding: 4px; border-radius: 50%; }
  .topbar-profile .caret { display: none; }
}

/* ===== TOPBAR QUICK ACTIONS (between title and home button) ===== */
.topbar-quick-actions {
  display: flex; align-items: center; gap: 6px;
  margin: 0 8px;
}
.topbar-qa-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 12px;
  border-radius: 10px;
  background: rgba(20,184,166,.08);
  border: 1px solid rgba(20,184,166,.18);
  color: var(--text);
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: all .25s cubic-bezier(.4,0,.2,1);
  white-space: nowrap;
}
.topbar-qa-btn:hover {
  background: rgba(20,184,166,.16);
  border-color: rgba(20,184,166,.4);
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(20,184,166,.2);
}
.topbar-qa-btn:active { transform: translateY(0); }
.topbar-qa-btn svg { color: var(--primary); }
.topbar-qa-btn .qa-plus {
  color: var(--primary);
  font-weight: 900;
  font-size: 14px;
  line-height: 1;
}
.topbar-qa-btn .qa-notes-count {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 18px;
  height: 18px;
  padding: 0 5px;
  background: linear-gradient(135deg, #ea580c, #c2410c);
  color: white;
  font-size: 10.5px;
  font-weight: 800;
  border-radius: 999px;
  margin-inline-start: 2px;
  box-shadow: 0 2px 5px rgba(234,88,12,.40);
  letter-spacing: -0.2px;
}
/* Notes count badge on the new topbar notes icon (next to notifications) */
#notes-icon-btn .qa-notes-count {
  position: absolute;
  top: -3px;
  inset-inline-end: -3px;
  min-width: 17px;
  height: 17px;
  padding: 0 4px;
  background: linear-gradient(135deg, #ea580c, #c2410c);
  color: #fff;
  font-size: 10px;
  font-weight: 800;
  border-radius: 999px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 5px rgba(234,88,12,.45);
}
.topbar-qa-btn.topbar-qa-notes {
  background: linear-gradient(135deg, rgba(245,158,11,.10), rgba(234,88,12,.06));
  border-color: rgba(245,158,11,.30);
}
.topbar-qa-btn.topbar-qa-notes:hover {
  background: linear-gradient(135deg, rgba(245,158,11,.20), rgba(234,88,12,.12));
  border-color: rgba(245,158,11,.50);
  box-shadow: 0 4px 12px rgba(234,88,12,.20);
}
.topbar-qa-btn.topbar-qa-notes svg { color: #c2410c; }
[data-theme="dark"] .topbar-qa-btn.topbar-qa-notes svg { color: #fbbf24; }
.topbar-qa-btn.topbar-qa-currency {
  background: linear-gradient(135deg, rgba(124,58,237,.10), rgba(168,85,247,.06));
  border-color: rgba(124,58,237,.30);
}
.topbar-qa-btn.topbar-qa-currency:hover {
  background: linear-gradient(135deg, rgba(124,58,237,.20), rgba(168,85,247,.12));
  border-color: rgba(124,58,237,.50);
  box-shadow: 0 4px 12px rgba(124,58,237,.20);
}
[data-theme="dark"] .topbar-qa-btn {
  background: rgba(20,184,166,.08);
  border-color: rgba(20,184,166,.20);
  color: var(--text);
}
[data-theme="dark"] .topbar-qa-btn:hover {
  background: rgba(20,184,166,.14);
  border-color: rgba(20,184,166,.40);
}

/* Hide labels on smaller screens, show icons only */
@media (max-width: 1100px) {
  .topbar-qa-btn span:not(.qa-plus) { display: none; }
  .topbar-qa-btn { padding: 8px 10px; }
}
@media (max-width: 760px) {
  .topbar-quick-actions { display: none; }
}

/* ===== TOPBAR HOME BUTTON (override) ===== */
[data-theme="dark"] .topbar-home-btn {
  background: linear-gradient(135deg, #14b8a6, #0d9488) !important;
  border: none !important;
  box-shadow: 0 4px 14px rgba(20,184,166,.4) !important;
}
[data-theme="dark"] .topbar-home-btn:hover {
  box-shadow: 0 8px 20px rgba(20,184,166,.6) !important;
}

/* ===== RECITER INLINE (override) ===== */
[data-theme="dark"] .reciter-inline {
  background: linear-gradient(135deg, #064e3b 0%, #047857 100%);
  border: 1px solid rgba(16,185,129,.3);
  box-shadow: 0 4px 12px rgba(4,120,87,.4);
}

/* ===== PAGE CONTENT ===== */
.page-content { padding: 24px; }
[data-theme="dark"] .page-title { color: var(--text); }
[data-theme="dark"] .page-subtitle { color: var(--text-muted); }

/* ===== WELCOME HEADER (matches mockup) ===== */
.welcome-header {
  text-align: center;
  margin: 8px 0 24px;
  padding: 14px 4px;
}
.welcome-header h1 {
  font-size: 26px;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -.5px;
  margin-bottom: 6px;
}
.welcome-header h1 .wave { display: inline-block; animation: wave 2.5s ease-in-out infinite; transform-origin: 70% 70%; }
@keyframes wave {
  0%, 60%, 100% { transform: rotate(0deg); }
  10%, 30% { transform: rotate(14deg); }
  20% { transform: rotate(-8deg); }
  40% { transform: rotate(10deg); }
  50% { transform: rotate(-4deg); }
}
.welcome-header p {
  color: var(--text-muted);
  font-size: 14px;
}
.welcome-toolbar {
  display: flex; gap: 10px; align-items: center;
  flex-wrap: wrap;
  margin-bottom: 22px;
}
.welcome-toolbar .chip {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 16px;
  border-radius: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  cursor: pointer;
  transition: all .25s ease;
}
.welcome-toolbar .chip:hover {
  border-color: rgba(20,184,166,.4);
  background: rgba(20,184,166,.06);
}
.welcome-toolbar .chip svg { color: var(--text-muted); width: 16px; height: 16px; }

/* ===== BIG KPI CARDS (matches mockup - 4 horizontal cards with colored bg) ===== */
.kpi-grid-v3 {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 22px;
}
@media (max-width: 1280px) { .kpi-grid-v3 { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 640px)  { .kpi-grid-v3 { grid-template-columns: 1fr; } }

.kpi-v3 {
  position: relative;
  padding: 22px;
  border-radius: 24px;
  border: 1px solid var(--border);
  display: flex; align-items: center; gap: 18px;
  overflow: hidden;
  transition: all .35s cubic-bezier(.4,0,.2,1);
  cursor: pointer;
  backdrop-filter: blur(8px);
}
.kpi-v3:hover {
  transform: translateY(-3px);
  box-shadow: 0 18px 48px rgba(15,23,42,.10), 0 4px 12px rgba(15,23,42,.06);
}
.kpi-v3::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 100% 0%, rgba(255,255,255,.5), transparent 60%);
  pointer-events: none;
}
.kpi-v3 .kpi-icon {
  width: 56px; height: 56px;
  border-radius: 16px;
  display: grid; place-items: center;
  font-size: 26px;
  flex-shrink: 0;
  position: relative;
  z-index: 1;
  color: white;
  box-shadow: 0 8px 18px rgba(0,0,0,.10), inset 0 1px 0 rgba(255,255,255,.30);
}
.kpi-v3 .kpi-body { flex: 1; min-width: 0; position: relative; z-index: 1; }
.kpi-v3 .kpi-label {
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 8px;
  color: var(--text-muted);
  letter-spacing: -0.1px;
}
.kpi-v3 .kpi-value {
  font-size: 30px;
  font-weight: 900;
  letter-spacing: -1.2px;
  margin-bottom: 4px;
  line-height: 1.1;
  color: var(--text);
}
.kpi-v3 .kpi-value .currency {
  font-size: 14px;
  font-weight: 700;
  opacity: .7;
  margin-right: 4px;
}
.kpi-v3 .kpi-trend {
  font-size: 11.5px;
  font-weight: 700;
  display: flex; align-items: center; gap: 6px;
}
.kpi-v3 .kpi-trend.up { color: #059669; }
.kpi-v3 .kpi-trend.down { color: #dc2626; }
.kpi-v3 .kpi-trend .ts {
  color: var(--text-soft);
  font-weight: 600;
}

/* === LIGHT-MODE TINTED VARIANTS (premium pastel) === */
.kpi-v3.kpi-teal {
  background: var(--tint-mint);
  border-color: rgba(16,185,129,.18);
}
.kpi-v3.kpi-teal .kpi-icon {
  background: linear-gradient(135deg, #10b981, #059669);
}

.kpi-v3.kpi-green {
  background: var(--tint-emerald);
  border-color: rgba(5,150,105,.20);
}
.kpi-v3.kpi-green .kpi-icon {
  background: linear-gradient(135deg, #059669, #047857);
}

.kpi-v3.kpi-purple {
  background: var(--tint-lavender);
  border-color: rgba(124,58,237,.18);
}
.kpi-v3.kpi-purple .kpi-icon {
  background: linear-gradient(135deg, #8b5cf6, #7c3aed);
}

.kpi-v3.kpi-red {
  background: var(--tint-rose);
  border-color: rgba(220,38,38,.18);
}
.kpi-v3.kpi-red .kpi-icon {
  background: linear-gradient(135deg, #ef4444, #dc2626);
}

.kpi-v3.kpi-orange {
  background: var(--tint-peach);
  border-color: rgba(234,88,12,.20);
}
.kpi-v3.kpi-orange .kpi-icon {
  background: linear-gradient(135deg, #f97316, #ea580c);
}

/* === DARK-MODE OVERRIDES (solid vibrant, matches old reference) === */
[data-theme="dark"] .kpi-v3 {
  border: 1px solid var(--border);
}
[data-theme="dark"] .kpi-v3::before {
  background: radial-gradient(circle at 100% 0%, rgba(255,255,255,.06), transparent 60%);
}
[data-theme="dark"] .kpi-v3 .kpi-label { color: var(--text-muted); }
[data-theme="dark"] .kpi-v3 .kpi-value { color: var(--text); }

[data-theme="dark"] .kpi-v3.kpi-teal {
  background: linear-gradient(135deg, rgba(16,185,129,.18) 0%, rgba(5,150,105,.08) 100%);
  border-color: rgba(16,185,129,.35);
}
[data-theme="dark"] .kpi-v3.kpi-teal .kpi-value { color: #34d399; }

[data-theme="dark"] .kpi-v3.kpi-green {
  background: linear-gradient(135deg, #047857 0%, #065f46 100%);
  border-color: rgba(16,185,129,.45);
  box-shadow: 0 8px 24px rgba(5,150,105,.20), inset 0 1px 0 rgba(255,255,255,.08);
}
[data-theme="dark"] .kpi-v3.kpi-green .kpi-label { color: rgba(255,255,255,.85); }
[data-theme="dark"] .kpi-v3.kpi-green .kpi-value { color: #ffffff; }
[data-theme="dark"] .kpi-v3.kpi-green .kpi-icon {
  background: rgba(255,255,255,.18);
}

[data-theme="dark"] .kpi-v3.kpi-purple {
  background: linear-gradient(135deg, rgba(124,58,237,.18) 0%, rgba(109,40,217,.08) 100%);
  border-color: rgba(124,58,237,.35);
}
[data-theme="dark"] .kpi-v3.kpi-purple .kpi-value { color: #a78bfa; }

[data-theme="dark"] .kpi-v3.kpi-red {
  background: linear-gradient(135deg, #991b1b 0%, #7f1d1d 100%);
  border-color: rgba(220,38,38,.45);
  box-shadow: 0 8px 24px rgba(220,38,38,.18), inset 0 1px 0 rgba(255,255,255,.08);
}
[data-theme="dark"] .kpi-v3.kpi-red .kpi-label { color: rgba(255,255,255,.85); }
[data-theme="dark"] .kpi-v3.kpi-red .kpi-value { color: #ffffff; }
[data-theme="dark"] .kpi-v3.kpi-red .kpi-icon {
  background: rgba(255,255,255,.18);
}

[data-theme="dark"] .kpi-v3.kpi-orange {
  background: linear-gradient(135deg, rgba(234,88,12,.18) 0%, rgba(194,65,12,.08) 100%);
  border-color: rgba(234,88,12,.35);
}
[data-theme="dark"] .kpi-v3.kpi-orange .kpi-value { color: #fbbf24; }

/* ===== DASHBOARD GRID LAYOUT (matches mockup row 2: 3 columns) ===== */
.dash-row {
  display: grid;
  grid-template-columns: 1fr 2fr 1.2fr;
  gap: 16px;
  margin-bottom: 22px;
}
@media (max-width: 1280px) { .dash-row { grid-template-columns: 1fr 1fr; } }
@media (max-width: 760px)  { .dash-row { grid-template-columns: 1fr; } }

.dash-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 22px;
  padding: 22px;
  box-shadow: var(--shadow-sm);
  position: relative;
  overflow: hidden;
  transition: box-shadow .25s, transform .25s;
}
.dash-card:hover { box-shadow: var(--shadow); }
[data-theme="dark"] .dash-card {
  background: linear-gradient(180deg, rgba(13,19,31,.7) 0%, rgba(13,19,31,.95) 100%);
  border: 1px solid var(--border);
}
.dash-card-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
  gap: 10px;
}
.dash-card-title {
  font-size: 16px;
  font-weight: 800;
  color: var(--text);
  display: flex; align-items: center; gap: 8px;
}
.dash-card-action {
  font-size: 11.5px;
  padding: 6px 12px;
  border-radius: 10px;
  background: rgba(255,255,255,.03);

  color: var(--text-muted);

.dash-card-action:hover { color: var(--primary); border-color: rgba(20,184,166,.3); }

/* ===== DASHBOARD ROW 3 (4 widgets) ===== */
.dash-row-2 {

  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 22px;

@media (max-width: 760px)  { .dash-row-2 { grid-template-columns: 1fr; } }

.stock-row {

}

  font-weight: 700;

}
.stock-cta:hover { background: linear-gradient(135deg, rgba(20,184,166,.25), rgba(13,148,136,.18)); }

/* ===== TABLES (override for dark) ===== */

  background: transparent;
}
[data-theme="dark"] .data-table thead th {
  background: rgba(20,184,166,.04);
  color: var(--text-muted);
  font-size: 11px;
  font-weight: 700;

  padding: 12px;
  border-bottom: 1px solid var(--border);

  font-size: 13px;
}
[data-theme="dark"] .data-table tbody tr:hover {
  background: rgba(20,184,166,.04);
}

/* ===== ALERTS WIDGET ===== */
.alert-row {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 12px;
  border-radius: 12px;
  background: rgba(255,255,255,.02);
  border: 1px solid var(--border);
  margin-bottom: 8px;
  transition: all .25s ease;
}
.alert-row:hover { background: rgba(255,255,255,.04); transform: translateX(-2px); }
.alert-row:last-child { margin-bottom: 0; }
.alert-row .alert-icon {
  width: 36px; height: 36px;

/* ========================= SMART ALERTS BAR (نابض) ========================= */
.smart-alerts-bar {
  display: flex;
  align-items: stretch;
  justify-content: center;
  gap: 12px;
  margin-bottom: 18px;
  flex-wrap: wrap;
}

.smart-alert {
  position: relative;
  display: inline-flex;
  align-items: center;
  gap: 12px;
  padding: 12px 18px 12px 14px;
  border-radius: 14px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  cursor: pointer;
  transition: transform .25s cubic-bezier(.4,0,.2,1), box-shadow .25s cubic-bezier(.4,0,.2,1);
  min-width: 220px;
  overflow: hidden;
}
.smart-alert:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-lg);
}
/* Pulsing left edge accent */
.smart-alert::before {
  content: '';
  position: absolute;
  inset-block: 10px;
  inset-inline-end: 0;
  width: 4px;
  border-radius: 4px;
  background: currentColor;
  opacity: .75;
}

.smart-alert.pulse-danger  { border-color: rgba(239,68,68,.45);  background: linear-gradient(135deg, rgba(239,68,68,.06), var(--surface) 70%); color: #b91c1c; animation: smart-pulse-danger 1.6s ease-in-out infinite; }
.smart-alert.pulse-warning { border-color: rgba(245,158,11,.5);  background: linear-gradient(135deg, rgba(245,158,11,.06), var(--surface) 70%); color: #b45309; animation: smart-pulse-warning 2.2s ease-in-out infinite; }
.smart-alert.pulse-success { border-color: rgba(16,185,129,.45); background: linear-gradient(135deg, rgba(16,185,129,.06), var(--surface) 70%); color: #047857; animation: smart-pulse-success 2.8s ease-in-out infinite; }

@keyframes smart-pulse-danger {
  0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,.45), 0 4px 12px rgba(239,68,68,.12); }
  50%      { box-shadow: 0 0 0 8px rgba(239,68,68,0),   0 6px 18px rgba(239,68,68,.22); }
}
@keyframes smart-pulse-warning {
  0%, 100% { box-shadow: 0 0 0 0 rgba(245,158,11,.4),  0 4px 12px rgba(245,158,11,.10); }
  50%      { box-shadow: 0 0 0 7px rgba(245,158,11,0),  0 6px 16px rgba(245,158,11,.18); }
}
@keyframes smart-pulse-success {
  0%, 100% { box-shadow: 0 0 0 0 rgba(16,185,129,.35), 0 4px 12px rgba(16,185,129,.08); }
  50%      { box-shadow: 0 0 0 6px rgba(16,185,129,0),  0 6px 14px rgba(16,185,129,.16); }
}

.pulse-dot {
  position: absolute;
  top: 10px; left: 10px;
  width: 8px; height: 8px;
  border-radius: 50%;
}
.pulse-dot.pulse-danger  { background: var(--danger);  animation: dot-pulse 1.2s ease-in-out infinite; }
.pulse-dot.pulse-warning { background: var(--warning); animation: dot-pulse 1.8s ease-in-out infinite; }
.pulse-dot.pulse-success { background: var(--success); animation: dot-pulse 2.4s ease-in-out infinite; }

@keyframes dot-pulse {
  0%, 100% { transform: scale(1);   opacity: 1; }
  50%      { transform: scale(1.6); opacity: .55; }
}

.smart-alert-icon {
  width: 42px; height: 42px;
  border-radius: 11px;
  display: grid; place-items: center;
  flex-shrink: 0;
  color: #fff;
}
.smart-alert-icon svg { width: 22px; height: 22px; }
.smart-alert.pulse-danger  .smart-alert-icon { background: linear-gradient(135deg, #ef4444, #dc2626); box-shadow: 0 4px 10px rgba(239,68,68,.35); }
.smart-alert.pulse-warning .smart-alert-icon { background: linear-gradient(135deg, #f59e0b, #d97706); box-shadow: 0 4px 10px rgba(245,158,11,.35); }
.smart-alert.pulse-success .smart-alert-icon { background: linear-gradient(135deg, #10b981, #059669); box-shadow: 0 4px 10px rgba(16,185,129,.30); }

.smart-alert-body { min-width: 0; }
.smart-alert-title {
  font-size: 14px; font-weight: 700; color: var(--text);
  display: inline-flex; align-items: center; gap: 6px; flex-wrap: wrap;
  line-height: 1.3;
}
.smart-alert-qty {
  font-size: 13px;
  font-weight: 800;
  padding: 2px 8px;
  border-radius: 999px;
  background: rgba(255,255,255,.6);
  color: currentColor;
  border: 1px solid currentColor;
}
[data-theme="dark"] .smart-alert-qty { background: rgba(255,255,255,.08); }
.smart-alert-text {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 2px;
  font-weight: 600;
}
.smart-alert.pulse-danger  .smart-alert-text { color: #dc2626; }
.smart-alert.pulse-warning .smart-alert-text { color: #d97706; }
.smart-alert.pulse-success .smart-alert-text { color: #059669; }
[data-theme="dark"] .smart-alert.pulse-danger  .smart-alert-text { color: #fca5a5; }
[data-theme="dark"] .smart-alert.pulse-warning .smart-alert-text { color: #fcd34d; }
[data-theme="dark"] .smart-alert.pulse-success .smart-alert-text { color: #6ee7b7; }
[data-theme="dark"] .smart-alert.pulse-danger  { background: linear-gradient(135deg, rgba(239,68,68,.10), var(--surface) 70%); }
[data-theme="dark"] .smart-alert.pulse-warning { background: linear-gradient(135deg, rgba(245,158,11,.10), var(--surface) 70%); }
[data-theme="dark"] .smart-alert.pulse-success { background: linear-gradient(135deg, rgba(16,185,129,.10), var(--surface) 70%); }

.smart-alert-spacer {
  /* Force the date to wrap to its own row, centered with the alerts */
  flex-basis: 100%;
  height: 0;
}

.smart-alert-date {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 16px;
  border-radius: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  font-size: 13px;
  color: var(--text-muted);
  font-weight: 600;
  align-self: center;
}
.smart-alert-date svg { width: 16px; height: 16px; color: var(--primary); }

@media (max-width: 768px) {
  .smart-alert { min-width: calc(100% - 4px); }
  .smart-alert-spacer { display: none; }
  .smart-alert-date { width: 100%; justify-content: center; }
}

/* Active state (popover open) */
.smart-alert.is-active {
  transform: translateY(-2px);
}
.smart-alert.is-active.pulse-danger  { background: linear-gradient(135deg, rgba(239,68,68,.16), var(--surface) 70%); }
.smart-alert.is-active.pulse-warning { background: linear-gradient(135deg, rgba(245,158,11,.16), var(--surface) 70%); }
.smart-alert.is-active.pulse-success { background: linear-gradient(135deg, rgba(16,185,129,.16), var(--surface) 70%); }
[data-theme="dark"] .smart-alert.is-active.pulse-danger  { background: linear-gradient(135deg, rgba(239,68,68,.22), var(--surface) 70%); }
[data-theme="dark"] .smart-alert.is-active.pulse-warning { background: linear-gradient(135deg, rgba(245,158,11,.22), var(--surface) 70%); }
[data-theme="dark"] .smart-alert.is-active.pulse-success { background: linear-gradient(135deg, rgba(16,185,129,.22), var(--surface) 70%); }

/* ========================= BACKUP CARDS (نسخ احتياطية) ========================= */
.backup-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 14px;
  margin-bottom: 6px;
}
.backup-card {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 16px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  cursor: pointer;
  font-family: inherit;
  text-align: right;
  transition: transform .2s, box-shadow .2s, border-color .2s, background .2s;
  position: relative;
  overflow: hidden;
}
.backup-card::before {
  content: '';
  position: absolute;
  top: 0; right: 0; bottom: 0;
  width: 4px;
  background: currentColor;
  opacity: .55;
}
.backup-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 28px rgba(0,0,0,.10), 0 4px 10px rgba(0,0,0,.06);
}
.backup-card:active { transform: translateY(-1px); }
.backup-card-icon {
  width: 48px; height: 48px;
  border-radius: 12px;
  display: grid; place-items: center;
  flex-shrink: 0;
  color: #fff;
}
.backup-card-icon svg { width: 24px; height: 24px; }
.backup-card-body { flex: 1; min-width: 0; }
.backup-card-title {
  font-size: 14px;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 4px;
}
.backup-card-desc {
  font-size: 12px;
  color: var(--text-muted);
  line-height: 1.5;
  margin-bottom: 8px;
}
.backup-card-tag {
  display: inline-block;
  font-size: 10.5px;
  font-weight: 700;
  padding: 3px 9px;
  border-radius: 999px;
  background: var(--surface-2);
  color: var(--text-muted);
}

/* JSON - teal */
.backup-card.backup-json { color: #0d9488; }
.backup-card.backup-json:hover { border-color: #14b8a6; background: linear-gradient(135deg, rgba(20,184,166,.05), var(--surface)); }
.backup-card.backup-json .backup-card-icon { background: linear-gradient(135deg, #14b8a6, #0d9488); box-shadow: 0 4px 12px rgba(20,184,166,.35); }
.backup-card.backup-json .backup-card-tag { background: rgba(20,184,166,.12); color: #0d9488; }

/* SQL - purple */
.backup-card.backup-sql { color: #7c3aed; }
.backup-card.backup-sql:hover { border-color: #8b5cf6; background: linear-gradient(135deg, rgba(139,92,246,.05), var(--surface)); }
.backup-card.backup-sql .backup-card-icon { background: linear-gradient(135deg, #8b5cf6, #7c3aed); box-shadow: 0 4px 12px rgba(139,92,246,.35); }
.backup-card.backup-sql .backup-card-tag { background: rgba(139,92,246,.12); color: #7c3aed; }

/* ZIP - orange */
.backup-card.backup-zip { color: #d97706; }
.backup-card.backup-zip:hover { border-color: #f59e0b; background: linear-gradient(135deg, rgba(245,158,11,.05), var(--surface)); }
.backup-card.backup-zip .backup-card-icon { background: linear-gradient(135deg, #f59e0b, #d97706); box-shadow: 0 4px 12px rgba(245,158,11,.35); }
.backup-card.backup-zip .backup-card-tag { background: rgba(245,158,11,.12); color: #d97706; }

/* Excel - green */
.backup-card.backup-excel { color: #059669; }
.backup-card.backup-excel:hover { border-color: #10b981; background: linear-gradient(135deg, rgba(16,185,129,.05), var(--surface)); }
.backup-card.backup-excel .backup-card-icon { background: linear-gradient(135deg, #10b981, #059669); box-shadow: 0 4px 12px rgba(16,185,129,.35); }
.backup-card.backup-excel .backup-card-tag { background: rgba(16,185,129,.12); color: #059669; }

/* Restore - blue (prominent, with dashed border to stand out as an action) */

.backup-card.backup-restore .backup-card-tag { background: rgba(59,130,246,.12); color: #2563eb; }

[data-theme="dark"] .backup-card.backup-sql  .backup-card-tag { background: rgba(139,92,246,.18); color: #c4b5fd; }
[data-theme="dark"] .backup-card.backup-zip  .backup-card-tag { background: rgba(245,158,11,.18); color: #fcd34d; }
[data-theme="dark"] .backup-card.backup-excel .backup-card-tag { background: rgba(16,185,129,.18); color: #6ee7b7; }

.voice-input-wrap {
  display: flex;
  gap: 8px;
  align-items: stretch;
}
.voice-input-target {
  flex: 1;
  min-width: 0;
}
.voice-mic-btn {
  position: relative;
  width: 44px;
  flex-shrink: 0;
  display: grid;
  place-items: center;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: #fff;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: transform .2s, box-shadow .2s;
  box-shadow: 0 4px 12px rgba(20,184,166,.35);
}
.voice-mic-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 16px rgba(20,184,166,.5);
}
.voice-mic-btn:active { transform: translateY(0); }
.voice-mic-btn svg {
  width: 20px;
  height: 20px;
  position: relative;
  z-index: 2;
}
.voice-mic-pulse {
  position: absolute;
  inset: 0;
  border-radius: 10px;
  pointer-events: none;
  opacity: 0;
}
.voice-mic-btn.listening {
  background: linear-gradient(135deg, #ef4444, #dc2626);
  box-shadow: 0 4px 16px rgba(239,68,68,.5);
  animation: voice-listening 1.2s ease-in-out infinite;
}
.voice-mic-btn.listening .voice-mic-pulse {
  opacity: 1;
  background: rgba(239,68,68,.3);
  animation: voice-mic-ring 1.2s ease-out infinite;
}
@keyframes voice-listening {
  0%, 100% { box-shadow: 0 4px 16px rgba(239,68,68,.5), 0 0 0 0 rgba(239,68,68,.6); }
  50%      { box-shadow: 0 4px 16px rgba(239,68,68,.7), 0 0 0 10px rgba(239,68,68,0); }
}
@keyframes voice-mic-ring {
  0%   { transform: scale(1);   opacity: .7; }
  100% { transform: scale(1.6); opacity: 0; }
}

/* ========================= POPOVER (تفاصيل البطاقة) ========================= */
.smart-alert-popover {
  position: absolute;
  z-index: 100;
  min-width: 320px;
  max-width: 380px;
  animation: pop-in .22s cubic-bezier(.4,0,.2,1);
}
@keyframes pop-in {
  from { opacity: 0; transform: translateY(-6px) scale(.97); }
  to   { opacity: 1; transform: translateY(0)    scale(1); }
}

.popover-inner {
  background: var(--surface);
  border: none;
  border-radius: 16px;
  padding: 0;
  position: relative;
  overflow: hidden;
  box-shadow:
    0 20px 50px rgba(0,0,0,.18),
    0 6px 18px rgba(0,0,0,.08),
    0 0 0 1px rgba(0,0,0,.04);
}
[data-theme="dark"] .popover-inner {
  box-shadow:
    0 24px 60px rgba(0,0,0,.6),
    0 8px 22px rgba(0,0,0,.45),
    0 0 0 1px rgba(255,255,255,.04);
}

/* Top accent stripe — strong, sets the mood without surrounding border */
.popover-inner::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
}
.smart-alert-popover.pop-danger  .popover-inner::before { background: linear-gradient(90deg, #ef4444, #f87171, #ef4444); box-shadow: 0 0 18px rgba(239,68,68,.7); }
.smart-alert-popover.pop-warning .popover-inner::before { background: linear-gradient(90deg, #f59e0b, #fbbf24, #f59e0b); box-shadow: 0 0 18px rgba(245,158,11,.7); }
.smart-alert-popover.pop-success .popover-inner::before { background: linear-gradient(90deg, #10b981, #34d399, #10b981); box-shadow: 0 0 16px rgba(16,185,129,.6); }

/* Inside content padding (since we removed it from .popover-inner) */
.popover-content {
  padding: 18px 18px 16px;
}

/* Arrow (ribbon connector) — solid color, no border */
.smart-alert-popover::after {
  content: '';
  position: absolute;
  top: -6px;
  right: var(--arrow-offset, 30px);
  width: 14px;
  height: 14px;
  background: var(--surface);
  transform: rotate(45deg);
  box-shadow: -2px -2px 4px rgba(0,0,0,.04);
}
.smart-alert-popover.pop-danger::after  { background: #ef4444; }
.smart-alert-popover.pop-warning::after { background: #f59e0b; }
.smart-alert-popover.pop-success::after { background: #10b981; }

.popover-header { margin-bottom: 12px; }
.popover-title {
  font-size: 15px;
  font-weight: 800;
  color: var(--text);
}
.smart-alert-popover.pop-danger  .popover-title { color: #dc2626; }
.smart-alert-popover.pop-warning .popover-title { color: #d97706; }
.smart-alert-popover.pop-success .popover-title { color: #059669; }
[data-theme="dark"] .smart-alert-popover.pop-danger  .popover-title { color: #fca5a5; }
[data-theme="dark"] .smart-alert-popover.pop-warning .popover-title { color: #fcd34d; }
[data-theme="dark"] .smart-alert-popover.pop-success .popover-title { color: #6ee7b7; }

.popover-rows {
  background: var(--surface-2);
  border-radius: 12px;
  padding: 4px 14px;
  margin-bottom: 12px;
}
[data-theme="dark"] .popover-rows { background: rgba(255,255,255,.025); }

.popover-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 11px 0;
  gap: 12px;
  border-bottom: 1px solid var(--border);
}
.popover-row:last-child { border-bottom: none; }

.popover-row-label {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 12.5px;
  color: var(--text-muted);
  font-weight: 600;
}
.popover-row-label svg {
  width: 15px;
  height: 15px;
  flex-shrink: 0;
}
.smart-alert-popover.pop-danger  .popover-row-label svg { color: #dc2626; }
.smart-alert-popover.pop-warning .popover-row-label svg { color: #d97706; }
.smart-alert-popover.pop-success .popover-row-label svg { color: #059669; }
[data-theme="dark"] .smart-alert-popover.pop-danger  .popover-row-label svg { color: #fca5a5; }
[data-theme="dark"] .smart-alert-popover.pop-warning .popover-row-label svg { color: #fcd34d; }
[data-theme="dark"] .smart-alert-popover.pop-success .popover-row-label svg { color: #6ee7b7; }

.popover-row-value {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  text-align: left;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 60%;
}
.popover-row-value.status-danger  { color: #dc2626; }
.popover-row-value.status-warning { color: #d97706; }
.popover-row-value.status-success { color: #059669; }
[data-theme="dark"] .popover-row-value.status-danger  { color: #fca5a5; }
[data-theme="dark"] .popover-row-value.status-warning { color: #fcd34d; }
[data-theme="dark"] .popover-row-value.status-success { color: #6ee7b7; }

.popover-meter { padding: 4px 4px 12px; }
.popover-meter-label {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 600;
}
.popover-meter-pct {
  font-size: 13px;
  font-weight: 800;
}
.smart-alert-popover.pop-danger  .popover-meter-pct { color: #dc2626; }
.smart-alert-popover.pop-warning .popover-meter-pct { color: #d97706; }
.smart-alert-popover.pop-success .popover-meter-pct { color: #059669; }
[data-theme="dark"] .smart-alert-popover.pop-danger  .popover-meter-pct { color: #fca5a5; }
[data-theme="dark"] .smart-alert-popover.pop-warning .popover-meter-pct { color: #fcd34d; }
[data-theme="dark"] .smart-alert-popover.pop-success .popover-meter-pct { color: #6ee7b7; }

.popover-meter-bar {
  height: 8px;
  background: var(--surface-2);
  border-radius: 999px;
  overflow: hidden;
}
[data-theme="dark"] .popover-meter-bar { background: rgba(255,255,255,.06); }
.popover-meter-fill {
  height: 100%;
  border-radius: 999px;
  transition: width .6s cubic-bezier(.4,0,.2,1);
}
.smart-alert-popover.pop-danger  .popover-meter-fill { background: linear-gradient(90deg, #ef4444, #dc2626); box-shadow: 0 0 12px rgba(239,68,68,.5); }
.smart-alert-popover.pop-warning .popover-meter-fill { background: linear-gradient(90deg, #f59e0b, #d97706); box-shadow: 0 0 12px rgba(245,158,11,.5); }
.smart-alert-popover.pop-success .popover-meter-fill { background: linear-gradient(90deg, #10b981, #059669); box-shadow: 0 0 12px rgba(16,185,129,.4); }

.popover-footer {
  margin-top: 8px;
  display: flex;
  justify-content: center;
}
.popover-btn {
  padding: 9px 22px;
  border-radius: 10px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  font-size: 12.5px;
  font-weight: 700;
  color: var(--text);
  cursor: pointer;
  transition: background .2s, border-color .2s, transform .2s, color .2s;
}
.popover-btn:hover {
  transform: translateY(-1px);
}
.smart-alert-popover.pop-danger  .popover-btn:hover { background: rgba(239,68,68,.1);  border-color: #ef4444; color: #dc2626; }
.smart-alert-popover.pop-warning .popover-btn:hover { background: rgba(245,158,11,.1); border-color: #f59e0b; color: #d97706; }
.smart-alert-popover.pop-success .popover-btn:hover { background: rgba(16,185,129,.1); border-color: #10b981; color: #059669; }

@media (max-width: 768px) {
  .smart-alert-popover {
    min-width: 280px;
    max-width: calc(100vw - 32px);
  }
}

/* ========================= DASHBOARD HEATMAP ========================= */
.dash-heat-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 5px;
  margin-top: 4px;
}
.dash-heat-table th {
  font-size: 11.5px;
  color: var(--text-muted);
  font-weight: 600;
  padding: 4px 2px;
  text-align: center;
}
.dash-heat-table td {
  height: 32px;
  border-radius: 7px;
  text-align: center;
  font-size: 10.5px;
  font-weight: 700;
  color: rgba(0,0,0,.55);
  cursor: pointer;
  transition: transform .2s cubic-bezier(.4,0,.2,1), box-shadow .2s;
}
.dash-heat-table td:hover {
  transform: scale(1.12);
  box-shadow: 0 4px 10px rgba(0,0,0,.15);
  z-index: 1;
  position: relative;
}
.dash-heat-table td.lvl-0 { background: #f3f4f6; color: var(--text-soft); }
.dash-heat-table td.lvl-1 { background: #fee2e2; }
.dash-heat-table td.lvl-2 { background: #fed7aa; }
.dash-heat-table td.lvl-3 { background: #fde68a; }
.dash-heat-table td.lvl-4 { background: #bbf7d0; }
.dash-heat-table td.lvl-5 { background: #4ade80; color: rgba(0,0,0,.7); }
.dash-heat-table td.weekrow {
  font-size: 11.5px;
  color: var(--text-muted);
  font-weight: 600;
  background: transparent !important;
  text-align: center;
  cursor: default;
  padding-inline-end: 6px;
}
.dash-heat-table td.weekrow:hover { transform: none; box-shadow: none; }
.dash-heat-table td.future { opacity: .25; cursor: default; }
.dash-heat-table td.future:hover { transform: none; box-shadow: none; }

[data-theme="dark"] .dash-heat-table td.lvl-0 { background: #1e293b; }
[data-theme="dark"] .dash-heat-table td.lvl-1 { background: rgba(239,68,68,.35); color: #fecaca; }
[data-theme="dark"] .dash-heat-table td.lvl-2 { background: rgba(245,158,11,.35); color: #fde68a; }
[data-theme="dark"] .dash-heat-table td.lvl-3 { background: rgba(250,204,21,.4); color: #fef3c7; }
[data-theme="dark"] .dash-heat-table td.lvl-4 { background: rgba(34,197,94,.4); color: #bbf7d0; }
[data-theme="dark"] .dash-heat-table td.lvl-5 { background: rgba(34,197,94,.7); color: #fff; }

.dash-heat-legend {
  display: flex; flex-wrap: wrap; gap: 12px;
  justify-content: center;
  padding-top: 14px; margin-top: 14px;
  border-top: 1px solid var(--border);
}
.dash-heat-legend span {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11.5px; color: var(--text-muted); font-weight: 600;
}
.dash-heat-legend i {
  width: 14px; height: 14px; border-radius: 4px; display: inline-block;
}
[data-theme="dark"] .dash-heat-legend i.lv-low  { background: rgba(239,68,68,.4) !important; }
[data-theme="dark"] .dash-heat-legend i.lv-med  { background: rgba(250,204,21,.45) !important; }
[data-theme="dark"] .dash-heat-legend i.lv-good { background: rgba(34,197,94,.45) !important; }
[data-theme="dark"] .dash-heat-legend i.lv-best { background: rgba(34,197,94,.75) !important; }

/* Period dropdown menu */
.heat-period-menu {
  position: absolute;
  top: 100%; inset-inline-end: 0;
  margin-top: 6px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  box-shadow: var(--shadow-lg);
  min-width: 140px;
  z-index: 50;
  overflow: hidden;
}
.heat-period-menu div {
  padding: 10px 14px;
  font-size: 13px;
  color: var(--text);
  cursor: pointer;
  font-weight: 600;
}
.heat-period-menu div:hover { background: var(--surface-2); color: var(--primary); }

/* ============== AI INSIGHTS BAR (sales + heatmap) ============== */
.ai-insights-bar {
  margin-top: 16px;
  padding: 14px;
  background: linear-gradient(135deg, rgba(124,58,237,.06) 0%, rgba(16,185,129,.06) 100%);
  border: 1px solid rgba(124,58,237,.18);
  border-radius: 16px;
  position: relative;
  overflow: hidden;
}
.ai-insights-bar::before {
  content: '';
  position: absolute;
  top: -50%; right: -20%;
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(124,58,237,.12), transparent 70%);
  pointer-events: none;
}
[data-theme="dark"] .ai-insights-bar {
  background: linear-gradient(135deg, rgba(124,58,237,.12) 0%, rgba(16,185,129,.10) 100%);
  border-color: rgba(124,58,237,.30);
}
.ai-insights-header {
  display: flex; align-items: center;
  margin-bottom: 10px;
  position: relative;
  z-index: 1;
}
.ai-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 11px;
  background: linear-gradient(135deg, #8b5cf6, #6d28d9);
  color: white;
  font-size: 11px;
  font-weight: 800;
  border-radius: 999px;
  box-shadow: 0 4px 12px rgba(124,58,237,.30), inset 0 1px 0 rgba(255,255,255,.20);
  letter-spacing: 0.2px;
}
.ai-badge svg {
  animation: aiSpark 2.4s ease-in-out infinite;
}
@keyframes aiSpark {
  0%, 100% { transform: scale(1) rotate(0); opacity: 1; }
  50%      { transform: scale(1.15) rotate(15deg); opacity: .8; }
}
.ai-insights-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  position: relative;
  z-index: 1;
}
@media (max-width: 700px) { .ai-insights-grid { grid-template-columns: 1fr; } }
.ai-insight {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 10px 12px;
  background: var(--surface);
  border-radius: 12px;
  border: 1px solid var(--border);
  font-size: 12.5px;
  line-height: 1.55;
  color: var(--text);
  transition: transform .2s, box-shadow .2s;
}
.ai-insight:hover {
  transform: translateX(-2px);
  box-shadow: 0 4px 12px rgba(15,23,42,.06);
}
[data-theme="dark"] .ai-insight {
  background: rgba(13,19,31,.7);
  border-color: var(--border);
}
.ai-insight .ai-icon {
  font-size: 18px;
  flex-shrink: 0;
  line-height: 1;
}
.ai-insight .ai-text b { color: var(--text); font-weight: 800; }
.ai-insight.ai-success { border-inline-start: 3px solid #10b981; }
.ai-insight.ai-warning { border-inline-start: 3px solid #f59e0b; }
.ai-insight.ai-danger  { border-inline-start: 3px solid #ef4444; }
.ai-insight.ai-info    { border-inline-start: 3px solid #8b5cf6; }

/* ============== TODAY'S PULSE WIDGET ============== */
.pulse-card {
  background: linear-gradient(135deg, var(--tint-mint) 0%, var(--surface) 60%);
  border-color: rgba(16,185,129,.22);
  position: relative;
  overflow: hidden;
  min-height: 360px;
}
[data-theme="dark"] .pulse-card {
  background: linear-gradient(135deg, rgba(16,185,129,.10) 0%, rgba(13,19,31,.95) 100%);
  border-color: rgba(16,185,129,.25);
}

/* "Live" indicator (red blinking dot) */
.pulse-live-indicator {
  display: inline-flex !important;
  align-items: center;
  gap: 6px;
  color: #dc2626 !important;
  font-weight: 800;
}
[data-theme="dark"] .pulse-live-indicator { color: #fca5a5 !important; }
.pulse-live-dot {
  width: 8px; height: 8px;
  background: #dc2626;
  border-radius: 50%;
  display: inline-block;
  animation: pulseLive 1.4s ease-in-out infinite;
}
@keyframes pulseLive {
  0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 0 0 rgba(220,38,38,.5); }
  50%      { opacity: .7; transform: scale(1.2); box-shadow: 0 0 0 6px rgba(220,38,38,0); }
}

.today-pulse-container { position: relative; z-index: 1; }

.pulse-empty {
  text-align: center;
  padding: 40px 14px;
}
.pulse-empty-icon { font-size: 56px; margin-bottom: 10px; opacity: .5; }
.pulse-empty-title { font-size: 16px; font-weight: 800; color: var(--text); margin-bottom: 4px; }
.pulse-empty-sub { font-size: 12.5px; color: var(--text-muted); }

/* Hero block: revenue + compare */
.pulse-hero {
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  gap: 14px;
  padding: 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  margin-bottom: 14px;
}
@media (max-width: 700px) {
  .pulse-hero { grid-template-columns: 1fr; }
}
[data-theme="dark"] .pulse-hero { background: rgba(13,19,31,.5); }

.pulse-hero-main {
  padding: 6px 4px;
}
.pulse-hero-label {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-muted);
  letter-spacing: 0.2px;
  margin-bottom: 6px;
}
.pulse-hero-value {
  font-size: 32px;
  font-weight: 900;
  letter-spacing: -0.8px;
  background: linear-gradient(135deg, #047857, #10b981);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1.1;
  margin-bottom: 10px;
}
.pulse-hero-compare {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
}
.pulse-compare-item {
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.pulse-compare-lbl {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
}

.pulse-pill {
  display: inline-flex;
  padding: 3px 9px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 800;
}
.pulse-pill-up { background: rgba(16,185,129,.12); color: #047857; }
.pulse-pill-down { background: rgba(220,38,38,.12); color: #b91c1c; }
.pulse-pill-stable { background: rgba(100,116,139,.12); color: #475569; }
[data-theme="dark"] .pulse-pill-up { background: rgba(16,185,129,.20); color: #6ee7b7; }
[data-theme="dark"] .pulse-pill-down { background: rgba(220,38,38,.20); color: #fca5a5; }
[data-theme="dark"] .pulse-pill-stable { background: rgba(100,116,139,.20); color: #cbd5e1; }

.pulse-hero-side {
  display: flex; flex-direction: column;
  gap: 8px;
  justify-content: center;
  padding-inline-start: 10px;
  border-inline-start: 2px dashed var(--border);
}
@media (max-width: 700px) {
  .pulse-hero-side { border-inline-start: none; border-top: 2px dashed var(--border); padding: 10px 0 0; }
}
.pulse-side-stat {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px;
  background: var(--surface-2);
  border-radius: 10px;
  border: 1px solid var(--border);
}
.pulse-side-stat.positive {
  background: rgba(16,185,129,.08);
  border-color: rgba(16,185,129,.25);
}
.pulse-side-stat.negative {
  background: rgba(220,38,38,.08);
  border-color: rgba(220,38,38,.25);
}
.pulse-side-icon { font-size: 20px; }
.pulse-side-lbl { font-size: 11px; font-weight: 700; color: var(--text-muted); }
.pulse-side-val {
  font-size: 14px;
  font-weight: 900;
  color: var(--text);
  letter-spacing: -0.3px;
}
.pulse-side-stat.positive .pulse-side-val { color: #047857; }
.pulse-side-stat.negative .pulse-side-val { color: #b91c1c; }
[data-theme="dark"] .pulse-side-stat.positive .pulse-side-val { color: #34d399; }
[data-theme="dark"] .pulse-side-stat.negative .pulse-side-val { color: #fca5a5; }

/* Top performers row (3 cards) */
.pulse-top-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 10px;
  margin-bottom: 14px;
}
.pulse-top-card {
  padding: 12px 14px;
  border-radius: 14px;
  border: 1.5px solid;
  background: var(--surface);
  position: relative;
  overflow: hidden;
  transition: transform .2s, box-shadow .2s;
}
.pulse-top-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(15,23,42,.08);
}
.pulse-top-customer { border-color: rgba(124,58,237,.30); background: linear-gradient(135deg, rgba(124,58,237,.08), var(--surface) 80%); }
.pulse-top-product  { border-color: rgba(245,158,11,.30); background: linear-gradient(135deg, rgba(245,158,11,.08), var(--surface) 80%); }
.pulse-top-peak     { border-color: rgba(6,182,212,.30); background: linear-gradient(135deg, rgba(6,182,212,.08), var(--surface) 80%); }
[data-theme="dark"] .pulse-top-customer { background: linear-gradient(135deg, rgba(124,58,237,.15), var(--surface) 80%); }
[data-theme="dark"] .pulse-top-product  { background: linear-gradient(135deg, rgba(245,158,11,.15), var(--surface) 80%); }
[data-theme="dark"] .pulse-top-peak     { background: linear-gradient(135deg, rgba(6,182,212,.15), var(--surface) 80%); }

.pulse-top-badge {
  display: inline-block;
  font-size: 10.5px;
  font-weight: 800;
  color: var(--text-muted);
  letter-spacing: 0.2px;
  margin-bottom: 4px;
}
.pulse-top-name {
  font-size: 15px;
  font-weight: 900;
  color: var(--text);
  letter-spacing: -0.3px;
  margin-bottom: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.pulse-top-meta {
  font-size: 11.5px;
  color: var(--text-muted);
  font-weight: 600;
}
.pulse-top-meta b { color: var(--text); font-weight: 800; }

/* Hourly bars chart */
.pulse-hourly {
  padding: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  margin-bottom: 14px;
}
[data-theme="dark"] .pulse-hourly { background: rgba(13,19,31,.5); }

.pulse-hourly-title {
  font-size: 12px;
  font-weight: 800;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.pulse-hourly-bars {
  display: grid;
  grid-template-columns: repeat(24, 1fr);
  gap: 3px;
  align-items: flex-end;
  height: 60px;
}
.pulse-hour-bar {
  display: flex; flex-direction: column;
  align-items: center;
  height: 100%;
  cursor: default;
}
.pulse-hour-fill {
  width: 100%;
  min-height: 2px;
  height: 0%;
  background: linear-gradient(180deg, #34d399, #059669);
  border-radius: 3px 3px 1px 1px;
  flex: 1 0 auto;
  animation: pulseHourRise 1s cubic-bezier(.34,1.56,.64,1) forwards;
  opacity: 0.85;
  transition: opacity .2s, transform .2s;
}
.pulse-hour-bar:hover .pulse-hour-fill { opacity: 1; transform: scaleY(1.05); transform-origin: bottom; }
@keyframes pulseHourRise {
  from { height: 0%; }
  to   { height: var(--target-h, 0%); }
}
.pulse-hour-bar.is-peak .pulse-hour-fill {
  background: linear-gradient(180deg, #fb923c, #ea580c);
  opacity: 1;
  box-shadow: 0 0 8px rgba(234,88,12,.5);
}
.pulse-hour-label {
  font-size: 9px;
  color: var(--text-soft);
  font-weight: 600;
  margin-top: 3px;
  white-space: nowrap;
}

/* Activity timeline */
.pulse-timeline-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
}
[data-theme="dark"] .pulse-timeline-section { background: rgba(13,19,31,.5); }

.pulse-timeline-title {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 14px;
  background: var(--surface-2);
  border-bottom: 1px solid var(--border);
  font-size: 12.5px;
  font-weight: 800;
  color: var(--text);
}
.pulse-timeline-count {
  background: linear-gradient(135deg, #10b981, #059669);
  color: white;
  padding: 2px 10px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 800;
}

.pulse-timeline {
  max-height: 360px;
  overflow-y: auto;
}
.pulse-timeline::-webkit-scrollbar { width: 6px; }
.pulse-timeline::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 999px; }

.pulse-tl-item {
  display: grid;
  grid-template-columns: auto auto 1fr auto;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background .15s;
  animation: tlSlideIn .25s ease-out;
}
.pulse-tl-item:last-child { border-bottom: none; }
.pulse-tl-item:hover { background: var(--surface-2); }
@keyframes tlSlideIn {
  from { opacity: 0; transform: translateX(-4px); }
  to   { opacity: 1; transform: translateX(0); }
}

.pulse-tl-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  box-shadow: 0 0 0 3px var(--surface);
}
.pulse-tl-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: grid; place-items: center;
  font-size: 18px;
  flex-shrink: 0;
}
.pulse-tl-body { min-width: 0; }
.pulse-tl-title {
  font-size: 13px;
  font-weight: 800;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.pulse-tl-sub {
  font-size: 11.5px;
  color: var(--text-muted);
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.pulse-tl-right {
  text-align: end;
  white-space: nowrap;
}
.pulse-tl-amount {
  font-size: 13px;
  font-weight: 900;
  letter-spacing: -0.3px;
}
.pulse-tl-amount.amt-pos { color: #047857; }
.pulse-tl-amount.amt-neg { color: #b91c1c; }
[data-theme="dark"] .pulse-tl-amount.amt-pos { color: #34d399; }
[data-theme="dark"] .pulse-tl-amount.amt-neg { color: #fca5a5; }
.pulse-tl-time {
  font-size: 10.5px;
  color: var(--text-soft);
  font-weight: 600;
  margin-top: 2px;
}

.pulse-tl-more {
  padding: 12px;
  text-align: center;
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 600;
  border-top: 1px dashed var(--border);
}

@media (max-width: 600px) {
  .pulse-hero-value { font-size: 26px; }
  .pulse-hourly-bars { height: 50px; }
  .pulse-tl-icon { width: 30px; height: 30px; font-size: 14px; }
}

/* ============== SUPPLIER PRICE LIST ============== */
/* Icon button with count badge in suppliers row */
.btn-icon.btn-pricelist {
  position: relative;
  color: #ea580c;
}
.btn-icon.btn-pricelist:hover {
  background: rgba(234,88,12,.10);
}
.pricelist-count {
  position: absolute;
  top: -2px;
  inset-inline-end: -2px;
  min-width: 16px; height: 16px;
  padding: 0 4px;
  background: linear-gradient(135deg, #f97316, #ea580c);
  color: white;
  font-size: 9px;
  font-weight: 800;
  border-radius: 999px;
  display: inline-flex; align-items: center; justify-content: center;
  border: 2px solid var(--surface);
  box-shadow: 0 2px 5px rgba(234,88,12,.40);
  letter-spacing: -0.2px;
}

/* Price list modal */
.pl-modal {
  display: flex; flex-direction: column;
  gap: 14px;
  max-height: 70vh;
}
.pl-header {
  padding: 14px;
  background: linear-gradient(135deg, rgba(234,88,12,.10), rgba(245,158,11,.05));
  border: 1px solid rgba(234,88,12,.20);
  border-radius: 14px;
}
[data-theme="dark"] .pl-header {
  background: linear-gradient(135deg, rgba(234,88,12,.15), rgba(245,158,11,.06));
}
.pl-supplier-name {
  font-size: 18px; font-weight: 900;
  color: var(--text); letter-spacing: -0.4px;
  margin-bottom: 6px;
}
.pl-supplier-meta { display: flex; flex-wrap: wrap; gap: 6px; }
.pl-meta-chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 999px;
  font-size: 11.5px; font-weight: 700;
  color: var(--text-muted);
}
.pl-meta-count {
  background: linear-gradient(135deg, #ea580c, #c2410c) !important;
  color: white !important;
  border-color: transparent !important;
}

/* Add form */
.pl-add-form {
  padding: 14px;
  background: var(--surface-2);
  border: 1.5px dashed rgba(5,150,105,.30);
  border-radius: 14px;
}
.pl-add-header {
  font-size: 13.5px; font-weight: 800;
  color: var(--primary-dark);
  margin-bottom: 10px;
}
[data-theme="dark"] .pl-add-header { color: #34d399; }
.pl-add-grid {
  display: grid;
  grid-template-columns: 1.4fr 1fr 0.8fr 0.9fr;
  gap: 8px;
  align-items: end;
}
.pl-add-grid .form-group { margin-bottom: 0; }
.pl-add-grid label { font-size: 11px; }
.pl-add-grid .form-control { padding: 8px 12px; font-size: 13px; }
.pl-add-notes { grid-column: 1 / 4; }
.pl-add-actions { grid-column: 4 / 5; align-self: stretch; display: flex; align-items: end; }
.pl-add-actions .btn { width: 100%; }
@media (max-width: 700px) {
  .pl-add-grid { grid-template-columns: 1fr 1fr; }
  .pl-add-notes, .pl-add-actions { grid-column: 1 / 3; }
}

/* Items by category */
.pl-items {
  display: flex; flex-direction: column; gap: 12px;
  overflow-y: auto;
  padding-inline-end: 4px;
}
.pl-items::-webkit-scrollbar { width: 6px; }
.pl-items::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 999px; }

.pl-empty {
  padding: 50px 20px;
  text-align: center;
}
.pl-empty-icon { font-size: 56px; margin-bottom: 10px; opacity: .4; }
.pl-empty-text { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.pl-empty-sub { font-size: 12.5px; color: var(--text-muted); }

.pl-category-group {
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  background: var(--surface);
}
.pl-category-header {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  background: color-mix(in srgb, var(--cat-color, #64748b) 10%, var(--surface));
  border-bottom: 1px solid var(--border);
}
[data-theme="dark"] .pl-category-header {
  background: color-mix(in srgb, var(--cat-color, #64748b) 18%, var(--surface));
}
.pl-cat-icon { font-size: 18px; }
.pl-cat-label {
  font-size: 13.5px; font-weight: 800;
  color: var(--cat-color, var(--text));
  letter-spacing: -0.2px;
}
.pl-cat-count {
  padding: 2px 8px;
  background: color-mix(in srgb, var(--cat-color, #64748b) 18%, transparent);
  color: var(--cat-color, var(--text));
  border-radius: 999px;
  font-size: 11px; font-weight: 700;
}
.pl-cat-total {
  margin-inline-start: auto;
  font-size: 11.5px; font-weight: 700;
  color: var(--text-muted);
}

.pl-cat-items { display: flex; flex-direction: column; }
.pl-item {
  display: grid;
  grid-template-columns: 1.5fr auto auto;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  border-top: 1px solid var(--border);
  transition: background .15s;
}
.pl-item:first-child { border-top: none; }
.pl-item:hover { background: color-mix(in srgb, var(--cat-color, #64748b) 6%, transparent); }
.pl-item-name {
  display: flex; flex-direction: column;
  min-width: 0;
}
.pl-item-name b {
  font-size: 13px; font-weight: 700;
  color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.pl-item-name small {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 2px;
}
.pl-item-price {
  display: flex; flex-direction: column; align-items: flex-end;
  white-space: nowrap;
}
.pl-price-val {
  font-size: 16px; font-weight: 900;
  color: var(--cat-color, var(--text));
  letter-spacing: -0.4px;
  line-height: 1;
}
.pl-price-unit {
  font-size: 10.5px; font-weight: 600;
  color: var(--text-soft);
  margin-top: 2px;
}
.pl-item-actions { display: flex; gap: 4px; }
.btn-icon.btn-icon-sm {
  width: 28px; height: 28px;
  border-radius: 7px;
}

/* ============== INLINE SUPPLIER PRICE LIST (in supplier form) ============== */
.sup-pl-section {
  margin-top: 18px;
  padding: 14px;
  background: linear-gradient(135deg, rgba(234,88,12,.06), rgba(245,158,11,.03));
  border: 1.5px dashed rgba(234,88,12,.30);
  border-radius: 14px;
}
[data-theme="dark"] .sup-pl-section {

}
.sup-pl-header { margin-bottom: 12px; }
.sup-pl-title {
  font-size: 14px;
  font-weight: 900;
  color: #c2410c;
  letter-spacing: -0.2px;
}
[data-theme="dark"] .sup-pl-title { color: #fb923c; }
.sup-pl-hint {
  font-size: 11.5px;
  color: var(--text-muted);
  margin-top: 2px;
}
.sup-pl-add {

.sup-pl-list { display: flex; flex-direction: column; gap: 8px; max-height: 240px; overflow-y: auto; }
.sup-pl-list::-webkit-scrollbar { width: 6px; }

.sup-pl-empty {

}
.sup-pl-empty-icon { font-size: 20px; }
.sup-pl-group {

}
.sup-pl-group-head {

}
.sup-pl-cat-icon { font-size: 14px; }
.sup-pl-cat-label {
  font-size: 12.5px; font-weight: 800;
  color: var(--cat-color, var(--text));

}
.sup-pl-cat-count {
  padding: 1px 7px;
  background: color-mix(in srgb, var(--cat-color, #64748b) 18%, transparent);

}
.sup-pl-row {

}
.sup-pl-row:first-child { border-top: none; }
.sup-pl-row:hover { background: color-mix(in srgb, var(--cat-color, #64748b) 5%, transparent); }
.sup-pl-row-name {

}
.sup-pl-row-price {

  font-weight: 800;
  color: var(--cat-color, var(--text));

}
.sup-pl-row-price small {
  font-size: 10px;
  color: var(--text-muted);
  font-weight: 600;

}
.sup-pl-row-rm {

  border-radius: 6px;
  background: rgba(220,38,38,.10);

}
.sup-pl-row-rm:hover { background: #dc2626; color: white; transform: scale(1.1); }

[data-theme="dark"] .pur-items-section {

}
.pur-items-header { margin-bottom: 12px; }
.pur-items-title {

}
[data-theme="dark"] .pur-items-title { color: #34d399; }
.pur-items-hint {
