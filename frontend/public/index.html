function printInvoice(id) {
  const inv = DB.data.invoices.find(x=>x.id===id);
  if (!inv) return;
  const { styles, body } = buildInvoiceHTML(inv, { standalone: true });
  const w = window.open('', '_blank', 'width=900,height=700');
  w.document.write(`<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><title>فاتورة #${inv.number}</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>${styles}</style></head><body>
    ${body}
    <script>window.onload = () => { window.print(); }<\/script>
    </body></html>`);
  w.document.close();
}

/* ===== WhatsApp: send invoice as A4 image ===== */
async function sendInvoiceWhatsApp(id) {
  const inv = DB.data.invoices.find(x => x.id === id);
  if (!inv) return;
  const c = DB.data.customers.find(x => x.id === inv.customerId);
  if (!c) { toast('العميل المرتبط بالفاتورة محذوف', 'error'); return; }
  const phoneRaw = (c.phone || '').trim();
  if (!phoneRaw) {
    toast('العميل ليس لديه رقم هاتف مسجل. أضف رقم من قسم العملاء.', 'error');
    return;
  }
  let digits = phoneRaw.replace(/[^0-9]/g, '');
  if (digits.startsWith('00')) digits = digits.slice(2);
  if (digits.startsWith('0') && !digits.startsWith('20')) digits = '20' + digits.slice(1);
  if (digits.length === 10 && !digits.startsWith('20')) digits = '20' + digits;
  if (digits.length < 10) { toast('رقم الهاتف غير صحيح: ' + phoneRaw, 'error'); return; }

  const s = DB.data.settings;
  const due = inv.total - inv.paid;
  const msgLines = [
    `*${s.companyName || 'OZAREX'}*`,
    `━━━━━━━━━━━━━━`,
    `📋 *فاتورة رقم #${inv.number}*`,
    `📅 التاريخ: ${inv.date}`,
    `👤 العميل: ${c.name}`,
    ``,
  ];
  if (inv.items && inv.items.length) {
    msgLines.push(`🛒 *الأصناف:*`);
    inv.items.forEach((it, i) => {
      msgLines.push(`${i+1}. ${it.productName || '-'} — ${fmt(it.quantity)} × ${fmt(it.price)} = ${fmt(it.total)}`);
    });
    msgLines.push(``);
  }
  msgLines.push(`💰 *الإجمالي:* ${fmtCurrency(inv.total)}`);
  msgLines.push(`✅ المدفوع: ${fmtCurrency(inv.paid)}`);
  if (due > 0) msgLines.push(`🔴 *المتبقي:* ${fmtCurrency(due)}`);
  else         msgLines.push(`🎉 *مسددة بالكامل*`);
  msgLines.push(``, `شكراً لتعاملكم معنا 🙏`);
  const msgText = msgLines.join('\n');

  toast('⏳ جاري تجهيز صورة الفاتورة...', 'info');

  try {
    const blob = await renderInvoiceToPngBlob(inv, c);
    if (!blob || blob.size < 3000) {
      throw new Error('Generated image is empty or too small');
    }

    const safeName = (c.name || 'invoice').replace(/[^a-zA-Z0-9\u0600-\u06FF]+/g, '_');
    const fileName = `فاتورة-${inv.number}-${safeName}.png`;
    const file = new File([blob], fileName, { type: 'image/png' });

    // Mobile: Web Share API with file
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({ files: [file], title: `فاتورة #${inv.number}`, text: msgText });
        toast('✓ تم فتح قائمة المشاركة');
        return;
      } catch (err) {
        if (err.name === 'AbortError') { toast('تم إلغاء المشاركة'); return; }
      }
    }

    // Desktop: download image + open WhatsApp Web with text
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = fileName;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 3000);

    const waUrl = `https://wa.me/${digits}?text=${encodeURIComponent(msgText)}`;
    window.open(waUrl, '_blank');
    toast('✓ تم تحميل صورة الفاتورة — افتح المحادثة وأرفق الصورة', 'success');
  } catch (err) {
    console.error('WhatsApp invoice render failed:', err);
    // Fallback: text-only
    const waUrl = `https://wa.me/${digits}?text=${encodeURIComponent(msgText)}`;
    window.open(waUrl, '_blank');
    toast('⚠ تعذر إنشاء الصورة — تم فتح الواتساب بالنص فقط', 'warning');
  }
}

    ${escapeHtml(s.companyName||'')}
  </div>
</div>
</body>
</html>`;

  // Create a hidden iframe so the document is fully isolated from the app's CSS/theme
  const iframe = document.createElement('iframe');
  iframe.style.cssText = 'position:fixed;top:0;left:-10000px;width:794px;height:1500px;border:0;visibility:hidden;';

  document.body.appendChild(iframe);

  try {
    // Write the document
    const doc = iframe.contentDocument || iframe.contentWindow.document;
    doc.open();
    doc.write(html);
    doc.close();

    // Wait for the iframe to fully load (fonts, layout)
    await new Promise(resolve => {
      if (doc.readyState === 'complete') return resolve();
      iframe.addEventListener('load', resolve, { once: true });
      setTimeout(resolve, 2000); // safety
    });

    // Wait for fonts in the iframe
    try {
      if (iframe.contentDocument.fonts && iframe.contentDocument.fonts.ready) {
        await iframe.contentDocument.fonts.ready;
      }
    } catch (e) {}

    // Wait for any images (logo) to load
    const imgs = Array.from(iframe.contentDocument.querySelectorAll('img'));
    await Promise.all(imgs.map(img => {
      if (img.complete && img.naturalHeight !== 0) return Promise.resolve();
      return new Promise(resolve => {
        img.onload = resolve;
        img.onerror = resolve;
        setTimeout(resolve, 3000);
      });
    }));

    // Allow layout to settle
    await new Promise(r => setTimeout(r, 300));

    const target = iframe.contentDocument.getElementById('invoice-root');
    if (!target) throw new Error('invoice-root not found in iframe');

    // Measure actual rendered size
    const rect = target.getBoundingClientRect();
    const width = Math.max(794, Math.ceil(rect.width) + 72);  // add body padding
    const height = Math.ceil(rect.height) + 72;

    // Render the iframe DOM using modern-screenshot (target the iframe BODY, not parent doc)
    if (typeof modernScreenshot !== 'undefined' && typeof modernScreenshot.domToPng === 'function') {
      const dataUrl = await modernScreenshot.domToPng(iframe.contentDocument.body, {
        scale: 2,
        backgroundColor: '#ffffff',
        width: width,
        height: height
      });
      const resp = await fetch(dataUrl);
      const blob = await resp.blob();
      if (blob && blob.size > 3000) return blob;
      console.warn('modernScreenshot returned tiny blob:', blob ? blob.size : 0);
    }

    // Pure-canvas fallback: rasterize via SVG <foreignObject>
    return await rasterizeViaSvg(iframe.contentDocument.body, width, height);
  } finally {
    if (iframe.parentNode) iframe.parentNode.removeChild(iframe);
  }
}

/* Fallback rasterizer: serialize body HTML into an SVG <foreignObject>,
   then draw the SVG into a canvas → PNG blob. No external library required. */
async function rasterizeViaSvg(bodyEl, width, height) {
  // Serialize the body content + inline-only CSS (already inline in our build)
  const html = bodyEl.innerHTML;
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}">
    <foreignObject x="0" y="0" width="100%" height="100%">
      <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl" lang="ar" style="background:#ffffff;width:${width}px;min-height:${height}px;padding:36px;font-family:'Cairo','Tajawal',sans-serif">
        ${html}
      </div>
    </foreignObject>
  </svg>`;

  const svgBlob = new Blob([svg], { type: 'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(svgBlob);

  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      const scale = 2;
      const canvas = document.createElement('canvas');
      canvas.width = width * scale;
      canvas.height = height * scale;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.scale(scale, scale);
      ctx.drawImage(img, 0, 0, width, height);
      URL.revokeObjectURL(url);
      canvas.toBlob(b => b ? resolve(b) : reject(new Error('canvas.toBlob returned null')), 'image/png', 0.95);
    };
    img.onerror = (e) => {
      URL.revokeObjectURL(url);
      reject(new Error('SVG image failed to load'));
    };
    img.src = url;
  });
}

function normalizeEgyptianPhone(phoneRaw) {
  let digits = (phoneRaw || '').replace(/[^0-9]/g, '');
  if (!digits) return null;
  if (digits.startsWith('00')) digits = digits.slice(2);
  if (digits.startsWith('0') && !digits.startsWith('20')) digits = '20' + digits.slice(1);
  if (digits.length === 10 && !digits.startsWith('20')) digits = '20' + digits;
  return digits.length >= 10 ? digits : null;
}

/* =========================================================
   MULTI-CURRENCY CONVERTER
   Fetches USD/EUR/GBP rates daily, caches in localStorage.
   Free API: open.er-api.com (no key needed)
========================================================= */
let _ratesCache = null;
async function getCurrencyRates() {
  // Try cached rates first
  try {
    const raw = localStorage.getItem('ozarex_currency_rates');
    if (raw) {
      const cached = JSON.parse(raw);
      const age = Date.now() - cached.fetchedAt;
      if (age < 12 * 60 * 60 * 1000) { // 12h cache
        _ratesCache = cached;
        return cached;
      }
    }
  } catch (e) {}

  try {
    // Free, no API key required. Returns rates against USD.
    const resp = await fetch('https://open.er-api.com/v6/latest/USD');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    if (data.result !== 'success') throw new Error('API returned: ' + data.result);
    const rates = {
      base: 'USD',
      fetchedAt: Date.now(),
      EGP: data.rates.EGP || 0,
      USD: 1,
      EUR: 1 / (data.rates.EUR || 1),
      GBP: 1 / (data.rates.GBP || 1),
      SAR: 1 / (data.rates.SAR || 1),
      AED: 1 / (data.rates.AED || 1)
    };
    // Compute rates relative to EGP
    rates.USD_to_EGP = data.rates.EGP || 0;
    rates.EUR_to_EGP = (data.rates.EGP || 0) / (data.rates.EUR || 1);
    rates.GBP_to_EGP = (data.rates.EGP || 0) / (data.rates.GBP || 1);
    rates.SAR_to_EGP = (data.rates.EGP || 0) / (data.rates.SAR || 1);
    rates.AED_to_EGP = (data.rates.EGP || 0) / (data.rates.AED || 1);
    try { localStorage.setItem('ozarex_currency_rates', JSON.stringify(rates)); } catch (e) {}
    _ratesCache = rates;
    return rates;
  } catch (err) {
    console.warn('Currency fetch failed:', err);
    return null;
  }
}

function updateConversion() {
  if (!_ratesCache) return;
  const amt = parseFloat(document.getElementById('curr-amount').value) || 0;
  const from = document.getElementById('curr-from').value;
  const to = document.getElementById('curr-to').value;
  const r = _ratesCache;

  // Convert via EGP as common base
  const toEGP = {
    'EGP': 1, 'USD': r.USD_to_EGP, 'EUR': r.EUR_to_EGP,
    'GBP': r.GBP_to_EGP, 'SAR': r.SAR_to_EGP, 'AED': r.AED_to_EGP
  };
  const amtInEGP = amt * toEGP[from];
  const result = amtInEGP / toEGP[to];

  const flag = { 'EGP':'🇪🇬', 'USD':'🇺🇸', 'EUR':'🇪🇺', 'GBP':'🇬🇧', 'SAR':'🇸🇦', 'AED':'🇦🇪' };
  document.getElementById('curr-result').innerHTML =
    `${fmt(amt)} ${flag[from]} <b>${from}</b> = <b style="color:var(--success);font-size:22px">${fmt(result)} ${flag[to]} ${to}</b>`;
}

function sendDebtReminderWhatsApp(customerId) {

  if (!digits) { toast('رقم الهاتف غير صحيح: ' + c.phone, 'error'); return; }

  const openIssuances = (DB.data.issuances || [])

      kind: 'issuance',

/* Send WhatsApp reminder for ONE specific invoice/issuance */
function sendInvoiceReminderWhatsApp(customerId, kind, itemId) {
  const c = DB.data.customers.find(x => x.id === customerId);
  if (!c) return;
  const digits = normalizeEgyptianPhone(c.phone);
  if (!digits) { toast('رقم الهاتف غير صحيح', 'error'); return; }

  let item, itemDesc;
  if (kind === 'issuance') {
    item = (DB.data.issuances || []).find(i => i.id === itemId);
    if (!item) return;
    itemDesc = `📄 الصنف: ${item.productName}\n📊 الكمية: ${fmt(item.quantity)} ${item.unit||''}`;
  } else {
    item = (DB.data.invoices || []).find(i => i.id === itemId);
    if (!item) return;
    let itemsText = '';
    if (item.items && item.items.length) {
      itemsText = '\n\n🛒 *الأصناف:*\n' + item.items.map((it, idx) =>
        `${idx+1}. ${it.productName} — ${fmt(it.quantity)} × ${fmt(it.price)} = ${fmtCurrency(it.total)}`
      ).join('\n');
    }
    itemDesc = itemsText.trim() || `📋 فاتورة متعددة البنود`;
  }

  const remaining = item.total - (item.paid || 0);
  const daysOld = Math.floor((new Date() - new Date(item.date)) / (1000 * 60 * 60 * 24));
  const s = DB.data.settings;

  // Pick encouraging closing line based on payment status & age
  let encouragement;
  if ((item.paid || 0) > 0) {
    encouragement = `💚 *شكراً لتعاونكم في السداد الجزئي* — خطوة كمان وننهي الفاتورة دي 🌟\n🤝 ثقتنا فيكم كبيرة، ومستنيين تكملوا معانا بنفس الروح الطيبة 🙌`;
  } else if (daysOld >= 30) {
    encouragement = `🌟 *تعاملكم معانا بيهمنا جداً* — ولأنكم من عملائنا المميزين، عايزين نسهّل عليكم 🤝\n💚 نقدر نستلم المبلغ كاش، تحويل، أو على دفعات — اللي يناسبكم 🙏\n✨ سدادكم بيخلينا نقدر نستمر في تقديم أفضل خدمة ليكم`;
  } else if (daysOld >= 14) {
    encouragement = `🤝 *علاقتنا معاكم أهم من أي شيء* — مستنيين تسديد الفاتورة في أقرب فرصة 🌟\n💚 وعد منّا إن خدمتنا هتبقى دايماً عند ثقتكم 🙌`;
  } else {
    encouragement = `✨ *شكراً ليكم على ثقتكم في تعاملكم معانا* 🌟\n💚 برجاء التكرم بسداد قيمة الفاتورة في أقرب وقت ممكن — وحضرتكم دايماً على راسنا 🙏`;
  }

  const msgLines = [
    `🌟 *${s.companyName || 'OZAREX'}* 🌟`,
    `━━━━━━━━━━━━━━`,
    `🌺 السلام عليكم ورحمة الله ${c.name}`,
    `أتمنى أن تكونوا بأفضل حال 🤲`,
    ``,
    `📌 *تذكير ودي بشأن الفاتورة التالية:*`,
    ``,
    `🧾 *فاتورة رقم #${item.number}*`,
    itemDesc,
    `📅 التاريخ: ${item.date}${daysOld > 0 ? ` _(منذ ${daysOld} يوم)_` : ''}`,
    ``,
    `━━━━━━━━━━━━━━`,
    `💰 *الإجمالي:* ${fmtCurrency(item.total)}`
  ];
  if ((item.paid || 0) > 0) msgLines.push(`✅ *المدفوع:* ${fmtCurrency(item.paid)}`);
  msgLines.push(`🔴 *المتبقي للسداد:* ${fmtCurrency(remaining)}`);
  msgLines.push(`━━━━━━━━━━━━━━`, ``);
  msgLines.push(encouragement);
  msgLines.push(``, `🙏 *شكراً لتعاملكم معنا — نُقدّر ثقتكم* 💚`);
  if (s.companyPhone) msgLines.push(``, `📞 *للتواصل والاستفسار:* ${s.companyPhone}`);

  const text = msgLines.join('\n');
  const waUrl = `https://wa.me/${digits}?text=${encodeURIComponent(text)}`;
  window.open(waUrl, '_blank');
  closeModal();
  toast(`✓ تم فتح الواتساب — تذكير بفاتورة #${item.number}`, 'success');
}

/* =========================================================
   WhatsApp: Send full customer account statement
========================================================= */
async function sendCustomerStatementWhatsApp(customerId) {
  const c = DB.data.customers.find(x => x.id === customerId);
  if (!c) return;
  if (!c.phone || !c.phone.trim()) {
    toast('العميل ليس لديه رقم هاتف مسجل', 'error'); return;
  }
  const digits = normalizeEgyptianPhone(c.phone);
  if (!digits) { toast('رقم الهاتف غير صحيح', 'error'); return; }

  const s = DB.data.settings;
  // Gather all transactions
  const issuances = (DB.data.issuances || []).filter(i => i.customerId === customerId);
  const invoices = (DB.data.invoices || []).filter(i => i.customerId === customerId);
  const payments = (DB.data.payments || []).filter(p => p.customerId === customerId);

  const totalCharges = issuances.reduce((s2,i)=>s2+(i.total||0), 0) + invoices.reduce((s2,i)=>s2+(i.total||0), 0);
  const totalPaid = payments.reduce((s2,p)=>s2+(p.amount||0), 0);

  const msgLines = [
    `*${s.companyName || 'OZAREX'}*`,
    `━━━━━━━━━━━━━━`,
    `📋 *كشف حساب - ${c.name}*`,
    `📅 حتى ${todayStr()}`,
    ``,
    `📦 عدد عمليات الصرف: ${issuances.length}`,
    `📄 عدد الفواتير: ${invoices.length}`,
    `💰 إجمالي السدادات: ${fmtCurrency(totalPaid)}`,
    `💸 إجمالي الفواتير: ${fmtCurrency(totalCharges)}`,
    ``,
    c.balance > 0
      ? `🔴 *الرصيد المستحق: ${fmtCurrency(c.balance)}*`
      : c.balance < 0
        ? `🟢 *رصيد دائن لكم: ${fmtCurrency(Math.abs(c.balance))}*`
        : `✅ *الحساب مسدّد بالكامل*`,
    ``,
    `شكراً لتعاملكم معنا 🙏`
  ];
  const text = msgLines.join('\n');
  const waUrl = `https://wa.me/${digits}?text=${encodeURIComponent(text)}`;
  window.open(waUrl, '_blank');
  toast(`✓ تم فتح كشف حساب ${c.name} في واتساب`, 'success');
}

function recalcEditInvoiceTotals() {
  const form = document.getElementById('edit-invoice-form');
  if (!form) return;
  const invoiceId = form._invoiceId.value;
  const inv = DB.data.invoices.find(x => x.id === invoiceId);
  if (!inv) return;
  const subtotal = inv.subtotal || inv.items.reduce((s,i)=>s+(i.total||0), 0);
  const discount = parseFloat(form.discount.value) || 0;
  const taxRate = parseFloat(form.taxRate.value) || 0;
  const afterDiscount = Math.max(0, subtotal - discount);
  const tax = afterDiscount * (taxRate/100);
  const total = afterDiscount + tax;
  document.getElementById('ei-subtotal').textContent = fmtCurrency(subtotal);
  document.getElementById('ei-tax').textContent = fmtCurrency(tax);
  document.getElementById('ei-total').textContent = fmtCurrency(total);
  document.getElementById('ei-computed-subtotal').value = subtotal;
  document.getElementById('ei-computed-tax').value = tax;
  document.getElementById('ei-computed-total').value = total;
}

function saveEditedInvoice() {
  const form = document.getElementById('edit-invoice-form');
  const invoiceId = form._invoiceId.value;
  const inv = DB.data.invoices.find(x => x.id === invoiceId);
  if (!inv) { toast('الفاتورة غير موجودة', 'error'); return; }
  const c = DB.data.customers.find(x => x.id === inv.customerId);

  const before = JSON.parse(JSON.stringify(inv));

  const newDate = form.date.value;
  const newPaymentMethod = form.paymentMethod.value;
  const newDiscount = parseFloat(form.discount.value) || 0;
  const newTaxRate = parseFloat(form.taxRate.value) || 0;
  const subtotal = parseFloat(document.getElementById('ei-computed-subtotal').value) || 0;
  const newTax = parseFloat(document.getElementById('ei-computed-tax').value) || 0;
  const newTotal = parseFloat(document.getElementById('ei-computed-total').value) || 0;

  // Adjust customer balance by the difference
  const oldRemaining = (inv.total || 0) - (inv.paid || 0);
  const newRemaining = newTotal - (inv.paid || 0);
  if (c) c.balance += (newRemaining - oldRemaining);

  // Apply changes
  inv.date = newDate;
  inv.paymentMethod = newPaymentMethod;
  inv.discount = newDiscount;
  inv.taxRate = newTaxRate;
  inv.tax = newTax;
  inv.total = newTotal;
  inv.status = (inv.paid||0) >= newTotal ? 'paid' : (inv.paid||0) > 0 ? 'partial' : 'unpaid';
  inv.updatedAt = Date.now();

  DB.save();
  logAudit({
    operation: 'edit',
    table: 'invoices',
    recordId: inv.id,
    recordLabel: `فاتورة #${inv.number} - ${c?c.name:'-'}`,
    before, after: JSON.parse(JSON.stringify(inv)),
    reason: window._pendingAuditReason || ''
  });
  delete window._pendingAuditReason;
  closeModal();
  playTone('save');
  toast(`✓ تم تحديث الفاتورة #${inv.number}`);
  renderInvoices();
  renderSidebar();
  updateNotifBadge();
}

function deleteInvoice(id) {
  const inv = DB.data.invoices.find(x=>x.id===id);
  if (!inv) return;
  const c = DB.data.customers.find(x=>x.id===inv.customerId);
  // Require reason BEFORE proceeding
  promptAuditReason({
    title: 'سبب حذف الفاتورة',
    description: `حذف فاتورة #${inv.number} بقيمة ${fmtCurrency(inv.total)} للعميل ${c?c.name:'-'} عملية حساسة وتتطلب توثيق`,
    suggestedReasons: [
      'فاتورة مكررة بالخطأ',
      'إلغاء طلب من العميل',
      'تصحيح خطأ في الإدخال',
      'فاتورة تجريبية',
      'استبدال بفاتورة جديدة'
    ]
  }).then(reason => {
    confirmDialog(`حذف الفاتورة #${inv.number}؟ سيتم استرجاع المخزون وتعديل رصيد العميل.`, () => {
      const before = JSON.parse(JSON.stringify(inv));
      inv.items.forEach(it => {
        const p = DB.data.products.find(x=>x.id===it.productId);
        if (p) p.quantity += it.qty;
      });
      if (c) c.balance -= (inv.total - inv.paid);
      DB.data.payments = DB.data.payments.filter(p => p.invoiceId !== id);
      DB.data.stockMoves = DB.data.stockMoves.filter(m => !m.note || !m.note.includes('#'+inv.number));
      DB.data.invoices = DB.data.invoices.filter(x=>x.id!==id);
      DB.save();
      logAudit({
        operation: 'delete',
        table: 'invoices',
        recordId: id,
        recordLabel: `فاتورة #${inv.number} - ${c?c.name:'-'}`,
        before, after: null,
        reason
      });
      toast('تم حذف الفاتورة');

  });
}

/* =========================================================
   PAYMENTS / COLLECTIONS PAGE
========================================================= */
let payTab = 'debts';
// Collections log filter state
let payHistoryFilter = {
  search: '',     // text search
  mode: 'all',    // 'all' | 'day' | 'month' | 'range'
  day: '',        // YYYY-MM-DD
  month: '',      // YYYY-MM
  from: '',       // YYYY-MM-DD
  to: ''          // YYYY-MM-DD
};
function getFilteredPayments() {
  let list = DB.data.payments.slice();
  const f = payHistoryFilter;
  if (f.mode === 'day' && f.day) list = list.filter(p => p.date === f.day);
  else if (f.mode === 'month' && f.month) list = list.filter(p => (p.date||'').startsWith(f.month));
  else if (f.mode === 'range' && (f.from || f.to)) {
    list = list.filter(p => {
      if (f.from && p.date < f.from) return false;
      if (f.to && p.date > f.to) return false;
      return true;
    });
  }
  if (f.search) {
    const q = f.search.toLowerCase();
    list = list.filter(p =>
      (p.customerName||'').toLowerCase().includes(q) ||
      (p.reference||'').toLowerCase().includes(q) ||
      (p.method||'').toLowerCase().includes(q) ||
      (p.note||'').toLowerCase().includes(q) ||
      (p.amount||'').toString().includes(q)
    );
  }
  return list;
}
function setPayFilter(field, value) {
  payHistoryFilter[field] = value;
  renderPayments();
}
function setPayFilterMode(mode) {
  payHistoryFilter.mode = mode;
  // reset other date fields when switching mode
  if (mode === 'all') {
    payHistoryFilter.day = ''; payHistoryFilter.month = ''; payHistoryFilter.from = ''; payHistoryFilter.to = '';
  }
  if (mode === 'day') payHistoryFilter.day = payHistoryFilter.day || todayStr();
  if (mode === 'month') payHistoryFilter.month = payHistoryFilter.month || todayStr().slice(0,7);
  renderPayments();
}
function clearPayFilter() {
  payHistoryFilter = { search:'', mode:'all', day:'', month:'', from:'', to:'' };
  renderPayments();
}

  const method = document.getElementById('pay-method').value;
  const section = document.getElementById('pay-transfer-section');
  if (section) section.style.display = (method === 'تحويل' || method === 'إيداع') ? 'block' : 'none';
}

function updatePayHint() {
  const sel = document.querySelector('#pay-form [name="customerId"]');
  if (!sel) return;
  const bal = parseFloat(sel.options[sel.selectedIndex]?.dataset.balance) || 0;
  const amount = parseFloat(document.getElementById('pay-amount').value) || 0;
  const remaining = bal - amount;
  const hint = document.getElementById('pay-hint');
  if (!hint) return;
  if (amount <= 0) {
    hint.innerHTML = `الرصيد المستحق: <b>${fmt(bal)}</b>`;
    hint.style.color = 'var(--text-muted)';
  } else if (remaining <= 0) {
    hint.innerHTML = `🎉 <b style="color:var(--success)">سيتم سداد المديونية بالكامل!</b>`;
    hint.style.color = 'var(--success)';
  } else {
    hint.innerHTML = `⚠ <b style="color:var(--warning)">سيتبقى على العميل: ${fmt(remaining)}</b>`;
    hint.style.color = 'var(--warning)';
  }
}

function onPayCustomerChange() {
  const sel = document.querySelector('#pay-form [name="customerId"]');
  const bal = parseFloat(sel.options[sel.selectedIndex].dataset.balance) || 0;
  document.getElementById('pay-amount').value = bal > 0 ? bal.toFixed(2) : '';
  document.getElementById('pay-hint').innerText = 'الرصيد المستحق: ' + fmt(bal);
  updatePayHint();
}

function savePayment() {
  const form = document.getElementById('pay-form');
  const d = Object.fromEntries(new FormData(form));
  const customerId = d.customerId || d.customerIdHidden;
  if (!customerId) { toast('اختر العميل', 'error'); return; }
  const amount = parseFloat(d.amount);
  if (!amount || amount <= 0) { toast('أدخل مبلغاً صحيحاً', 'error'); return; }
  const c = DB.data.customers.find(x=>x.id===customerId);
  if (!c) { toast('العميل غير موجود', 'error'); return; }

  const balanceBefore = c.balance;
  const isTransfer = (d.method === 'تحويل' || d.method === 'إيداع');

  const pay = {
    id:'pay_'+uid(),
    customerId,
    customerName: c.name,
    amount,
    date: d.date,
    method: d.method,
    reference: d.reference||'',
    bankAccount: d.bankAccount||'',
    depositor: d.depositor||'',
    isTransfer,
    note: d.note,
    invoiceId: d.invoiceId||null,
    createdAt: Date.now()
  };
  DB.data.payments.push(pay);
  c.balance -= amount;

  // Update invoice if linked
  if (d.invoiceId) {
    const inv = DB.data.invoices.find(x=>x.id===d.invoiceId);
    if (inv) {
      inv.paid = Math.min(inv.paid + amount, inv.total);
      inv.status = inv.paid >= inv.total ? 'paid' : inv.paid > 0 ? 'partial' : 'unpaid';
    }
  } else {
    // distribute over unpaid invoices (FIFO)
    let remaining = amount;
    const unpaidInvs = DB.data.invoices.filter(i => i.customerId === customerId && i.status !== 'paid').sort((a,b)=>a.createdAt-b.createdAt);
    for (const inv of unpaidInvs) {
      if (remaining <= 0) break;
      const due = inv.total - inv.paid;
      const apply = Math.min(due, remaining);
      inv.paid += apply;
      remaining -= apply;
      inv.status = inv.paid >= inv.total ? 'paid' : inv.paid > 0 ? 'partial' : 'unpaid';
    }
  }

  // Also mark issuances as paid (FIFO)
  let remIss = amount;
  const unpaidIssAll = (DB.data.issuances||[]).filter(i => i.customerId === customerId && i.status !== 'paid').sort((a,b)=>a.createdAt-b.createdAt);
  for (const iss of unpaidIssAll) {
    if (remIss <= 0) break;
    const due = iss.total - (iss.paid||0);
    const apply = Math.min(due, remIss);
    iss.paid = (iss.paid||0) + apply;
    remIss -= apply;
    iss.status = iss.paid >= iss.total ? 'paid' : iss.paid > 0 ? 'partial' : 'unpaid';
  }

  DB.save();
  // Audit
  logAudit({
    operation: 'add', table: 'payments',
    recordId: pay.id,
    recordLabel: `تحصيل ${fmtCurrency(amount)} من ${c.name}`,
    before: null,
    after: JSON.parse(JSON.stringify(pay)),
    reason: window._pendingAuditReason || ''
  });
  delete window._pendingAuditReason;
  closeModal();
  playTone('collect');
  celebrate();

  // Smart message based on remaining balance
  const balanceAfter = c.balance;
  if (balanceAfter <= 0) {
    toast(`🎉 تم التحصيل بالكامل من "${c.name}" - السداد كامل!`, 'success');
  } else {
    toast(`✓ تم تحصيل ${fmtCurrency(amount)} - متبقي على "${c.name}": ${fmtCurrency(balanceAfter)} (مديونية)`, 'info');
  }

  if (currentPage === 'payments') renderPayments();
  else if (currentPage === 'customers') renderCustomers();
  else if (currentPage === 'invoices') renderInvoices();
  else if (currentPage === 'dashboard') renderDashboard();
  else if (currentPage === 'issuances') renderIssuances();
  renderSidebar();
  updateNotifBadge();
}

function deletePayment(id) {
  const p = DB.data.payments.find(x=>x.id===id);
  if (!p) return;
  promptAuditReason({
    title: 'سبب حذف التحصيل',
    description: `حذف تحصيل بقيمة ${fmtCurrency(p.amount)} من ${p.customerName||'-'} يتطلب توثيق`,
    suggestedReasons: ['تحصيل مكرر', 'خطأ في الإدخال', 'إلغاء بناءً على طلب العميل', 'استرداد المبلغ']
  }).then(reason => {
    confirmDialog(`حذف هذا التحصيل بقيمة ${fmtCurrency(p.amount)}؟`, () => {
      const before = JSON.parse(JSON.stringify(p));
      const c = DB.data.customers.find(x=>x.id===p.customerId);
      if (c) c.balance += p.amount;
      if (p.invoiceId) {
        const inv = DB.data.invoices.find(x=>x.id===p.invoiceId);
        if (inv) {
          inv.paid = Math.max(0, inv.paid - p.amount);
          inv.status = inv.paid >= inv.total ? 'paid' : inv.paid > 0 ? 'partial' : 'unpaid';
        }
      }
      DB.data.payments = DB.data.payments.filter(x=>x.id!==id);
      DB.save();
      logAudit({
        operation: 'delete', table: 'payments',
        recordId: id,
        recordLabel: `تحصيل ${fmtCurrency(p.amount)} من ${p.customerName||'-'}`,
        before, after: null, reason
      });
      toast('تم حذف التحصيل');
      renderPayments();
      renderSidebar();
      updateNotifBadge();
    });
  }).catch(() => {});
}

/* Show consumption per customer/center for a specific product, with date filtering */
let _consState = { from:'', to:'' };
function viewProductConsumption(productId) {
  const p = DB.data.products.find(x=>x.id===productId);
  if (!p) return;
  _consState = { from: daysAgo(30).toISOString().slice(0,10), to: todayStr(), productId };
  renderConsumptionModal();
}

function renderConsumptionModal() {
  const p = DB.data.products.find(x=>x.id===_consState.productId);
  if (!p) return;
  const isss = (DB.data.issuances||[]).filter(i =>
    i.productId === _consState.productId &&
    i.date >= _consState.from && i.date <= _consState.to
  );

  // Group by customer
  const byCustomer = {};
  isss.forEach(i => {
    if (!byCustomer[i.customerId]) byCustomer[i.customerId] = {
      id: i.customerId, name: i.customerName, qty:0, total:0, count:0, items:[]
    };
    const b = byCustomer[i.customerId];
    b.qty += i.quantity;
    b.total += i.total;
    b.count += 1;
    b.items.push(i);
  });
  const centers = Object.values(byCustomer).sort((a,b) => b.qty - a.qty);
  const totalQty = centers.reduce((s,c)=>s+c.qty, 0);
  const totalMoney = centers.reduce((s,c)=>s+c.total, 0);

  // Daily breakdown
  const byDay = {};
  isss.forEach(i => {
    if (!byDay[i.date]) byDay[i.date] = { qty:0, total:0 };
    byDay[i.date].qty += i.quantity;
    byDay[i.date].total += i.total;
  });

  const html = `
    <div style="background:linear-gradient(135deg,#0d9488,#14b8a6);color:#fff;padding:16px 20px;border-radius:12px;margin-bottom:16px">
      <div style="font-size:12px;opacity:.9">المنتج</div>
      <div style="font-size:20px;font-weight:900;margin-top:4px">${escapeHtml(p.name)}</div>
      <div style="font-size:11px;opacity:.85;margin-top:4px">المتاح بالمخزن: ${fmt(p.quantity)} ${escapeHtml(p.unit||'')}</div>
    </div>

    <div class="filter-bar" style="margin-bottom:14px">
      <label>من:</label>
      <input class="form-control" type="date" id="cons-from" value="${_consState.from}">
      <label>إلى:</label>
      <input class="form-control" type="date" id="cons-to" value="${_consState.to}">
      <button class="btn btn-ghost btn-sm" onclick="_consState.from=daysAgo(7).toISOString().slice(0,10);_consState.to=todayStr();renderConsumptionModal()">أسبوع</button>
      <button class="btn btn-ghost btn-sm" onclick="_consState.from=daysAgo(30).toISOString().slice(0,10);_consState.to=todayStr();renderConsumptionModal()">شهر</button>
      <button class="btn btn-ghost btn-sm" onclick="_consState.from=daysAgo(90).toISOString().slice(0,10);_consState.to=todayStr();renderConsumptionModal()">3 شهور</button>
      <button class="btn btn-ghost btn-sm" onclick="_consState.from=daysAgo(365).toISOString().slice(0,10);_consState.to=todayStr();renderConsumptionModal()">سنة</button>
    </div>

    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px">
      <div class="kpi"><div class="l">المراكز</div><div class="v">${centers.length}</div></div>
      <div class="kpi"><div class="l">إجمالي المصروف</div><div class="v" style="color:var(--primary)">${fmt(totalQty)}</div></div>
      <div class="kpi"><div class="l">إجمالي القيمة</div><div class="v" style="color:var(--success)">${fmtCurrency(totalMoney)}</div></div>
    </div>

    <h4 style="margin:14px 0 8px;font-size:14px">🏢 استهلاك كل مركز</h4>
    <div class="table-scroll" style="max-height:300px;overflow-y:auto;margin-bottom:14px">
      <table class="data-table">
        <thead><tr><th>المركز</th><th>عمليات الصرف</th><th>إجمالي الكمية</th><th>النسبة</th><th>إجمالي القيمة</th></tr></thead>
        <tbody>
          ${centers.length === 0 ? '<tr><td colspan="5" class="empty-state">لا توجد عمليات صرف لهذا المنتج في الفترة المختارة</td></tr>' :
            centers.map(c => `<tr>
              <td><b>${escapeHtml(c.name)}</b></td>
              <td>${c.count}</td>
              <td><b style="color:var(--primary)">${fmt(c.qty)}</b></td>
              <td>${totalQty?((c.qty/totalQty)*100).toFixed(1):0}%</td>
              <td><b style="color:var(--success)">${fmtCurrency(c.total)}</b></td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>
  `;
  openModal('📊 استهلاك المنتج حسب المراكز', html,
    '<button class="btn btn-secondary" onclick="closeModal()">إغلاق</button>', 'large');
  setTimeout(() => {
    const f = document.getElementById('cons-from');
    const t = document.getElementById('cons-to');
    if (f) f.addEventListener('change', e => { _consState.from = e.target.value; renderConsumptionModal(); });
    if (t) t.addEventListener('change', e => { _consState.to = e.target.value; renderConsumptionModal(); });
  }, 50);
}

          <label>سعر البيع *</label>
          <input class="form-control" type="number" name="price" value="${p.price}" step="0.01" min="0" required>
        </div>
      </div>
    </form>
  `, `<button class="btn btn-primary" onclick="saveProduct('${id||''}')">حفظ</button>
      <button class="btn btn-secondary" onclick="closeModal()">إلغاء</button>`);
}

function saveProduct(id) {
  const d = Object.fromEntries(new FormData(document.getElementById('prod-form')));
  if (!d.name.trim()) { toast('اسم المنتج مطلوب', 'error'); return; }
  ['quantity','minQuantity','price','cost'].forEach(k => d[k] = parseFloat(d[k])||0);
  let before = null;
  let record;
  if (id) {
    const p = DB.data.products.find(x=>x.id===id);
    if (!p) return;
    before = JSON.parse(JSON.stringify(p));
    const oldQty = p.quantity;
    Object.assign(p, d, { quantity: oldQty });
    record = p;
  } else {
    record = { id:'p_'+uid(), ...d };
    DB.data.products.push(record);
    if (record.quantity > 0) {
      DB.data.stockMoves.push({ id:'sm_'+uid(), productId: record.id, type:'in', quantity: record.quantity, date: todayStr(), note:'رصيد افتتاحي', createdAt: Date.now() });
    }
  }
  DB.save();
  logAudit({
    operation: id ? 'edit' : 'add', table: 'products',
    recordId: record.id, recordLabel: record.name,
    before, after: JSON.parse(JSON.stringify(record)),
    reason: window._pendingAuditReason || ''
  });
  delete window._pendingAuditReason;
  closeModal();
  notify({ type:'success', title: id ? 'تم تحديث المنتج' : 'تم إضافة المنتج', message: `تم ${id?'تحديث':'إضافة'} المنتج <b>"${escapeHtml(record.name)}"</b> بنجاح` });
  renderInventory();
  renderSidebar();
  updateNotifBadge();
}

function deleteProduct(id) {
  const p = DB.data.products.find(x=>x.id===id);
  if (!p) return;
  const inInv = DB.data.invoices.some(i => i.items.some(it => it.productId === id));
  if (inInv) { toast('لا يمكن حذف منتج مستخدم في فواتير', 'error'); return; }
  confirmDialog(`حذف المنتج "${p.name}"؟`, () => {
    const before = JSON.parse(JSON.stringify(p));
    DB.data.products = DB.data.products.filter(x=>x.id!==id);
    DB.data.stockMoves = DB.data.stockMoves.filter(m => m.productId !== id);
    DB.save();
    logAudit({
      operation: 'delete', table: 'products',
      recordId: id, recordLabel: p.name,
      before, after: null,
      reason: 'حذف منتج من المخزن'
    });
    toast('تم الحذف');
    renderInventory();
    renderSidebar();
  });
}

  openModal('حركة مخزن', `

        <select class="form-control" name="productId" required>

function saveStockMove() {
  const d = Object.fromEntries(new FormData(document.getElementById('move-form')));
  if (!d.productId) { toast('اختر المنتج', 'error'); return; }
  const qty = parseFloat(d.quantity);
  if (!qty || qty <= 0) { toast('أدخل كمية صحيحة', 'error'); return; }
  const p = DB.data.products.find(x=>x.id===d.productId);
  if (d.type === 'out' && qty > p.quantity) { toast('الكمية أكبر من المتاح', 'error'); return; }
  p.quantity += (d.type === 'in' ? qty : -qty);
  DB.data.stockMoves.push({ id:'sm_'+uid(), productId: d.productId, type: d.type, quantity: qty, date: d.date, note: d.note||'', createdAt: Date.now() });
  DB.save();
  closeModal();
  toast('تم تسجيل الحركة');
  renderInventory();
  renderSidebar();
  updateNotifBadge();
}

/* Show salary table when category is "مرتبات", hide amount input */
function onExpenseCategoryChange() {
  const catSel = document.getElementById('exp-category');
  if (!catSel) return;
  const isSalary = catSel.value === 'مرتبات';
  const amountWrap = document.getElementById('exp-amount-wrap');
  const salarySection = document.getElementById('salary-table-section');
  const amountInput = document.getElementById('exp-amount');

  if (isSalary) {
    amountWrap.style.display = 'none';
    amountInput.removeAttribute('required');
    salarySection.style.display = 'block';
    renderSalaryTable();
  } else {
    amountWrap.style.display = '';
    amountInput.setAttribute('required', '');
    salarySection.style.display = 'none';
  }
}

/* Build the salary table rows for all active employees */
function renderSalaryTable() {
  const host = document.getElementById('salary-table-container');
  if (!host) return;
  const employees = (DB.data.employees || []).filter(e => !e.disabled);

  if (employees.length === 0) {
    host.innerHTML = `
      <div class="salary-empty">
        <div class="salary-empty-icon">👥</div>
        <div class="salary-empty-text">لا يوجد موظفين مسجلين بعد</div>
        <div class="salary-empty-sub">اضغط "⚙️ إدارة الموظفين" لإضافة أول موظف</div>
      </div>`;
    document.getElementById('salary-summary').innerHTML = '';
    return;
  }

  // Initialize staging from employees if not already set
  if (!window._salaryStaging) {
    window._salaryStaging = {};
  }
  // Ensure all current employees have entries
  employees.forEach(emp => {
    if (!window._salaryStaging[emp.id]) {
      window._salaryStaging[emp.id] = {
        included: true,
        deduction: 0,
        bonus: 0,
        note: ''
      };
    }
  });

  const cur = (DB.data.settings.currency || 'جنيه');
  const curShort = cur === 'جنيه' ? 'ج.م' : cur === 'ريال' ? 'ر.س' : cur === 'درهم' ? 'د.إ' : cur.slice(0, 3);

  host.innerHTML = `
    <div class="salary-table-wrap">
      <table class="salary-table">
        <thead>
          <tr>
            <th style="width:36px"><input type="checkbox" id="sal-check-all" onchange="toggleAllSalaries(this.checked)" checked></th>
            <th>الموظف</th>
            <th>الوظيفة</th>
            <th>المرتب الأساسي</th>
            <th>الخصم</th>
            <th>المكافأة</th>
            <th>صافي المرتب</th>
            <th>ملاحظة</th>
          </tr>
        </thead>
        <tbody>
          ${employees.map(emp => {
            const state = window._salaryStaging[emp.id];
            const baseSalary = emp.baseSalary || 0;
            const deduction = state.deduction || 0;
            const bonus = state.bonus || 0;
            const net = Math.max(0, baseSalary - deduction + bonus);
            return `
              <tr class="salary-row ${!state.included ? 'salary-row-disabled' : ''}" data-emp-id="${emp.id}">
                <td><input type="checkbox" class="sal-check" data-emp="${emp.id}" ${state.included?'checked':''} onchange="onSalaryRowToggle('${emp.id}', this.checked)"></td>
                <td><b>${escapeHtml(emp.name)}</b></td>
                <td><span class="sal-job-badge">${escapeHtml(emp.position||'-')}</span></td>
                <td class="sal-base">${fmt(baseSalary)} <small>${curShort}</small></td>
                <td>
                  <input type="number" step="0.01" min="0" max="${baseSalary}" class="form-control sal-input sal-deduction" value="${deduction}" oninput="onSalaryFieldChange('${emp.id}','deduction',this.value)" ${!state.included?'disabled':''} placeholder="0">
                </td>
                <td>
                  <input type="number" step="0.01" min="0" class="form-control sal-input sal-bonus" value="${bonus}" oninput="onSalaryFieldChange('${emp.id}','bonus',this.value)" ${!state.included?'disabled':''} placeholder="0">
                </td>
                <td class="sal-net" id="sal-net-${emp.id}">
                  <b>${fmt(net)}</b> <small>${curShort}</small>
                </td>
                <td>
                  <input type="text" class="form-control sal-input sal-note" value="${escapeHtml(state.note||'')}" oninput="onSalaryFieldChange('${emp.id}','note',this.value)" ${!state.included?'disabled':''} placeholder="اختياري">
                </td>
              </tr>
            `;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;

  recalcSalarySummary();
}

function onSalaryRowToggle(empId, included) {
  if (!window._salaryStaging) window._salaryStaging = {};
  if (!window._salaryStaging[empId]) window._salaryStaging[empId] = { deduction:0, bonus:0, note:'' };
  window._salaryStaging[empId].included = included;
  // Toggle disabled state on inputs in this row
  const row = document.querySelector(`tr.salary-row[data-emp-id="${empId}"]`);
  if (row) {
    row.classList.toggle('salary-row-disabled', !included);
    row.querySelectorAll('.sal-input').forEach(inp => {
      inp.disabled = !included;
    });
  }
  recalcSalarySummary();
  // Sync "check all" state
  const allChecks = document.querySelectorAll('.sal-check');
  const allChecked = Array.from(allChecks).every(c => c.checked);
  const checkAll = document.getElementById('sal-check-all');
  if (checkAll) checkAll.checked = allChecked;
}

function toggleAllSalaries(checked) {
  document.querySelectorAll('.sal-check').forEach(cb => {
    cb.checked = checked;
    const empId = cb.dataset.emp;
    onSalaryRowToggle(empId, checked);
  });
}

function onSalaryFieldChange(empId, field, value) {
  if (!window._salaryStaging) window._salaryStaging = {};
  if (!window._salaryStaging[empId]) window._salaryStaging[empId] = { included:true, deduction:0, bonus:0, note:'' };
  if (field === 'deduction' || field === 'bonus') {
    window._salaryStaging[empId][field] = parseFloat(value) || 0;
    // Update net cell
    const emp = (DB.data.employees||[]).find(e => e.id === empId);
    if (emp) {
      const base = emp.baseSalary || 0;
      const ded = window._salaryStaging[empId].deduction || 0;
      const bon = window._salaryStaging[empId].bonus || 0;
      const net = Math.max(0, base - ded + bon);
      const cur = (DB.data.settings.currency || 'جنيه');
      const curShort = cur === 'جنيه' ? 'ج.م' : cur === 'ريال' ? 'ر.س' : cur === 'درهم' ? 'د.إ' : cur.slice(0, 3);
      const cell = document.getElementById('sal-net-' + empId);
      if (cell) cell.innerHTML = `<b>${fmt(net)}</b> <small>${curShort}</small>`;
    }
  } else {
    window._salaryStaging[empId][field] = value;
  }
  recalcSalarySummary();
}

function recalcSalarySummary() {
  const summary = document.getElementById('salary-summary');
  if (!summary) return;
  let totalBase = 0, totalDed = 0, totalBon = 0, totalNet = 0, count = 0;
  (DB.data.employees || []).forEach(emp => {
    if (emp.disabled) return;
    const state = (window._salaryStaging || {})[emp.id];
    if (!state || !state.included) return;
    count++;
    const base = emp.baseSalary || 0;
    const ded = state.deduction || 0;
    const bon = state.bonus || 0;
    totalBase += base;
    totalDed += ded;
    totalBon += bon;
    totalNet += Math.max(0, base - ded + bon);
  });
  const cur = (DB.data.settings.currency || 'جنيه');
  const curShort = cur === 'جنيه' ? 'ج.م' : cur === 'ريال' ? 'ر.س' : cur === 'درهم' ? 'د.إ' : cur.slice(0, 3);

  summary.innerHTML = `
    <div class="sal-sum-card sal-sum-count">
      <div class="sal-sum-icon">👥</div>
      <div>
        <div class="sal-sum-label">عدد الموظفين</div>
        <div class="sal-sum-value">${count}</div>
      </div>
    </div>
    <div class="sal-sum-card sal-sum-base">
      <div class="sal-sum-icon">💰</div>
      <div>
        <div class="sal-sum-label">إجمالي المرتبات</div>
        <div class="sal-sum-value">${fmt(totalBase)} <small>${curShort}</small></div>
      </div>
    </div>
    <div class="sal-sum-card sal-sum-deduction">
      <div class="sal-sum-icon">➖</div>
      <div>
        <div class="sal-sum-label">إجمالي الخصومات</div>
        <div class="sal-sum-value">${fmt(totalDed)} <small>${curShort}</small></div>
      </div>
    </div>
    <div class="sal-sum-card sal-sum-bonus">
      <div class="sal-sum-icon">➕</div>
      <div>
        <div class="sal-sum-label">إجمالي المكافآت</div>
        <div class="sal-sum-value">${fmt(totalBon)} <small>${curShort}</small></div>
      </div>
    </div>
    <div class="sal-sum-card sal-sum-net">
      <div class="sal-sum-icon">✅</div>
      <div>
        <div class="sal-sum-label">صافي ما سيُدفع</div>
        <div class="sal-sum-value">${fmt(totalNet)} <small>${curShort}</small></div>
      </div>
    </div>
  `;

  // Sync hidden input with current staging
  const hidden = document.getElementById('_salaryDataJson');
  if (hidden) hidden.value = JSON.stringify(window._salaryStaging || {});
  // Also update the (now hidden) amount field with the net total so saveExpense reads it
  const amtInput = document.getElementById('exp-amount');
  if (amtInput) amtInput.value = totalNet;
}

function addEmployee() {
  const name = (document.getElementById('emp-new-name').value || '').trim();
  const position = (document.getElementById('emp-new-position').value || '').trim();
  const salary = parseFloat(document.getElementById('emp-new-salary').value) || 0;
  if (!name) { toast('اسم الموظف مطلوب', 'warning'); return; }
  if (!position) { toast('الوظيفة مطلوبة', 'warning'); return; }
  if (salary <= 0) { toast('المرتب لازم يكون أكبر من صفر', 'warning'); return; }
  if (!DB.data.employees) DB.data.employees = [];
  DB.data.employees.push({
    id: 'emp_' + uid(),
    name, position, baseSalary: salary,
    disabled: false,
    createdAt: Date.now()
  });
  DB.save();
  toast(`✓ تم إضافة ${name}`);
  // Clear inputs
  document.getElementById('emp-new-name').value = '';
  document.getElementById('emp-new-position').value = '';
  document.getElementById('emp-new-salary').value = '';
  document.getElementById('emp-new-name').focus();
  // Refresh list
  const cur = (DB.data.settings.currency || 'جنيه');
  const curShort = cur === 'جنيه' ? 'ج.م' : cur === 'ريال' ? 'ر.س' : cur === 'درهم' ? 'د.إ' : cur.slice(0, 3);
  document.getElementById('emp-list').innerHTML = renderEmployeesList(DB.data.employees, curShort);
}

function editEmployee(id) {
  const emp = (DB.data.employees||[]).find(e => e.id === id);
  if (!emp) return;
  const cur = (DB.data.settings.currency || 'جنيه');
  const curShort = cur === 'جنيه' ? 'ج.م' : cur === 'ريال' ? 'ر.س' : cur === 'درهم' ? 'د.إ' : cur.slice(0, 3);

  const newName = prompt('اسم الموظف:', emp.name);
  if (newName === null) return;
  const newPosition = prompt('الوظيفة:', emp.position||'');
  if (newPosition === null) return;
  const newSalary = prompt(`المرتب الأساسي (${curShort}):`, emp.baseSalary||0);
  if (newSalary === null) return;
  const sal = parseFloat(newSalary) || 0;
  if (!newName.trim()) { toast('الاسم مطلوب', 'error'); return; }
  if (sal <= 0) { toast('المرتب غير صحيح', 'error'); return; }

  emp.name = newName.trim();
  emp.position = newPosition.trim();
  emp.baseSalary = sal;
  emp.updatedAt = Date.now();
  DB.save();
  toast('✓ تم التحديث');
  document.getElementById('emp-list').innerHTML = renderEmployeesList(DB.data.employees, curShort);
}

function toggleEmployee(id) {
  const emp = (DB.data.employees||[]).find(e => e.id === id);
  if (!emp) return;
  emp.disabled = !emp.disabled;
  DB.save();
  toast(emp.disabled ? `تم تعطيل ${emp.name}` : `تم تفعيل ${emp.name}`);
  const cur = (DB.data.settings.currency || 'جنيه');
  const curShort = cur === 'جنيه' ? 'ج.م' : cur === 'ريال' ? 'ر.س' : cur === 'درهم' ? 'د.إ' : cur.slice(0, 3);
  document.getElementById('emp-list').innerHTML = renderEmployeesList(DB.data.employees, curShort);
}

function deleteEmployee(id) {

  confirmDialog(`هل تريد حذف الموظف "${emp.name}"؟`, () => {

function saveExpense(id) {
  const d = Object.fromEntries(new FormData(document.getElementById('exp-form')));
  d.amount = parseFloat(d.amount);

  // Salary mode: read staging and build detailed record
  const isSalary = d.category === 'مرتبات';
  if (isSalary) {
    const staging = window._salaryStaging || {};
    const employees = (DB.data.employees || []).filter(e => !e.disabled);
    const selected = employees.filter(emp => staging[emp.id] && staging[emp.id].included);

    if (selected.length === 0) {
      toast('اختر موظف واحد على الأقل لصرف مرتبه', 'error');
      return;
    }

    let totalBase = 0, totalDed = 0, totalBon = 0, totalNet = 0;
    const breakdown = [];
    selected.forEach(emp => {
      const s = staging[emp.id];
      const base = emp.baseSalary || 0;
      const ded = s.deduction || 0;
      const bon = s.bonus || 0;
      const net = Math.max(0, base - ded + bon);
      totalBase += base; totalDed += ded; totalBon += bon; totalNet += net;
      breakdown.push({
        employeeId: emp.id,
        employeeName: emp.name,
        position: emp.position,
        baseSalary: base,
        deduction: ded,
        bonus: bon,
        net,
        note: s.note || ''
      });
    });

    d.amount = totalNet;
    d.salaryData = {
      runDate: d.date,
      employees: breakdown,
      totalBase, totalDed, totalBon, totalNet
    };
    // Build a description if user didn't write one
    if (!d.description || !d.description.trim()) {
      const month = new Date(d.date).toLocaleDateString('ar-EG', { month: 'long', year: 'numeric' });
      d.description = `مرتبات شهر ${month} - ${selected.length} موظف - إجمالي ${fmtCurrency(totalNet)}${totalDed > 0 ? ` (خصومات ${fmtCurrency(totalDed)})` : ''}`;
    }
  }

  // Remove staging field from FormData
  delete d._salaryDataJson;

  if (!d.amount || d.amount <= 0) { toast('أدخل مبلغاً صحيحاً', 'error'); return; }
  let before = null;
  let record;
  if (id) {
    const e = DB.data.expenses.find(x=>x.id===id);
    if (!e) return;
    before = JSON.parse(JSON.stringify(e));
    Object.assign(e, d);
    record = e;
  } else {
    record = { id:'e_'+uid(), ...d, createdAt: Date.now() };
    DB.data.expenses.push(record);
  }
  // Cleanup staging
  delete window._salaryStaging;
  DB.save();
  logAudit({
    operation: id ? 'edit' : 'add', table: 'expenses',
    recordId: record.id,
    recordLabel: `${record.category||'مصروف'} - ${fmtCurrency(record.amount)}`,
    before, after: JSON.parse(JSON.stringify(record)),
    reason: window._pendingAuditReason || ''
  });
  delete window._pendingAuditReason;
  closeModal();
  toast(isSalary ? `✓ تم صرف مرتبات ${d.salaryData.employees.length} موظف` : (id ? 'تم التحديث' : 'تم إضافة المصروف'));
  renderExpenses();
}

function deleteExpense(id) {
  const e = DB.data.expenses.find(x=>x.id===id);
  if (!e) return;
  confirmDialog('حذف هذا المصروف؟', () => {
    const before = JSON.parse(JSON.stringify(e));
    DB.data.expenses = DB.data.expenses.filter(x=>x.id!==id);
    DB.save();
    logAudit({
      operation: 'delete', table: 'expenses',
      recordId: id, recordLabel: `${e.category||'مصروف'} - ${fmtCurrency(e.amount)}`,
      before, after: null, reason: 'حذف مصروف'
    });
    toast('تم الحذف');
    renderExpenses();
  });
}

          </div>

            <button class="btn btn-ghost btn-sm" onclick="quickRange('month')">شهر</button>

          </div>
        </div>
        <div id="report-content" class="report-content"></div>
      </main>
    </div>
  `;

  const toEl = document.getElementById('rep-to');
  if (fromEl) fromEl.addEventListener('change', e => { reportState.from = e.target.value; renderReportContent(); });
  if (toEl) toEl.addEventListener('change', e => { reportState.to = e.target.value; renderReportContent(); });

  renderReportContent();
}

function switchReportTab(tab) { reportState.tab = tab; renderReports(); }

function quickRange(type) {
  const today = new Date();
  let from = new Date();
  if (type==='today') { from = new Date(); }
  else if (type==='week') { from.setDate(today.getDate()-7); }
  else if (type==='month') { from.setMonth(today.getMonth()); from.setDate(1); }
  else if (type==='year') { from = new Date(today.getFullYear(), 0, 1); }
  reportState.from = from.toISOString().slice(0,10);
  reportState.to = today.toISOString().slice(0,10);
  renderReports();
}

function inDateRange(date) {
  if (reportState.from && date < reportState.from) return false;
  if (reportState.to && date > reportState.to) return false;
  return true;
}

function renderReportContent() {
  const c = document.getElementById('report-content');
  if (!c) return;
  if (reportState.tab === 'overview')    c.innerHTML = buildOverviewReport();
  else if (reportState.tab === 'daily')  c.innerHTML = buildDailyReport();
  else if (reportState.tab === 'monthly') c.innerHTML = buildMonthlyReport();
  else if (reportState.tab === 'compare') c.innerHTML = buildCompareReport();
  else if (reportState.tab === 'daily-expenses') c.innerHTML = buildDailyExpensesReport();
  else if (reportState.tab === 'pnl')    c.innerHTML = buildPnlReport();
  else if (reportState.tab === 'issuances') c.innerHTML = buildIssuancesReport();
  else if (reportState.tab === 'customers') c.innerHTML = buildCustomersReport();
  else if (reportState.tab === 'inventory') c.innerHTML = buildInventoryReport();
  else if (reportState.tab === 'collections') c.innerHTML = buildCollectionsReport();
  else if (reportState.tab === 'transfers') c.innerHTML = buildTransfersReport();
}

/* ----- OVERVIEW: Big picture in the date range ----- */
function buildOverviewReport() {
  const isss = (DB.data.issuances||[]).filter(i => inDateRange(i.date));
  const invs = DB.data.invoices.filter(i => inDateRange(i.date));
  const pays = DB.data.payments.filter(p => inDateRange(p.date));
  const exps = DB.data.expenses.filter(e => e.kind !== "purchase" && inDateRange(e.date));

  const issTotal = isss.reduce((s,i)=>s+i.total,0);
  const issQty = isss.reduce((s,i)=>s+i.quantity,0);
  const revenue = isss.reduce((s,i)=>s+i.total,0); // primary revenue = issuances
  const collected = pays.reduce((s,p)=>s+p.amount,0);
  const spent = exps.reduce((s,e)=>s+e.amount,0);
  const profit = revenue - spent;

  // Top customer by issuances in range
  const byCust = {};
  isss.forEach(i => {
    if (!byCust[i.customerId]) byCust[i.customerId] = { name:i.customerName, qty:0, total:0 };
    byCust[i.customerId].qty += i.quantity;
    byCust[i.customerId].total += i.total;
  });
  const topCusts = Object.values(byCust).sort((a,b)=>b.total-a.total).slice(0,5);

  // Top paper by qty
  const byProd = {};
  isss.forEach(i => {
    if (!byProd[i.productId]) byProd[i.productId] = { name:i.productName, qty:0, total:0 };
    byProd[i.productId].qty += i.quantity;
    byProd[i.productId].total += i.total;
  });
  const topProds = Object.values(byProd).sort((a,b)=>b.qty-a.qty).slice(0,5);

  return `
    <div class="rep-cards-grid">
      <div class="rep-stat-card grad-teal">

        <div class="rep-stat-label">ورق مصروف</div>

        <div class="rep-stat-sub">${isss.length} عملية صرف</div>
      </div>
      <div class="rep-stat-card grad-green">
        <div class="rep-stat-icon">💰</div>
        <div class="rep-stat-label">إجمالي التوريدات</div>
        <div class="rep-stat-value">${fmtCurrency(issTotal)}</div>
        <div class="rep-stat-sub">من توريدات المراكز</div>
      </div>
      <div class="rep-stat-card grad-sky">
        <div class="rep-stat-icon">💵</div>
        <div class="rep-stat-label">المحصل</div>
        <div class="rep-stat-value">${fmtCurrency(collected)}</div>
        <div class="rep-stat-sub">${pays.length} عملية تحصيل</div>
      </div>
      <div class="rep-stat-card grad-orange">
        <div class="rep-stat-icon">💸</div>
        <div class="rep-stat-label">المصروفات</div>
        <div class="rep-stat-value">${fmtCurrency(spent)}</div>
        <div class="rep-stat-sub">${exps.length} مصروف</div>
      </div>
      <div class="rep-stat-card ${profit>=0?'grad-purple':'grad-red'}">
        <div class="rep-stat-icon">${profit>=0?'📈':'📉'}</div>
        <div class="rep-stat-label">صافي الربح</div>
        <div class="rep-stat-value">${fmtCurrency(profit)}</div>
        <div class="rep-stat-sub">${profit>=0?'ربح':'خسارة'} في الفترة</div>
      </div>
    </div>

    <div class="rep-two-col">
      <div class="rep-panel">
        <div class="rep-panel-header"><h4>🏆 أكبر 5 مراكز</h4></div>
        <div class="rep-panel-body">
          ${topCusts.length === 0 ? '<div class="rep-empty">لا توجد بيانات</div>' :
            topCusts.map((c,idx) => `
              <div class="rep-rank-row">

/* ----- DAILY: Per-day breakdown ----- */
function buildDailyReport() {
  // Build per-day buckets
  const buckets = {}; // date -> { issuances, issTotal, issQty, payments, payAmount, expenses, expAmount }
  const ensure = d => {
    if (!buckets[d]) buckets[d] = { date:d, issuances:0, issTotal:0, issQty:0, payments:0, payAmount:0, expenses:0, expAmount:0 };
    return buckets[d];

/* ----- P&L Report ----- */
function buildPnlReport() {
  const invs = DB.data.invoices.filter(i => inDateRange(i.date));

  const exps = DB.data.expenses.filter(e => e.kind !== "purchase" && inDateRange(e.date));
  const revenue = isss.reduce((s,i)=>s+i.total,0); // toraidat are the revenue
  let cogs = 0;
  isss.forEach(iss => {
    const p = DB.data.products.find(x=>x.id===iss.productId);

  });
  const grossProfit = revenue - cogs;
  const totalExpenses = exps.reduce((s,e)=>s+e.amount,0);
  const netProfit = grossProfit - totalExpenses;

  exps.forEach(e => { byCat[e.category] = (byCat[e.category]||0) + e.amount; });

  return `

/* ----- Issuances Report (paper-out details) ----- */
/* =========================================================
   COMPARISON REPORT: month-vs-month or year-vs-year
========================================================= */
let compareState = { period1: '', period2: '', mode: 'month' };

function buildCompareReport() {
  // Default to current month vs previous month
  if (!compareState.period1) {
    const now = new Date();
    compareState.period1 = now.toISOString().slice(0,7);
    const prev = new Date(now.getFullYear(), now.getMonth() - 1, 1);
    compareState.period2 = prev.toISOString().slice(0,7);
  }

  function getStats(period, mode) {
    const matchFn = mode === 'year'
      ? (date) => (date || '').startsWith(period)  // period = "2026"
      : (date) => (date || '').startsWith(period); // period = "2026-05"

    const invoices = (DB.data.invoices || []).filter(i => matchFn(i.date));
    const issuances = (DB.data.issuances || []).filter(i => matchFn(i.date));
    const payments = (DB.data.payments || []).filter(p => matchFn(p.date));
    const expenses = (DB.data.expenses || []).filter(e => matchFn(e.date) && e.kind !== 'purchase');
    const purchases = (DB.data.expenses || []).filter(e => matchFn(e.date) && e.kind === 'purchase');

    const revenue = invoices.reduce((s,i)=>s+(i.total||0), 0) + issuances.reduce((s,i)=>s+(i.total||0), 0);
    const collections = payments.reduce((s,p)=>s+(p.amount||0), 0);
    const expensesTotal = expenses.reduce((s,e)=>s+(e.amount||0), 0);
    const purchasesTotal = purchases.reduce((s,e)=>s+(e.amount||0), 0);

    // COGS
    let cogs = 0;
    issuances.forEach(iss => {
      const p = DB.data.products.find(x => x.id === iss.productId);
      if (p) cogs += (p.cost || 0) * iss.quantity;
    });

    const profit = revenue - cogs - expensesTotal;
    const paperQty = issuances.reduce((s,i)=>s+(i.quantity||0), 0);

    return {
      invoicesCount: invoices.length,
      issuancesCount: issuances.length,
      paymentsCount: payments.length,
      revenue, collections, expensesTotal, purchasesTotal,
      cogs, profit, paperQty
    };
  }

  function diff(a, b) {
    if (b === 0) return a === 0 ? 0 : 100;
    return ((a - b) / Math.abs(b)) * 100;
  }
  function diffBadge(a, b, reverse) {
    // reverse=true means decrease is good (e.g. expenses)
    const d = diff(a, b);
    if (Math.abs(d) < 0.5) return '<span class="cmp-diff cmp-stable">— ثابت</span>';
    const good = reverse ? d < 0 : d > 0;
    const arrow = d > 0 ? '▲' : '▼';
    const cls = good ? 'cmp-up' : 'cmp-down';
    return `<span class="cmp-diff ${cls}">${arrow} ${Math.abs(d).toFixed(1)}%</span>`;
  }

  function periodLabel(period, mode) {
    if (mode === 'year') return period;
    const [y, m] = period.split('-');
    const months = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
    return `${months[parseInt(m)-1]} ${y}`;
  }

  // Build period options for selects (last 24 months / last 5 years)
  function buildPeriodOptions(selected, mode) {
    const opts = [];
    const today = new Date();
    if (mode === 'year') {
      for (let i = 0; i < 6; i++) {
        const y = (today.getFullYear() - i).toString();
        opts.push(`<option value="${y}" ${y===selected?'selected':''}>${y}</option>`);
      }
    } else {
      for (let i = 0; i < 24; i++) {
        const d = new Date(today.getFullYear(), today.getMonth() - i, 1);
        const v = d.toISOString().slice(0,7);
        opts.push(`<option value="${v}" ${v===selected?'selected':''}>${periodLabel(v, 'month')}</option>`);
      }
    }
    return opts.join('');
  }

  const s1 = getStats(compareState.period1, compareState.mode);
  const s2 = getStats(compareState.period2, compareState.mode);

  const cur = (DB.data.settings.currency || 'جنيه');
  const curShort = cur === 'جنيه' ? 'ج.م' : cur === 'ريال' ? 'ر.س' : cur.slice(0, 3);

  return `
    <div class="rep-panel" style="background:linear-gradient(135deg,rgba(124,58,237,.06),rgba(16,185,129,.04));border-color:rgba(124,58,237,.20)">
      <div class="rep-panel-header">
        <h4>⚖️ اختر الفترتين للمقارنة</h4>
      </div>
      <div style="padding:14px;display:flex;flex-wrap:wrap;gap:12px;align-items:end">
        <div style="display:flex;gap:6px">
          <button class="btn btn-sm ${compareState.mode==='month'?'btn-primary':'btn-secondary'}" onclick="compareState.mode='month';compareState.period1='';compareState.period2='';renderReportContent()">شهر بشهر</button>
          <button class="btn btn-sm ${compareState.mode==='year'?'btn-primary':'btn-secondary'}" onclick="compareState.mode='year';compareState.period1=(new Date()).getFullYear().toString();compareState.period2=((new Date()).getFullYear()-1).toString();renderReportContent()">سنة بسنة</button>
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex:1;min-width:200px">
          <label style="font-weight:700;font-size:13px">الفترة A:</label>
          <select class="form-control" style="flex:1" onchange="compareState.period1=this.value;renderReportContent()">${buildPeriodOptions(compareState.period1, compareState.mode)}</select>
        </div>
        <div style="font-size:20px;color:var(--text-muted)">VS</div>
        <div style="display:flex;align-items:center;gap:8px;flex:1;min-width:200px">
          <label style="font-weight:700;font-size:13px">الفترة B:</label>
          <select class="form-control" style="flex:1" onchange="compareState.period2=this.value;renderReportContent()">${buildPeriodOptions(compareState.period2, compareState.mode)}</select>
        </div>
      </div>
    </div>

    <div class="cmp-grid">
      ${[
        { label:'💰 الإيرادات', a:s1.revenue, b:s2.revenue, money:true },
        { label:'✅ التحصيلات', a:s1.collections, b:s2.collections, money:true },
        { label:'📈 الربح الصافي', a:s1.profit, b:s2.profit, money:true },
        { label:'📤 المصروفات', a:s1.expensesTotal, b:s2.expensesTotal, money:true, reverse:true },
        { label:'🛒 المشتريات', a:s1.purchasesTotal, b:s2.purchasesTotal, money:true, reverse:true },
        { label:'📦 تكلفة البضاعة', a:s1.cogs, b:s2.cogs, money:true, reverse:true },
        { label:'📄 الفواتير', a:s1.invoicesCount, b:s2.invoicesCount, money:false },
        { label:'🚚 عمليات الصرف', a:s1.issuancesCount, b:s2.issuancesCount, money:false },
        { label:'📋 إجمالي الورق', a:s1.paperQty, b:s2.paperQty, money:false }
      ].map(row => `
        <div class="cmp-card">
          <div class="cmp-card-title">${row.label}</div>
          <div class="cmp-card-grid">
            <div class="cmp-period-block cmp-a">
              <div class="cmp-period-lbl">${periodLabel(compareState.period1, compareState.mode)}</div>
              <div class="cmp-period-val">${row.money ? fmtCurrency(row.a) : fmt(row.a)}</div>
            </div>
            <div class="cmp-vs-block">
              <div class="cmp-vs-arrow">→</div>
              ${diffBadge(row.a, row.b, row.reverse)}
            </div>
            <div class="cmp-period-block cmp-b">
              <div class="cmp-period-lbl">${periodLabel(compareState.period2, compareState.mode)}</div>
              <div class="cmp-period-val">${row.money ? fmtCurrency(row.b) : fmt(row.b)}</div>
            </div>
          </div>
        </div>
      `).join('')}
    </div>

    <div class="rep-grand-total" style="margin-top:14px">
      <div class="rep-grand-header">
        <span class="rep-grand-icon">💡</span>
        <span>الخلاصة</span>
      </div>
      <div class="rep-grand-body">
        ${(() => {
          const lines = [];
          const revDiff = diff(s1.revenue, s2.revenue);
          const profDiff = diff(s1.profit, s2.profit);
          if (Math.abs(revDiff) >= 5) {
            lines.push(`📊 الإيرادات ${revDiff > 0 ? 'زادت' : 'انخفضت'} بنسبة <b>${Math.abs(revDiff).toFixed(1)}%</b> في ${periodLabel(compareState.period1, compareState.mode)} مقارنة بـ ${periodLabel(compareState.period2, compareState.mode)}.`);
          }
          if (Math.abs(profDiff) >= 5) {
            const isGood = profDiff > 0;
            lines.push(`${isGood?'🎉':'⚠️'} صافي الربح ${isGood ? 'تحسّن' : 'تراجع'} بنسبة <b>${Math.abs(profDiff).toFixed(1)}%</b>.`);
          }
          const expDiff = diff(s1.expensesTotal, s2.expensesTotal);
          if (Math.abs(expDiff) >= 10) {
            lines.push(`💸 المصروفات ${expDiff > 0 ? 'ارتفعت' : 'انخفضت'} بنسبة <b>${Math.abs(expDiff).toFixed(1)}%</b>.`);
          }
          if (lines.length === 0) lines.push('📊 الأرقام متقاربة بين الفترتين — أداء مستقر.');
          return lines.map(l => `<div class="rep-grand-insight" style="margin-top:6px">${l}</div>`).join('');
        })()}
      </div>
    </div>
  `;
}

function buildIssuancesReport() {
  const isss = (DB.data.issuances||[]).filter(i => inDateRange(i.date)).sort((a,b)=>a.date.localeCompare(b.date));
  const totalQty = isss.reduce((s,i)=>s+i.quantity,0);
  const totalValue = isss.reduce((s,i)=>s+i.total,0);
  const totalPaid = isss.reduce((s,i)=>s+(i.paid||0),0);
  const totalDue = totalValue - totalPaid;

  /* Smart category detection: classify each product into a category based on its
     "type" field or its name (Arabic + English keywords). */
  function detectCategory(productName, productType) {
    const text = ((productType || '') + ' ' + (productName || '')).toLowerCase();
    const rules = [
      { key:'paper',     label:'ورق',           icon:'📄', color:'#0891b2', keywords:['ورق','paper','a4','a3','a5','رزمة','رزم','ريم','فرخ','sheet','photo'] },
      { key:'cardboard', label:'كرتون',         icon:'📦', color:'#92400e', keywords:['كرتون','كارتون','cardboard','carton','مقوى'] },
      { key:'film',      label:'فيلم بلاستيك',  icon:'🎞️', color:'#7c3aed', keywords:['فيلم','بلاستيك','بلاستك','plastic','film','lamination','تغليف','شفاف','pvc'] },
      { key:'ink',       label:'أحبار وحبر',    icon:'🖨️', color:'#dc2626', keywords:['حبر','ink','toner','تونر','خرطوشة','cartridge'] },
      { key:'plate',     label:'زنكات/بليتات',  icon:'🟦', color:'#475569', keywords:['زنك','زنكات','بليت','plate','بلاتة'] },
      { key:'glue',      label:'صمغ ولاصق',     icon:'🧪', color:'#ea580c', keywords:['صمغ','لاصق','glue','tape','شريط'] },
      { key:'chemical',  label:'كيماويات',      icon:'⚗️', color:'#059669', keywords:['كيماو','chemical','solution','محلول'] },
      { key:'binding',   label:'تجليد وأغلفة',  icon:'📔', color:'#0284c7', keywords:['تجليد','غلاف','binding','cover','spiral'] }
    ];
    for (const r of rules) {
      if (r.keywords.some(kw => text.includes(kw))) return r;
    }
    return { key:'other', label:'أخرى', icon:'📌', color:'#64748b', keywords:[] };
  }

  /* Helper to get product type by id (issuance doesn't store type directly) */
  function getProductType(productId) {
    const p = DB.data.products.find(x => x.id === productId);
    return p ? (p.type || '') : '';
  }

  /* Group by category, with products nested inside */
  const byCategory = {};
  isss.forEach(i => {
    const cat = detectCategory(i.productName, getProductType(i.productId));
    if (!byCategory[cat.key]) {
      byCategory[cat.key] = { ...cat, qty:0, total:0, count:0, products:{} };
    }
    byCategory[cat.key].qty += i.quantity;
    byCategory[cat.key].total += i.total;
    byCategory[cat.key].count += 1;
    const pid = i.productId;
    if (!byCategory[cat.key].products[pid]) {
      byCategory[cat.key].products[pid] = { name: i.productName, qty:0, total:0, count:0 };
    }
    byCategory[cat.key].products[pid].qty += i.quantity;
    byCategory[cat.key].products[pid].total += i.total;
    byCategory[cat.key].products[pid].count += 1;
  });

  /* Sort categories by total qty descending */
  const sortedCats = Object.values(byCategory).sort((a,b)=>b.qty-a.qty);
  const topCat = sortedCats[0];

  /* Group by center for the side panel */
  const byCenter = {};
  isss.forEach(i => {
    if (!byCenter[i.customerId]) byCenter[i.customerId] = { name: i.customerName, qty:0, total:0, count:0 };
    byCenter[i.customerId].qty += i.quantity;
    byCenter[i.customerId].total += i.total;
    byCenter[i.customerId].count++;
  });

  return `
    <div class="rep-cards-grid">
      <div class="rep-stat-card grad-teal"><div class="rep-stat-icon">📄</div><div class="rep-stat-label">عمليات الصرف</div><div class="rep-stat-value">${isss.length}</div></div>
      <div class="rep-stat-card grad-green"><div class="rep-stat-icon">📋</div><div class="rep-stat-label">إجمالي الكمية</div><div class="rep-stat-value">${fmt(totalQty)}</div></div>
      <div class="rep-stat-card grad-sky"><div class="rep-stat-icon">💰</div><div class="rep-stat-label">إجمالي القيمة</div><div class="rep-stat-value">${fmtCurrency(totalValue)}</div></div>
      <div class="rep-stat-card grad-red"><div class="rep-stat-icon">⏳</div><div class="rep-stat-label">المتبقي</div><div class="rep-stat-value">${fmtCurrency(totalDue)}</div></div>
    </div>

    ${sortedCats.length === 0 ? '' : `
    <!-- ===== CATEGORY BREAKDOWN ===== -->
    <div class="rep-panel" style="margin-top:14px">
      <div class="rep-panel-header">
        <h4>🗂️ الاستهلاك حسب التصنيف</h4>
        <span style="font-size:12px;color:var(--text-muted);font-weight:700">${sortedCats.length} ${sortedCats.length===1?'تصنيف':'تصنيفات'}</span>
      </div>
      <div class="rep-panel-body">
        <div class="cat-summary-grid">
          ${sortedCats.map(cat => {
            const sharePct = totalQty > 0 ? (cat.qty/totalQty)*100 : 0;
            return `
              <div class="cat-summary-card" style="--cat-color:${cat.color}">
                <div class="cat-summary-head">
                  <span class="cat-summary-icon" style="background:${cat.color}">${cat.icon}</span>
                  <div class="cat-summary-title">
                    <div class="cat-summary-name">${cat.label}</div>
                    <div class="cat-summary-meta">${cat.count} عملية • ${Object.keys(cat.products).length} نوع</div>
                  </div>
                  <div class="cat-summary-share">${sharePct.toFixed(1)}%</div>
                </div>
                <div class="cat-summary-stats">
                  <div class="cat-stat">
                    <span class="cat-stat-lbl">الكمية</span>
                    <span class="cat-stat-val">${fmt(cat.qty)}</span>
                  </div>
                  <div class="cat-stat">
                    <span class="cat-stat-lbl">القيمة</span>
                    <span class="cat-stat-val cat-stat-money">${fmtCurrency(cat.total)}</span>
                  </div>
                </div>
                <div class="cat-progress-track">
                  <div class="cat-progress-fill" style="width:${sharePct}%;background:${cat.color}"></div>
                </div>
              </div>`;
          }).join('')}
        </div>
      </div>
    </div>

    <!-- ===== PRODUCTS BREAKDOWN UNDER EACH CATEGORY ===== -->
    <div class="rep-panel" style="margin-top:14px">
      <div class="rep-panel-header">
        <h4>📊 تفاصيل المنتجات داخل كل تصنيف</h4>
      </div>
      <div class="rep-panel-body" style="padding:14px">
        ${sortedCats.map(cat => `
          <div class="cat-detail-section" style="--cat-color:${cat.color}">
            <div class="cat-detail-header">
              <span class="cat-detail-icon" style="background:${cat.color}">${cat.icon}</span>
              <span class="cat-detail-name">${cat.label}</span>
              <span class="cat-detail-total">${fmt(cat.qty)} <small>قطعة</small> • ${fmtCurrency(cat.total)}</span>
            </div>
            <div class="cat-detail-products">
              ${Object.values(cat.products).sort((a,b)=>b.qty-a.qty).map(p => {
                const pPctInCat = cat.qty > 0 ? (p.qty/cat.qty)*100 : 0;
                return `
                  <div class="cat-product-row">
                    <div class="cat-product-name">
                      <span class="cat-product-dot" style="background:${cat.color}"></span>
                      <b>${escapeHtml(p.name)}</b>
                      <small>${p.count} عملية</small>
                    </div>
                    <div class="cat-product-bar-wrap">
                      <div class="cat-product-bar"><div class="cat-product-bar-fill" style="width:${pPctInCat}%;background:${cat.color}"></div></div>
                    </div>
                    <div class="cat-product-stats">
                      <span class="cat-product-qty">${fmt(p.qty)}</span>
                      <span class="cat-product-money">${fmtCurrency(p.total)}</span>
                    </div>
                  </div>`;
              }).join('')}
            </div>
          </div>
        `).join('')}
      </div>
    </div>

    <!-- ===== GRAND TOTAL FOOTER ===== -->
    <div class="rep-grand-total">
      <div class="rep-grand-header">
        <span class="rep-grand-icon">📊</span>
        <span>الإجمالي العام للاستهلاك</span>
      </div>
      <div class="rep-grand-body">
        ${sortedCats.map(cat => `
          <div class="rep-grand-row">
            <span class="rep-grand-cat" style="color:${cat.color}">
              ${cat.icon} <b>${cat.label}</b>
            </span>
            <span class="rep-grand-vals">
              <span class="rep-grand-qty">${fmt(cat.qty)} قطعة</span>
              <span class="rep-grand-sep">|</span>
              <span class="rep-grand-money">${fmtCurrency(cat.total)}</span>
            </span>
          </div>`).join('')}
        <div class="rep-grand-final">
          <span class="rep-grand-final-lbl">🎯 الإجمالي الكلي</span>
          <span class="rep-grand-final-vals">
            <b class="rep-grand-final-qty">${fmt(totalQty)} قطعة</b>

          </span>
        </div>
        ${topCat ? `
          <div class="rep-grand-insight">
            💡 <b>${topCat.label}</b> هو التصنيف الأكثر استهلاكاً بنسبة <b>${((topCat.qty/totalQty)*100).toFixed(1)}%</b> من إجمالي الكميات
          </div>
        ` : ''}
      </div>
    </div>
    `}

    <!-- ===== ORIGINAL: BY CENTER ===== -->
    <div class="rep-panel" style="margin-top:14px">
      <div class="rep-panel-header"><h4>🏢 المراكز حسب الكمية</h4></div>

      ...c,
