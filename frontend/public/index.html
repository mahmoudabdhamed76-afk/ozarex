/* ============== WHATSAPP BUTTON (in invoice row + invoice viewer) ============== */
.btn-icon.btn-whatsapp {
  color: #25d366;
  position: relative;
  transition: all .2s;
}
.btn-icon.btn-whatsapp:hover {
  background: rgba(37,211,102,.12);
  color: #128c7e;
  transform: scale(1.08);
}
.btn-icon.btn-whatsapp:active { transform: scale(.95); }

/* ============== NOTES SIDE PANEL ============== */
.notes-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(15,23,42,.40);
  backdrop-filter: blur(2px);
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s;
}
.notes-backdrop.show { opacity: 1; pointer-events: auto; }

.notes-panel {
  position: fixed;
  top: 0;
  inset-inline-start: 0;
  height: 100vh;
  width: 420px;
  max-width: 92vw;
  background: var(--surface);
  border-inline-end: 1px solid var(--border);
  box-shadow: 8px 0 32px rgba(15,23,42,.20);
  z-index: 201;
  display: flex;
  flex-direction: column;
  transform: translateX(-110%);
  transition: transform .35s cubic-bezier(.4,0,.2,1);
}
.notes-panel.open { transform: translateX(0); }
[dir="rtl"] .notes-panel,
:root[dir="rtl"] .notes-panel {
  inset-inline-start: 0;
  transform: translateX(110%);
}
[dir="rtl"] .notes-panel.open,
:root[dir="rtl"] .notes-panel.open {
  transform: translateX(0);
}
[data-theme="dark"] .notes-panel {
  background: var(--surface);
  box-shadow: 8px 0 32px rgba(0,0,0,.55);
}

.notes-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 20px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(135deg, rgba(245,158,11,.10), rgba(234,88,12,.04));
}
[data-theme="dark"] .notes-header {
  background: linear-gradient(135deg, rgba(245,158,11,.12), rgba(234,88,12,.06));
}
.notes-title {
  font-size: 17px; font-weight: 900;
  letter-spacing: -0.3px;
  color: var(--text);
}
.notes-sub {
  font-size: 11.5px; font-weight: 600;
  color: var(--text-muted);
  margin-top: 2px;
}
.notes-close {
  width: 34px; height: 34px;
  border-radius: 10px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  cursor: pointer;
  display: grid; place-items: center;
  color: var(--text-muted);
  transition: all .2s;
}
.notes-close:hover { color: var(--danger); background: rgba(220,38,38,.10); border-color: rgba(220,38,38,.30); }

.notes-add {
  padding: 14px 18px;
  background: var(--surface-2);
  border-bottom: 1px solid var(--border);
}
.notes-textarea {
  width: 100%;
  padding: 10px 12px;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-family: inherit;
  font-size: 13.5px;
  resize: vertical;
  min-height: 60px;
  transition: all .2s;
}
.notes-textarea:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-50);
}
.notes-add-row {
  display: flex; gap: 8px;
  margin-top: 8px;
}
.notes-color-select {
  flex: 1;
  padding: 7px 10px;
  border-radius: 9px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-family: inherit;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
}

.notes-filter-bar {
  padding: 10px 18px;
  border-bottom: 1px solid var(--border);
}
.notes-search {
  width: 100%;
  padding: 8px 14px;
  border-radius: 999px;
  border: 1.5px solid var(--border);
  background: var(--surface-2);
  color: var(--text);
  font-family: inherit;
  font-size: 12.5px;
  transition: all .2s;
}
.notes-search:focus {
  outline: none;
  border-color: var(--primary);
  background: var(--surface);
  box-shadow: 0 0 0 3px var(--primary-50);
}

.notes-list {
  flex: 1;
  overflow-y: auto;
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.notes-list::-webkit-scrollbar { width: 6px; }
.notes-list::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 999px; }

.notes-empty {
  text-align: center;
  padding: 40px 14px;
}
.notes-empty-icon { font-size: 48px; opacity: .4; margin-bottom: 10px; }
.notes-empty-text { font-size: 14px; font-weight: 800; color: var(--text); margin-bottom: 4px; }
.notes-empty-sub { font-size: 12px; color: var(--text-muted); }

.note-card {
  position: relative;
  padding: 14px 14px 10px;
  border-radius: 14px;
  border: 1px solid;
  transition: all .25s;
  animation: noteSlideIn .35s cubic-bezier(.34,1.56,.64,1);
  box-shadow: 0 2px 8px rgba(15,23,42,.04);
}
.note-card:hover {
  transform: translateX(-3px);
  box-shadow: 0 6px 18px rgba(15,23,42,.08);
}
@keyframes noteSlideIn {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Note color variants - sticky note style */
.note-card.note-amber   { background: #fef9e7; border-color: #fde68a; }
.note-card.note-emerald { background: #ecfdf5; border-color: #a7f3d0; }
.note-card.note-rose    { background: #fef2f2; border-color: #fecaca; }
.note-card.note-purple  { background: #f5f3ff; border-color: #ddd6fe; }
.note-card.note-sky     { background: #eff6ff; border-color: #bfdbfe; }

[data-theme="dark"] .note-card.note-amber   { background: rgba(245,158,11,.12); border-color: rgba(245,158,11,.35); }
[data-theme="dark"] .note-card.note-emerald { background: rgba(16,185,129,.12); border-color: rgba(16,185,129,.35); }
[data-theme="dark"] .note-card.note-rose    { background: rgba(220,38,38,.12); border-color: rgba(220,38,38,.35); }
[data-theme="dark"] .note-card.note-purple  { background: rgba(124,58,237,.12); border-color: rgba(124,58,237,.35); }
[data-theme="dark"] .note-card.note-sky     { background: rgba(59,130,246,.12); border-color: rgba(59,130,246,.35); }

.note-card.pinned {
  box-shadow: 0 0 0 2px rgba(234,88,12,.30), 0 4px 14px rgba(234,88,12,.10);
}
.note-card.done { opacity: 0.55; }
.note-card.done .note-text { text-decoration: line-through; color: var(--text-muted); }

.note-pin-badge {
  position: absolute;
  top: -8px;
  inset-inline-end: 12px;
  font-size: 18px;
  filter: drop-shadow(0 2px 3px rgba(234,88,12,.4));
}
.note-text {
  font-size: 13.5px;
  font-weight: 600;
  color: #1f2937;
  line-height: 1.6;
  margin-bottom: 8px;
  white-space: pre-wrap;
  word-break: break-word;
}
[data-theme="dark"] .note-text { color: var(--text); }

.note-meta {
  font-size: 10.5px;
  font-weight: 600;
  color: rgba(15,23,42,.55);
  margin-bottom: 8px;
}
[data-theme="dark"] .note-meta { color: var(--text-soft); }

.note-actions {
  display: flex; align-items: center; gap: 4px;
  padding-top: 8px;
  border-top: 1px dashed rgba(15,23,42,.10);
  flex-wrap: wrap;
}
[data-theme="dark"] .note-actions { border-top-color: rgba(255,255,255,.10); }

.note-act {
  width: 26px; height: 26px;
  border-radius: 7px;
  background: rgba(255,255,255,.55);
  border: 1px solid rgba(15,23,42,.10);
  cursor: pointer;
  font-size: 12px;
  display: grid; place-items: center;
  transition: all .15s;
}
[data-theme="dark"] .note-act {
  background: rgba(0,0,0,.25);
  border-color: rgba(255,255,255,.10);
  color: var(--text);
}
.note-act:hover {
  background: white;
  transform: scale(1.1);
}
[data-theme="dark"] .note-act:hover { background: rgba(0,0,0,.45); }
.note-act-del { margin-inline-start: auto; }
.note-act-del:hover { background: #fecaca; color: #991b1b; }
[data-theme="dark"] .note-act-del:hover { background: rgba(220,38,38,.30); color: white; }

.note-color-pick {
  display: flex; gap: 3px;
  margin-inline-start: 6px;
}
.ncp {
  width: 16px; height: 16px;
  border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,.6);
  box-shadow: 0 1px 3px rgba(15,23,42,.20);
  cursor: pointer;
  transition: transform .15s;
}
.ncp:hover { transform: scale(1.25); }
.ncp-amber   { background: #f59e0b; }
.ncp-emerald { background: #10b981; }
.ncp-rose    { background: #ef4444; }
.ncp-purple  { background: #8b5cf6; }
.ncp-sky     { background: #3b82f6; }

@media (max-width: 500px) {
  .notes-panel { width: 100vw; }
}

/* ============== COLLECTIONS FILTER ============== */
.collections-filter {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 14px;
  box-shadow: var(--shadow-sm);
}
.cf-row {
  display: flex; flex-wrap: wrap; align-items: center; gap: 10px;
  margin-bottom: 10px;
}
.cf-row:last-child { margin-bottom: 0; }
.cf-row-search { gap: 8px; }
.cf-search-wrap {
  flex: 1; min-width: 220px;
  display: flex; align-items: center; gap: 8px;
  background: var(--surface-2);
  border: 1.5px solid var(--border);
  border-radius: 999px;
  padding: 8px 14px;
  transition: all .25s;
}
.cf-search-wrap:focus-within {
  border-color: var(--primary);
  background: var(--surface);
  box-shadow: 0 0 0 4px var(--primary-50);
}
.cf-search-wrap input {
  flex: 1; border: none; background: transparent; outline: none;
  color: var(--text); font-size: 13.5px; font-family: inherit;
}
.cf-row-tabs { gap: 6px; flex-wrap: wrap; }
.cf-tab {
  padding: 8px 14px;
  border-radius: 999px;
  background: var(--surface-2);
  color: var(--text-muted);
  border: 1.5px solid var(--border);
  font-weight: 700; font-size: 13px;
  cursor: pointer;
  transition: all .2s;
  font-family: inherit;
}
.cf-tab:hover { color: var(--primary); border-color: var(--primary); }
.cf-tab.active {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
  border-color: transparent;
  box-shadow: 0 4px 12px rgba(5,150,105,.3);
}
.cf-quick-actions { margin-right: auto; display: flex; gap: 6px; }
.cf-quick {
  padding: 6px 12px;
  border-radius: 8px;
  background: var(--primary-50);
  color: var(--primary-dark);
  border: 1px dashed var(--primary);
  font-size: 12px; font-weight: 700;
  cursor: pointer;
  font-family: inherit;
}
.cf-quick:hover { background: var(--primary); color: white; }
.cf-label { font-weight: 700; font-size: 13px; color: var(--text); }
.cf-input {
  padding: 8px 12px;
  border-radius: 8px;
  border: 1.5px solid var(--border);
  background: var(--surface-2);
  color: var(--text);
  font-family: inherit;
  font-size: 13px;
  transition: all .2s;
}
.cf-input:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-50);
}
[data-theme="dark"] .cf-input::-webkit-calendar-picker-indicator {
  filter: invert(1) opacity(.7);
}
.cf-summary {
  display: flex; justify-content: space-between; align-items: center;
  background: linear-gradient(135deg, var(--primary-50), transparent);
  padding: 10px 16px;
  border-radius: 10px;
  border-right: 4px solid var(--primary);
  margin-bottom: 10px;
  font-size: 13.5px;
  font-weight: 600;
  flex-wrap: wrap; gap: 10px;
}
[data-theme="dark"] .cf-summary {
  background: linear-gradient(135deg, rgba(16,185,129,.10), transparent);
}


/* =========================================================
   📱 GLOBAL MOBILE RESPONSIVE LAYER
   - Applies to every page in the system.
   - Zero horizontal scroll on body.
   - All cards, tables, headers, modals adapt automatically.
   - Matches the working invoices page layout.
========================================================= */

.mobile-menu-btn {
  display: none;
  position: fixed;
  top: 8px;
  inset-inline-start: 8px;
  z-index: 1001;
  width: 36px; height: 36px;
  border-radius: 8px;
  background: var(--primary, #0f766e);
  color: #fff; border: none;
  font-size: 18px; cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,.18);
  align-items: center; justify-content: center;
  line-height: 1;
}
.mobile-menu-btn:active { transform: scale(0.95); }
body.mobile-drawer-open { overflow: hidden; }

@media (max-width: 768px) {
  /* Global no-overflow */
  html, body {
    overflow-x: hidden !important;
    max-width: 100vw;
    -webkit-text-size-adjust: 100%;
  }
  body { font-size: 14px; }
  * { max-width: 100vw; box-sizing: border-box; }

  .mobile-menu-btn { display: flex; }

  /* Sidebar → drawer */
  .sidebar {
    position: fixed !important;
    top: 0;
    inset-inline-end: 0;
    height: 100vh !important;
    width: 82vw !important;
    max-width: 320px;
    z-index: 1000;
    transform: translateX(100%);
    transition: transform .28s cubic-bezier(.4,0,.2,1);
    box-shadow: -8px 0 24px rgba(0,0,0,.20);
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  html[dir="rtl"] .sidebar { transform: translateX(100%); }
  html[dir="ltr"] .sidebar { transform: translateX(-100%); inset-inline-end: auto; inset-inline-start: 0; }
  .sidebar.open { transform: translateX(0) !important; }

  .overlay-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.45);
    z-index: 999;
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    opacity: 0; visibility: hidden;
    transition: opacity .26s ease, visibility .26s ease;
  }
  body.mobile-drawer-open .overlay-backdrop { opacity: 1; visibility: visible; }

  /* ===== HEADER STACK FIX (banner + topbar + safe area) ===== */
  /* Banner sits at very top. Use safe-area when available (PWA),
     fall back to a fixed min padding so it clears the browser/status bar. */
  .company-banner {
    position: sticky !important;
    top: 0 !important;
    z-index: 60 !important;
    height: auto !important;
    min-height: 38px !important;
    padding-top: max(env(safe-area-inset-top, 0px), 6px) !important;
    box-sizing: content-box !important;
  }
  .banner-inner {
    padding: 5px 12px !important;
    gap: 8px !important;
    min-height: 30px;
    justify-content: center;
  }
  .banner-name { font-size: 13px !important; }
  .banner-tag { display: none !important; }
  .banner-icon { font-size: 16px !important; }

  /* Topbar sits directly under the banner, no overlap */
  .topbar, .header, .top-bar, .page-header {
    position: sticky !important;
    top: 0 !important;            /* relative to flow, banner already above it */
    z-index: 55 !important;
    height: auto !important;
    min-height: 48px !important;
    padding: 6px 10px !important;
    gap: 6px !important;
    flex-wrap: nowrap !important;
    align-items: center !important;
  }
  /* The in-topbar menu toggle is enough; hide the separate fixed hamburger to avoid double menus */
  .mobile-menu-btn { display: none !important; }
  .topbar .menu-toggle {
    display: flex !important;
    order: -1;
    width: 38px !important; height: 38px !important;
    flex-shrink: 0;
  }
  .topbar-title, .page-title-text {
    font-size: 16px !important;
    font-weight: 800 !important;
    flex: 1;
    min-width: 60px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .topbar .btn-icon, .topbar-home-btn, .topbar-wallet-btn,
  .notif-btn, .theme-toggle, .sound-toggle {
    width: 36px !important; height: 36px !important;
    min-width: 36px !important;
    padding: 0 !important; font-size: 15px !important;
    flex-shrink: 0;
  }

  /* Hide audio/theme/reciter on mobile */
  .topbar .sound-toggle, .topbar .theme-toggle,
  .topbar .reciter-inline, .topbar .reciter-bar,
  .topbar #reciter-inline, audio { display: none !important; }

  /* Main content full width — tighter outer padding so cards fill the screen */
  .main-content, .content-wrapper, main {
    margin-inline-start: 0 !important;
    margin-inline-end: 0 !important;
    margin-right: 0 !important;
    margin-left: 0 !important;
    width: 100% !important;
    max-width: 100vw !important;
    padding: 8px 8px 78px 8px !important;
    box-sizing: border-box;
  }
  .page-content { padding: 8px 8px 78px 8px !important; }

  /* Headings — enlarged ~12% for a closer, bigger feel */
  .page-title, .section-title { font-size: 1.35rem !important; margin-bottom: 4px !important; }
  .page-subtitle, .section-subtitle { font-size: 0.92rem !important; margin-bottom: 8px !important; }
  h1 { font-size: 1.5rem !important; margin: 6px 0 !important; }
  h2 { font-size: 1.32rem !important; margin: 6px 0 !important; }
  h3 { font-size: 1.15rem !important; margin: 4px 0 !important; }

  /* Stat cards: 2-column compact grid */
  .stats-grid, .stat-cards, .summary-cards, .kpi-grid, .cards-grid {
    display: grid !important;
    grid-template-columns: repeat(2, 1fr) !important;
    gap: 8px !important;
  }
  .stat-card, .kpi-card, .summary-card, .kpi {
    padding: 15px 13px !important;
    min-height: 0 !important;
    border-radius: 14px !important;
    width: 100% !important;
    max-width: 100% !important;
  }
  .stat-card .stat-value, .stat-card .value, .kpi-value, .summary-card .value, .kpi .v {
    font-size: 1.22rem !important;
    line-height: 1.2 !important;
    margin: 2px 0 !important;
    font-weight: 800 !important;
  }
  .stat-card .stat-label, .stat-card .label, .kpi-label, .summary-card .label, .kpi .l {
    font-size: 0.82rem !important;
    margin: 0 !important;
  }

  /* Dashboard big cards — enlarged ~12% */
  .dash-card, .dashboard-card, .big-stat-card {
    padding: 17px 16px !important;
    border-radius: 16px !important;
    width: 100% !important;
    max-width: 100% !important;
  }
  .dash-card .value, .dashboard-card .value, .big-stat-card .value {
    font-size: 1.6rem !important; line-height: 1.2 !important;
  }
  .dash-card .label, .dashboard-card .label, .big-stat-card .label { font-size: 0.96rem !important; }
  .dash-card .sub, .dashboard-card .sub { font-size: 0.82rem !important; }

  /* All cards → full width */
  .card, .info-card, .glass-card, .panel, .box {
    width: 100% !important;
    max-width: 100% !important;
    margin-inline: 0 !important;
    margin-left: 0 !important;
    margin-right: 0 !important;
    box-sizing: border-box;
  }

  /* Single-column grids */
  .dash-grid, .summary-grid, .chart-grid, .form-row, .form-row-3, .form-row-4,
  .two-col, .three-col, .rep-two-col, .cf-summary-row, .curr-form-grid,
  .consolidate-filters {
    display: block !important;
    grid-template-columns: 1fr !important;
  }

  /* 🎯 CRITICAL: dash-row uses INLINE grid-template-columns (e.g. "1.6fr 1fr 1fr").
     Inline styles beat normal CSS, so we force single-column with !important.
     This fixes the 3 squished columns (التنبيهات/العملاء/الفواتير) on mobile. */
  .dash-row, .dash-row-2, .dash-row-3 {
    display: grid !important;
    grid-template-columns: 1fr !important;
    gap: 10px !important;
    width: 100% !important;
    max-width: 100% !important;
  }
  .dash-row > *, .dash-row-2 > *, .dash-row-3 > * {
    width: 100% !important;
    max-width: 100% !important;
    min-width: 0 !important;
  }
  /* Card icons enlarged ~12% so they feel closer/bigger */
  .stat-card .stat-icon, .stat-card .icon, .kpi-icon, .summary-card .icon,
  .dash-card .icon, .dash-card .card-icon, .big-stat-card .icon,
  .smart-alert-icon {
    width: 50px !important; height: 50px !important;
    border-radius: 14px !important;
  }
  .stat-card .stat-icon svg, .kpi-icon svg, .dash-card .icon svg,
  .smart-alert-icon svg { width: 26px !important; height: 26px !important; }
  .dash-card {
    width: 100% !important;
    max-width: 100% !important;
    min-width: 0 !important;
    overflow: hidden;
  }
  /* Tables inside dashboard cards scroll horizontally instead of overflowing */
  .dash-card .table-scroll, .dash-card .table-wrap {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    max-width: 100%;
  }
  .form-row > *, .form-row-3 > *, .form-row-4 > *,
  .two-col > *, .three-col > *, .rep-two-col > *,
  .dash-grid > *, .summary-grid > *, .chart-grid > * {
    margin-bottom: 10px;
  }

  /* Action buttons row: 2-col grid, no overflow */
  .page-actions, .section-action-bar, .actions, .button-group {
    display: grid !important;
    grid-template-columns: repeat(2, 1fr) !important;
    gap: 6px !important;
    margin-bottom: 10px !important;
    width: 100% !important;
    overflow: visible !important;
  }
  .page-actions > .btn, .section-action-bar > .btn,
  .actions > .btn, .button-group > .btn {
    width: 100% !important;
    min-width: 0 !important;
    max-width: 100% !important;
    flex: unset !important;
    font-size: 12px !important;
    padding: 10px 6px !important;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Buttons */
  .btn {
    min-height: 40px;
    padding: 8px 14px !important;
    font-size: 13px !important;
    border-radius: 10px;
  }
  .btn-sm, .btn-xs { min-height: 32px; padding: 5px 10px !important; font-size: 12px !important; }
  .btn-lg { min-height: 44px; font-size: 14px !important; padding: 10px 16px !important; }
  .btn-icon { min-width: 40px; min-height: 40px; }
  .btn-block { width: 100%; }

  /* Inputs (no iOS zoom) */
  .form-control, input, select, textarea {
    font-size: 16px !important;
    min-height: 40px;
    padding: 8px 12px !important;
    box-sizing: border-box;
    width: 100% !important;
    max-width: 100% !important;
    min-width: 0 !important;
    border-radius: 8px !important;
  }
  textarea { min-height: 70px; }

  /* Filter bars — match invoices page (single column, full width) */
  .filter-bar, .filters, .audit-filters, .filter-grid, .filter-row, .search-row {
    display: grid !important;
    grid-template-columns: 1fr !important;
    gap: 8px !important;
    padding: 10px !important;
    border-radius: 10px !important;
    align-items: stretch !important;
  }
  .filter-bar > *, .filters > *, .audit-filters > *,
  .filter-grid > *, .filter-row > *, .search-row > * {
    width: 100% !important;
    max-width: 100% !important;
    min-width: 0 !important;
  }
  .filter-bar input, .filter-bar select, .filter-bar .form-control,
  .filter-bar [style*="min-width"], .filter-bar [style*="max-width"] {
    min-width: 0 !important;
    max-width: 100% !important;
    width: 100% !important;
  }
  .filter-bar .inv-search-wrap {
    width: 100% !important;
    grid-column: 1 / -1;
  }
  .filter-bar .inv-search-wrap input {
    width: 100% !important;
    padding-inline-start: 36px !important;
  }
  .filter-bar label {
    display: flex !important;
    align-items: center !important;
    gap: 8px !important;
    padding: 8px 4px !important;
    font-size: 13px !important;
    background: rgba(0,0,0,0.02);
    border-radius: 8px;
    cursor: pointer;
    width: 100% !important;
  }
  .filter-bar label input[type="checkbox"] {
    width: 18px !important; min-width: 18px !important;
    height: 18px !important; min-height: 18px !important;
    margin: 0 !important; padding: 0 !important;
    flex-shrink: 0;
  }

  /* Tables: horizontal scroll wrapper */
  table {
    display: block;
    width: 100% !important;
    max-width: 100vw !important;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    white-space: nowrap;
    border-collapse: collapse;
    font-size: 12px;
  }
  .table-wrap, .table-scroll, .table-responsive {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    max-width: 100%;
    width: 100%;
  }
  table.data-table th, table.data-table td {
    padding: 6px 8px !important;
    white-space: nowrap;
    font-size: 12px !important;
  }

  /* Modals: bottom sheet */
  .modal-overlay {
    padding: 0 !important;
    align-items: flex-start !important;   /* start from the TOP, not center */
    justify-content: center !important;
  }
  .modal {
    width: 100% !important;
    max-width: 100% !important;
    margin: 0 !important;
    border-radius: 0 0 16px 16px !important;  /* rounded bottom since it drops from top */
    max-height: 100dvh !important;
    height: auto !important;
    min-height: 100dvh !important;            /* fill screen so it never floats in the middle */
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    display: flex !important;
    flex-direction: column !important;
  }
  .modal-header {
    padding: 14px 16px !important;
    padding-top: calc(14px + env(safe-area-inset-top, 0px)) !important;
    position: sticky; top: 0;
    background: var(--surface) !important; z-index: 2;
    font-size: 16px;
  }
  .modal-body { padding: 14px 16px !important; flex: 1; }
  .modal-footer {
    padding: 12px 16px !important;
    padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px)) !important;
    position: sticky; bottom: 0;
    background: var(--surface) !important;
    border-top: 1px solid var(--border);
    display: flex; flex-wrap: wrap;
    gap: 8px;
    z-index: 2;
  }
  .modal-footer .btn { flex: 1 1 auto; min-width: 0; }

  /* Toasts compact */
  .toast-container {
    position: fixed !important;
    top: 50% !important;
    left: 50% !important;
    right: auto !important;
    inset-inline-start: auto !important;
    inset-inline-end: auto !important;
    transform: translate(-50%, -50%) !important;
    width: 88vw !important;
    max-width: 360px !important;
    z-index: 2000;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .toast {
    width: 100%;
    margin-bottom: 8px;
    font-size: 14px;
    padding: 14px 16px;
    border-radius: 12px;
    pointer-events: auto;
    box-shadow: 0 8px 28px rgba(0,0,0,.35);
    text-align: center;
    justify-content: center;
  }

  /* Tabs scroll horizontally */
  .tabs, .nav-tabs, .tab-list {
    overflow-x: auto;
    flex-wrap: nowrap !important;
    -webkit-overflow-scrolling: touch;
  }

  /* Charts */
  .chart-container, canvas { max-height: 260px !important; }

  /* Invoice items as cards */
  table.invoice-items thead { display: none; }
  table.invoice-items, table.invoice-items tbody, table.invoice-items tr,
  table.invoice-items td {
    display: block;
    width: 100%;
    box-sizing: border-box;
  }
  table.invoice-items tr {
    border: 1px solid rgba(0,0,0,.08);
    border-radius: 10px;
    padding: 10px;
    margin-bottom: 10px;
  }
  table.invoice-items td { padding: 4px 0 !important; }

  /* Containers */
  .container, .wrapper {
    padding-inline: 10px !important;
    max-width: 100% !important;
  }

  /* 🎯 Kill all inline min-width on mobile */
  [style*="min-width"] { min-width: 0 !important; }

  /* Login */
  .login-wrap { padding: 16px !important; }
  .login-card, .login-box {
    width: 100% !important;
    max-width: 420px;
    padding: 24px 20px !important;
  }

  /* (Quick-actions FAB handled in a separate wider media query below
     so it also applies to tablets where the topbar gets crowded.) */

@media (max-width: 480px) {
  .main-content { padding: 6px 8px 70px 8px !important; }
  body { font-size: 13px; }

/* ===================== 📄 PAPER COUNTER (neon) ===================== */
.paper-counter {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 11px; margin: 0 2px;
  border-radius: 11px;
  background: rgba(56, 189, 248, .08);
  border: 1px solid rgba(56, 189, 248, .45);
  box-shadow: 0 0 10px rgba(56,189,248,.25), inset 0 0 8px rgba(56,189,248,.08);
  color: #38bdf8;
  cursor: pointer;
  position: relative;
  transition: box-shadow .25s ease, transform .15s ease, border-color .25s ease;
  white-space: nowrap;
}
.paper-counter:hover { box-shadow: 0 0 16px rgba(56,189,248,.45), inset 0 0 10px rgba(56,189,248,.12); transform: translateY(-1px); border-color: rgba(56,189,248,.7); }
.paper-counter svg { width: 16px; height: 16px; flex-shrink: 0; }
.paper-counter-num {
  font-size: 13.5px; font-weight: 800; letter-spacing: .3px;
  font-variant-numeric: tabular-nums;
  transition: transform .2s ease;
}
.paper-counter.bump .paper-counter-num { animation: paperBump .4s cubic-bezier(.34,1.56,.64,1); }
@keyframes paperBump { 0%{transform:scale(1);} 40%{transform:scale(1.35);} 100%{transform:scale(1);} }
/* +amount green delta that floats up and fades */
.paper-counter-delta {
  position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
  font-size: 12px; font-weight: 800; color: #22c55e;
  opacity: 0; pointer-events: none; white-space: nowrap;
  text-shadow: 0 0 8px rgba(34,197,94,.6);
}
.paper-counter-delta.show { animation: paperDelta 1.4s ease forwards; }
@keyframes paperDelta {
  0%   { opacity: 0; transform: translate(-50%, 4px); }
  20%  { opacity: 1; transform: translate(-50%, -2px); }
  70%  { opacity: 1; transform: translate(-50%, -10px); }
  100% { opacity: 0; transform: translate(-50%, -20px); }
}
@media (max-width: 768px) {
  .paper-counter { padding: 6px 10px; gap: 5px; margin: 0 1px; }
  .paper-counter svg { width: 16px; height: 16px; }
  .paper-counter-num { font-size: 13px; }
}

@media (max-width: 768px) {

/* ===================== 🔔 NOTIFICATION CENTER ===================== */
.notify-overlay {
  position: fixed; inset: 0; z-index: 99999;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  background: rgba(3, 6, 14, 0);
  backdrop-filter: blur(0px);
  opacity: 0;
  pointer-events: none;
  transition: background .25s ease, backdrop-filter .25s ease, opacity .25s ease;
}
.notify-overlay.show {
  background: rgba(3, 6, 14, .68);
  backdrop-filter: blur(8px);
  opacity: 1;
  pointer-events: auto;
}
.notify-overlay.closing { opacity: 0; background: rgba(3,6,14,0); backdrop-filter: blur(0); }

.notify-card {
  position: relative;
  width: 100%; max-width: 400px;
  background: linear-gradient(165deg, #161d2e 0%, #0f1522 100%);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 26px;
  padding: 30px 24px 20px;
  text-align: center;
  box-shadow: 0 30px 80px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.06);
  transform: scale(.85);
  opacity: 0;
  transition: transform .28s cubic-bezier(.34,1.56,.64,1), opacity .25s ease;
}
.notify-overlay.show .notify-card { transform: scale(1); opacity: 1; }
.notify-overlay.closing .notify-card { transform: scale(.95); opacity: 0; }
[data-theme="light"] .notify-card { background: linear-gradient(165deg, #ffffff, #f1f5f9); border-color: #e2e8f0; }

/* top accent line */
.notify-card::before {
  content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 60px; height: 4px; border-radius: 0 0 4px 4px;
}
.notify-success::before { background: #10b981; }
.notify-error::before   { background: #ef4444; }
.notify-warning::before { background: #f59e0b; }
.notify-info::before    { background: #3b82f6; }

.notify-close {
  position: absolute; top: 16px; left: 16px;
  width: 34px; height: 34px; border-radius: 50%;
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.12);
  color: var(--text-muted);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all .18s ease;
}
.notify-close:hover { background: rgba(255,255,255,.14); color: var(--text); }

.notify-icon-wrap {
  position: relative;
  width: 110px; height: 110px;
  margin: 10px auto 20px;
  display: flex; align-items: center; justify-content: center;
}
/* Outer soft halo glow */
.notify-icon-glow {
  position: absolute; inset: -16px;
  border-radius: 50%;
  filter: blur(26px); opacity: .7;
  animation: notifyGlowPulse 2s ease-in-out infinite;
}
/* Faint outer ring circle (the lighter band around the icon) */
.notify-icon-wrap::before {
  content: ''; position: absolute;
  width: 108px; height: 108px; border-radius: 50%;
  border: 2px solid currentColor;
  opacity: .22;
  animation: notifyRingExpand 1.8s ease-out infinite;
}
.notify-icon-ring {
  position: relative; z-index: 2;
  width: 84px; height: 84px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  animation: notifyIconPop .45s cubic-bezier(.34,1.56,.64,1) .1s both;
}
/* Sparkle particles around the icon */
.notify-icon-wrap .notify-spark {
  position: absolute; z-index: 1;
  width: 6px; height: 6px; border-radius: 50%;
  background: currentColor;
  opacity: 0;
  animation: notifySpark 1.8s ease-out infinite;
}
.notify-icon-wrap .notify-spark:nth-child(1){ top: 6%;  left: 50%; animation-delay: 0s;   }
.notify-icon-wrap .notify-spark:nth-child(2){ top: 22%; left: 86%; animation-delay: .25s; width:4px;height:4px;}
.notify-icon-wrap .notify-spark:nth-child(3){ top: 70%; left: 90%; animation-delay: .5s;  }
.notify-icon-wrap .notify-spark:nth-child(4){ top: 90%; left: 60%; animation-delay: .75s; width:5px;height:5px;}
.notify-icon-wrap .notify-spark:nth-child(5){ top: 80%; left: 12%; animation-delay: 1s;   }
.notify-icon-wrap .notify-spark:nth-child(6){ top: 30%; left: 6%;  animation-delay: 1.25s;width:4px;height:4px;}

/* color per type — wrap gets the accent color so currentColor works */
.notify-success .notify-icon-wrap { color: #34d399; }
.notify-error   .notify-icon-wrap { color: #f87171; }
.notify-warning .notify-icon-wrap { color: #fbbf24; }
.notify-info    .notify-icon-wrap { color: #60a5fa; }

.notify-success .notify-icon-glow { background: #10b981; }
.notify-success .notify-icon-ring { background: radial-gradient(circle at 38% 32%, #4ade80, #10b981 55%, #059669); box-shadow: 0 0 0 6px rgba(16,185,129,.18), 0 12px 36px rgba(16,185,129,.6), inset 0 2px 6px rgba(255,255,255,.45); }
.notify-error .notify-icon-glow { background: #ef4444; }
.notify-error .notify-icon-ring { background: radial-gradient(circle at 38% 32%, #fca5a5, #ef4444 55%, #dc2626); box-shadow: 0 0 0 6px rgba(239,68,68,.18), 0 12px 36px rgba(239,68,68,.6), inset 0 2px 6px rgba(255,255,255,.4); }
.notify-warning .notify-icon-glow { background: #f59e0b; }
.notify-warning .notify-icon-ring { background: radial-gradient(circle at 38% 32%, #fcd34d, #f59e0b 55%, #d97706); box-shadow: 0 0 0 6px rgba(245,158,11,.18), 0 12px 36px rgba(245,158,11,.6), inset 0 2px 6px rgba(255,255,255,.4); }
.notify-info .notify-icon-glow { background: #3b82f6; }
.notify-info .notify-icon-ring { background: radial-gradient(circle at 38% 32%, #93c5fd, #3b82f6 55%, #2563eb); box-shadow: 0 0 0 6px rgba(59,130,246,.18), 0 12px 36px rgba(59,130,246,.6), inset 0 2px 6px rgba(255,255,255,.4); }
.notify-icon-path { stroke-dasharray: 40; stroke-dashoffset: 40; animation: notifyDraw .5s ease .35s forwards; }

<script>
/* =========================================================
   DATA LAYER (LocalStorage) - Robust with auto-backup rotation
========================================================= */
const STORAGE_KEY = 'ozarex_erp_v1';
const SESSION_KEY = 'ozarex_session';
const BACKUP_KEY_PREFIX = 'ozarex_erp_backup_';
const MAX_BACKUPS = 5;

/* =========================================================
   API_BASE — always same-origin, never a hardcoded IP/localhost.
   Uses window.location.origin + the app path prefix so requests
   go to the EXACT host the page was opened from (works behind
   reverse proxies, custom domains, HTTPS, Synology, Railway...).
========================================================= */
function detectApiBase() {
  const origin = window.location.origin; // e.g. https://erp.example.com
  const p = window.location.pathname || '/';
  const m = p.match(/^(\/Ozarex)(\/|$)/);
  const prefix = m ? m[1] : '';
  return origin + prefix;
}
const API_BASE = detectApiBase();

const DB = {
  data: {
    users: [], customers: [], products: [], invoices: [],
    payments: [], expenses: [], stockMoves: [], issuances: [],
    bankTransfers: [], suppliers: [], supplierPayments: [],
    notes: [], auditLog: [], employees: [], salaryRuns: [],
    settings: {},
    counters: { invoice: 1000, issuance: 1000, purchase: 1000 }
  },

  _bootstrapped: false,
  _bootstrapData: null,

  load() {
    if (this._bootstrapData) {
      this.data = this._bootstrapData;
      const keys = ['users','customers','products','invoices','payments','expenses','stockMoves','issuances','bankTransfers','suppliers','supplierPayments','notes','auditLog','employees','salaryRuns'];
      for (const k of keys) if (!Array.isArray(this.data[k])) this.data[k] = [];
      if (!this.data.settings) this.data.settings = {};
      if (!this.data.counters) this.data.counters = { invoice: 1000, issuance: 1000, purchase: 1000 };
      if (!this.data.counters.issuance) this.data.counters.issuance = 1000;
      if (!this.data.counters.purchase) this.data.counters.purchase = 1000;
      this.data.customers.forEach(c => { if (!c.customPrices) c.customPrices = {}; });
      return true;
    }
    return false;
  },

  _saveTimer: null,
  _saveInflight: false,
  _savePending: false,

  save() {
    if (this._saveTimer) clearTimeout(this._saveTimer);
    this._saveTimer = setTimeout(() => this._flush(), 250);
    return true;
  },

  async _flush() {
    if (this._saveInflight) { this._savePending = true; return; }
    this._saveInflight = true;
    try {
      const res = await fetch(API_BASE + '/api/data', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(this.data)
      });
      if (!res.ok) {
        const text = await res.text().catch(() => '');
        throw new Error('HTTP ' + res.status + ' ' + text);
      }
      window.__lastSaveOk = Date.now();
    } catch (e) {
      console.error('Save failed:', e);
      if (typeof toast === 'function') toast('فشل حفظ البيانات على السيرفر: ' + e.message, 'error');
    } finally {
      this._saveInflight = false;
      if (this._savePending) { this._savePending = false; this._flush(); }
    }
  },

  snapshot() { return null; },
  listBackups() { return []; },
  rotateBackups() {},
  removeOldestBackup() {},
  recoverFromBackup() { return false; },

  async reset() {
    try {
      await fetch(API_BASE + '/api/reset', { method: 'POST' });
      const r = await fetch(API_BASE + '/api/data');
      this._bootstrapData = await r.json();
      this.load();
    } catch (e) { console.error('Reset failed:', e); }
  }
};

async function bootstrapFromServer() {
  let res;
  try {
    res = await fetch(API_BASE + '/api/data', {
      headers: { 'Accept': 'application/json' },
      cache: 'no-store'
    });
  } catch (e) {
    throw new Error('تعذّر الوصول للسيرفر (' + API_BASE + '). تأكد إن السيرفر شغال وإن الرابط صحيح.');
  }
  if (!res.ok) throw new Error('السيرفر رد بخطأ HTTP ' + res.status);

  // Detect ISP/captive-portal HTML redirect (e.g. TE Data) instead of JSON
  const ct = res.headers.get('content-type') || '';
  if (!ct.includes('application/json')) {
    throw new Error('الرد مش JSON (محتمل إعادة توجيه من مزود الإنترنت). افتح البرنامج عبر HTTPS بدومين صحيح.');
  }
  DB._bootstrapData = await res.json();
  DB._bootstrapped = true;
}


/* Seed initial data - empty database with only admin user */
function seedData() {
  DB.data = {
    users: [
      { id: 'u1', username: 'admin', password: 'admin', name: 'المدير', role: 'admin' }
    ],
    customers: [],
    products: [],
    invoices: [],
    payments: [],
    expenses: [],
    stockMoves: [],
    issuances: [],
    bankTransfers: [],
    suppliers: [],
    supplierPayments: [],
    notes: [],
    auditLog: [],
    employees: [],
    salaryRuns: [],
    settings: {
      companyName: 'أوزاريكس',
      companyAddress: '',

function dateStr(d) { return d.toISOString().slice(0,10); }

function fmt(n) { return Number(n||0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
function fmtCurrency(n) { return fmt(n) + ' ' + (DB.data.settings.currency || 'ج'); }
function todayStr() { return dateStr(new Date()); }
function escapeHtml(s) { return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* Arabic text normalization for tolerant search
   Handles common spelling variations:
   - أ إ آ ٱ → ا (alif variations)
   - ة → ه (taa marbuta)
   - ى → ي (alif maqsura)
   - ؤ ئ → و ي
   - removes diacritics (ً ٌ ٍ َ ُ ِ ّ ْ)
   - removes tatweel ـ
   - collapses extra spaces
*/
function normalizeArabic(s) {
  if (!s) return '';
  return String(s)
    .toLowerCase()
    .replace(/[\u064B-\u065F\u0670]/g, '')      // diacritics & superscript alef
    .replace(/\u0640/g, '')                      // tatweel
    .replace(/[إأآٱ]/g, 'ا')                     // all alif variants → ا
    .replace(/ة/g, 'ه')                          // taa marbuta → haa
    .replace(/ى/g, 'ي')                          // alif maqsura → yaa
    .replace(/ؤ/g, 'و')                          // waw with hamza → waw
    .replace(/ئ/g, 'ي')                          // yaa with hamza → yaa
    .replace(/ء/g, '')                           // standalone hamza
    .replace(/\s+/g, ' ')                        // collapse spaces
    .trim();
}

/* ========================= SOUND SYSTEM (Web Audio API) ========================= */
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e) { return null; }
  }
  return audioCtx;
}
function playTone(type='success') {
  if (!DB.data.settings || DB.data.settings.soundEnabled === false) return;
  const ctx = getAudioCtx();
  if (!ctx) return;
  if (ctx.state === 'suspended') ctx.resume();

  // VOLUME is higher now - 0.32 base instead of 0.18
  // DIFFERENT melodic patterns per type so user can identify by ear
  const presets = {
    // Successful save (issuance/invoice creation) — bright triple-rise: C5 → E5 → G5 → C6 ascending major chord
    save:    [ {f:523, t:0,   d:.10, g:.35}, {f:659, t:.08, d:.10, g:.38}, {f:784, t:.16, d:.12, g:.40}, {f:1047, t:.24, d:.18, g:.45} ],

    // Collection/payment — warm 2-note bell: A4 + E5 together, then C6 ding
    collect: [ {f:440, t:0,   d:.18, g:.35}, {f:659, t:0,   d:.18, g:.25}, {f:1047, t:.18, d:.22, g:.45} ],

    // Generic small success ding (light)
    success: [ {f:880, t:0,   d:.08, g:.30}, {f:1175, t:.06, d:.14, g:.32} ],

    // Error: low buzz
    error:   [ {f:220, t:0,   d:.20, g:.40}, {f:180, t:.18, d:.20, g:.30} ],

    // Warning: ominous two-tone descending
    warning: [ {f:520, t:0,   d:.14, g:.32}, {f:392, t:.12, d:.18, g:.32} ],

    // Info chime
    info:    [ {f:659, t:0,   d:.12, g:.28} ],

    // Delete: short descending pair
    delete:  [ {f:392, t:0,   d:.08, g:.30}, {f:262, t:.07, d:.14, g:.30} ],

    // Notification: 3 chimes
    notify:  [ {f:880, t:0,   d:.10, g:.32}, {f:880, t:.18, d:.10, g:.32}, {f:1175, t:.36, d:.18, g:.40} ]
  };
  const notes = presets[type] || presets.success;
  const now = ctx.currentTime;
  notes.forEach(n => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    // Type=triangle for save (warm), sine for others (gentle)
    osc.type = (type === 'save' || type === 'collect' || type === 'notify') ? 'triangle' : 'sine';
    osc.frequency.value = n.f;
    const peak = n.g || 0.32;
    gain.gain.setValueAtTime(0, now + n.t);
    gain.gain.linearRampToValueAtTime(peak, now + n.t + 0.012);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + n.t + n.d);
    osc.connect(gain).connect(ctx.destination);
    osc.start(now + n.t);
    osc.stop(now + n.t + n.d + .05);
  });
}

function toast(msg, type='success', duration) {
  // Errors & warnings are important → show them in the premium centered modal.
  // Success & info stay as lightweight toasts (so they don't interrupt flow).
  if (type === 'error' || type === 'warning') {
    notify({
      type: type,
      title: type === 'error' ? 'تنبيه' : 'انتبه',
      message: msg,
      showMeta: false,
      autoClose: true,
      duration: type === 'error' ? 4000 : 4500
    });
    return;
  }
  const box = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  const ic = { success:'✓', error:'✕', warning:'⚠', info:'ℹ' }[type] || 'ℹ';
  el.innerHTML = `<span class="icon">${ic}</span><span class="msg">${escapeHtml(msg)}</span><span class="close-x" style="margin-right:auto;font-size:18px;font-weight:900;cursor:pointer;color:var(--text-muted);padding:0 6px">×</span>`;
  el.querySelector('.close-x').onclick = () => { el.style.opacity='0'; setTimeout(()=>el.remove(), 300); };
  box.appendChild(el);
  playTone(type);
  const auto = duration || 3000;
  setTimeout(()=> { el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(), 300); }, auto);
}

/* ============================================================
   🔔 ENTERPRISE NOTIFICATION CENTER — premium centered modal
   Usage: notify({ type:'success', title:'تم إضافة العميل',
                   message:'تم إضافة العميل "X" بنجاح' })
============================================================ */
let _notifyTimer = null, _notifyRAF = null;
function notify(opts) {
  opts = opts || {};
  const type = opts.type || 'success';
  const title = opts.title || 'تم بنجاح';
  const message = opts.message || '';
  const autoClose = opts.autoClose !== false;          // default true
  const duration = opts.duration || 3000;
  const showMeta = opts.showMeta !== false;            // show date/time/user

  const themes = {
    success: { color:'#10b981', dark:'#059669', glow:'rgba(16,185,129,', icon:'M20 6L9 17l-5-5' },
    error:   { color:'#ef4444', dark:'#dc2626', glow:'rgba(239,68,68,',  icon:'M18 6L6 18M6 6l12 12' },
    warning: { color:'#f59e0b', dark:'#d97706', glow:'rgba(245,158,11,', icon:'M12 9v4M12 17h.01M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z' },
    info:    { color:'#3b82f6', dark:'#2563eb', glow:'rgba(59,130,246,', icon:'M12 16v-4M12 8h.01M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20z' }
  };
  const t = themes[type] || themes.success;

  const now = new Date();
  const dateStr = `${String(now.getDate()).padStart(2,'0')}-${String(now.getMonth()+1).padStart(2,'0')}-${now.getFullYear()}`;
  const timeStr = now.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit', hour12:true });
  const userName = (typeof currentUser !== 'undefined' && currentUser && currentUser.name) ? currentUser.name : 'النظام';

  // Remove any existing
  const existing = document.getElementById('notify-overlay');
  if (existing) existing.remove();
  if (_notifyTimer) clearTimeout(_notifyTimer);
  if (_notifyRAF) cancelAnimationFrame(_notifyRAF);

  const overlay = document.createElement('div');
  overlay.id = 'notify-overlay';
  overlay.className = 'notify-overlay';
  overlay.innerHTML = `
    <div class="notify-card notify-${type}" role="alertdialog" aria-live="assertive">
      <button class="notify-close" aria-label="إغلاق">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>

      <div class="notify-icon-wrap">
        <span class="notify-icon-glow"></span>
        <span class="notify-spark"></span><span class="notify-spark"></span><span class="notify-spark"></span>
        <span class="notify-spark"></span><span class="notify-spark"></span><span class="notify-spark"></span>
        <span class="notify-icon-ring">
          <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <path d="${t.icon}" class="notify-icon-path"/>
          </svg>
        </span>
      </div>

      <div class="notify-title">${escapeHtml(title)}</div>
      ${message ? `<div class="notify-message">${message}</div>` : ''}

      ${showMeta ? `
      <div class="notify-meta">
        <div class="notify-meta-row">
          <span class="notify-meta-label"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> التاريخ</span>
          <span class="notify-meta-value">${dateStr}</span>
        </div>
        <div class="notify-meta-row">
          <span class="notify-meta-label"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> الوقت</span>
          <span class="notify-meta-value">${timeStr}</span>
        </div>
        <div class="notify-meta-row">
          <span class="notify-meta-label"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> المستخدم</span>
          <span class="notify-meta-value">${escapeHtml(userName)}</span>
        </div>
      </div>` : ''}

      <button class="notify-ok-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
        حسناً
      </button>

      ${autoClose ? `<div class="notify-progress"><div class="notify-progress-bar" id="notify-progress-bar"></div></div>` : ''}
    </div>
  `;
  document.body.appendChild(overlay);
  try { playTone(type); } catch(_) {}

  // trigger open animation
  requestAnimationFrame(() => overlay.classList.add('show'));

  function close() {
    overlay.classList.remove('show');
    overlay.classList.add('closing');
    if (_notifyTimer) clearTimeout(_notifyTimer);
    setTimeout(() => overlay.remove(), 250);
  }
  overlay.querySelector('.notify-close').onclick = close;
  overlay.querySelector('.notify-ok-btn').onclick = close;
  overlay.onclick = (e) => { if (e.target === overlay) close(); };

  if (autoClose) {
    const bar = overlay.querySelector('#notify-progress-bar');
    const start = Date.now();
    function tick() {
      const elapsed = Date.now() - start;
      const pct = Math.max(0, 100 - (elapsed / duration * 100));
      if (bar) bar.style.width = pct + '%';
      if (elapsed < duration) _notifyRAF = requestAnimationFrame(tick);
    }
    tick();
    _notifyTimer = setTimeout(close, duration);
  }
}

const SECTIONS = { main: 'الإدارة اليومية', ops: 'العمليات والتقارير', admin: 'إعدادات النظام' };

function renderSidebar() {
  const nav = document.getElementById('sidebar-nav');
  let html = '';
  let lastSection = '';
  NAV_ITEMS.forEach(it => {
    if (!can(it.key)) return;
    // Section title
    if (it.section !== lastSection) {
      html += `<div class="nav-section-title">${SECTIONS[it.section]}</div>`;
      lastSection = it.section;
    }
    let badge = '';
    if (it.key === 'inventory') {
      const low = DB.data.products.filter(p => p.quantity <= p.minQuantity).length;
      if (low > 0) badge = `<span class="badge">${low > 9 ? '9+' : low}</span>`;
    }
    if (it.key === 'payments') {
      const overdue = DB.data.customers.filter(c => c.balance > 0).length;
      if (overdue > 0) badge = `<span class="badge">${overdue > 9 ? '9+' : overdue}</span>`;
    }
    if (it.key === 'suppliers') {
      // Count suppliers we still owe money to
      const owedCount = (DB.data.suppliers || []).filter(s => {
        const m = supplierMetrics(s.id);
        return m.balance > 0;
      }).length;
      if (owedCount > 0) badge = `<span class="badge">${owedCount > 9 ? '9+' : owedCount}</span>`;
    }
    if (it.key === 'audit' && currentUser.role === 'admin') {
      // Count audit entries NOT yet seen by the admin
      const lastSeen = parseInt(localStorage.getItem('ozarex_audit_seen_ts') || '0');
      const unread = (DB.data.auditLog || []).filter(e => e.timestamp > lastSeen).length;
      if (unread > 0) badge = `<span class="badge badge-audit">${unread > 99 ? '99+' : unread}</span>`;
    }
    const isActive = currentPage === it.key;
    html += `<div class="nav-item ${isActive?'active':''}" style="--nav-color:${it.color}" onclick="navigate('${it.key}')">
      <span class="icon nav-icon-colored" style="background:${hexToRgba(it.color,0.15)};color:${it.color};border:1px solid ${hexToRgba(it.color,0.3)}">${it.icon}</span>
      <span>${it.label}</span>
      ${badge}
    </div>`;
  });
  nav.innerHTML = html;
}

// helper: convert hex color to rgba
function hexToRgba(hex, alpha) {
  const h = hex.replace('#','');
  const r = parseInt(h.substring(0,2),16);
  const g = parseInt(h.substring(2,4),16);
  const b = parseInt(h.substring(4,6),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

let _navHistory = [];
function navigate(page, isBack) {
  if (!can(page)) { toast('ليس لديك صلاحية للوصول لهذه الصفحة', 'error'); return; }
  // track history for the back button (skip when navigating via back itself)
  if (!isBack && typeof currentPage !== 'undefined' && currentPage && currentPage !== page) {
    _navHistory.push(currentPage);
    if (_navHistory.length > 40) _navHistory.shift();
  }
  currentPage = page;
  renderSidebar();
  toggleSidebar(false);
  const titles = { dashboard:'لوحة التحكم', customers:'العملاء والمراكز', issuances:'صرف الورق للمراكز', invoices:'الفواتير', payments:'التحصيل والمديونيات', transfers:'التحويلات البنكية', suppliers:'الموردين', inventory:'إدارة المخازن', expenses:'المصروفات', reports:'التقارير', aiassistant:'المساعد الذكي', users:'إدارة المستخدمين', audit:'سجل التعديلات الذكي', settings:'الإعدادات' };
  document.getElementById('topbar-title').innerText = titles[page] || '';
  const renderers = { dashboard: renderDashboard, customers: renderCustomers, issuances: renderIssuances, invoices: renderInvoices, payments: renderPayments, transfers: renderTransfersPage, suppliers: renderSuppliers, inventory: renderInventory, expenses: renderExpenses, reports: renderReports, aiassistant: renderAIAssistant, users: renderUsers, audit: renderAuditLog, settings: renderSettings };
  (renderers[page] || renderDashboard)();
  updateBackButton();
  window.scrollTo(0,0);
}

function goBack() {
  if (_navHistory.length === 0) { navigate('dashboard', true); return; }
  const prev = _navHistory.pop();
  navigate(prev, true);
}

function updateBackButton() {
  const btn = document.getElementById('topbar-back-btn');
  if (btn) btn.style.display = _navHistory.length > 0 ? 'grid' : 'none';
}

// Stock counter: total quantity of ALL products combined, with a green +delta on increase
let _paperCountLast = null;
function updatePaperCounter() {
  const el = document.getElementById('paper-counter');
  const numEl = document.getElementById('paper-counter-num');
  if (!el || !numEl || !DB.data || !DB.data.products) return;
  const excludeWords = ['حبر','تنر','تونر','ink','toner','كارتريدج','cartridge','ريبون','ribbon'];
  const includeWords = ['ورق','بلاستك','بلاستيك','فوتو','photo','paper','a4','a3','a5','فيلم'];
  const paperProds = DB.data.products.filter(p => {
    const name = (p.name || '').toLowerCase();
    const unit = (p.unit || '').toLowerCase();
    if (excludeWords.some(w => name.includes(w))) return false;
    if (includeWords.some(w => name.includes(w) || unit.includes(w))) return true;
    if (['ورقة','لفة','رزمة','رول'].some(w => unit.includes(w))) return true;
    return false;
  });
  const total = paperProds.reduce((s,p)=> s + (Number(p.quantity)||0), 0);

  numEl.textContent = fmt(Math.round(total));

  if (_paperCountLast !== null && total > _paperCountLast) {
    const delta = total - _paperCountLast;
    const d = document.getElementById('paper-counter-delta');
    if (d) {
      d.textContent = '+' + fmt(Math.round(delta));
      d.classList.remove('show'); void d.offsetWidth; d.classList.add('show');
    }
    el.classList.remove('bump'); void el.offsetWidth; el.classList.add('bump');
  }
  _paperCountLast = total;
}

}

/* ============ AUTO-SAVE (every 5 seconds + snapshot every 5 minutes) ============ */
let _autoSaveInterval = null;
let _snapshotInterval = null;
let _lastSaveStamp = 0;
function startAutoSave() {
  if (_autoSaveInterval) clearInterval(_autoSaveInterval);
  if (_snapshotInterval) clearInterval(_snapshotInterval);

  // Quick save every 5 seconds
  _autoSaveInterval = setInterval(() => {
    try {
      const stamp = JSON.stringify(DB.data).length + ':' + Date.now();
      DB.save();
      _lastSaveStamp = Date.now();
    } catch(e) { console.error('autosave failed', e); }
  }, 5000);

  // Take a backup snapshot every 5 minutes
  _snapshotInterval = setInterval(() => {
    try {
      const key = DB.snapshot();
      if (key) {
        showAutoSaveIndicator('✓ تم حفظ نسخة احتياطية تلقائية');
      }
    } catch(e) { console.error('snapshot failed', e); }
  }, 5 * 60 * 1000);

  // Take initial snapshot
  setTimeout(() => DB.snapshot(), 30000);
}

function showAutoSaveIndicator(message) {
  const el = document.getElementById('autosave-indicator');
  if (!el) return;
  const txt = document.getElementById('autosave-text');
  if (txt) txt.innerText = message || 'تم الحفظ تلقائياً ✓';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

function getOverdueIssuances() {
  // Issuances with dueDate that has passed and still have unpaid amount
  const today = todayStr();
  return (DB.data.issuances || []).filter(i =>
    i.dueDate && i.dueDate < today && (i.total - (i.paid||0)) > 0
  ).map(i => ({
    ...i,
    daysOverdue: Math.floor((new Date(today) - new Date(i.dueDate)) / 86400000),
    remaining: i.total - (i.paid||0)
  })).sort((a,b) => b.daysOverdue - a.daysOverdue);
}

function getDueSoonIssuances() {
  // Issuances with dueDate within next 7 days and still unpaid
  const today = todayStr();
  const inSevenDays = new Date();
  inSevenDays.setDate(inSevenDays.getDate() + 7);
  const cutoff = inSevenDays.toISOString().slice(0,10);
  return (DB.data.issuances || []).filter(i =>
    i.dueDate && i.dueDate >= today && i.dueDate <= cutoff && (i.total - (i.paid||0)) > 0
  ).map(i => ({
    ...i,
    daysUntil: Math.floor((new Date(i.dueDate) - new Date(today)) / 86400000),
    remaining: i.total - (i.paid||0)
  })).sort((a,b) => a.daysUntil - b.daysUntil);
}

function updateNotifBadge() {
  updatePaperCounter();
  const low = DB.data.products.filter(p => p.quantity <= p.minQuantity).length;
  const overdueIss = getOverdueIssuances().length;
  const dueSoon = getDueSoonIssuances().length;
  // Top customers we should chase (mediunia > threshold)
  const heavyDebtors = DB.data.customers.filter(c => (c.balance||0) > 1000).length;
  // Suppliers we owe money to
  const owedSuppliers = (DB.data.suppliers || []).filter(s => {
    const m = supplierMetrics(s.id);
    return m.balance > 0;
  }).length;
  // Recent price changes on supplier price lists (compared to last purchase)
  const priceChanges = getRecentPriceChanges().length;

  // Supplier purchase payments overdue or due soon (by dueDate)
  const supOverdue = getOverdueSupplierPurchases().length;
  const supDueSoon = getDueSoonSupplierPurchases().length;

  const total = low + overdueIss + dueSoon + heavyDebtors + owedSuppliers + priceChanges + supOverdue + supDueSoon;
  const dot = document.getElementById('notif-dot');
  if (dot) {
    dot.style.display = total > 0 ? 'flex' : 'none';
    dot.textContent = total > 0 ? (total > 9 ? '9+' : total) : '';
  }
  updateWalletBadge();
}

/* Detect price changes: compare each supplier's current price list against the
   most recent purchase of the same product name in the last 60 days */
function getRecentPriceChanges() {
  const changes = [];
  const purchases = (DB.data.expenses || [])
    .filter(e => e.kind === 'purchase' && e.items && e.items.length > 0)
    .sort((a, b) => (b.date || '').localeCompare(a.date || ''));

  (DB.data.suppliers || []).forEach(sup => {
    if (!sup.priceList || !sup.priceList.length) return;
    // Get this supplier's most recent purchase that has items
    const recent = purchases.find(p => p.supplierId === sup.id);
    if (!recent) return;
    recent.items.forEach(boughtItem => {
      const listed = sup.priceList.find(pl => pl.name === boughtItem.name);
      if (!listed) return;
      const oldPrice = boughtItem.price || 0;
      const newPrice = listed.price || 0;
      if (oldPrice === 0 || newPrice === 0) return;
      const diff = ((newPrice - oldPrice) / oldPrice) * 100;
      if (Math.abs(diff) >= 5) { // ≥5% change is noteworthy
        changes.push({
          supplierId: sup.id,
          supplierName: sup.name,
          itemName: boughtItem.name,
          oldPrice, newPrice, diff,
          lastDate: recent.date
        });
      }
    });
  });
  return changes;
}

/* Wallet badge: shows total liquid cash on hand.
   = collections (cash + transfer + check + card) − cash expenses
   We use the user-facing definition: "إجمالي (كاش + تحويلات + بنوك)" */
function updateWalletBadge() {
  const el = document.getElementById('topbar-wallet-amount');
  const btn = document.getElementById('topbar-wallet-btn');
  if (!el) return;

  // Inflows
  const paymentsTotal = (DB.data.payments || []).reduce((s, p) => s + (p.amount || 0), 0);
  const bankInflows = (DB.data.bankTransfers || [])
    .filter(t => t.type === 'in' || t.type === 'deposit' || !t.type) // legacy entries default to inflow
    .reduce((s, t) => s + (t.amount || 0), 0);

  // Outflows
  const expensesTotal = (DB.data.expenses || [])
    .filter(e => e.kind !== 'purchase' || e.paymentMethod === 'cash' || e.paymentMethod === 'transfer')
    .reduce((s, e) => s + (e.amount || 0), 0);
  const supplierPaymentsTotal = (DB.data.supplierPayments || []).reduce((s, p) => s + (p.amount || 0), 0);
  const bankOutflows = (DB.data.bankTransfers || [])
    .filter(t => t.type === 'out' || t.type === 'withdrawal')
    .reduce((s, t) => s + (t.amount || 0), 0);

  const net = paymentsTotal + bankInflows - expensesTotal - supplierPaymentsTotal - bankOutflows;

  const cur = (DB.data.settings && DB.data.settings.currency) || 'جنيه';
  const curShort = cur === 'جنيه' ? 'ج.م' : cur === 'ريال' ? 'ر.س' : cur === 'درهم' ? 'د.إ' : cur.slice(0, 3);

  const display = Math.abs(net) >= 1000
    ? (net / 1000).toFixed(net >= 10000 ? 0 : 1) + 'K ' + curShort
    : fmt(net).split('.')[0] + ' ' + curShort;

  // Flash animation if value changed
  if (btn && el.textContent !== display && el.textContent !== '0') {
    btn.classList.remove('wallet-flash');
    void btn.offsetWidth; // restart animation
    btn.classList.add('wallet-flash');
  }
  el.textContent = display;

  // Red-ish color if net is negative (owed more than we have)
  if (btn) {
    if (net < 0) {
      el.style.color = 'var(--danger)';
    } else {
      el.style.color = '';
    }
  }
}

document.addEventListener('DOMContentLoaded', async () => {
  loadTheme();
  try {
    await bootstrapFromServer();
  } catch (e) {
    console.error('Failed to reach server:', e);
    alert('فشل الاتصال بالسيرفر. تأكد إن السيرفر شغال ثم أعد تحميل الصفحة.\n\nالخطأ: ' + e.message);
    return;
  }
  if (!DB.load()) seedData();
  // Ensure latest schema bits exist
  if (!DB.data.settings) DB.data.settings = { companyName:'أوزاريكس', taxRate:0, currency:'جنيه', soundEnabled: true };
  if (DB.data.settings.soundEnabled === undefined) DB.data.settings.soundEnabled = true;
  if (!DB.data.counters) DB.data.counters = { invoice: 1000, issuance: 1000, purchase: 1000 };
  if (!DB.data.counters.issuance) DB.data.counters.issuance = 1000;
  if (!DB.data.counters.purchase) DB.data.counters.purchase = 1000;
  if (!DB.data.stockMoves) DB.data.stockMoves = [];
  if (!DB.data.issuances) DB.data.issuances = [];
  if (!DB.data.suppliers) DB.data.suppliers = [];
  if (!DB.data.supplierPayments) DB.data.supplierPayments = [];
  DB.save();

  // Resume audio context on first user interaction (required by browsers)
  const audioResume = () => {
    const ctx = getAudioCtx();
    if (ctx && ctx.state === 'suspended') ctx.resume();
    document.removeEventListener('click', audioResume);
    document.removeEventListener('keydown', audioResume);
  };
  document.addEventListener('click', audioResume);
  document.addEventListener('keydown', audioResume);

  if (restoreSession()) startApp();

  document.getElementById('login-form').addEventListener('submit', e => {
    e.preventDefault();
    const u = document.getElementById('login-username').value.trim();
    const p = document.getElementById('login-password').value;
    if (login(u, p)) { toast('مرحباً بك ' + currentUser.name); startApp(); }
    else toast('بيانات الدخول غير صحيحة', 'error');
  });

  // Global Search with results dropdown
  const gs = document.getElementById('global-search');
  const sr = document.getElementById('search-results');
  gs.addEventListener('input', e => runGlobalSearch(e.target.value.trim()));
  gs.addEventListener('focus', e => { if (e.target.value.trim()) runGlobalSearch(e.target.value.trim()); });
  // Close on outside click
  document.addEventListener('click', e => {
    const box = document.getElementById('global-search-box');
    if (box && !box.contains(e.target)) sr.classList.remove('show');
  });
  // Close on Escape
  gs.addEventListener('keydown', e => {
    if (e.key === 'Escape') { sr.classList.remove('show'); gs.value=''; gs.blur(); }
  });
});

/* =========================================================
   GLOBAL SEARCH (invoices, customers, products, payments)
========================================================= */
function runGlobalSearch(q) {
  const sr = document.getElementById('search-results');
  if (!q || q.length < 1) { sr.classList.remove('show'); sr.innerHTML = ''; return; }
  const qLower = q.toLowerCase();

  // Search customers/centers
  const customers = (DB.data.customers || []).filter(c =>
    (c.name||'').toLowerCase().includes(qLower) ||
    (c.company||'').toLowerCase().includes(qLower) ||
    (c.phone||'').includes(q)
  ).slice(0, 5);

  // Search invoices by number/customer
  const invoices = (DB.data.invoices || []).filter(i =>
    (i.number||'').toString().toLowerCase().includes(qLower) ||
    (i.customerName||'').toLowerCase().includes(qLower)
  ).slice(0, 5);

  // Search products
  const products = (DB.data.products || []).filter(p =>
    (p.name||'').toLowerCase().includes(qLower) ||
    (p.code||'').toLowerCase().includes(qLower)
  ).slice(0, 5);

  // Search payments by ref/customer/amount
  const payments = (DB.data.payments || []).filter(p =>
    (p.reference||'').toLowerCase().includes(qLower) ||
    (p.customerName||'').toLowerCase().includes(qLower) ||
    (p.amount||'').toString().includes(q) ||
    (p.note||'').toLowerCase().includes(qLower)
  ).slice(0, 5);

  // Search issuances
  const issuances = (DB.data.issuances || []).filter(i =>
    (i.number||'').toString().toLowerCase().includes(qLower) ||
    (i.customerName||'').toLowerCase().includes(qLower) ||
    (i.productName||'').toLowerCase().includes(qLower)
  ).slice(0, 5);

  let html = '';
  if (customers.length === 0 && invoices.length === 0 && products.length === 0 && payments.length === 0 && issuances.length === 0) {
    html = `<div class="search-result-empty">
      <div class="sre-icon">🔍</div>
      لا توجد نتائج للبحث عن "<b>${escapeHtml(q)}</b>"
    </div>`;
  } else {
    if (customers.length) {
      html += `<div class="search-result-section">
        <div class="search-result-header">👥 العملاء / المراكز (${customers.length})</div>
        ${customers.map(c => `
          <div class="search-result-item" onclick="navigate('customers');setTimeout(()=>{document.getElementById('global-search').value='';document.getElementById('search-results').classList.remove('show');},50)">
            <div class="sr-icon" style="background:rgba(139,92,246,.15);color:#8b5cf6">👤</div>
            <div class="sr-body">
              <div class="sr-title">${escapeHtml(c.name)}</div>
              <div class="sr-sub">${escapeHtml(c.phone||'-')} ${c.balance>0?'• <b style="color:var(--danger)">مديونية '+fmtCurrency(c.balance)+'</b>':''}</div>
            </div>
          </div>
        `).join('')}
      </div>`;
    }
    if (invoices.length) {
      html += `<div class="search-result-section">
        <div class="search-result-header">📄 الفواتير (${invoices.length})</div>
        ${invoices.map(i => `
          <div class="search-result-item" onclick="navigate('invoices');setTimeout(()=>{if(window.viewInvoice)viewInvoice('${i.id}');document.getElementById('global-search').value='';document.getElementById('search-results').classList.remove('show');},80)">
            <div class="sr-icon" style="background:rgba(6,182,212,.15);color:#06b6d4">📄</div>
            <div class="sr-body">
              <div class="sr-title">فاتورة #${escapeHtml(i.number)} - ${escapeHtml(i.customerName||'')}</div>
              <div class="sr-sub">${i.date} • <b>${fmtCurrency(i.total||0)}</b></div>
            </div>
          </div>
        `).join('')}
      </div>`;
    }
    if (issuances.length) {
      html += `<div class="search-result-section">
        <div class="search-result-header">📋 صرف الورق (${issuances.length})</div>
        ${issuances.map(i => `
          <div class="search-result-item" onclick="navigate('issuances');setTimeout(()=>{if(window.viewIssuance)viewIssuance('${i.id}');document.getElementById('global-search').value='';document.getElementById('search-results').classList.remove('show');},80)">

    }
  }
  sr.innerHTML = html;
  sr.classList.add('show');
}

/* Voice search (Web Speech API) */
let voiceRecognition = null;
function toggleVoiceSearch() {
  const btn = document.getElementById('search-mic-btn');
  const input = document.getElementById('global-search');

  // Toggle off if already listening
  if (voiceRecognition) {
    try { voiceRecognition.stop(); } catch(e) {}
    voiceRecognition = null;
    btn.classList.remove('listening');
    return;
  }

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    toast('متصفحك ما يدعمش البحث الصوتي - جرب على Chrome', 'error');
    return;
  }

  try {
    voiceRecognition = new SR();
    voiceRecognition.lang = 'ar-EG';
    voiceRecognition.continuous = false;
    voiceRecognition.interimResults = true;

    btn.classList.add('listening');
    toast('🎤 اتكلم دلوقتي...', 'info');

    voiceRecognition.onresult = (e) => {
      const transcript = Array.from(e.results)
        .map(r => r[0].transcript)
        .join('');
      input.value = transcript;
      runGlobalSearch(transcript.trim());
    };

    voiceRecognition.onerror = (e) => {
      btn.classList.remove('listening');
      voiceRecognition = null;
      if (e.error === 'no-speech') toast('ما سمعتش حاجة، جرب تاني', 'warning');
      else if (e.error === 'not-allowed') toast('لازم تسمح بالميكروفون من الإعدادات', 'error');
      else toast('حصلت مشكلة في البحث الصوتي', 'error');
    };

    voiceRecognition.onend = () => {
      btn.classList.remove('listening');
      voiceRecognition = null;
    };

    voiceRecognition.start();
  } catch(err) {
    btn.classList.remove('listening');
    voiceRecognition = null;
    toast('ما قدرتش أشغّل البحث الصوتي', 'error');
  }
}

              <div style="font-size:11px;color:var(--text-muted);margin-top:2px">📄 ${escapeHtml(e.description||'')} • 📅 ${e.dueDate}</div>
            </div>
            <div style="text-align:left">
              <div style="color:#92400e;font-weight:800;font-size:14px">${fmtCurrency(e.amount)}</div>
              <div style="font-size:11px;color:#92400e;background:rgba(245,158,11,.12);padding:2px 8px;border-radius:999px;margin-top:2px;display:inline-block">${label}</div>
            </div>
          </div>
        </div>`;
      });
    }

    // 5) PRICE CHANGES (inflation watch)
    if (priceChanges.length > 0) {
      html += `<div style="background:linear-gradient(135deg,#ede9fe,#ddd6fe);padding:12px;border-radius:10px;margin:14px 0;border-right:4px solid #7c3aed">
        <h4 style="color:#5b21b6;margin:0 0 4px;font-size:15px">📊 تغيرات في أسعار الموردين (${priceChanges.length})</h4>
        <p style="color:#4c1d95;font-size:12px;margin:0">الموردين دول غيّروا أسعار في قائمتهم — راجع قبل الشراء</p>
      </div>`;
      priceChanges.slice(0, 6).forEach(pc => {
        const isUp = pc.diff > 0;
        const arrowColor = isUp ? '#dc2626' : '#059669';
        const arrow = isUp ? '▲' : '▼';
        html += `<div style="background:var(--surface);border:1px solid var(--border);border-right:3px solid #7c3aed;padding:10px 12px;border-radius:8px;margin-bottom:6px;cursor:pointer" onclick="closeModal();navigate('suppliers');setTimeout(()=>openSupplierPriceList('${pc.supplierId}'),100)">
          <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px">
            <div style="min-width:0;flex:1">
              <b style="font-size:13.5px">${escapeHtml(pc.itemName)}</b>
              <div style="font-size:11px;color:var(--text-muted);margin-top:2px">من ${escapeHtml(pc.supplierName)} • آخر شراء ${pc.lastDate}</div>
            </div>
            <div style="text-align:left;white-space:nowrap">
              <div style="color:${arrowColor};font-weight:800;font-size:13.5px">${arrow} ${Math.abs(pc.diff).toFixed(1)}%</div>
              <div style="font-size:11px;color:var(--text-muted);margin-top:2px">${fmt(pc.oldPrice).split('.')[0]} → <b style="color:${arrowColor}">${fmt(pc.newPrice).split('.')[0]}</b></div>
            </div>
          </div>
        </div>`;
      });
    }

    // 6) Low stock
    if (low.length > 0) {
      html += `<div style="background:linear-gradient(135deg,#dbeafe,#bfdbfe);padding:12px;border-radius:10px;margin:14px 0;border-right:4px solid var(--info)">
        <h4 style="color:#1e40af;margin:0 0 4px;font-size:15px">📦 مخزون منخفض (${low.length})</h4>
        <p style="color:#1e3a8a;font-size:12px;margin:0">المنتجات دي قاربت تنفد من المخزن</p>
      </div>`;
      low.forEach(p => {
        html += `<div style="background:var(--surface);border:1px solid var(--border);border-right:3px solid var(--info);padding:10px 12px;border-radius:8px;margin-bottom:6px">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <b>${escapeHtml(p.name)}</b>
            <div style="font-size:11px"><span style="color:var(--danger);font-weight:800">${p.quantity} ${p.unit||''}</span> / حد أدنى ${p.minQuantity}</div>
          </div>
        </div>`;
      });
    }
  }

  openModal('🔔 الإشعارات والتنبيهات', html, '<button class="btn btn-secondary" onclick="closeModal()">إغلاق</button>', 'large');
}

/* =========================================================
   DASHBOARD
========================================================= */
let dashCharts = {};
function renderDashboard() {
  // Destroy old charts
  Object.values(dashCharts).forEach(c => c && c.destroy());
  dashCharts = {};

  const today = todayStr();
  const monthStart = today.slice(0,7) + '-01';

  const monthIssuances = (DB.data.issuances||[]).filter(i => i.date >= monthStart);
  const monthIssTotal = monthIssuances.reduce((s,i)=>s+i.total, 0);
  const monthIssQty = monthIssuances.reduce((s,i)=>s+i.quantity, 0);
  // Standalone invoices NOT linked to issuances (avoid double counting)
  const monthStandaloneSales = DB.data.invoices.filter(i => i.date >= monthStart && !i.sourceIssuanceId).reduce((s,i)=>s+i.total, 0);
  // إيرادات الشهر = كل الفلوس التي دخلت من البيع (صرف الورق + الفواتير المنفصلة)
  const monthRevenue = monthIssTotal + monthStandaloneSales;
  // صافي الربح = الإيرادات - كل المصروفات (مصاريف يدوية + تكلفة الورق المباع = COGS)
  // COGS = تكلفة الورق المصروف فعلياً (سعر التكلفة من المخزن)
  let monthCOGS = 0;
  monthIssuances.forEach(iss => {
    const p = DB.data.products.find(x=>x.id===iss.productId);
    if (p) monthCOGS += (p.cost||0) * iss.quantity;
  });
  const monthExpenses = DB.data.expenses.filter(e => e.kind !== 'purchase' && e.date >= monthStart).reduce((s,e)=>s+e.amount, 0);
  const netProfit = monthRevenue - monthCOGS - monthExpenses;

  // Today's sales (issuances only - those are the actual sales transactions)
  const todayIssTotal = (DB.data.issuances||[]).filter(i => i.date === today).reduce((s,i)=>s+i.total, 0);
  const todayStandalone = DB.data.invoices.filter(i => i.date === today && !i.sourceIssuanceId).reduce((s,i)=>s+i.total, 0);
  const todaySales = todayIssTotal + todayStandalone;

  const totalDebts = DB.data.customers.reduce((s,c)=>s+(c.balance||0), 0);
  const overdueCount = DB.data.customers.filter(c => c.balance > 0).length;
  const lowStock = DB.data.products.filter(p => p.quantity <= p.minQuantity);

  // Money we owe to suppliers (for dashboard card)
  let supplierTotalOwed = 0;
  let supplierOwedCount = 0;
  let topOwedSuppliers = [];
  (DB.data.suppliers || []).forEach(s => {
    const m = supplierMetrics(s.id);
    if (m.balance > 0) {
      supplierTotalOwed += m.balance;
      supplierOwedCount++;
      topOwedSuppliers.push({ name: s.name, balance: m.balance, id: s.id });
    }
  });
  topOwedSuppliers.sort((a, b) => b.balance - a.balance);

  // Total inventory quantity
  const totalInventoryQty = DB.data.products.reduce((s,p) => s + (p.quantity||0), 0);
  const totalInventoryValue = DB.data.products.reduce((s,p) => s + (p.quantity||0) * (p.cost||0), 0);

  const root = document.getElementById('page-content');

  // Trend calculations (% vs last month)
  const lastMonthStart = (() => {
    const d = new Date(); d.setMonth(d.getMonth() - 1); d.setDate(1);
    return dateStr(d);
  })();
  const lastMonthEnd = monthStart;
  const lastMonthRevenue = (DB.data.issuances||[]).filter(i => i.date >= lastMonthStart && i.date < lastMonthEnd).reduce((s,i)=>s+i.total, 0)
    + DB.data.invoices.filter(i => i.date >= lastMonthStart && i.date < lastMonthEnd && !i.sourceIssuanceId).reduce((s,i)=>s+i.total, 0);
  const revenueTrend = lastMonthRevenue > 0 ? ((monthRevenue - lastMonthRevenue) / lastMonthRevenue * 100) : 0;
  let lastMonthProfit = 0;
  (DB.data.issuances||[]).filter(i => i.date >= lastMonthStart && i.date < lastMonthEnd).forEach(iss => {
    lastMonthProfit += iss.total;
    const p = DB.data.products.find(x=>x.id===iss.productId);
    if (p) lastMonthProfit -= (p.cost||0) * iss.quantity;
  });
  lastMonthProfit -= DB.data.expenses.filter(e => e.kind !== 'purchase' && e.date >= lastMonthStart && e.date < lastMonthEnd).reduce((s,e)=>s+e.amount, 0);
  const profitTrend = lastMonthProfit !== 0 ? ((netProfit - lastMonthProfit) / Math.abs(lastMonthProfit) * 100) : 0;
  const customerTrend = 0; // Default: would need historical data
  const overdueTrend = 0;

  // Currency abbreviation for KPI display
  const cur = (DB.data.settings.currency || 'جنيه').slice(0, 4);
  const curShort = cur === 'جنيه' ? 'ج.م' : cur === 'ريال' ? 'ر.س' : cur === 'درهم' ? 'د.إ' : cur;

  // Recent invoices (last 5)
  const recentInvoices = DB.data.invoices.slice().sort((a,b) => b.createdAt - a.createdAt).slice(0, 5);
  // Top debtors
  const topDebtors = DB.data.customers.filter(c => c.balance > 0).sort((a,b) => b.balance - a.balance).slice(0, 5);

  // Smart alerts
  const alerts = [];
  if (lowStock.length > 0) {
    alerts.push({
      type: 'warning',
      icon: '⚠',
      title: 'تنبيه مخزون',
      text: `مخزون ${escapeHtml(lowStock[0].name)} أقل من الحد المطلوب`,
      time: 'منذ 15 دقيقة'
    });
  }
  const overdueInvoices = DB.data.invoices.filter(i => i.status === 'unpaid' || i.status === 'partial').length;
  if (overdueInvoices > 0) {
    alerts.push({
      type: 'danger',
      icon: '📄',
      title: 'فاتورة متأخرة',
      text: `لديك ${overdueInvoices} فاتورة متأخرة`,
      time: 'منذ ساعة'
    });
  }
  const topDebtor = DB.data.customers.filter(c => c.balance > 0).sort((a,b)=>b.balance-a.balance)[0];
  if (topDebtor) {
    alerts.push({
      type: 'info',
