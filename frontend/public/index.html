/* Cache for device info & IP (fetched once per session) */
let _deviceInfoCache = null;
let _clientIPCache = null;

function getDeviceInfo() {
  if (_deviceInfoCache) return _deviceInfoCache;
  const ua = navigator.userAgent;
  let os = 'غير معروف';
  if (/Windows NT 10/i.test(ua)) os = 'Windows 10/11';
  else if (/Windows NT/i.test(ua)) os = 'Windows';
  else if (/Mac OS X/i.test(ua)) os = 'macOS';
  else if (/Android/i.test(ua)) os = 'Android';
  else if (/iPhone|iPad|iPod/i.test(ua)) os = 'iOS';
  else if (/Linux/i.test(ua)) os = 'Linux';

  let browser = 'غير معروف';
  if (/Edg\//i.test(ua)) browser = 'Edge';
  else if (/OPR\/|Opera/i.test(ua)) browser = 'Opera';
  else if (/Chrome\//i.test(ua) && !/Edg\//i.test(ua)) browser = 'Chrome';
  else if (/Firefox\//i.test(ua)) browser = 'Firefox';
  else if (/Safari\//i.test(ua) && !/Chrome\//i.test(ua)) browser = 'Safari';

  _deviceInfoCache = `${os} - ${browser}`;
  return _deviceInfoCache;
}

async function getClientIP() {
  if (_clientIPCache) return _clientIPCache;
  // Try cached from previous session
  try {
    const cached = localStorage.getItem('ozarex_client_ip');
    if (cached) {
      const obj = JSON.parse(cached);
      if (Date.now() - obj.ts < 6 * 60 * 60 * 1000) { // 6h cache
        _clientIPCache = obj.ip;
        return obj.ip;
      }
    }
  } catch (e) {}
  try {
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), 3000);
    const resp = await fetch('https://api.ipify.org?format=json', { signal: ctrl.signal });
    clearTimeout(t);
    if (resp.ok) {
      const data = await resp.json();
      _clientIPCache = data.ip || 'محلي';
      try { localStorage.setItem('ozarex_client_ip', JSON.stringify({ ip: _clientIPCache, ts: Date.now() })); } catch (e) {}
      return _clientIPCache;
    }
  } catch (e) {
    // Offline / blocked - that's fine
  }
  _clientIPCache = 'محلي / بدون نت';
  return _clientIPCache;
}

/* Pre-fetch IP on app start (don't block UI) */
function initAuditTrail() {
  getClientIP();
  getDeviceInfo();
}

/* Detect suspicion level for an audit entry */
function analyzeSuspicion(entry) {
  const flags = [];
  const op = entry.operation;
  const table = entry.table;
  const before = entry.before || {};
  const after = entry.after || {};

  // 1) Invoice deletion → HIGH
  if (op === 'delete' && (table === 'invoices' || table === 'issuances')) {
    flags.push({ level: 'high', reason: 'حذف فاتورة' });
  }

  // 2) Large discount → HIGH
  if (table === 'invoices' && (after.discount || before.discount)) {
    const discount = after.discount || before.discount || 0;
    const total = after.total || before.total || 1;
    const pct = (discount / total) * 100;
    if (pct >= 20) flags.push({ level: 'high', reason: `خصم كبير ${pct.toFixed(1)}%` });
    else if (pct >= 10) flags.push({ level: 'medium', reason: `خصم متوسط ${pct.toFixed(1)}%` });
  }

  // 3) Price change > 30% → MEDIUM
  if (op === 'edit' && (table === 'products' || table === 'invoices' || table === 'issuances')) {
    const oldPrice = before.price || before.unitPrice || before.total;
    const newPrice = after.price || after.unitPrice || after.total;
    if (oldPrice && newPrice && oldPrice > 0) {
      const change = Math.abs((newPrice - oldPrice) / oldPrice) * 100;
      if (change >= 50) flags.push({ level: 'high', reason: `تغيير سعر ${change.toFixed(0)}%` });
      else if (change >= 30) flags.push({ level: 'medium', reason: `تغيير سعر ${change.toFixed(0)}%` });
    }
  }

  // 4) Customer balance reset → HIGH
  if (op === 'edit' && table === 'customers' && before.balance && after.balance === 0 && before.balance > 1000) {
    flags.push({ level: 'high', reason: `إزالة مديونية كاملة ${fmt(before.balance)}` });
  }

  // 5) Very large amount payment → MEDIUM (could be fraud)
  if (op === 'add' && table === 'payments' && (after.amount || 0) > 50000) {
    flags.push({ level: 'medium', reason: `سداد كبير ${fmt(after.amount)}` });
  }

  // 6) After-hours operation (10pm - 6am) → MEDIUM
  const hour = new Date(entry.timestamp).getHours();
  if (hour >= 22 || hour < 6) {
    flags.push({ level: 'medium', reason: 'عملية خارج ساعات العمل' });
  }

  // 7) Frequency-based: same user did 20+ ops in last hour → MEDIUM
  const oneHourAgo = entry.timestamp - 60 * 60 * 1000;
  const recentByUser = (DB.data.auditLog || []).filter(e =>
    e.userId === entry.userId && e.timestamp >= oneHourAgo
  ).length;
  if (recentByUser >= 30) flags.push({ level: 'high', reason: `${recentByUser} عملية في ساعة واحدة` });
  else if (recentByUser >= 20) flags.push({ level: 'medium', reason: `${recentByUser} عملية في ساعة واحدة` });

  // 8) Edit without reason on sensitive table → LOW
  const sensitiveTables = ['invoices', 'issuances', 'payments', 'products', 'customers'];
  if (op === 'edit' && sensitiveTables.includes(table) && !entry.reason) {
    flags.push({ level: 'low', reason: 'تعديل بدون سبب موثق' });
  }

  if (flags.length === 0) return { level: 'normal', flags: [] };
  // Highest wins
  const hasHigh = flags.some(f => f.level === 'high');
  const hasMed = flags.some(f => f.level === 'medium');
  return {
    level: hasHigh ? 'high' : (hasMed ? 'medium' : 'low'),
    flags
  };
}

/* MAIN: log an audit entry. Call this from save/delete functions. */
function logAudit(opts) {
  // opts: { operation, table, recordId, recordLabel, before, after, reason, suspicion }
  if (!currentUser) return; // don't log pre-auth operations
  const entry = {
    id: 'au_' + Date.now() + '_' + uid(),
    timestamp: Date.now(),
    userId: currentUser.id,
    userName: currentUser.name,
    userRole: currentUser.role,
    operation: opts.operation, // 'add' | 'edit' | 'delete'
    table: opts.table,         // 'invoices' | 'customers' | ...
    recordId: opts.recordId || null,
    recordLabel: opts.recordLabel || '',
    before: opts.before || null,
    after: opts.after || null,
    reason: opts.reason || '',
    device: getDeviceInfo(),
    ip: _clientIPCache || 'محلي'
  };
  const susAnalysis = analyzeSuspicion(entry);
  entry.suspicionLevel = susAnalysis.level;
  entry.suspicionFlags = susAnalysis.flags;

  if (!DB.data.auditLog) DB.data.auditLog = [];
  DB.data.auditLog.unshift(entry);

  // Cap log at 5000 entries to prevent localStorage bloat
  if (DB.data.auditLog.length > 5000) {
    DB.data.auditLog = DB.data.auditLog.slice(0, 5000);
  }

  // Show in-line warning toast for suspicious ops
  if (susAnalysis.level === 'high') {
    setTimeout(() => toast('⚠️ تم اكتشاف عملية مشبوهة! راجع سجل التعديلات', 'warning'), 400);
  }

  // Refresh sidebar so the audit badge updates live
  if (typeof renderSidebar === 'function') {
    try { renderSidebar(); } catch (e) {}
  }
}

function markAuditAsSeen() {
  try {
    localStorage.setItem('ozarex_audit_seen_ts', String(Date.now()));
  } catch (e) {}
  if (typeof renderSidebar === 'function') renderSidebar();
}

/* Admin can delete a specific audit log entry */
function deleteAuditEntry(id) {
  if (currentUser.role !== 'admin') {
    toast('فقط الأدمن يقدر يحذف من سجل التعديلات', 'error');
    return;
  }
  const entry = (DB.data.auditLog || []).find(e => e.id === id);
  if (!entry) return;
  const dt = new Date(entry.timestamp).toLocaleString('ar-EG');
  confirmDialog(
    `هل تريد حذف هذا السجل من سجل التعديلات؟\n\n${opLabel(entry.operation)} في ${tableLabel(entry.table)}\nبواسطة: ${entry.userName}\nبتاريخ: ${dt}\n\n⚠️ هذا الإجراء لا يمكن التراجع عنه.`,
    () => {
      DB.data.auditLog = (DB.data.auditLog || []).filter(e => e.id !== id);
      DB.save();
      toast('تم حذف السجل');
      closeModal();
      renderAuditLog();
    }
  );
}

function clearAllAuditLog() {
  if (currentUser.role !== 'admin') {
    toast('فقط الأدمن يقدر يمسح سجل التعديلات', 'error');
    return;
  }
  const count = (DB.data.auditLog || []).length;

/* Admin can delete entries matching current filter (bulk) */
function deleteFilteredAuditEntries() {
  if (currentUser.role !== 'admin') return;
  // Re-apply filters to get the current visible list
  let filtered = (DB.data.auditLog || []).slice();
  if (auditFilters.user) filtered = filtered.filter(e => e.userId === auditFilters.user);
  if (auditFilters.op) filtered = filtered.filter(e => e.operation === auditFilters.op);
  if (auditFilters.table) filtered = filtered.filter(e => e.table === auditFilters.table);
  if (auditFilters.suspicion) filtered = filtered.filter(e => e.suspicionLevel === auditFilters.suspicion);
  if (auditFilters.from) {
    const fromTs = new Date(auditFilters.from).getTime();
    filtered = filtered.filter(e => e.timestamp >= fromTs);
  }
  if (auditFilters.to) {
    const toTs = new Date(auditFilters.to).getTime() + 24*60*60*1000;
    filtered = filtered.filter(e => e.timestamp <= toTs);
  }
  if (auditFilters.search) {
    const q = auditFilters.search.toLowerCase();
    filtered = filtered.filter(e =>
      (e.userName||'').toLowerCase().includes(q) ||
      (e.recordLabel||'').toLowerCase().includes(q) ||
      (e.reason||'').toLowerCase().includes(q) ||
      String(e.recordId||'').toLowerCase().includes(q)
    );
  }
  if (filtered.length === 0) { toast('لا توجد سجلات لحذفها'); return; }
  const ids = new Set(filtered.map(e => e.id));
  confirmDialog(
    `⚠️ سيتم حذف ${filtered.length} سجل من السجلات الظاهرة حالياً (حسب الفلاتر).\n\nهل أنت متأكد؟`,
    () => {
      DB.data.auditLog = (DB.data.auditLog || []).filter(e => !ids.has(e.id));
      DB.save();
      toast(`تم حذف ${filtered.length} سجل`);
      renderAuditLog();
    }
  );
}

  });
}

/* Diff helper: compare two objects, return array of changed fields */
function diffObjects(before, after) {
  const changes = [];
  if (!before && !after) return changes;
  const keys = new Set([...Object.keys(before || {}), ...Object.keys(after || {})]);
  keys.forEach(k => {
    const b = before ? before[k] : undefined;
    const a = after  ? after[k]  : undefined;
    // Skip id and timestamps
    if (k === 'id' || k === 'createdAt' || k === 'updatedAt') return;
    // Compare values
    const bStr = JSON.stringify(b);
    const aStr = JSON.stringify(a);
    if (bStr !== aStr) {
      changes.push({ field: k, before: b, after: a });
    }
  });
  return changes;
}

/* Helper to format any field value for display */
function fmtAuditValue(v) {
  if (v === null || v === undefined) return '<i style="color:var(--text-muted)">فارغ</i>';
  if (typeof v === 'object') {
    if (Array.isArray(v)) return `<i>قائمة (${v.length} عنصر)</i>`;
    return `<i>${Object.keys(v).length} حقل</i>`;
  }
  if (typeof v === 'number') return fmt(v);
  if (typeof v === 'boolean') return v ? 'نعم' : 'لا';
  return escapeHtml(String(v));
}

  if (id) {
    const u = DB.data.users.find(x=>x.id===id);
    u.name = d.name; u.role = d.role;
    if (d.password) u.password = d.password;
  } else {
    if (DB.data.users.find(u => u.username === d.username)) { toast('اسم المستخدم موجود بالفعل', 'error'); return; }
    if (!d.password) { toast('كلمة المرور مطلوبة', 'error'); return; }

// The "brain": analyzes the real company data and answers in Arabic
function aiAnswer(qRaw) {
  const q = (qRaw || '').toLowerCase().trim();
  const cur = (DB.data.settings && DB.data.settings.currency) || 'جنيه';
  const curShort = cur === 'جنيه' ? 'ج.م' : cur === 'ريال' ? 'ر.س' : cur === 'درهم' ? 'د.إ' : cur;
  const fmtm = (n) => `<b>${fmt(Math.round(n||0))} ${curShort}</b>`;

  const today = todayStr();
  const monthStart = today.slice(0,7) + '-01';
  const has = (...words) => words.some(w => q.includes(w));

  const invoices = DB.data.invoices || [];
  const products = DB.data.products || [];
  const customers = DB.data.customers || [];

  // Helper: sum cost of goods for an invoice from its items (using product cost)
  const invoiceCOGS = (inv) => (inv.items||[]).reduce((s,it) => {
    const p = products.find(x => x.id === it.productId);
    return s + ((p ? (p.cost||0) : 0) * (it.qty||it.quantity||0));
  }, 0);

  // ---- SUPPLIERS we owe (عليا للموردين) — checked BEFORE debts (more specific) ----
  if (has('مورد', 'موردين', 'للمورد', 'مورّد') || (has('عليا') && has('مورد'))) {
    const suppliers = DB.data.suppliers || [];
    if (suppliers.length === 0) return '🏭 مفيش موردين مسجلين لسه.';
    let totalOwed = 0; const owedList = [];
    suppliers.forEach(s => {
      let bal = 0;
      if (typeof supplierMetrics === 'function') { bal = supplierMetrics(s.id).balance || 0; }
      else { bal = s.balance || 0; }
      if (bal > 0) { totalOwed += bal; owedList.push({ name: s.name, bal }); }
    });
    owedList.sort((a,b)=>b.bal-a.bal);
    if (owedList.length === 0) return '✅ مفيش مستحقات عليك للموردين حالياً.';
    const top = owedList.slice(0,5).map((s,i)=>`${i+1}. <b>${escapeHtml(s.name)}</b>: ${fmt(Math.round(s.bal))} ${curShort}`).join('<br>');
    return `🏭 <b>إجمالي اللي عليك للموردين:</b> ${fmtm(totalOwed)}<br>عدد الموردين المستحقين: <b>${owedList.length}</b><br><br>🔝 <b>الأكبر:</b><br>${top}`;
  }

  // ---- TOP PRODUCT (أكتر منتج) — checked BEFORE sales (so "أكتر منتج مبيعاً" doesn't hit sales) ----
  if (has('أكتر منتج', 'اكتر منتج', 'أفضل منتج', 'افضل منتج', 'أكثر مبيع', 'اكثر مبيع', 'منتج مبيع', 'أكتر صنف', 'اكتر صنف', 'أكتر حاجة', 'اكتر حاجة')) {
    const sales = {};
    invoices.forEach(inv => (inv.items||[]).forEach(it => {
      const name = it.productName || (products.find(p=>p.id===it.productId)||{}).name || 'غير معروف';
      sales[name] = (sales[name]||0) + (it.total||0);
    }));
    const arr = Object.entries(sales).sort((a,b)=>b[1]-a[1]);
    if (arr.length === 0) return '🏆 مفيش مبيعات مسجلة لسه عشان أحدد أكتر منتج.';
    const top = arr.slice(0,5).map((e,i)=>`${i+1}. <b>${escapeHtml(e[0])}</b>: ${fmt(Math.round(e[1]))} ${curShort}`).join('<br>');
    return `🏆 <b>أكتر المنتجات مبيعاً:</b><br>${top}`;
  }

  // ---- SALES (مبيعات) — invoices are the single source of truth ----
  if (has('مبيعات', 'مبيعاتي', 'بعت', 'البيع', 'بيعت', 'مبيعا')) {
    const monthInvs = invoices.filter(i => (i.date||'') >= monthStart);
    const monthSales = monthInvs.reduce((s,i)=>s+(i.total||0), 0);
    const todaySales = invoices.filter(i=>i.date===today).reduce((s,i)=>s+(i.total||0),0);
    const allSales = invoices.reduce((s,i)=>s+(i.total||0),0);
    if (invoices.length === 0) return '📊 لسه مفيش أي مبيعات مسجلة. ابدأ بإصدار فاتورة أو صرف ورق.';
    return `📊 <b>المبيعات:</b><br>• هذا الشهر: ${fmtm(monthSales)}<br>• اليوم: ${fmtm(todaySales)}<br>• إجمالي كل المبيعات: ${fmtm(allSales)}<br>• عدد فواتير الشهر: <b>${monthInvs.length}</b>`;
  }

  // ---- PROFIT (أرباح) ----
  if (has('ربح', 'أرباح', 'ارباح', 'مكسب', 'الربح', 'كسبت')) {
    const monthInvs = invoices.filter(i => (i.date||'') >= monthStart);
    const revenue = monthInvs.reduce((s,i)=>s+(i.total||0), 0);
    let cogs = 0;
    monthInvs.forEach(inv => { cogs += invoiceCOGS(inv); });
    const expenses = (DB.data.expenses||[]).filter(e => e.kind !== 'purchase' && (e.date||'') >= monthStart).reduce((s,e)=>s+(e.amount||0), 0);
    const profit = revenue - cogs - expenses;
    const margin = revenue > 0 ? (profit/revenue*100) : 0;
    if (invoices.length === 0) return '💰 لسه مفيش مبيعات لحساب الربح منها.';
    return `💰 <b>صافي الربح هذا الشهر:</b> ${fmtm(profit)}<br><br>• الإيرادات (المبيعات): ${fmtm(revenue)}<br>• تكلفة البضاعة المباعة: ${fmtm(cogs)}<br>• المصروفات: ${fmtm(expenses)}<br>• هامش الربح: <b>${margin.toFixed(1)}%</b>`;
  }

  // ---- DEBTS / who owes most (ديون / عميل عليه فلوس) ----
  if (has('مديون', 'عليه فلوس', 'عليه فلو', 'ديون', 'دين', 'مستحق', 'فلوسي', 'مدين', 'عميل عليه', 'عملاء عليهم')) {
    const debtors = customers.filter(c => (c.balance||0) > 0).sort((a,b)=>(b.balance||0)-(a.balance||0));
    const totalDebt = debtors.reduce((s,c)=>s+(c.balance||0), 0);
    if (debtors.length === 0) return '✅ مفيش أي عميل عليه فلوس حالياً. كل الحسابات مسددة! 👏';
    const top = debtors.slice(0,5).map((c,i)=>`${i+1}. <b>${escapeHtml(c.name)}</b>: ${fmt(Math.round(c.balance))} ${curShort}`).join('<br>');
    const topOne = debtors[0];
    return `💸 <b>أكتر عميل عليه فلوس:</b> ${escapeHtml(topOne.name)} بمبلغ ${fmtm(topOne.balance)}<br><br>إجمالي ديون العملاء: ${fmtm(totalDebt)} (${debtors.length} عميل)<br><br>🔝 <b>الترتيب:</b><br>${top}`;
  }

  // ---- INVENTORY — list what's in stock by item with quantities (المخزن) ----
  if (has('مخزن', 'مخزون', 'المخزن', 'ستوك', 'عندي ايه', 'عندي إيه', 'الاصناف', 'الأصناف', 'موجود في', 'الكمي', 'متبقي', 'يخلص', 'ينفذ', 'قرب', 'ورق قد', 'قد ايه', 'قد إيه', 'عندنا كام', 'عندنا ورق', 'كام ورق', 'فيه كام', 'الورق', 'البضاعة', 'بضاعة')) {
    if (products.length === 0) return '📦 مفيش منتجات مسجلة في المخزن لسه.';
    const totalQty = products.reduce((s,p)=>s+(Number(p.quantity)||0),0);
    const sorted = [...products].sort((a,b)=>(Number(b.quantity)||0)-(Number(a.quantity)||0));
    const list = sorted.map(p => {
      const low = (p.quantity||0) <= (p.minQuantity||0);
      const warn = low ? ' ⚠️' : '';
      return `• <b>${escapeHtml(p.name)}</b>: ${fmt(p.quantity||0)} ${escapeHtml(p.unit||'')}${warn}`;
    }).join('<br>');
    const lowItems = products.filter(p => (p.quantity||0) <= (p.minQuantity||0));
    const lowNote = lowItems.length > 0
      ? `<br><br>⚠️ <b>قرب يخلص (${lowItems.length}):</b> ${lowItems.map(p=>escapeHtml(p.name)).join('، ')}`
      : '<br><br>✅ كل الأصناف فوق الحد الأدنى.';
    return `📦 <b>المخزن (${products.length} صنف — إجمالي ${fmt(Math.round(totalQty))} وحدة):</b><br>${list}${lowNote}`;
  }

  // ---- CUSTOMERS count (كام عميل) ----
  if (has('كام عميل', 'عدد العملاء', 'عملائي', 'كام مركز', 'العملاء', 'كام زبون')) {
    const total = customers.length;
    const active = customers.filter(c => invoices.some(inv=>inv.customerId===c.id)).length;
    const withDebt = customers.filter(c=>(c.balance||0)>0).length;
    return `👥 <b>العملاء:</b><br>• الإجمالي: <b>${total}</b><br>• نشطين (عليهم تعاملات): <b>${active}</b><br>• عليهم مديونية: <b>${withDebt}</b>`;
  }

  // ---- INVOICES (فواتير) ----
  if (has('فاتورة', 'فواتير', 'كام فاتورة') && !has('متوسط', 'معدل')) {
    const total = invoices.length;
    const unpaid = invoices.filter(i=>i.status==='unpaid'||i.status==='partial').length;
    const monthInv = invoices.filter(i=>(i.date||'')>=monthStart).length;
    return `🧾 <b>الفواتير:</b><br>• الإجمالي: <b>${total}</b><br>• هذا الشهر: <b>${monthInv}</b><br>• غير مدفوعة/جزئية: <b>${unpaid}</b>`;
  }

  // ---- AVERAGE INVOICE VALUE (متوسط الفاتورة) ----
  if (has('متوسط', 'معدل الفاتورة', 'متوسط الفاتورة', 'متوسط فاتورة')) {
    if (invoices.length === 0) return '📊 لسه مفيش فواتير لحساب المتوسط.';
    const avg = invoices.reduce((s,i)=>s+(i.total||0),0) / invoices.length;
    const max = invoices.reduce((m,i)=>Math.max(m,i.total||0),0);
    return `📊 <b>متوسط قيمة الفاتورة:</b> ${fmtm(avg)}<br>• أكبر فاتورة: ${fmtm(max)}<br>• عدد الفواتير: <b>${invoices.length}</b>`;
  }

  // ---- TOP BUYING CUSTOMER (أكتر عميل بيشتري) ----
  if (has('أكتر عميل بيشتري', 'اكتر عميل بيشتري', 'أفضل عميل', 'افضل عميل', 'أكتر عميل شاري', 'اكتر زبون')) {
    const byCust = {};
    invoices.forEach(inv => { byCust[inv.customerId] = (byCust[inv.customerId]||0) + (inv.total||0); });
    const arr = Object.entries(byCust).sort((a,b)=>b[1]-a[1]);
    if (arr.length === 0) return '🛒 لسه مفيش مشتريات مسجلة.';
    const top = arr.slice(0,5).map(([cid,amt],i)=>{
      const c = customers.find(x=>x.id===cid);
      return `${i+1}. <b>${escapeHtml(c?c.name:'غير معروف')}</b>: ${fmt(Math.round(amt))} ${curShort}`;
    }).join('<br>');
    return `🛒 <b>أكتر العملاء شراءً:</b><br>${top}`;
  }

  // ---- SMART ADVICE (نصيحة) ----
  if (has('نصيحة', 'نصيحتك', 'اقتراح', 'رأيك', 'تنصحني', 'اعمل ايه', 'أعمل إيه')) {
    const tips = [];
    const lowItems = products.filter(p => (p.quantity||0) <= (p.minQuantity||0));
    if (lowItems.length) tips.push(`📦 عندك <b>${lowItems.length}</b> صنف قرب يخلص (${lowItems.slice(0,3).map(p=>escapeHtml(p.name)).join('، ')})${lowItems.length>3?'...':''} — يفضل تطلبهم.`);
    const bigDebtors = customers.filter(c=>(c.balance||0)>0).sort((a,b)=>b.balance-a.balance);
    if (bigDebtors.length) tips.push(`💸 حصّل من <b>${escapeHtml(bigDebtors[0].name)}</b> (عليه ${fmt(Math.round(bigDebtors[0].balance))} ${curShort}) — أكبر مديونية.`);
    const overdue = (typeof getOverdueIssuances === 'function') ? getOverdueIssuances().length : 0;
    if (overdue) tips.push(`⏰ عندك <b>${overdue}</b> عملية متأخرة في التحصيل — راجعها.`);
    const unpaidInv = invoices.filter(i=>i.status!=='paid').length;
    if (unpaidInv) tips.push(`🧾 فيه <b>${unpaidInv}</b> فاتورة لسه مش مدفوعة بالكامل.`);
    if (!tips.length) return '✅ كل حاجة تمام! المخزون كويس، مفيش ديون متأخرة، والفواتير مدفوعة. شغل ممتاز! 👏';
    return `💡 <b>نصايح النهارده:</b><br><br>${tips.join('<br><br>')}`;
  }

  // ---- summary / general (ملخص) ----
  if (has('ملخص', 'الوضع', 'إزاي', 'ازاي', 'الشركة', 'تقرير', 'الموقف')) {
    const monthInvs = invoices.filter(i => (i.date||'') >= monthStart);
    const revenue = monthInvs.reduce((s,i)=>s+(i.total||0),0);
    const totalDebt = customers.reduce((s,c)=>s+(c.balance||0),0);
    const low = products.filter(p=>(p.quantity||0)<=(p.minQuantity||0)).length;
    return `📋 <b>ملخص سريع للشركة:</b><br>• مبيعات الشهر: ${fmtm(revenue)}<br>• إجمالي الديون: ${fmtm(totalDebt)}<br>• عدد العملاء: <b>${customers.length}</b><br>• أصناف قرب تخلص: <b>${low}</b><br>• فواتير غير مدفوعة: <b>${invoices.filter(i=>i.status!=='paid').length}</b>`;
  }

  // ---- fallback ----
  return `🤔 معرفتش أجاوب على ده بالظبط. جرّب تسألني عن:<br>• المبيعات أو الأرباح<br>• الديون أو المديونيات<br>• المخزون واللي قرب يخلص<br>• العملاء أو الموردين<br>• الفواتير<br>أو اضغط أحد الأزرار السريعة فوق.`;
}

/* ===== Company Logo Upload ===== */
function handleLogoUpload(input) {
  const file = input.files && input.files[0];
  if (!file) return;
  if (!file.type.startsWith('image/')) { toast('الملف لازم يكون صورة', 'error'); return; }
  if (file.size > 2 * 1024 * 1024) { toast('حجم الصورة كبير. الحد الأقصى 2 ميجا', 'error'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    const dataUrl = e.target.result;
    // Compress/normalize via canvas (skip for SVG which is already small)
    if (file.type === 'image/svg+xml') {
      DB.data.settings.companyLogo = dataUrl;
      DB.save();
      toast('تم حفظ الشعار ✓');
      renderSettings();
      return;
    }
    const img = new Image();
    img.onload = () => {
      // Resize so longest side <= 600px (more than enough for invoice print)
      const MAX = 600;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w >= h) { h = Math.round(h * MAX / w); w = MAX; }
        else { w = Math.round(w * MAX / h); h = MAX; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      // Use PNG to preserve transparency
      const optimizedDataUrl = canvas.toDataURL('image/png', 0.92);
      DB.data.settings.companyLogo = optimizedDataUrl;
      DB.save();
      toast('تم حفظ الشعار ✓');
      renderSettings();
    };
    img.onerror = () => {
      // Fallback: save as-is
      DB.data.settings.companyLogo = dataUrl;
      DB.save();
      toast('تم حفظ الشعار ✓');
      renderSettings();
    };
    img.src = dataUrl;
  };
  reader.onerror = () => toast('فشل قراءة الملف', 'error');
  reader.readAsDataURL(file);
}

function removeLogo() {
  confirmDialog('هل تريد حذف شعار الشركة؟', () => {
    delete DB.data.settings.companyLogo;
    DB.save();
    toast('تم حذف الشعار');
    renderSettings();
  });
}

/* =========================================================
   PROFESSIONAL BACKUP SYSTEM (متوافق مع SQLite migration)
   ─────────────────────────────────────────────────────────
   Format spec: Ozarex ERP Backup v2
   - schema_version: integer that defines the structure version.
     v1 = legacy raw dump (old format)
     v2 = current structured format with metadata + tables + schema
   - When SQLite/Node backend is built later, this same JSON
     can be read directly: each "table" array maps 1:1 to a
     SQLite table, with field names that match the planned
     SQLite columns. Counters become a sequence-state table.
========================================================= */
const BACKUP_SCHEMA_VERSION = 2;
const BACKUP_APP_NAME = 'Ozarex ERP';

/* Defines the canonical tables and their primary keys.
   The same definitions will guide the future SQL CREATE TABLE statements. */
const BACKUP_TABLES = [
  { key: 'users',            pk: 'id' },
  { key: 'customers',        pk: 'id' },
  { key: 'products',         pk: 'id' },
  { key: 'invoices',         pk: 'id' },
  { key: 'payments',         pk: 'id' },
  { key: 'expenses',         pk: 'id' },
  { key: 'stockMoves',       pk: 'id' },
  { key: 'issuances',        pk: 'id' },
  { key: 'bankTransfers',    pk: 'id' },
  { key: 'suppliers',        pk: 'id' },
  { key: 'supplierPayments', pk: 'id' }
];

/* Simple stable-string checksum (fnv-1a 32-bit, hex). Pure JS, no deps. */
function backupChecksum(str) {
  let h = 0x811c9dc5;
  for (let i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h = (h + ((h << 1) + (h << 4) + (h << 7) + (h << 8) + (h << 24))) >>> 0;
  }
  return h.toString(16).padStart(8, '0');
}

/* Build the backup envelope. */
function buildBackupEnvelope() {
  const tables = {};
  const counts = {};
  BACKUP_TABLES.forEach(t => {
    const rows = Array.isArray(DB.data[t.key]) ? DB.data[t.key] : [];
    tables[t.key] = rows;
    counts[t.key] = rows.length;
  });

  // Counters become a sequence-state table (matches SQLite sqlite_sequence pattern)
  const sequences = Object.entries(DB.data.counters || {}).map(([name, value]) => ({ name, value }));

  // Settings as a key-value table
  const settings = Object.entries(DB.data.settings || {}).map(([key, value]) => ({ key, value }));

  // Build the payload (excluding the checksum which we compute over the canonical form)
  const payload = {
    app: BACKUP_APP_NAME,
    schema_version: BACKUP_SCHEMA_VERSION,
    exported_at: new Date().toISOString(),
    exported_by: currentUser ? { id: currentUser.id, username: currentUser.username, name: currentUser.name } : null,
    summary: {
      total_records: Object.values(counts).reduce((s, n) => s + n, 0),
      counts
    },
    schema: BACKUP_TABLES.map(t => ({ table: t.key, primary_key: t.pk })),
    tables,
    sequences,
    settings
  };

  // Compute checksum over a canonical (sorted-keys) representation of just the data tables
  const canonical = JSON.stringify({ tables: payload.tables, sequences: payload.sequences, settings: payload.settings });
  payload.checksum = 'fnv1a32:' + backupChecksum(canonical);

  return payload;
}

/* Pretty filename: ozarex_backup_2026-05-23_14-32.json */
function backupFilename() {
  const d = new Date();
  const pad = n => String(n).padStart(2, '0');
  return `ozarex_backup_${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}_${pad(d.getHours())}-${pad(d.getMinutes())}.json`;
}

function exportBackup() {
  try {
    const envelope = buildBackupEnvelope();
    const data = JSON.stringify(envelope, null, 2);
    const blob = new Blob([data], { type: 'application/json;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = backupFilename();
    a.click();
    URL.revokeObjectURL(url);
    const sizeKB = (data.length / 1024).toFixed(1);
    // Track last backup date
    try { localStorage.setItem('ozarex_last_backup', new Date().toISOString()); } catch (e) {}
    refreshBackupReminder();
    toast(`تم تصدير النسخة الاحتياطية (${envelope.summary.total_records} سجل، ${sizeKB} KB)`);
  } catch (err) {
    console.error('Export failed:', err);
    toast('فشل تصدير النسخة الاحتياطية: ' + err.message, 'error');
  }
}

/* Backup reminder: show a small banner if last backup is older than 7 days */
function refreshBackupReminder() {
  const banner = document.getElementById('backup-reminder-banner');
  if (!banner) return;
  let last;
  try { last = localStorage.getItem('ozarex_last_backup'); } catch (e) {}
  if (!last) {
    // Never backed up - show banner
    banner.style.display = 'flex';
    banner.querySelector('.brb-msg').textContent = 'لم تأخذ نسخة احتياطية أبداً — احم بياناتك دلوقتي!';
    return;
  }
  const days = Math.floor((Date.now() - new Date(last).getTime()) / (1000 * 60 * 60 * 24));
  if (days >= 7) {
    banner.style.display = 'flex';
    banner.querySelector('.brb-msg').textContent = `آخر نسخة احتياطية كانت من ${days} يوم — وقت الباك أب الجديد!`;
  } else {
    banner.style.display = 'none';
  }
}

function dismissBackupReminder() {
  // Snooze for 24h
  try { localStorage.setItem('ozarex_backup_snooze', String(Date.now() + 24*60*60*1000)); } catch (e) {}
  const banner = document.getElementById('backup-reminder-banner');
  if (banner) banner.style.display = 'none';
}

function checkBackupSnooze() {
  let snooze;
  try { snooze = parseInt(localStorage.getItem('ozarex_backup_snooze') || '0'); } catch (e) { snooze = 0; }
  return snooze > Date.now();
}

/* ============== SQL DUMP (متوافق مع SQLite / MySQL) ============== */
/* Generates a portable SQL script that can be loaded into SQLite/MySQL
   to fully restore the data into native tables. */
function _sqlIdent(name) { return '"' + String(name).replace(/"/g, '""') + '"'; }
function _sqlValue(v) {
  if (v === null || v === undefined) return 'NULL';
  if (typeof v === 'number') {
    if (!Number.isFinite(v)) return 'NULL';
    return String(v);
  }
  if (typeof v === 'boolean') return v ? '1' : '0';
  if (typeof v === 'object') {
    // Store nested objects/arrays as JSON strings (SQLite TEXT, MySQL JSON-compatible)
    return _sqlValue(JSON.stringify(v));
  }
  return "'" + String(v).replace(/'/g, "''") + "'";
}

/* Infer column SQL type from a sample of values. */
function _inferSqlType(rows, col) {
  let allInt = true, allNum = true, anyNonNull = false;
  for (let i = 0; i < Math.min(rows.length, 100); i++) {
    const v = rows[i][col];
    if (v === null || v === undefined) continue;
    anyNonNull = true;
    if (typeof v === 'number') {
      if (!Number.isInteger(v)) allInt = false;
    } else {
      allInt = false;
      allNum = false;
    }
  }
  if (!anyNonNull) return 'TEXT';
  if (allInt) return 'INTEGER';
  if (allNum) return 'REAL';
  return 'TEXT';
}

function buildSqlDump() {
  const lines = [];
  const now = new Date().toISOString();
  lines.push('-- Ozarex ERP — SQL Dump');
  lines.push('-- Generated: ' + now);
  lines.push('-- Compatible with: SQLite 3.x, MySQL 5.7+ (with minor tweaks)');
  lines.push('-- Schema version: ' + BACKUP_SCHEMA_VERSION);
  lines.push('');
  lines.push('PRAGMA foreign_keys = OFF;');
  lines.push('BEGIN TRANSACTION;');
  lines.push('');

  BACKUP_TABLES.forEach(t => {
    const rows = Array.isArray(DB.data[t.key]) ? DB.data[t.key] : [];

    // Collect all columns across rows (union of keys)
    const colSet = new Set();
    rows.forEach(r => Object.keys(r || {}).forEach(k => colSet.add(k)));
    // Ensure primary key is first
    const cols = [t.pk, ...Array.from(colSet).filter(c => c !== t.pk)];
    if (!colSet.has(t.pk) && rows.length > 0) cols.shift(); // pk not actually present

    lines.push(`-- ────────── Table: ${t.key} (${rows.length} rows) ──────────`);
    lines.push(`DROP TABLE IF EXISTS ${_sqlIdent(t.key)};`);

    if (cols.length === 0) {
      // Create empty placeholder with just the primary key
      lines.push(`CREATE TABLE ${_sqlIdent(t.key)} (${_sqlIdent(t.pk)} TEXT PRIMARY KEY);`);
      lines.push('');
      return;
    }

    const colDefs = cols.map(c => {
      const type = _inferSqlType(rows, c);
      const pkSuffix = c === t.pk ? ' PRIMARY KEY' : '';
      return `  ${_sqlIdent(c)} ${type}${pkSuffix}`;
    });
    lines.push(`CREATE TABLE ${_sqlIdent(t.key)} (`);
    lines.push(colDefs.join(',\n'));
    lines.push(');');

    if (rows.length > 0) {
      const colsList = cols.map(_sqlIdent).join(', ');
      rows.forEach(r => {
        const vals = cols.map(c => _sqlValue(r ? r[c] : null)).join(', ');
        lines.push(`INSERT INTO ${_sqlIdent(t.key)} (${colsList}) VALUES (${vals});`);
      });
    }
    lines.push('');
  });

  // Counters as a sequence table
  lines.push('-- ────────── Sequences (counters) ──────────');
  lines.push('DROP TABLE IF EXISTS "_sequences";');
  lines.push('CREATE TABLE "_sequences" ("name" TEXT PRIMARY KEY, "value" INTEGER);');
  Object.entries(DB.data.counters || {}).forEach(([name, value]) => {
    lines.push(`INSERT INTO "_sequences" ("name", "value") VALUES (${_sqlValue(name)}, ${_sqlValue(value)});`);
  });
  lines.push('');

  // Settings as key-value
  lines.push('-- ────────── Settings ──────────');
  lines.push('DROP TABLE IF EXISTS "_settings";');
  lines.push('CREATE TABLE "_settings" ("key" TEXT PRIMARY KEY, "value" TEXT);');
  Object.entries(DB.data.settings || {}).forEach(([k, v]) => {
    const sv = (typeof v === 'object') ? JSON.stringify(v) : v;
    lines.push(`INSERT INTO "_settings" ("key", "value") VALUES (${_sqlValue(k)}, ${_sqlValue(sv)});`);
  });
  lines.push('');

  lines.push('COMMIT;');
  lines.push('PRAGMA foreign_keys = ON;');
  lines.push('');
  return lines.join('\n');
}

function exportBackupSQL() {
  try {
    const sql = buildSqlDump();
    const blob = new Blob([sql], { type: 'application/sql;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = backupFilename().replace('.json', '.sql');
    a.click();
    URL.revokeObjectURL(url);
    const sizeKB = (sql.length / 1024).toFixed(1);
    toast(`تم تصدير SQL dump (${sizeKB} KB) — جاهز لـ SQLite/MySQL`);
  } catch (err) {
    console.error('SQL export failed:', err);
    toast('فشل تصدير SQL: ' + err.message, 'error');
  }
}

/* ============== EXCEL (CSV multi-table in one file) ============== */
/* Produces a single CSV with section dividers, openable directly in Excel.
   Uses UTF-8 BOM so Excel renders Arabic correctly. */
function _csvEscape(v) {
  if (v === null || v === undefined) return '';
  if (typeof v === 'object') v = JSON.stringify(v);
  const s = String(v);
  if (/[",\n\r]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
  return s;
}

function buildExcelCsv() {
  const lines = [];
  const labelMap = {
    users: 'المستخدمين', customers: 'العملاء', products: 'المنتجات', invoices: 'الفواتير',
    payments: 'التحصيلات', expenses: 'المصروفات', stockMoves: 'حركات المخزن', issuances: 'صرف الورق',
    bankTransfers: 'التحويلات البنكية', suppliers: 'الموردين', supplierPayments: 'دفعات الموردين'
  };

  lines.push(_csvEscape('Ozarex ERP — نسخة Excel'));
  lines.push(_csvEscape('تاريخ التصدير: ' + new Date().toLocaleString('ar-EG')));
  lines.push('');

  BACKUP_TABLES.forEach(t => {
    const rows = Array.isArray(DB.data[t.key]) ? DB.data[t.key] : [];
    lines.push(_csvEscape('═══ ' + (labelMap[t.key] || t.key) + ' (' + rows.length + ') ═══'));
    if (rows.length === 0) {
      lines.push(_csvEscape('(فارغ)'));
      lines.push('');
      return;
    }
    const colSet = new Set();
    rows.forEach(r => Object.keys(r || {}).forEach(k => colSet.add(k)));
    const cols = Array.from(colSet);
    lines.push(cols.map(_csvEscape).join(','));
    rows.forEach(r => {
      lines.push(cols.map(c => _csvEscape(r ? r[c] : '')).join(','));
    });
    lines.push('');
  });

  return lines.join('\r\n');
}

function exportBackupExcel() {
  try {
    const csv = buildExcelCsv();
    // BOM so Excel recognizes UTF-8 (Arabic)
    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = backupFilename().replace('.json', '.csv');
    a.click();
    URL.revokeObjectURL(url);
    const sizeKB = (csv.length / 1024).toFixed(1);
    toast(`تم تصدير ملف Excel (${sizeKB} KB) — يفتح مباشرة في Excel`);
  } catch (err) {
    console.error('Excel export failed:', err);
    toast('فشل تصدير Excel: ' + err.message, 'error');
  }
}

/* ============== ZIP (Pure JS, STORED entries, no compression) ==============
   Pure-JS ZIP writer — no external libraries. Builds a valid ZIP file
   with multiple JSON files (one per table) + a manifest + the SQL dump.
   We use the STORED method (0 = no compression) which keeps the writer
   tiny and dependency-free; the file is fully ZIP-spec compliant and
   opens in any unzip tool. */

/* CRC-32 (IEEE 802.3) — precomputed table for speed */
function _crc32(bytes) {
  if (!_crc32.table) {
    const t = new Uint32Array(256);
    for (let n = 0; n < 256; n++) {
      let c = n;
      for (let k = 0; k < 8; k++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
      t[n] = c;
    }
    _crc32.table = t;
  }
  let crc = 0xFFFFFFFF;
  for (let i = 0; i < bytes.length; i++) {
    crc = (crc >>> 8) ^ _crc32.table[(crc ^ bytes[i]) & 0xFF];
  }
  return (crc ^ 0xFFFFFFFF) >>> 0;
}

/* Convert a JS Date to DOS time/date components (used by ZIP local headers). */
function _dosDateTime(d) {
  const date = ((d.getFullYear() - 1980) << 9) | ((d.getMonth() + 1) << 5) | d.getDate();
  const time = (d.getHours() << 11) | (d.getMinutes() << 5) | (d.getSeconds() >> 1);
  return { date, time };
}

/* Write a 16-bit or 32-bit little-endian value into a Uint8Array at offset. */
function _u16(arr, off, v) { arr[off] = v & 0xFF; arr[off+1] = (v >>> 8) & 0xFF; }
function _u32(arr, off, v) { arr[off] = v & 0xFF; arr[off+1] = (v >>> 8) & 0xFF; arr[off+2] = (v >>> 16) & 0xFF; arr[off+3] = (v >>> 24) & 0xFF; }

/* Build a ZIP file from a list of { name: string, data: Uint8Array } entries. */
function buildZip(entries) {
  const enc = new TextEncoder();
  const now = new Date();
  const { date: dosDate, time: dosTime } = _dosDateTime(now);

  const localParts = [];
  const centralParts = [];
  let offset = 0;

  entries.forEach(entry => {
    const nameBytes = enc.encode(entry.name);
    const data = entry.data;
    const crc = _crc32(data);
    const size = data.length;

    // Local file header (30 bytes + name + data)
    const localHeader = new Uint8Array(30 + nameBytes.length);
    _u32(localHeader, 0, 0x04034b50);   // signature
    _u16(localHeader, 4, 20);           // version needed
    _u16(localHeader, 6, 0x0800);       // flags (bit 11 = UTF-8 filename)
    _u16(localHeader, 8, 0);            // compression: STORED
    _u16(localHeader, 10, dosTime);
    _u16(localHeader, 12, dosDate);
    _u32(localHeader, 14, crc);
    _u32(localHeader, 18, size);        // compressed size
    _u32(localHeader, 22, size);        // uncompressed size
    _u16(localHeader, 26, nameBytes.length);
    _u16(localHeader, 28, 0);           // extra field length
    localHeader.set(nameBytes, 30);
    localParts.push(localHeader, data);

    // Central directory entry (46 bytes + name)
    const central = new Uint8Array(46 + nameBytes.length);
    _u32(central, 0, 0x02014b50);       // signature
    _u16(central, 4, 0x031E);           // version made by (UNIX, ZIP 3.0)
    _u16(central, 6, 20);               // version needed
    _u16(central, 8, 0x0800);           // flags (UTF-8)
    _u16(central, 10, 0);               // compression
    _u16(central, 12, dosTime);
    _u16(central, 14, dosDate);
    _u32(central, 16, crc);
    _u32(central, 20, size);
    _u32(central, 24, size);
    _u16(central, 28, nameBytes.length);
    _u16(central, 30, 0);               // extra
    _u16(central, 32, 0);               // comment
    _u16(central, 34, 0);               // disk #
    _u16(central, 36, 0);               // internal attrs
    _u32(central, 38, 0);               // external attrs
    _u32(central, 42, offset);          // local header offset
    central.set(nameBytes, 46);
    centralParts.push(central);

    offset += localHeader.length + data.length;
  });

  // End of central directory
  const cdSize = centralParts.reduce((s, p) => s + p.length, 0);
  const cdOffset = offset;
  const eocd = new Uint8Array(22);
  _u32(eocd, 0, 0x06054b50);
  _u16(eocd, 4, 0);                   // disk #
  _u16(eocd, 6, 0);                   // disk where CD starts
  _u16(eocd, 8, entries.length);      // entries on this disk
  _u16(eocd, 10, entries.length);     // total entries
  _u32(eocd, 12, cdSize);
  _u32(eocd, 16, cdOffset);
  _u16(eocd, 20, 0);                  // comment length

  // Concatenate
  const totalSize = offset + cdSize + 22;
  const result = new Uint8Array(totalSize);
  let pos = 0;
  localParts.forEach(p => { result.set(p, pos); pos += p.length; });
  centralParts.forEach(p => { result.set(p, pos); pos += p.length; });
  result.set(eocd, pos);
  return result;
}

function exportBackupZIP() {
  try {
    const enc = new TextEncoder();
    const envelope = buildBackupEnvelope();
    const entries = [];

    // Manifest with metadata
    const manifest = {
      app: BACKUP_APP_NAME,
      schema_version: BACKUP_SCHEMA_VERSION,
      exported_at: envelope.exported_at,
      exported_by: envelope.exported_by,
      summary: envelope.summary,
      files: BACKUP_TABLES.map(t => `tables/${t.key}.json`).concat(['_sequences.json', '_settings.json', 'schema.json', 'database.sql', 'README.txt'])
    };
    entries.push({ name: 'manifest.json', data: enc.encode(JSON.stringify(manifest, null, 2)) });

    // Each table as its own JSON file (clean for diff/audit)
    BACKUP_TABLES.forEach(t => {
      const rows = Array.isArray(DB.data[t.key]) ? DB.data[t.key] : [];
      entries.push({
        name: `tables/${t.key}.json`,
        data: enc.encode(JSON.stringify(rows, null, 2))
      });
    });

    // Sequences and settings
    entries.push({ name: '_sequences.json', data: enc.encode(JSON.stringify(envelope.sequences, null, 2)) });
    entries.push({ name: '_settings.json',  data: enc.encode(JSON.stringify(envelope.settings, null, 2)) });
    entries.push({ name: 'schema.json',     data: enc.encode(JSON.stringify(envelope.schema, null, 2)) });

    // The SQL dump as a bonus (so the ZIP is self-contained)
    entries.push({ name: 'database.sql', data: enc.encode(buildSqlDump()) });

    // README
    const readme = [
      'Ozarex ERP — Backup Archive',
      '═══════════════════════════',
      '',
      'Exported: ' + envelope.exported_at,
      'Schema version: ' + envelope.schema_version,
      'Total records: ' + envelope.summary.total_records,
      '',
      'Contents:',
      '  manifest.json    — archive metadata + file list',
      '  schema.json      — table & primary-key definitions',
      '  tables/*.json    — one JSON file per database table',
      '  _sequences.json  — counter values (invoice/issuance/purchase)',
      '  _settings.json   — app settings as key-value pairs',
      '  database.sql     — complete SQLite-compatible SQL dump',
      '',
      'Restoration:',
      '  • Inside the app: settings → restore from JSON',
      '  • Outside the app: sqlite3 mydb.db < database.sql'
    ].join('\n');
    entries.push({ name: 'README.txt', data: enc.encode(readme) });

    const zipBytes = buildZip(entries);
    const blob = new Blob([zipBytes], { type: 'application/zip' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = backupFilename().replace('.json', '.zip');
    a.click();
    URL.revokeObjectURL(url);
    const sizeKB = (zipBytes.length / 1024).toFixed(1);
    toast(`تم تصدير الأرشيف المضغوط (${entries.length} ملف، ${sizeKB} KB)`);
  } catch (err) {
    console.error('ZIP export failed:', err);
    toast('فشل تصدير ZIP: ' + err.message, 'error');
  }
}

/* Validate and normalize an imported envelope. Supports both v2 (new) and v1 (legacy raw). */
function normalizeBackupEnvelope(raw) {
  // Legacy v1: bare DB.data dump with no envelope
  if (raw && typeof raw === 'object' && !raw.schema_version && (raw.users || raw.customers || raw.products)) {
    return {
      kind: 'legacy',
      schema_version: 1,
      data: raw,
      summary: {
        total_records: BACKUP_TABLES.reduce((s, t) => s + ((raw[t.key] || []).length), 0),
        counts: Object.fromEntries(BACKUP_TABLES.map(t => [t.key, (raw[t.key] || []).length]))
      }
    };
  }
  // v2 envelope
  if (raw && raw.schema_version >= 2 && raw.tables) {
    // Verify checksum if present (non-fatal)
    let checksumOk = true;
    if (raw.checksum && typeof raw.checksum === 'string') {
      const canonical = JSON.stringify({ tables: raw.tables, sequences: raw.sequences || [], settings: raw.settings || [] });
      const expected = 'fnv1a32:' + backupChecksum(canonical);
      checksumOk = (raw.checksum === expected);
    }
    // Reconstruct DB.data shape
    const data = {};
    BACKUP_TABLES.forEach(t => { data[t.key] = Array.isArray(raw.tables[t.key]) ? raw.tables[t.key] : []; });
    data.counters = {};
    (raw.sequences || []).forEach(s => { if (s && s.name) data.counters[s.name] = s.value; });
    data.settings = {};
    (raw.settings || []).forEach(s => { if (s && s.key) data.settings[s.key] = s.value; });
    return {
      kind: 'v2',
      schema_version: raw.schema_version,
      data,
      summary: raw.summary || { total_records: 0, counts: {} },
      checksumOk,
      exported_at: raw.exported_at,
      exported_by: raw.exported_by
    };
  }
  throw new Error('صيغة الملف غير معروفة أو تالفة');
}

function importBackup(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const raw = JSON.parse(e.target.result);
      const env = normalizeBackupEnvelope(raw);

      // Build user-friendly summary
      const counts = env.summary.counts || {};
      const total = env.summary.total_records || 0;
      const checksumNote = env.kind === 'v2'
        ? (env.checksumOk ? '<span style="color:var(--success)">✓ التحقق من سلامة الملف ناجح</span>'
                          : '<span style="color:var(--warning)">⚠ تحذير: التحقق من سلامة الملف فشل (قد يكون الملف تم تعديله)</span>')
        : '<span style="color:var(--info)">ملف بصيغة قديمة (legacy v1) — سيتم تحويله تلقائياً</span>';

      const exportedAt = env.exported_at ? new Date(env.exported_at).toLocaleString('ar-EG') : 'غير معروف';
      const exportedBy = env.exported_by ? escapeHtml(env.exported_by.name || env.exported_by.username) : 'غير معروف';

      const labelMap = {
        users: 'مستخدمين', customers: 'عملاء', products: 'منتجات', invoices: 'فواتير',
        payments: 'تحصيلات', expenses: 'مصروفات', stockMoves: 'حركات مخزن', issuances: 'صرف ورق',
        bankTransfers: 'تحويلات بنكية', suppliers: 'موردين', supplierPayments: 'دفعات للموردين'
      };
      const rowsHtml = BACKUP_TABLES.map(t => `
        <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:12.5px">
          <span style="color:var(--text-muted)">${labelMap[t.key] || t.key}</span>
          <span style="font-weight:700;color:var(--text)">${counts[t.key] || 0}</span>
        </div>
      `).join('');

      openModal('استعادة نسخة احتياطية', `
        <div style="font-size:13px;line-height:1.7">
          <div style="background:var(--surface-2);border-radius:10px;padding:14px;margin-bottom:14px">
            <div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="color:var(--text-muted)">إصدار الصيغة</span><span style="font-weight:700">v${env.schema_version}</span></div>
            <div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="color:var(--text-muted)">تاريخ التصدير</span><span style="font-weight:700">${exportedAt}</span></div>
            <div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="color:var(--text-muted)">صدّرت بواسطة</span><span style="font-weight:700">${exportedBy}</span></div>
            <div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="color:var(--text-muted)">إجمالي السجلات</span><span style="font-weight:800;color:var(--primary)">${total}</span></div>
            <div style="margin-top:10px;font-size:12px">${checksumNote}</div>
          </div>
          <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 14px;margin-bottom:14px">
            <div style="font-size:12px;font-weight:700;color:var(--text-muted);margin:6px 0">تفصيل الجداول</div>
            ${rowsHtml}
          </div>
          <div style="background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.3);border-radius:10px;padding:12px;color:#b91c1c;font-size:12.5px">
            <strong>⚠ تنبيه:</strong> سيتم استبدال جميع البيانات الحالية بهذه النسخة. هذا الإجراء لا يمكن التراجع عنه (إلا بنسخة احتياطية أخرى).
          </div>
        </div>
      `, `
        <button class="btn btn-danger" id="backup-restore-confirm">نعم، استعادة الآن</button>
        <button class="btn btn-secondary" onclick="closeModal()">إلغاء</button>
      `);

      document.getElementById('backup-restore-confirm').onclick = () => {
        // Take an automatic safety snapshot before restoring
        try { DB.saveBackup(); } catch (_) {}
        // Ensure required fields exist in case the backup misses some new fields
        const merged = { ...DB.data, ...env.data };
        // Always ensure counters and settings are objects
        merged.counters = { ...(DB.data.counters || {}), ...(env.data.counters || {}) };
        merged.settings = { ...(DB.data.settings || {}), ...(env.data.settings || {}) };
        DB.data = merged;
        DB.save();
        closeModal();
        toast(`تم استعادة ${total} سجل بنجاح`);
        setTimeout(() => location.reload(), 1200);
      };
    } catch (err) {
      console.error('Import failed:', err);
      toast('فشل قراءة الملف: ' + err.message, 'error');
    }
  };
  reader.onerror = () => toast('فشلت قراءة الملف', 'error');
  reader.readAsText(file);
  event.target.value = '';
}

function resetAllData() {
  confirmDialog('سيتم حذف جميع بياناتك واستبدالها بالبيانات التجريبية. هذا الإجراء لا يمكن التراجع عنه. هل أنت متأكد؟', async () => {
    sessionStorage.removeItem(SESSION_KEY);
    toast('جاري إعادة التهيئة...');
    try { await DB.reset(); } catch (e) { console.error(e); }
    setTimeout(() => location.reload(), 600);
  });
}

/* =========================================================
   CSV EXPORT (Excel-compatible with Arabic support)
========================================================= */
function exportCSV(type) {
  let rows = [];
  let filename = '';

  if (type === 'customers') {
    filename = 'customers';
    rows.push(['الاسم','الشركة','الهاتف','العنوان','الحد الائتماني','الرصيد','الحالة']);
    DB.data.customers.forEach(c => {
      rows.push([c.name, c.company||'', c.phone||'', c.address||'', c.creditLimit||0, c.balance||0, c.balance>0?'عليه مديونية':'منتظم']);
    });
  }
  else if (type === 'invoices') {
    filename = 'invoices';
    rows.push(['رقم الفاتورة','التاريخ','العميل','الإجمالي','الضريبة','الخصم','المدفوع','المتبقي','الحالة','طريقة الدفع']);
    DB.data.invoices.forEach(i => {
      const statusLbl = { paid:'مدفوعة', partial:'مدفوعة جزئياً', unpaid:'غير مدفوعة' }[i.status] || i.status;
      const methodLbl = { cash:'كاش', credit:'آجل', transfer:'تحويل' }[i.paymentMethod] || i.paymentMethod;
      rows.push([i.number, i.date, i.customerName, i.total, i.tax||0, i.discount||0, i.paid||0, i.total-(i.paid||0), statusLbl, methodLbl]);
    });
  }
  else if (type === 'payments') {
    filename = 'payments';
    rows.push(['رقم الإيصال','التاريخ','العميل','المبلغ','طريقة الدفع','رقم الفاتورة','الملاحظات']);
    DB.data.payments.forEach(p => {
      const methodLbl = { cash:'كاش', transfer:'تحويل', check:'شيك' }[p.method] || p.method;
      const inv = p.invoiceId ? DB.data.invoices.find(i=>i.id===p.invoiceId) : null;
      rows.push([p.number||'', p.date, p.customerName||'', p.amount, methodLbl, inv?inv.number:'', p.notes||'']);
    });
  }
  else if (type === 'products') {
    filename = 'products';
    rows.push(['الكود','المنتج','الوحدة','الكمية','الحد الأدنى','سعر التكلفة','سعر البيع','قيمة المخزون']);
    DB.data.products.forEach(p => {
      rows.push([p.code||'', p.name, p.unit||'', p.quantity, p.minQuantity, p.cost||0, p.price||0, p.quantity*(p.cost||0)]);
    });
  }
  else if (type === 'expenses') {
    filename = 'expenses';
    rows.push(['التاريخ','التصنيف','الوصف','المبلغ']);
    DB.data.expenses.filter(e => e.kind !== 'purchase').forEach(e => {
      rows.push([e.date, e.category, e.description||'', e.amount]);
    });
  }
  else if (type === 'issuances') {
    filename = 'issuances';
    rows.push(['رقم','التاريخ','المركز','نوع الورق','الوحدة','الكمية','سعر الوحدة','الإجمالي','المدفوع','المتبقي','طريقة الدفع','الحالة','ملاحظات']);
    (DB.data.issuances||[]).forEach(i => {
      const statusLbl = { paid:'مدفوعة', partial:'جزئي', unpaid:'آجل' }[i.status] || i.status;
      const methodLbl = { credit:'آجل', cash:'كاش', transfer:'تحويل', check:'شيك' }[i.paymentMethod] || i.paymentMethod;
      rows.push([i.number, i.date, i.customerName, i.productName, i.productUnit||'', i.quantity, i.unitPrice, i.total, i.paid||0, i.total-(i.paid||0), methodLbl, statusLbl, i.notes||'']);
    });
  }

  // Build CSV with UTF-8 BOM for proper Arabic display in Excel
  const csv = rows.map(r => r.map(cell => {
    const s = String(cell == null ? '' : cell);
    if (s.includes(',') || s.includes('"') || s.includes('\n')) {
      return '"' + s.replace(/"/g, '""') + '"';
    }
    return s;
  }).join(',')).join('\r\n');

  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${filename}_${todayStr()}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  toast('تم تصدير الملف بنجاح');
}

/* =========================================================

let issuanceFilters = { search: '', from: '', to: '', customerId: '', productId: '' };

function renderIssuances() {
  const root = document.getElementById('page-content');
  const issuances = (DB.data.issuances||[]).slice().sort((a,b)=>b.createdAt-a.createdAt);

  // Apply filters
  let list = issuances;
  if (issuanceFilters.search) {
    const q = issuanceFilters.search.toLowerCase();
    list = list.filter(i => (i.customerName||'').toLowerCase().includes(q) || (i.productName||'').toLowerCase().includes(q) || String(i.number).includes(q));
  }
  if (issuanceFilters.from) list = list.filter(i => i.date >= issuanceFilters.from);
  if (issuanceFilters.to) list = list.filter(i => i.date <= issuanceFilters.to);
  if (issuanceFilters.customerId) list = list.filter(i => i.customerId === issuanceFilters.customerId);
  if (issuanceFilters.productId) list = list.filter(i => i.productId === issuanceFilters.productId);

  const monthStart = today.slice(0,8) + '01';

/* ============== VOICE INPUT (Web Speech API) ============== */
/* Picks the best-matching customer from the select by Arabic voice. */
function _normalizeArabic(s) {
  return String(s || '')
    .toLowerCase()
    .trim()
    // strip Arabic diacritics
    .replace(/[\u064B-\u0652\u0670\u0640]/g, '')
    // unify alef variants
    .replace(/[إأآا]/g, 'ا')
    // unify yaa
    .replace(/[ىي]/g, 'ي')
    // unify taa marbouta
    .replace(/ة/g, 'ه')
    // collapse spaces
    .replace(/\s+/g, ' ');
}

function _scoreMatch(query, candidate) {
  const q = _normalizeArabic(query);
  const c = _normalizeArabic(candidate);
  if (!q || !c) return 0;
  if (c === q) return 1000;
  if (c.includes(q) || q.includes(c)) return 500 - Math.abs(c.length - q.length);
  // token-overlap score
  const qt = q.split(' ').filter(Boolean);
  const ct = c.split(' ').filter(Boolean);
  let hits = 0;
  qt.forEach(t => { if (ct.some(x => x.includes(t) || t.includes(x))) hits++; });
  return hits * 50;
}

/* Generic voice input for text fields. Sets the value of inputId,
   updates hintId with status, and respects Arabic locale. */
function startVoiceInput(inputId, hintId) {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  const input = document.getElementById(inputId);
  const hint = hintId ? document.getElementById(hintId) : null;
  const wrap = input?.closest('.voice-input-wrap');
  const btn = wrap?.querySelector('.voice-mic-btn');

  if (!SpeechRecognition) {
    toast('متصفحك لا يدعم التعرف على الصوت. جرب Chrome أو Edge', 'error');
    return;
  }
  if (!input) return;

  if (btn && btn.classList.contains('listening')) {
    if (window.__voiceRecognition) { try { window.__voiceRecognition.stop(); } catch (_) {} }
    return;
  }
  if (window.__voiceRecognition) { try { window.__voiceRecognition.stop(); } catch (_) {} }

  const recognition = new SpeechRecognition();
  recognition.lang = 'ar-EG';
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.maxAlternatives = 1;
  window.__voiceRecognition = recognition;

  if (btn) btn.classList.add('listening');
  if (hint) { hint.style.color = 'var(--primary)'; hint.innerHTML = '🎙 جاري الاستماع...'; }

  let finalTranscript = '';

  recognition.onresult = (event) => {
    let interim = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const result = event.results[i];
      if (result.isFinal) finalTranscript += result[0].transcript;
      else interim += result[0].transcript;
    }
    if (interim || finalTranscript) {
      input.value = (finalTranscript + interim).trim();
      if (hint) hint.innerHTML = '🎙 ' + (finalTranscript || interim);
    }
  };

  recognition.onerror = (event) => {
    if (btn) btn.classList.remove('listening');
    if (hint) {
      hint.style.color = 'var(--danger)';
      const msg = event.error === 'not-allowed' ? 'صلاحية الميكروفون مرفوضة'
        : event.error === 'no-speech' ? 'لم أسمع شيء، حاول مرة أخرى'
        : 'حدث خطأ في التعرف على الصوت';
      hint.innerHTML = '✗ ' + msg;
    }
  };

  recognition.onend = () => {
    if (btn) btn.classList.remove('listening');
    if (finalTranscript.trim()) {
      input.value = finalTranscript.trim();
      input.dispatchEvent(new Event('input', { bubbles: true }));
      input.dispatchEvent(new Event('change', { bubbles: true }));
      if (hint) { hint.style.color = 'var(--success)'; hint.innerHTML = `✓ تم: "${finalTranscript.trim()}"`; }
      try { playTone('save'); } catch (_) {}
    }
  };

  try { recognition.start(); }
  catch (err) {
    if (btn) btn.classList.remove('listening');
    if (hint) { hint.style.color = 'var(--danger)'; hint.innerHTML = '✗ تعذر بدء التسجيل: ' + err.message; }
  }
}

function startVoiceCustomerSelect() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  const btn = document.getElementById('iss-customer-mic');
  const hint = document.getElementById('iss-voice-hint');
  const select = document.getElementById('iss-form-customer');

  if (!SpeechRecognition) {
    toast('متصفحك لا يدعم التعرف على الصوت. جرب Chrome أو Edge', 'error');
    return;
  }
  if (!select) return;

  // If already listening, stop
  if (btn && btn.classList.contains('listening')) {
    if (window.__voiceRecognition) {
      try { window.__voiceRecognition.stop(); } catch (_) {}
    }
    return;
  }

  const recognition = new SpeechRecognition();
  recognition.lang = 'ar-EG';
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.maxAlternatives = 3;
  window.__voiceRecognition = recognition;

  if (btn) btn.classList.add('listening');
  if (hint) {
    hint.style.color = 'var(--primary)';
    hint.innerHTML = '🎙 جاري الاستماع... قل اسم العميل';
  }

  let finalTranscript = '';
  let alternatives = [];

  recognition.onresult = (event) => {
    let interim = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const result = event.results[i];
      if (result.isFinal) {
        finalTranscript += result[0].transcript;
        // Capture alternatives for the final result
        for (let j = 0; j < result.length; j++) {
          alternatives.push(result[j].transcript);
        }
      } else {
        interim += result[0].transcript;
      }
    }
    if (hint && (interim || finalTranscript)) {
      hint.style.color = 'var(--primary)';
      hint.innerHTML = '🎙 ' + (finalTranscript || interim);
    }
  };

  recognition.onerror = (event) => {
    if (btn) btn.classList.remove('listening');
    if (hint) {
      hint.style.color = 'var(--danger)';
      const msg = event.error === 'not-allowed'
        ? 'صلاحية الميكروفون مرفوضة. فعّلها من إعدادات المتصفح'
        : event.error === 'no-speech'
        ? 'لم أسمع شيء، حاول مرة أخرى'
        : 'حدث خطأ في التعرف على الصوت';
      hint.innerHTML = '✗ ' + msg;
    }
  };

  recognition.onend = () => {
    if (btn) btn.classList.remove('listening');
    if (!finalTranscript.trim()) {
      // already handled by onerror likely
      return;
    }
    // Try each alternative, pick best match against options
    const options = Array.from(select.options).filter(o => o.value);
    let bestOpt = null, bestScore = 0, bestQuery = '';
    [finalTranscript, ...alternatives].forEach(q => {
      options.forEach(opt => {
        // Strip company suffix to focus on customer name
        const name = opt.text.split(' - ')[0];
        const score = _scoreMatch(q, name);
        if (score > bestScore) { bestScore = score; bestOpt = opt; bestQuery = q; }
      });
    });

    if (bestOpt && bestScore >= 50) {
      select.value = bestOpt.value;
      if (typeof onIssuanceCustomerChange === 'function') onIssuanceCustomerChange();
      if (hint) {
        hint.style.color = 'var(--success)';
        hint.innerHTML = `✓ تم اختيار "${bestOpt.text}"`;
      }
      try { playTone('save'); } catch (_) {}
    } else {
      if (hint) {
        hint.style.color = 'var(--danger)';
        hint.innerHTML = `✗ لم أجد عميل مطابق لـ "${finalTranscript.trim()}"`;
      }
    }
  };

  try {
    recognition.start();
  } catch (err) {
    if (btn) btn.classList.remove('listening');
    if (hint) {
      hint.style.color = 'var(--danger)';
      hint.innerHTML = '✗ تعذر بدء التسجيل: ' + err.message;
    }
  }
}

function toggleDueDateInput() {
  const cb = document.getElementById('iss-set-duedate');
  const section = document.getElementById('iss-duedate-input');
  if (cb && section) {
    section.style.display = cb.checked ? 'block' : 'none';
    if (cb.checked && !document.getElementById('iss-duedate').value) {
      // default to 30 days from now
      quickDueDate('30');
    }
  }
}

function quickDueDate(days) {
  if (!days) return;
  const d = new Date();
  d.setDate(d.getDate() + parseInt(days));
  const el = document.getElementById('iss-duedate');
  if (el) el.value = d.toISOString().slice(0,10);
}

  // When method is credit (آجل), auto-suggest enabling due date
  const method = document.getElementById('iss-pmethod').value;
  const cb = document.getElementById('iss-set-duedate');
  if (method === 'credit' && cb && !cb.checked) {
    cb.checked = true;
    toggleDueDateInput();
  }
}

function onIssuanceProductChange() {
  const sel = document.getElementById('iss-form-product');
  const opt = sel.selectedOptions[0];
  if (!opt || !opt.value) {
    document.getElementById('iss-stock-info').innerText = '';
    return;
  }
  const productId = opt.value;
  const defaultPrice = parseFloat(opt.dataset.price) || 0;
  const qty = parseFloat(opt.dataset.qty) || 0;
  const unit = opt.dataset.unit || '';
  const priceInput = document.getElementById('iss-price');

  // Check for customer-specific price
  const custSel = document.getElementById('iss-form-customer');
  const customerId = custSel ? custSel.value : '';
  const customer = customerId ? DB.data.customers.find(c => c.id === customerId) : null;
  const customPrice = (customer && customer.customPrices && customer.customPrices[productId]) || null;

  const finalPrice = customPrice != null ? customPrice : defaultPrice;
  priceInput.value = finalPrice;

  let info = `📦 المتاح في المخزن: <b style="color:${qty>0?'var(--success)':'var(--danger)'}">${fmt(qty)} ${escapeHtml(unit)}</b>`;
  if (customPrice != null && customPrice !== defaultPrice) {
    info += ` | <b style="color:var(--info)">💎 السعر الخاص بـ ${escapeHtml(customer.name)}: ${fmtCurrency(customPrice)}</b> (الافتراضي: ${fmtCurrency(defaultPrice)})`;
  } else {
    info += ` | السعر: <b>${fmtCurrency(defaultPrice)}</b>`;
  }
  document.getElementById('iss-stock-info').innerHTML = info;
  calcIssuanceTotal();
}

function onIssuanceCustomerChange() {
  // Re-run product change to apply customer-specific price
  const prodSel = document.getElementById('iss-form-product');
  if (prodSel && prodSel.value) onIssuanceProductChange();
}

function calcIssuanceTotal() {
  const qty = parseFloat(document.getElementById('iss-qty').value) || 0;
  const price = parseFloat(document.getElementById('iss-price').value) || 0;
  const productId = document.getElementById('iss-form-product').value;
  const total = qty * price;
  document.getElementById('iss-total-display').innerText = fmtCurrency(total);

  // Live profit calculation
  const panel = document.getElementById('iss-profit-panel');
  if (!panel) return;
  const product = DB.data.products.find(p => p.id === productId);

  if (!product || qty <= 0 || price <= 0) {
    panel.style.display = 'none';
    return;
  }
  panel.style.display = 'block';

  const costPerUnit = product.cost || 0;
  const totalCost = qty * costPerUnit;
  const revenue = total;
  const profit = revenue - totalCost;
  const margin = revenue > 0 ? (profit / revenue) * 100 : 0;

  document.getElementById('iss-cost-display').textContent = costPerUnit > 0
    ? `${fmt(costPerUnit)} × ${fmt(qty)} = ${fmtCurrency(totalCost)}`
    : '⚠ تكلفة المنتج غير مسجلة';
  document.getElementById('iss-revenue-display').textContent = fmtCurrency(revenue);
  document.getElementById('iss-profit-display').textContent = fmtCurrency(profit);

  // Color the profit row based on outcome
  const finalRow = document.getElementById('iss-profit-row-final');
  const badge = document.getElementById('iss-profit-badge');
  const hint = document.getElementById('iss-profit-hint');
  const marginFill = document.getElementById('iss-profit-margin-fill');
  const marginText = document.getElementById('iss-profit-margin-text');

  finalRow.classList.remove('profit-positive', 'profit-warning', 'profit-loss');

  if (costPerUnit === 0) {
    finalRow.classList.add('profit-warning');
    badge.textContent = '⚠️ تكلفة غير محسوبة';
    badge.className = 'profit-panel-badge badge-warning';
    hint.innerHTML = `💡 سجّل <b>تكلفة الوحدة</b> للمنتج "${escapeHtml(product.name)}" من قسم المخزن عشان نقدر نحسب الربح الفعلي.`;
    hint.className = 'profit-hint profit-hint-warn';
    marginFill.style.width = '100%';
    marginFill.style.background = '#94a3b8';
    marginText.textContent = '—';
    return;
  }

  if (profit < 0) {
    finalRow.classList.add('profit-loss');
    badge.textContent = '🔻 خسارة';
    badge.className = 'profit-panel-badge badge-loss';
    hint.innerHTML = `⛔ <b>تنبيه:</b> سعر البيع <b>أقل</b> من التكلفة! بتخسر <b>${fmtCurrency(Math.abs(profit))}</b> في الفاتورة دي. ارفع السعر إلى <b>${fmt(costPerUnit * 1.15)}</b> على الأقل لتحقيق ربح 15%.`;
    hint.className = 'profit-hint profit-hint-loss';
  } else if (margin < 10) {
    finalRow.classList.add('profit-warning');
    badge.textContent = `⚠️ هامش ضعيف ${margin.toFixed(1)}%`;
    badge.className = 'profit-panel-badge badge-warning';
    hint.innerHTML = `⚡ الهامش <b>ضعيف</b> (${margin.toFixed(1)}%). يفضّل ما يقل عن 15%. السعر المقترح: <b>${fmt(costPerUnit * 1.20)}</b> لربح 20%.`;
    hint.className = 'profit-hint profit-hint-warn';
  } else {
    finalRow.classList.add('profit-positive');
    badge.textContent = `✓ ربح ${margin.toFixed(1)}%`;
    badge.className = 'profit-panel-badge badge-success';
    let msg = '';
    if (margin >= 30) msg = '🎉 هامش ربح ممتاز جداً!';
    else if (margin >= 20) msg = '👍 هامش ربح جيد جداً.';
    else msg = '✓ هامش ربح مناسب.';
    hint.innerHTML = msg + ` صافي الربح <b>${fmtCurrency(profit)}</b> من إجمالي <b>${fmtCurrency(revenue)}</b>.`;
    hint.className = 'profit-hint profit-hint-good';
  }

  // Margin bar (visual): clamp 0..50% (above 50% just shows full)
  const barPct = Math.max(0, Math.min(100, (margin / 50) * 100));
  marginFill.style.width = barPct + '%';
  if (profit < 0) {
    marginFill.style.background = 'linear-gradient(90deg, #dc2626, #991b1b)';
  } else if (margin < 10) {
    marginFill.style.background = 'linear-gradient(90deg, #f59e0b, #ea580c)';
  } else if (margin < 20) {
    marginFill.style.background = 'linear-gradient(90deg, #84cc16, #65a30d)';
  } else {
    marginFill.style.background = 'linear-gradient(90deg, #10b981, #047857)';
  }
  marginText.textContent = `هامش الربح: ${margin.toFixed(1)}%`;
}

// ===== Multi-item issuance cart =====
let _issuanceCart = [];

function addIssuanceItem() {
  const prodSel = document.getElementById('iss-form-product');
  const productId = prodSel.value;
  const quantity = parseFloat(document.getElementById('iss-qty').value);
  const unitPrice = parseFloat(document.getElementById('iss-price').value);

  if (!productId) { toast('اختر النوع', 'error'); return; }
  if (!quantity || quantity <= 0) { toast('أدخل كمية صحيحة', 'error'); return; }
  if (unitPrice == null || isNaN(unitPrice) || unitPrice < 0) { toast('أدخل سعراً صحيحاً', 'error'); return; }

  const product = DB.data.products.find(p => p.id === productId);
  if (!product) { toast('خطأ في بيانات الصنف', 'error'); return; }

  // Stock check considering what's already in cart for this product
  const inCartQty = _issuanceCart.filter(it => it.productId === productId).reduce((s,it)=>s+it.quantity, 0);
  if (product.quantity < (inCartQty + quantity)) {
    if (!confirm(`⚠️ الكمية المطلوبة من "${product.name}" (${fmt(inCartQty + quantity)}) أكبر من المتاح بالمخزن (${fmt(product.quantity)}).\nهل تريد المتابعة؟`)) return;
  }

  _issuanceCart.push({
    productId,
    productName: product.name,
    productUnit: product.unit || '',
    quantity,
    unitPrice,
    cost: (product.cost || 0) * quantity,
    total: quantity * unitPrice
  });

  // reset item inputs (keep product dropdown ready for next)
  document.getElementById('iss-qty').value = '';
  document.getElementById('iss-price').value = '';
  prodSel.value = '';
  const tot = document.getElementById('iss-total-display');
  if (tot) tot.textContent = fmtCurrency(0);
  const panel = document.getElementById('iss-profit-panel');
  if (panel) panel.style.display = 'none';
  const stockInfo = document.getElementById('iss-stock-info');
  if (stockInfo) stockInfo.textContent = '';
  renderIssuanceCart();
  try { playTone('click'); } catch(_) {}
  prodSel.focus();
}

function removeIssuanceItem(idx) {
  _issuanceCart.splice(idx, 1);
  renderIssuanceCart();
}

function renderIssuanceCart() {
  const wrap = document.getElementById('iss-cart-wrap');
  const body = document.getElementById('iss-cart-body');
  if (!wrap || !body) return;
  if (_issuanceCart.length === 0) {
    wrap.style.display = 'none';
    body.innerHTML = '';
    return;
  }
  wrap.style.display = 'block';
  body.innerHTML = _issuanceCart.map((it, i) => `<tr>
    <td>${escapeHtml(it.productName)}</td>
    <td>${fmt(it.quantity)} ${escapeHtml(it.productUnit)}</td>
    <td>${fmt(it.unitPrice)}</td>
    <td><b>${fmt(it.total)}</b></td>
    <td><button type="button" class="btn-icon" onclick="removeIssuanceItem(${i})" title="حذف" style="color:var(--danger)">✕</button></td>
  </tr>`).join('');
  const grand = _issuanceCart.reduce((s,it)=>s+it.total, 0);
  const grandEl = document.getElementById('iss-cart-grand');
  if (grandEl) grandEl.textContent = fmtCurrency(grand);
}

function saveIssuance(keepOpen) {
  const d = Object.fromEntries(new FormData(document.getElementById('iss-form')));
  d.paid = parseFloat(d.paid) || 0;

  if (!d.customerId) { toast('اختر المركز', 'error'); return; }

  // If the user filled the item fields but didn't click "أضف"، نضيفه تلقائياً
  const pendingProduct = document.getElementById('iss-form-product').value;
  const pendingQty = parseFloat(document.getElementById('iss-qty').value);
  const pendingPrice = parseFloat(document.getElementById('iss-price').value);
  if (pendingProduct && pendingQty > 0 && !isNaN(pendingPrice)) {
    addIssuanceItem();
  }

  if (_issuanceCart.length === 0) { toast('أضف صنف واحد على الأقل للفاتورة', 'error'); return; }

  const customer = DB.data.customers.find(c => c.id === d.customerId);
  if (!customer) { toast('خطأ في بيانات العميل', 'error'); return; }

  const grandTotal = _issuanceCart.reduce((s,it)=>s+it.total, 0);
  if (d.paid > grandTotal) { toast('المدفوع أكبر من الإجمالي', 'error'); return; }

  // Validate due date if set
  const setDueDate = document.getElementById('iss-set-duedate');
  let dueDate = null;
  if (setDueDate && setDueDate.checked) {
    dueDate = d.dueDate;
    if (!dueDate) { toast('حدد موعد التحصيل', 'error'); return; }
    if (dueDate < d.date) { toast('موعد التحصيل قبل تاريخ الصرف!', 'error'); return; }
  }

  const status = d.paid >= grandTotal ? 'paid' : d.paid > 0 ? 'partial' : 'unpaid';
  const invoiceId = 'inv_' + uid();
  const invoiceNumber = ++DB.data.counters.invoice;
  const methodMap = { credit:'آجل', cash:'كاش', transfer:'تحويل', check:'شيك' };

  // ----- Create ONE merged INVOICE with all items -----
  const invoice = {
    id: invoiceId,
    number: invoiceNumber,
    customerId: d.customerId,
    date: d.date,
    items: _issuanceCart.map(it => ({
      productId: it.productId,
      productName: it.productName,
      qty: it.quantity,
      price: it.unitPrice,
      total: it.total
    })),
    subtotal: grandTotal,
    tax: 0, taxRate: 0, discount: 0,
    total: grandTotal,
    paid: d.paid,
    paymentMethod: methodMap[d.paymentMethod] || 'آجل',
    status: status,
    notes: d.notes || '',
    createdAt: Date.now()
  };
  DB.data.invoices.push(invoice);

  // ----- For each item: create an issuance record + stock move (all linked to same invoice) -----
  if (!DB.data.issuances) DB.data.issuances = [];
  if (!DB.data.stockMoves) DB.data.stockMoves = [];
  const issuanceNumber = ++DB.data.counters.issuance;
  const createdIssuanceIds = [];

  // Distribute the paid amount proportionally across items (so each issuance has consistent paid/status)
  _issuanceCart.forEach((it, idx) => {
    const product = DB.data.products.find(p => p.id === it.productId);
    const itemPaid = grandTotal > 0 ? (d.paid * (it.total / grandTotal)) : 0;
    const itemStatus = itemPaid >= it.total ? 'paid' : itemPaid > 0 ? 'partial' : 'unpaid';
    const issuanceId = 'iss_' + uid();
    createdIssuanceIds.push(issuanceId);

    DB.data.issuances.push({
      id: issuanceId,
      number: issuanceNumber,          // same number for the whole invoice batch
      invoiceId: invoiceId,            // all linked to the one merged invoice
      batchIndex: idx,
      date: d.date,
      dueDate: dueDate || null,
      customerId: d.customerId,
      customerName: customer.name,
      productId: it.productId,
      productName: it.productName,
      productUnit: it.productUnit,
      quantity: it.quantity,
      unitPrice: it.unitPrice,
      total: it.total,
      paid: itemPaid,
      paymentMethod: d.paymentMethod,
      status: itemStatus,
      notes: d.notes || '',
      createdAt: Date.now()
    });

    // Decrement stock for this product
    if (product) product.quantity -= it.quantity;

    DB.data.stockMoves.push({
      id: 'sm_' + uid(),
      productId: it.productId,
      type: 'out',
      quantity: it.quantity,
      date: d.date,
      reference: `صرف #${issuanceNumber} - ${customer.name} (فاتورة #${invoiceNumber})`,
      createdAt: Date.now()
    });
  });

  // Update customer balance (add unpaid amount of whole invoice)
  const owed = grandTotal - d.paid;
  customer.balance = (customer.balance || 0) + owed;

  // If paid > 0, create ONE linked payment record (to invoice)
  if (d.paid > 0) {
    if (!DB.data.payments) DB.data.payments = [];
    DB.data.payments.push({
      id: 'pay_' + uid(),
      customerId: customer.id,
      customerName: customer.name,
      issuanceId: createdIssuanceIds[0] || null,
      invoiceId: invoice.id,
      amount: d.paid,
      date: d.date,
      method: d.paymentMethod === 'credit' ? 'cash' : d.paymentMethod,
      note: 'دفعة مع فاتورة الصرف #' + invoiceNumber,
      createdAt: Date.now()
    });
  }

  DB.save();
  logAudit({
    operation: 'add', table: 'invoices',
    recordId: invoice.id,
    recordLabel: `فاتورة صرف #${invoiceNumber} - ${customer.name} (${_issuanceCart.length} صنف)`,
    before: null,
    after: JSON.parse(JSON.stringify(invoice)),
    reason: window._pendingAuditReason || ''
  });
  delete window._pendingAuditReason;

  const itemCount = _issuanceCart.length;
  _issuanceCart = []; // clear cart

  playTone('save');
  renderIssuances();
  renderSidebar();
  updateNotifBadge();
  closeModal();
  celebrate();
  notify({ type:'success', title:'تم إصدار الفاتورة', message:`تم إصدار فاتورة الصرف رقم <b>#${invoiceNumber}</b> للعميل <b>"${escapeHtml(customer.name)}"</b> وتشمل <b>${itemCount}</b> صنف بنجاح` });
}
