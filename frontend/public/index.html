<style>
/* ========================= VARIABLES ========================= */
:root {
  /* Primary action color - Vibrant Emerald Green */
  --primary: #db2033;
  --primary-dark: #b01526;
  --primary-light: #ef4458;
  --primary-50: #fef2f3;
  --primary-100: #fcdcdf;
  --primary-rgb: 219, 32, 51;

  /* Accent colors - BOLDER, VIVID */
  --accent: #7c3aed;          /* deep purple */
  --accent-2: #ea580c;        /* vibrant orange */
  --accent-3: #dc2626;        /* strong red */
  --accent-4: #059669;        /* deep green */
  --accent-pink: #db2777;
  --accent-blue: #2563eb;

  --success: #059669;
  --danger: #dc2626;
  --warning: #ea580c;
  --info: #2563eb;

  /* Tinted soft card backgrounds (premium look) */
  --tint-emerald: #e6f7f0;
  --tint-mint:    #ecfdf5;
  --tint-lavender:#f3effd;
  --tint-purple:  #efe9fc;
  --tint-peach:   #fff1e6;
  --tint-rose:    #fde8e8;
  --tint-amber:   #fef6e7;
  --tint-sky:     #e7f1fd;
  --tint-cream:   #fdf9f0;

  /* Bold gradients */
  --grad-primary: linear-gradient(135deg, #b01526 0%, #db2033 50%, #ef4458 100%);
  --grad-teal:    linear-gradient(135deg, #7f0f1c 0%, #db2033 50%, #ef4458 100%);
  --grad-success: linear-gradient(135deg, #047857 0%, #10b981 100%);
  --grad-warning: linear-gradient(135deg, #c2410c 0%, #ea580c 100%);
  --grad-danger:  linear-gradient(135deg, #991b1b 0%, #dc2626 100%);
  --grad-purple:  linear-gradient(135deg, #6d28d9 0%, #8b5cf6 100%);
  --grad-pink:    linear-gradient(135deg, #be185d 0%, #ec4899 100%);
  --grad-sky:     linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
  --grad-orange:  linear-gradient(135deg, #c2410c 0%, #ea580c 100%);
  --grad-banner:  linear-gradient(90deg, #0a0e1a 0%, #0f1729 30%, #1e293b 70%, #b01526 100%);

  /* LIGHT mode - Warm gray, NOT stark white. Premium SaaS look. */
  --bg: #f3f5f7;             /* warm light gray base */
  --bg-soft: #eef1f4;
  --surface: #ffffff;        /* card surface */
  --surface-2: #f8fafb;      /* secondary surface */
  --surface-3: #eef2f5;
  --border: #e3e8ee;         /* very soft border */
  --border-strong: #cbd5e1;
  --text: #0f172a;           /* near-black for strong contrast */
  --text-muted: #475569;
  --text-soft: #94a3b8;

  --shadow-sm: 0 1px 3px rgba(15,23,42,.04);
  --shadow: 0 4px 16px rgba(15,23,42,.06), 0 1px 3px rgba(15,23,42,.04);
  --shadow-lg: 0 18px 48px rgba(15,23,42,.10), 0 4px 12px rgba(15,23,42,.06);
  --shadow-glow: 0 0 0 4px rgba(5,150,105,.18);
  --radius-sm: 8px;
  --radius: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --sidebar-w: 240px;
  --topbar-h: 70px;
  --banner-h: 44px;
  --font: 'Cairo', 'Tajawal', system-ui, sans-serif;
  --transition: .25s cubic-bezier(.4,0,.2,1);
}

/* ========================= DARK THEME (matches reference exactly - black + vibrant emerald) ========================= */
[data-theme="dark"] {
  --bg: #0a0f1c;
  --bg-soft: #0d1424;
  --surface: #111a2e;
  --surface-2: #16213a;
  --surface-3: #1e2b48;
  --border: #1f2d4a;
  --border-strong: #2d3f63;
  --text: #ffffff;
  --text-muted: #cdd8ec;
  --text-soft: #8ea0c0;

  --primary: #ef4458;
  --primary-dark: #db2033;
  --primary-light: #f87171;
  --primary-50: rgba(239,68,88,.12);
  --primary-100: rgba(239,68,88,.22);

  --success: #10b981;
  --danger: #ef4444;
  --warning: #f59e0b;
  --info: #3b82f6;

  --grad-banner: linear-gradient(90deg, #0a0f1c 0%, #111a2e 30%, #1e2b48 70%, #b01526 100%);
  --grad-primary: linear-gradient(135deg, #b01526 0%, #db2033 50%, #ef4458 100%);

  --shadow-sm: 0 1px 3px rgba(0,0,0,.5);
  --shadow: 0 4px 14px rgba(0,0,0,.45), 0 2px 4px rgba(0,0,0,.3);
  --shadow-lg: 0 16px 40px rgba(0,0,0,.55), 0 6px 14px rgba(0,0,0,.4);
  --shadow-glow: 0 0 0 4px rgba(16,185,129,.30);
  --shadow-card-glow: 0 0 50px rgba(59,130,246,.07);
}

/* ========================= RESET / BASE ========================= */
*, *::before, *::after { box-sizing: border-box; }
* { margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font);
  font-size: 14.5px;
  background: var(--bg);
  background-image:
    radial-gradient(at 12% 8%,  rgba(16,185,129,.06)  0px, transparent 50%),
    radial-gradient(at 88% 8%,  rgba(124,58,237,.04)  0px, transparent 50%),
    radial-gradient(at 88% 92%, rgba(234,88,12,.03)   0px, transparent 50%);
  background-attachment: fixed;
  color: var(--text);
  font-weight: 600;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  transition: background var(--transition), color var(--transition);
}
[data-theme="dark"] body {
  background-image:
    radial-gradient(at 12% 8%,  rgba(16,185,129,.10) 0px, transparent 50%),
    radial-gradient(at 88% 92%, rgba(5,150,105,.06)  0px, transparent 50%);
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, select, textarea { font-family: inherit; }
a { color: inherit; text-decoration: none; }
table { border-collapse: collapse; width: 100%; }
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-soft); }

/* ========================= LOGIN ========================= */
.login-wrap {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 24px;
  width: 100%;
  background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 50%, #a7f3d0 100%);
  background-image:
    radial-gradient(circle at 15% 25%, rgba(16,185,129,.18) 0%, transparent 45%),
    radial-gradient(circle at 85% 75%, rgba(5,150,105,.15) 0%, transparent 45%),
    radial-gradient(circle at 50% 50%, rgba(167,243,208,.4) 0%, transparent 70%),
    linear-gradient(135deg, #ecfdf5 0%, #d1fae5 100%);
  position: relative;
  overflow: hidden;
}
[data-theme="dark"] .login-wrap {
  background: #050810;
  background-image:
    radial-gradient(circle at 15% 25%, rgba(16,185,129,.18) 0%, transparent 40%),
    radial-gradient(circle at 85% 75%, rgba(5,150,105,.12) 0%, transparent 40%),
    radial-gradient(circle at 50% 50%, rgba(16,185,129,.06) 0%, transparent 60%);
}
.login-card {
  width: 100%; max-width: 440px;
  background: rgba(255, 255, 255, 0.88);
  backdrop-filter: blur(20px) saturate(150%);
  -webkit-backdrop-filter: blur(20px) saturate(150%);
  border-radius: var(--radius-xl);
  padding: 36px 32px 30px;
  box-shadow:
    0 25px 60px rgba(5, 150, 105, .15),
    0 8px 20px rgba(15, 23, 42, .08),
    inset 0 1px 0 rgba(255,255,255,.8);
  border: 1px solid rgba(16, 185, 129, .25);
  animation: fadeUp .5s ease both;
  position: relative;
  z-index: 2;
}
[data-theme="dark"] .login-card {
  background: rgba(13, 19, 31, 0.88);
  backdrop-filter: blur(22px) saturate(160%);
  -webkit-backdrop-filter: blur(22px) saturate(160%);
  border-color: rgba(16,185,129,.20);
  box-shadow:
    0 25px 60px rgba(0,0,0,.7),
    0 12px 32px rgba(16,185,129,.10),
    inset 0 1px 0 rgba(16,185,129,.15);
}
.login-logo {
  width: 80px; height: 80px;
  border-radius: 22px;
  display: grid; place-items: center;
  background: linear-gradient(135deg, #047857 0%, #059669 50%, #10b981 100%);
  margin: 0 auto 16px;
  color: white;
  font-size: 36px;
  font-weight: 900;
  box-shadow:
    0 14px 32px rgba(5,150,105,.40),
    0 4px 10px rgba(5,150,105,.20),
    inset 0 1px 0 rgba(255,255,255,.25);
  animation: logoFloat 4s ease-in-out infinite;
}
.login-logo-svg {
  background: transparent;
  box-shadow:
    0 18px 40px rgba(5,150,105,.35),
    0 6px 14px rgba(0,0,0,.10);
  overflow: hidden;
}
.login-logo-svg svg { width: 100%; height: 100%; display: block; }
@keyframes logoFloat {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-6px); }
}

.login-card h1 { text-align: center; font-size: 22px; font-weight: 800; margin-bottom: 4px; }
.login-card .sub { text-align: center; color: var(--text-muted); margin-bottom: 22px; font-size: 12.5px; }
.demo-creds { margin-top: 18px; padding: 12px; background: var(--primary-50); border-radius: var(--radius); border: 1px dashed var(--primary); font-size: 12px; color: var(--text-muted); }
.demo-creds b { color: var(--primary-dark); }

/* ========================= FORMS ========================= */
.form-group { margin-bottom: 18px; }
.form-group label { display: block; margin-bottom: 7px; font-weight: 600; font-size: 13px; color: var(--text-muted); letter-spacing: .2px; }
.form-control {
  width: 100%;
  padding: 12px 14px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--surface);
  color: var(--text);
  font-size: 14px;
  line-height: 1.4;
  transition: border-color .18s ease, box-shadow .18s ease, background .18s ease;
}
.form-control:hover { border-color: var(--text-soft); }
.form-control:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-50); }
.form-control::placeholder { color: var(--text-soft); }
textarea.form-control { resize: vertical; min-height: 80px; }
.form-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
.form-row-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
@media (max-width: 700px) { .form-row, .form-row-3 { grid-template-columns: 1fr; gap: 0; } }

/* ========================= BUTTONS ========================= */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 10px 18px;
  border-radius: 12px;
  font-weight: 700;
  font-size: 13.5px;
  transition: all var(--transition);
  white-space: nowrap;
  border: 1.5px solid transparent;
  letter-spacing: -0.1px;
}
.btn-primary {
  background: linear-gradient(135deg, var(--primary-light), var(--primary-dark));
  color: white;
  box-shadow: 0 6px 16px rgba(5,150,105,.30), inset 0 1px 0 rgba(255,255,255,.18);
}
.btn-primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 10px 24px rgba(5,150,105,.40), inset 0 1px 0 rgba(255,255,255,.25);
}
.btn-secondary {
  background: var(--surface); color: var(--text);
  border-color: var(--border-strong);
  box-shadow: var(--shadow-sm);
}
.btn-secondary:hover { background: var(--surface-2); border-color: var(--primary); color: var(--primary); }
.btn-add-another {
  background: linear-gradient(135deg, #f59e0b, #d97706);
  color: #fff;
  box-shadow: 0 4px 12px rgba(245,158,11,.35);
}
.btn-add-another:hover { filter: brightness(1.07); transform: translateY(-1px); }
.btn-add-item {
  background: linear-gradient(135deg, #3b82f6, #2563eb);
  color: #fff; font-weight: 800;
  box-shadow: 0 4px 12px rgba(59,130,246,.32);
  border: 1px dashed rgba(255,255,255,.4);
}
.btn-add-item:hover { filter: brightness(1.08); transform: translateY(-1px); }
.btn-success {
  background: linear-gradient(135deg, #10b981, #059669);
  color: white;
  box-shadow: 0 6px 16px rgba(5,150,105,.25), inset 0 1px 0 rgba(255,255,255,.18);
}
.btn-success:hover { transform: translateY(-1px); box-shadow: 0 10px 24px rgba(5,150,105,.35); }
.btn-danger {
  background: linear-gradient(135deg, #ef4444, #dc2626);
  color: white;
  box-shadow: 0 6px 16px rgba(220,38,38,.25), inset 0 1px 0 rgba(255,255,255,.18);
}
.btn-danger:hover { transform: translateY(-1px); box-shadow: 0 10px 24px rgba(220,38,38,.35); }
.btn-warning {
  background: linear-gradient(135deg, #f97316, #ea580c);
  color: white;
  box-shadow: 0 6px 16px rgba(234,88,12,.25), inset 0 1px 0 rgba(255,255,255,.18);
}
.btn-warning:hover { transform: translateY(-1px); }
.btn-ghost { background: transparent; color: var(--text-muted); }
.btn-ghost:hover { background: var(--surface-2); color: var(--text); }
.btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 9px; }
.btn-lg { padding: 14px 22px; font-size: 15px; border-radius: 14px; }
.btn-block { width: 100%; }
.btn-icon { width: 36px; height: 36px; padding: 0; border-radius: 10px; display: inline-grid; place-items: center; }
.btn:disabled { opacity: .5; cursor: not-allowed; transform: none !important; }

/* ========================= APP LAYOUT ========================= */
#app { display: none; min-height: 100vh; }
.sidebar {
  position: fixed;
  top: 0; right: 0;
  width: var(--sidebar-w);
  height: 100vh;
  background: rgba(248, 250, 251, 0.85);
  backdrop-filter: blur(20px) saturate(160%);
  -webkit-backdrop-filter: blur(20px) saturate(160%);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  z-index: 50;
  transition: transform var(--transition);
  box-shadow: -1px 0 0 rgba(15,23,42,.02);
}
[data-theme="dark"] .sidebar {
  background: rgba(8, 13, 24, 0.85);
}
.sidebar-brand {
  height: var(--topbar-h);
  display: flex; align-items: center; gap: 12px;
  padding: 0 20px;
  border-bottom: 1px solid var(--border);
}
.brand-logo {
  width: 38px; height: 38px;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  display: grid; place-items: center;
  color: white; font-weight: 800; font-size: 18px;
  box-shadow: 0 4px 12px rgba(5,150,105,.3);
}
.brand-logo-svg {
  width: 42px; height: 42px;
  background: transparent !important;
  border: none !important;
  box-shadow: 0 6px 18px rgba(5,150,105,.35), 0 2px 4px rgba(0,0,0,.10) !important;
  padding: 0;
  overflow: hidden;
}
.brand-logo-svg svg { width: 100%; height: 100%; display: block; }
.brand-name { font-size: 16px; font-weight: 800; letter-spacing: -0.3px; color: var(--text); }
.brand-sub { font-size: 11.5px; color: var(--text-muted); font-weight: 500; margin-top: 1px; }

.sidebar-nav { flex: 1; overflow-y: auto; padding: 16px 12px; }
.nav-section-title {
  font-size: 10.5px;
  font-weight: 800;
  color: var(--text-soft);
  text-transform: uppercase;
  letter-spacing: 1.2px;
  padding: 16px 12px 8px;
}
.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px;
  border-radius: 12px;
  color: var(--text-muted);
  font-weight: 600;
  font-size: 13.5px;
  margin-bottom: 3px;
  cursor: pointer;
  transition: all var(--transition);
  position: relative;
}
.nav-item:hover {
  background: rgba(15,23,42,.04);
  color: var(--text);
}
.nav-item:hover .nav-icon-colored {
  transform: scale(1.05);
}
/* Active state: neon line + subtle tint, NOT solid colored gradient */
.nav-item.active {
  background: rgba(5,150,105,.08);
  color: var(--text);
  font-weight: 800;
}
.nav-item.active::after {
  content: '';
  position: absolute;
  top: 8px; bottom: 8px;
  inset-inline-end: -12px;
  width: 3px;
  border-radius: 3px;
  background: linear-gradient(180deg, #10b981, #059669);
  box-shadow: 0 0 10px rgba(16,185,129,.6), 0 0 20px rgba(16,185,129,.3);
}
[data-theme="dark"] .nav-item.active {
  background: rgba(16,185,129,.12);
  color: #ffffff;
}
.nav-item .icon {
  width: 32px; height: 32px;
  display: inline-grid; place-items: center;
  flex-shrink: 0;
  border-radius: 9px;
  transition: transform .25s;
}
.nav-item .nav-icon-colored svg { width: 16px; height: 16px; }
.nav-item .badge {
  margin-right: auto;
  min-width: 20px;
  height: 20px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #ef4444, #dc2626);
  color: white;
  font-size: 11px;
  padding: 0 6px;
  border-radius: 999px;
  font-weight: 800;
  box-shadow: 0 2px 6px rgba(220,38,38,.40), 0 0 0 0 rgba(220,38,38,.5);
  animation: badgePulse 2s ease-in-out infinite;
  letter-spacing: -0.2px;
}
@keyframes badgePulse {
  0%, 100% { box-shadow: 0 2px 6px rgba(220,38,38,.40), 0 0 0 0 rgba(220,38,38,.5); }
  50%      { box-shadow: 0 2px 6px rgba(220,38,38,.40), 0 0 0 6px rgba(220,38,38,0); }
}
/* Audit badge — stronger red pulse for new audit entries */
.nav-item .badge.badge-audit {
  background: linear-gradient(135deg, #f87171, #dc2626);
  box-shadow: 0 2px 8px rgba(220,38,38,.55), 0 0 0 0 rgba(220,38,38,.7);
  animation: badgePulseStrong 1.4s ease-in-out infinite;
}
@keyframes badgePulseStrong {
  0%, 100% {
    transform: scale(1);
    box-shadow: 0 2px 8px rgba(220,38,38,.55), 0 0 0 0 rgba(220,38,38,.7);
  }
  50% {
    transform: scale(1.15);
    box-shadow: 0 2px 10px rgba(220,38,38,.70), 0 0 0 8px rgba(220,38,38,0);
  }
}
.sidebar-footer { padding: 14px; border-top: 1px solid var(--border); }
.user-pill {
  display: flex; align-items: center; gap: 10px;
  padding: 10px;
  border-radius: var(--radius);
  background: var(--surface-2);
}
.avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: white;
  display: grid; place-items: center;
  font-weight: 700;
  flex-shrink: 0;
}
.user-name { font-size: 13px; font-weight: 700; }
.user-role { font-size: 11px; color: var(--text-muted); }

/* Main content */
.main-content {
  margin-right: var(--sidebar-w);
  min-height: 100vh;
  display: flex; flex-direction: column;
}
.topbar {
  height: var(--topbar-h);
  background: rgba(255, 255, 255, 0.75);
  backdrop-filter: blur(16px) saturate(160%);
  -webkit-backdrop-filter: blur(16px) saturate(160%);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 14px;
  padding: 0 24px;
  position: sticky; top: 0; z-index: 30;
  box-shadow: 0 1px 0 rgba(15,23,42,.02), 0 4px 20px rgba(15,23,42,.03);
}
[data-theme="dark"] .topbar {
  background: rgba(13, 19, 31, 0.80);
}
.topbar-title { font-size: 19px; font-weight: 800; letter-spacing: -0.3px; color: var(--text); }
.topbar-spacer { flex: 1; }
.search-box {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface-2);
  border: 1.5px solid var(--border);
  border-radius: 999px;
  padding: 9px 16px;
  width: 320px;
  transition: all var(--transition);
  position: relative;
}
.search-box:focus-within {
  border-color: var(--primary);
  background: var(--surface);
  box-shadow: 0 0 0 4px var(--primary-50), 0 4px 12px rgba(5,150,105,.10);
}
.search-box input {
  border: none; background: transparent; outline: none;
  width: 100%; color: var(--text);
  font-size: 13px; font-weight: 500;
  font-family: inherit;
}
.search-box input::placeholder { color: var(--text-soft); font-weight: 500; }

/* Mic button inside search */
.search-mic-btn {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: grid; place-items: center;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
  flex-shrink: 0;
  border: none;
  cursor: pointer;
  transition: all .25s;
  box-shadow: 0 2px 8px rgba(5,150,105,.3);
}
.search-mic-btn:hover { transform: scale(1.1); box-shadow: 0 4px 14px rgba(5,150,105,.5); }
.search-mic-btn.listening {
  background: linear-gradient(135deg, #dc2626, #b91c1c);
  animation: micPulse 1.2s ease-in-out infinite;
  box-shadow: 0 0 0 0 rgba(220,38,38,.5);
}
@keyframes micPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(220,38,38,.6); }
  50% { box-shadow: 0 0 0 10px rgba(220,38,38,0); }
}

/* Search results dropdown */
.search-results {
  position: absolute;
  top: calc(100% + 8px);
  inset-inline-start: 0;
  inset-inline-end: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  box-shadow: var(--shadow-lg);
  max-height: 420px;
  overflow-y: auto;
  z-index: 100;
  display: none;
}
.search-results.show { display: block; animation: fadeUp .2s ease both; }
.search-result-section { padding: 8px 0; }
.search-result-section + .search-result-section { border-top: 1px solid var(--border); }
.search-result-header {
  padding: 6px 14px;
  font-size: 11px;
  font-weight: 800;
  color: var(--text-soft);
  text-transform: uppercase;
  letter-spacing: .8px;
  display: flex; align-items: center; gap: 6px;
}
.search-result-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  cursor: pointer;
  transition: background .15s;
  border-right: 3px solid transparent;
}
.search-result-item:hover {
  background: var(--primary-50);
  border-right-color: var(--primary);
}
.search-result-item .sr-icon {
  width: 32px; height: 32px;
  border-radius: 8px;
  display: grid; place-items: center;
  font-size: 16px;
  flex-shrink: 0;
}
.search-result-item .sr-body { flex: 1; min-width: 0; }
.search-result-item .sr-title { font-weight: 700; font-size: 13px; color: var(--text); }
.search-result-item .sr-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.search-result-empty {
  padding: 28px 14px;
  text-align: center;
  color: var(--text-muted);
  font-size: 13px;
}
.search-result-empty .sre-icon { font-size: 32px; margin-bottom: 8px; }

.icon-btn {
  width: 40px; height: 40px;
  border-radius: var(--radius);
  display: grid; place-items: center;
  color: var(--text-muted);
  position: relative;
  transition: all var(--transition);
}
.icon-btn:hover { background: var(--surface-2); color: var(--text); }
.icon-btn .notif-dot {
  position: absolute; top: 4px; left: 4px;
  min-width: 18px; height: 18px;
  padding: 0 5px;
  background: var(--danger);
  color: #fff;
  border-radius: 999px;
  border: 2px solid var(--surface);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 800;
  animation: notifPulse 2s ease-in-out infinite;
}
@keyframes notifPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.15); }
}

/* Supplier-owed card: red + pulsing glow when debt exceeds 20k */
@keyframes supplierDangerPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,.45), 0 4px 14px rgba(0,0,0,.25); }
  50%      { box-shadow: 0 0 0 8px rgba(239,68,68,0), 0 4px 18px rgba(239,68,68,.35); }
}
.supplier-alert-danger {
  animation: supplierDangerPulse 1.8s ease-in-out infinite;
}
.supplier-alert-danger .pulse-dot {
  animation: notifPulse 1.2s ease-in-out infinite;
}
.supplier-alert-danger .smart-alert-icon {
  animation: notifPulse 1.8s ease-in-out infinite;
}

.page-content { padding: 24px; flex: 1; animation: fadeIn .35s ease; }
.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; gap: 12px; flex-wrap: wrap; }
.page-title { font-size: 26px; font-weight: 900; letter-spacing: -0.6px; color: var(--text); }
.page-subtitle { color: var(--text-muted); font-size: 13px; margin-top: 4px; }
.page-actions { display: flex; gap: 10px; flex-wrap: wrap; }

/* ========================= CARDS / STAT CARDS ========================= */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  box-shadow: var(--shadow-sm);
}
.card-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }

.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 16px;
  margin-bottom: 22px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 22px;
  padding: 22px;
  position: relative;
  overflow: hidden;
  transition: all var(--transition);
}
.stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
.stat-card .icon-wrap {
  width: 48px; height: 48px;
  border-radius: 14px;
  display: grid; place-items: center;
  margin-bottom: 14px;
  font-size: 22px;
  color: white;
  box-shadow: 0 6px 16px rgba(0,0,0,.10), inset 0 1px 0 rgba(255,255,255,.25);
}
.stat-card .label { color: var(--text-muted); font-size: 13px; font-weight: 700; }
.stat-card .value { font-size: 28px; font-weight: 900; margin-top: 4px; letter-spacing: -.7px; color: var(--text); }
.stat-card .trend { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 700; margin-top: 10px; padding: 4px 10px; border-radius: 999px; }
.stat-card .trend.up { color: var(--success); background: rgba(5,150,105,.10); }
.stat-card .trend.down { color: var(--danger); background: rgba(220,38,38,.10); }
.stat-card .accent-stripe { position: absolute; right: 0; top: 0; bottom: 0; width: 4px; }
.stat-primary { background: var(--tint-mint); border-color: rgba(5,150,105,.18); }
.stat-primary .icon-wrap { background: linear-gradient(135deg, #10b981, #059669); } .stat-primary .accent-stripe { background: var(--primary); }
.stat-success { background: var(--tint-emerald); border-color: rgba(5,150,105,.18); }
.stat-success .icon-wrap { background: linear-gradient(135deg, #10b981, #059669); } .stat-success .accent-stripe { background: var(--success); }
.stat-warning { background: var(--tint-peach); border-color: rgba(234,88,12,.20); }
.stat-warning .icon-wrap { background: linear-gradient(135deg, #f97316, #ea580c); } .stat-warning .accent-stripe { background: var(--warning); }
.stat-danger { background: var(--tint-rose); border-color: rgba(220,38,38,.18); }
.stat-danger .icon-wrap { background: linear-gradient(135deg, #ef4444, #dc2626); } .stat-danger .accent-stripe { background: var(--danger); }
.stat-info { background: var(--tint-sky); border-color: rgba(37,99,235,.18); }
.stat-info .icon-wrap { background: linear-gradient(135deg, #3b82f6, #2563eb); } .stat-info .accent-stripe { background: var(--info); }

/* Dark mode: keep stat-card on surface (not tinted) */
[data-theme="dark"] .stat-primary,
[data-theme="dark"] .stat-success,
[data-theme="dark"] .stat-warning,
[data-theme="dark"] .stat-danger,
[data-theme="dark"] .stat-info { background: var(--surface); border-color: var(--border); }

/* ========================= TABLES ========================= */
.table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm); }
.table-toolbar { padding: 14px 16px; display: flex; gap: 10px; align-items: center; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.table-toolbar .search-box { width: 280px; max-width: 100%; }
.table-scroll { overflow-x: auto; }
table.data-table { width: 100%; border-collapse: collapse; }
table.data-table th {
  text-align: right;
  padding: 13px 16px;
  font-size: 12px;
  font-weight: 700;
  color: var(--text-muted);
  letter-spacing: .3px;
  background: var(--surface-2);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
table.data-table th:first-child { border-top-right-radius: 10px; }
table.data-table th:last-child { border-top-left-radius: 10px; }
table.data-table td {
  padding: 13px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 13.5px;
  vertical-align: middle;
}
table.data-table tbody tr { transition: background .15s ease; }
table.data-table tbody tr:nth-child(even) { background: rgba(127,127,127,.03); }
table.data-table tbody tr:hover { background: var(--primary-50); }
table.data-table tbody tr:last-child td { border-bottom: none; }
.empty-state { padding: 60px 20px; text-align: center; color: var(--text-muted); }
.empty-state .icon { font-size: 48px; opacity: .35; margin-bottom: 10px; }

.badge-status {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 11.5px;
  font-weight: 700;
}
.badge-paid { background: rgba(16,185,129,.12); color: var(--success); }
.badge-partial { background: rgba(245,158,11,.14); color: var(--warning); }
.badge-unpaid { background: rgba(239,68,68,.12); color: var(--danger); }
.badge-neutral { background: var(--surface-2); color: var(--text-muted); }
.badge-info { background: rgba(59,130,246,.12); color: var(--info); }

.row-actions { display: flex; gap: 6px; justify-content: flex-end; }
.row-actions .btn-icon { width: 32px; height: 32px; }
.row-actions .btn-icon:hover { background: var(--surface-2); }

/* ========================= MODAL ========================= */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(15,23,42,.55);
  backdrop-filter: blur(4px);
  display: none;
  align-items: center; justify-content: center;
  z-index: 5000;
  padding: 20px;
}
.modal-overlay.show { display: flex !important; opacity: 1 !important; visibility: visible !important; }
.modal {
  background: var(--surface);
  border-radius: var(--radius-xl);
  width: 100%;
  max-width: 560px;
  max-height: 90vh;
  overflow: hidden;
  display: flex; flex-direction: column;
  box-shadow: var(--shadow-lg);
}
.modal.large { max-width: 900px; }
.modal.xl { max-width: 1100px; }
.modal-header { padding: 18px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.modal-title { font-size: 17px; font-weight: 800; }
.modal-body { padding: 22px 24px; overflow-y: auto; flex: 1; }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-start; background: var(--surface-2); }

/* ========================= TOAST ========================= */
.toast-container {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 200;
  display: flex; flex-direction: column;
  gap: 12px;
  pointer-events: none;
}
.toast {
  background: var(--surface);
  border: none;
  border-radius: var(--radius-lg);
  padding: 16px 22px;
  box-shadow:
    0 20px 50px rgba(0,0,0,.25),
    0 8px 20px rgba(0,0,0,.15),
    0 0 0 1px rgba(0,0,0,.04);
  min-width: 360px;
  max-width: 500px;
  display: flex; align-items: center; gap: 14px;
  animation: toastPopIn .35s cubic-bezier(.34, 1.56, .64, 1);
  font-size: 15px;
  font-weight: 700;
  pointer-events: auto;
  position: relative;
  overflow: hidden;
}
[data-theme="dark"] .toast {
  box-shadow:
    0 24px 60px rgba(0,0,0,.6),
    0 8px 22px rgba(0,0,0,.45),
    0 0 0 1px rgba(255,255,255,.04);
}
/* Strong accent strip on the right (RTL: visual start of card) */
.toast::before {
  content: '';
  position: absolute;
  top: 0; bottom: 0; right: 0;
  width: 5px;
  background: var(--primary);
}
@keyframes toastPopIn {
  from { transform: scale(.85); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
.toast.success { background: var(--surface); }
.toast.error   { background: var(--surface); }
.toast.warning { background: var(--surface); }
.toast.info    { background: var(--surface); }
.toast.success::before { background: linear-gradient(180deg, #10b981, #059669); box-shadow: -2px 0 14px rgba(16,185,129,.4); }
.toast.error::before   { background: linear-gradient(180deg, #ef4444, #dc2626); box-shadow: -2px 0 14px rgba(239,68,68,.4); }
.toast.warning::before { background: linear-gradient(180deg, #f59e0b, #d97706); box-shadow: -2px 0 14px rgba(245,158,11,.4); }
.toast.info::before    { background: linear-gradient(180deg, #3b82f6, #2563eb); box-shadow: -2px 0 14px rgba(59,130,246,.4); }
.toast .icon {
  font-size: 22px;
  flex-shrink: 0;
  width: 40px; height: 40px;
  border-radius: 12px;
  display: grid; place-items: center;
  color: #fff;
  font-weight: 800;
}
.toast.success .icon { background: linear-gradient(135deg, #10b981, #059669); box-shadow: 0 4px 12px rgba(16,185,129,.35); }
.toast.error .icon   { background: linear-gradient(135deg, #ef4444, #dc2626); box-shadow: 0 4px 12px rgba(239,68,68,.35); }
.toast.warning .icon { background: linear-gradient(135deg, #f59e0b, #d97706); box-shadow: 0 4px 12px rgba(245,158,11,.35); }
.toast.info .icon    { background: linear-gradient(135deg, #3b82f6, #2563eb); box-shadow: 0 4px 12px rgba(59,130,246,.35); }
.toast .msg { font-size: 14px; font-weight: 700; color: var(--text); }

/* ========================= CHARTS ========================= */
.chart-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 22px; }
@media (max-width: 1024px) { .chart-grid { grid-template-columns: 1fr; } }
.chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow-sm); }
.chart-card .card-header { margin-bottom: 10px; }
.chart-wrap { position: relative; height: 280px; }

/* ========================= INVOICE FORM ========================= */
.invoice-items { width: 100%; margin-top: 10px; }
.invoice-items th { background: var(--surface-2); padding: 10px; font-size: 12px; font-weight: 700; text-align: right; color: var(--text-muted); }
.invoice-items td { padding: 8px; border-bottom: 1px solid var(--border); }
.invoice-items input, .invoice-items select { padding: 8px 10px; }
.invoice-totals { background: var(--surface-2); border-radius: var(--radius); padding: 16px; margin-top: 16px; }
.invoice-totals .row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 14px; }
.invoice-totals .row.grand { font-size: 18px; font-weight: 800; border-top: 2px dashed var(--border-strong); margin-top: 8px; padding-top: 12px; color: var(--primary); }

/* ========================= PRINT INVOICE ========================= */
.invoice-print {
  background: white; color: #0f172a;
  padding: 30px; max-width: 800px; margin: 0 auto;
  font-family: var(--font);
}
.invoice-print .head { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 3px solid var(--primary); padding-bottom: 16px; margin-bottom: 22px; }
.invoice-print .company h2 { font-size: 22px; color: var(--primary); }
.invoice-print .company .info { font-size: 12px; color: #64748b; margin-top: 4px; }
.invoice-print .meta { text-align: left; }
.invoice-print .meta h1 { font-size: 28px; color: var(--primary); margin-bottom: 8px; }
.invoice-print .meta .num { font-size: 14px; }
.invoice-print .bill-to { background: #f8fafc; padding: 14px; border-radius: 8px; margin-bottom: 18px; }
.invoice-print table { width: 100%; border-collapse: collapse; margin-bottom: 18px; }
.invoice-print table th { background: var(--primary); color: white; padding: 10px; text-align: right; font-size: 13px; }
.invoice-print table td { padding: 10px; border-bottom: 1px solid #e2e8f0; font-size: 13px; }
.invoice-print .totals-box { margin-right: auto; width: 320px; }
.invoice-print .totals-box .row { display: flex; justify-content: space-between; padding: 6px 0; }
.invoice-print .totals-box .row.grand { border-top: 2px solid var(--primary); margin-top: 8px; padding-top: 10px; font-size: 18px; font-weight: 800; color: var(--primary); }
.invoice-print .footer { margin-top: 30px; text-align: center; color: #64748b; font-size: 12px; border-top: 1px solid #e2e8f0; padding-top: 14px; }
@media print {
  body * { visibility: hidden; }
  .invoice-print, .invoice-print * { visibility: visible; }
  .invoice-print { position: absolute; top: 0; left: 0; right: 0; }
  .no-print { display: none !important; }
}

/* ========================= MISC ========================= */
.tabs { display: flex; gap: 4px; border-bottom: 2px solid var(--border); margin-bottom: 18px; overflow-x: auto; }
.tab {
  padding: 10px 18px; border: none; background: transparent;
  font-weight: 700; font-size: 13px; color: var(--text-muted);
  border-bottom: 3px solid transparent; margin-bottom: -2px;
  white-space: nowrap; transition: all var(--transition);
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--primary); border-bottom-color: var(--primary); }

.filter-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
.filter-bar .form-control { width: auto; min-width: 160px; }

.alert {
  padding: 14px 16px;
  border-radius: var(--radius);
  background: var(--surface-2);
  border-right: 4px solid var(--info);
  margin-bottom: 16px;
  font-size: 13px;
}
.alert-warning { background: rgba(245,158,11,.08); border-right-color: var(--warning); color: var(--text); }
.alert-danger { background: rgba(239,68,68,.08); border-right-color: var(--danger); color: var(--text); }
.alert-success { background: rgba(16,185,129,.08); border-right-color: var(--success); color: var(--text); }

.kpi-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 16px; }
.kpi { background: var(--surface-2); border-radius: var(--radius); padding: 14px; }
.kpi .l { font-size: 12px; color: var(--text-muted); font-weight: 600; }
.kpi .v { font-size: 20px; font-weight: 800; margin-top: 4px; }

.menu-toggle { display: none; }

/* ========================= ANIMATIONS ========================= */
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes scaleIn { from { opacity: 0; transform: scale(.95); } to { opacity: 1; transform: scale(1); } }
@keyframes slideInLeft { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }

/* ========================= RESPONSIVE ========================= */
@media (max-width: 900px) {
  :root { --sidebar-w: 260px; }
  .sidebar { transform: translateX(100%); box-shadow: var(--shadow-lg); }
  .sidebar.open { transform: translateX(0); }
  .main-content { margin-right: 0; }
  .menu-toggle { display: inline-grid; }
  .search-box { width: 180px; }
  .chart-grid { grid-template-columns: 1fr; }
}
@media (max-width: 600px) {
  .topbar { padding: 0 14px; gap: 8px; }
  .page-content { padding: 16px; }
  .search-box { display: none; }
  .topbar-title { font-size: 16px; }
  .stat-card .value { font-size: 22px; }
}
.overlay-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 40;
  display: none; backdrop-filter: blur(2px);
}
.overlay-backdrop.show { display: block; }

/* ========================= COMPANY BANNER ========================= */
.company-banner {
  height: var(--banner-h);
  background: var(--grad-banner);
  background-size: 200% 100%;
  animation: bannerShine 10s linear infinite;
  color: #fff;
  position: sticky; top: 0; z-index: 35;
  box-shadow: 0 4px 14px rgba(15,118,110,.25);
  overflow: hidden;
}
.company-banner::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(circle at 30% 50%, rgba(255,255,255,.18), transparent 50%),
              radial-gradient(circle at 70% 50%, rgba(255,255,255,.10), transparent 50%);
}
@keyframes bannerShine {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
.banner-inner {
  position: relative; z-index: 1;
  height: 100%;
  display: flex; align-items: center; justify-content: center; gap: 14px;
  padding: 0 24px;
  font-weight: 700;
}
.banner-icon { font-size: 22px; filter: drop-shadow(0 2px 4px rgba(0,0,0,.3)); animation: bannerIconPulse 3s ease-in-out infinite; }
@keyframes bannerIconPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15) rotate(-5deg); } }
.banner-name { font-size: 17px; letter-spacing: 0; text-shadow: 0 2px 6px rgba(0,0,0,.35); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.banner-tag { font-size: 11px; opacity: .85; background: rgba(255,255,255,.18); padding: 3px 10px; border-radius: 999px; backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,.2); }
@media (max-width: 700px) {
  .banner-tag { display: none; }
  .banner-name { font-size: 13px; }
  :root { --banner-h: 38px; }
}

/* Bump topbar top sticky position so it sits below banner */
.topbar { top: var(--banner-h) !important; }

/* ========================= ENHANCED SIDEBAR ========================= */
.sidebar {
  background: linear-gradient(180deg, var(--surface) 0%, var(--surface-2) 100%) !important;
  box-shadow: -4px 0 24px rgba(15,23,42,.06);
}
.sidebar-brand {
  background: var(--grad-primary);
  background-size: 200% 200%;
  animation: gradShift 8s ease infinite;
  color: #fff !important;
  border-bottom: none !important;
  padding: 18px 16px !important;
}
@keyframes gradShift {
  0%,100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}
.sidebar-brand .brand-logo {
  background: rgba(255,255,255,.22) !important;
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,.28);
  box-shadow: 0 4px 14px rgba(0,0,0,.18);
}
.sidebar-brand .brand-logo-svg {
  background: transparent !important;
  border: 1px solid rgba(255,255,255,.18) !important;
  box-shadow: 0 6px 18px rgba(0,0,0,.4), 0 0 24px rgba(45,212,191,.25) !important;
}
.sidebar-brand .brand-name { color: #fff !important; text-shadow: 0 1px 3px rgba(0,0,0,.25); }
.sidebar-brand .brand-sub { color: rgba(255,255,255,.85) !important; }

.nav-item {
  position: relative; overflow: hidden;
}
.nav-item::before {
  content: ''; position: absolute; right: 0; top: 50%; transform: translateY(-50%);
  width: 4px; height: 0; background: var(--grad-primary); border-radius: 0 4px 4px 0;
  transition: height .3s;
}
.nav-item:hover::before { height: 70%; }
.nav-item.active::before { height: 70%; }
.nav-item.active {
  background: linear-gradient(90deg, rgba(20,184,166,.10), rgba(6,182,212,.08)) !important;
  color: var(--primary) !important;
}

/* ========================= GORGEOUS STAT CARDS ========================= */
.stat-card { transition: all .3s cubic-bezier(.4,0,.2,1); }
.stat-card:hover { transform: translateY(-4px) scale(1.01); box-shadow: 0 16px 36px rgba(15,23,42,.12); }
.stat-card::after {
  content: ''; position: absolute; top: -50%; right: -50%; width: 200%; height: 200%;
  background: radial-gradient(circle, rgba(255,255,255,.06) 0%, transparent 50%);
  pointer-events: none; opacity: 0; transition: opacity .3s;
}
.stat-card:hover::after { opacity: 1; }
.stat-card .accent-stripe { width: 5px !important; }
.stat-card .icon-wrap { font-size: 22px !important; box-shadow: 0 4px 10px rgba(0,0,0,.06); }

/* Page-content stats grid - rich colored cards (used in reports/issuances etc) */
.stats-grid .stat-card.info,
.stats-grid .stat-card.success,
.stats-grid .stat-card.warning,
.stats-grid .stat-card.danger {
  color: #fff;
  border: none;
}
.stats-grid .stat-card.info { background: var(--grad-sky); }
.stats-grid .stat-card.success { background: var(--grad-success); }
.stats-grid .stat-card.warning { background: var(--grad-warning); }
.stats-grid .stat-card.danger { background: var(--grad-danger); }
.stats-grid .stat-card.info .stat-label,
.stats-grid .stat-card.success .stat-label,
.stats-grid .stat-card.warning .stat-label,
.stats-grid .stat-card.danger .stat-label { color: rgba(255,255,255,.92); }
.stats-grid .stat-card.info .stat-sub,
.stats-grid .stat-card.success .stat-sub,
.stats-grid .stat-card.warning .stat-sub,
.stats-grid .stat-card.danger .stat-sub { color: rgba(255,255,255,.85); }
.stat-card.info .stat-value,
.stat-card.success .stat-value,
.stat-card.warning .stat-value,
.stat-card.danger .stat-value { color: #fff !important; }

/* ========================= ENHANCED BUTTONS ========================= */
.btn { position: relative; overflow: hidden; }
.btn::before {
  content: ''; position: absolute; top: 50%; left: 50%; width: 0; height: 0;
  background: rgba(255,255,255,.25); border-radius: 50%;
  transform: translate(-50%,-50%); transition: width .5s, height .5s;
  pointer-events: none;
}
.btn:active::before { width: 250px; height: 250px; transition: 0s; }
.btn-primary { background: var(--grad-primary) !important; background-size: 200% 100% !important; transition: all .3s, background-position .5s !important; }
.btn-primary:hover { background-position: 100% 0 !important; transform: translateY(-2px); box-shadow: 0 8px 22px rgba(15,118,110,.42); }
.btn-success { background: var(--grad-success) !important; }
.btn-success:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(16,185,129,.4); }
.btn-danger { background: var(--grad-danger) !important; }
.btn-danger:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(239,68,68,.4); }
.btn-warning { background: var(--grad-warning) !important; }
.btn-warning:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(245,158,11,.4); }

/* ========================= LOGIN PAGE - ANIMATED BACKGROUND ========================= */
.login-wrap {
  background: transparent !important;
  position: relative; overflow: visible;
}
/* Hide animated background shapes — login is now a compact top sheet */
.login-bg-shapes { display: none !important; }
.login-card { position: relative; z-index: 2; }
.login-card h1 {
  background: var(--grad-primary);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: -.5px;
}
.login-logo { animation: logoBob 3s ease-in-out infinite; }
@keyframes logoBob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

/* ========================= CENTERS DROPDOWN WIDGET ========================= */
.centers-widget {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  margin-top: 22px;
  box-shadow: var(--shadow-sm);
  overflow: hidden;
}
.centers-widget-header {
  padding: 16px 20px;
  background: linear-gradient(90deg, var(--primary-50) 0%, transparent 100%);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer;
  user-select: none;
  transition: background .3s;
}
.centers-widget-header:hover { background: linear-gradient(90deg, var(--primary-100) 0%, transparent 100%); }
.centers-widget-title { font-size: 15px; font-weight: 800; display: flex; align-items: center; gap: 10px; }
.centers-widget-title .icon-circle {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: var(--grad-primary);
  color: #fff;
  display: grid; place-items: center;
  box-shadow: 0 4px 12px rgba(15,118,110,.3);
}
.centers-widget-toggle {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: var(--surface-2);
  display: grid; place-items: center;
  transition: transform .3s, background .3s;
}
.centers-widget-toggle.open { transform: rotate(180deg); background: var(--primary-100); color: var(--primary); }
.centers-widget-body {
  max-height: 0; overflow: hidden;
  transition: max-height .5s cubic-bezier(.4,0,.2,1);
}
.centers-widget-body.open { max-height: 2000px; }
.centers-widget-content { padding: 8px; }

.center-row {
  border-radius: var(--radius);
  padding: 0;
  margin-bottom: 6px;
  transition: all .25s;
  overflow: hidden;
  background: var(--surface);
  border: 1px solid var(--border);
}
.center-row:hover { box-shadow: var(--shadow-sm); transform: translateY(-1px); }
.center-row-main {
  display: grid;
  grid-template-columns: auto 1fr auto auto auto auto;
  gap: 14px; align-items: center;
  padding: 12px 14px;
  cursor: pointer;
}
.center-avatar {
  width: 40px; height: 40px;
  border-radius: 12px;
  display: grid; place-items: center;
  color: #fff;
  font-weight: 800;
  font-size: 16px;
  box-shadow: 0 3px 8px rgba(0,0,0,.12);
}
.center-name-block .name { font-weight: 700; font-size: 14px; }
.center-name-block .sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.center-metric { text-align: center; min-width: 80px; }
.center-metric .v { font-weight: 800; font-size: 15px; }
.center-metric .l { font-size: 10px; color: var(--text-muted); margin-top: 2px; text-transform: uppercase; letter-spacing: .5px; }
.center-expand-icon {
  width: 28px; height: 28px;
  border-radius: 8px;
  background: var(--surface-2);
  display: grid; place-items: center;
  transition: transform .3s, background .3s;
  color: var(--text-muted);
}
.center-row.expanded .center-expand-icon { transform: rotate(180deg); background: var(--primary); color: #fff; }
.center-row-detail {
  padding: 0 14px;
  max-height: 0;
  overflow: hidden;
  transition: max-height .4s, padding .4s;
  background: var(--surface-2);
  border-top: 1px solid transparent;
}
.center-row.expanded .center-row-detail {
  max-height: 600px;
  padding: 14px;
  border-top: 1px solid var(--border);
}
.center-row-detail table { width: 100%; font-size: 12px; }
.center-row-detail th { background: transparent; padding: 6px 8px; color: var(--text-muted); font-size: 11px; font-weight: 700; }
.center-row-detail td { padding: 6px 8px; border-bottom: 1px dashed var(--border); }
.center-row-detail tr:last-child td { border-bottom: none; }
@media (max-width: 700px) {
  .center-row-main { grid-template-columns: auto 1fr auto; }
  .center-metric:nth-child(3),
  .center-metric:nth-child(4) { display: none; }
}
.no-centers {
  padding: 36px; text-align: center; color: var(--text-muted);
}
.no-centers .icon { font-size: 48px; margin-bottom: 10px; opacity: .5; }

/* ========================= CONFETTI BURST ON SAVE ========================= */
.confetti-container {
  position: fixed; pointer-events: none; inset: 0; overflow: hidden; z-index: 9999;
}
.confetti-piece {
  position: absolute; width: 8px; height: 14px;
  animation: confettiFall 1.6s cubic-bezier(.2,.5,.2,1) forwards;
}
@keyframes confettiFall {
  0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

/* ========================= NEW BIG DASHBOARD CARDS ========================= */
.dash-bigcards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 18px;
  margin: 0 0 24px;
}
.dash-bigcard {
  display: flex; align-items: center; gap: 16px;
  padding: 20px 22px;
  border-radius: 18px;
  color: #fff;
  position: relative; overflow: hidden;
  box-shadow: 0 8px 22px rgba(0,0,0,.10);
  transition: all .3s cubic-bezier(.4,0,.2,1);
  min-height: 110px;
}
.dash-bigcard::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(circle at 90% 10%, rgba(255,255,255,.22), transparent 50%),
              radial-gradient(circle at 10% 90%, rgba(255,255,255,.08), transparent 50%);
  pointer-events: none;
}
.dash-bigcard::after {
  content: ''; position: absolute; top: -30%; right: -20%;
  width: 180px; height: 180px;
  background: radial-gradient(circle, rgba(255,255,255,.15), transparent 60%);
  pointer-events: none;
  transition: transform .5s;
}
.dash-bigcard:hover {
  transform: translateY(-6px) scale(1.02);
  box-shadow: 0 16px 38px rgba(0,0,0,.18);
}
.dash-bigcard:hover::after { transform: scale(1.4); }

.dash-bigcard-icon {
  font-size: 44px;
  flex-shrink: 0;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,.25));
  z-index: 1;
  transition: transform .3s;
}
.dash-bigcard:hover .dash-bigcard-icon { transform: scale(1.18) rotate(-8deg); }

.dash-bigcard-content { flex: 1; z-index: 1; min-width: 0; }
.dash-bigcard-label {
  font-size: 14px;
  font-weight: 700;
  opacity: .95;
  margin-bottom: 6px;
  text-shadow: 0 1px 2px rgba(0,0,0,.15);
  letter-spacing: -.2px;
}
.dash-bigcard-value {
  font-size: 28px;
  font-weight: 900;
  letter-spacing: -1px;
  text-shadow: 0 2px 6px rgba(0,0,0,.2);
  line-height: 1.1;
  word-break: break-word;
}
.dash-bigcard-foot {
  font-size: 11px;
  opacity: .9;
  margin-top: 6px;
  font-weight: 600;
}

/* Dashboard card gradients - elegant grays with subtle color hints */
.dash-bg-teal   { background: linear-gradient(135deg, #1f2937 0%, #374151 100%); }
.dash-bg-green  { background: linear-gradient(135deg, #14532d 0%, #166534 100%); }
.dash-bg-orange { background: linear-gradient(135deg, #2d2418 0%, #3f2f1c 100%); }
.dash-bg-purple { background: linear-gradient(135deg, #1c1917 0%, #292524 100%); }
.dash-bg-red    { background: linear-gradient(135deg, #450a0a 0%, #7f1d1d 100%); }
.dash-bg-sky    { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); }
.dash-bg-amber  { background: linear-gradient(135deg, #3f3f46 0%, #52525b 100%); }
.dash-bg-pink   { background: linear-gradient(135deg, #262626 0%, #404040 100%); }

/* Clickable big cards */
.dash-bigcard.clickable { cursor: pointer; }
.dash-bigcard.clickable:hover { transform: translateY(-6px) scale(1.025); box-shadow: 0 18px 42px rgba(0,0,0,.22); }
.dash-bigcard .click-hint {
  position: absolute; top: 12px; left: 12px;
  font-size: 10px; padding: 4px 10px;
  background: rgba(255,255,255,.20);
  border-radius: 999px;
  font-weight: 800;
  opacity: 0; transition: opacity .25s;
  backdrop-filter: blur(4px);
  border: 1px solid rgba(255,255,255,.15);
}
.dash-bigcard.clickable:hover .click-hint { opacity: 1; }

.dash-middle {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
  margin-bottom: 22px;
}
@media (max-width: 900px) {
  .dash-middle { grid-template-columns: 1fr; }
}

/* Page-action button — bigger + bolder */
.page-actions .btn { padding: 12px 20px; font-size: 14px; font-weight: 700; }
.page-actions .btn-primary { box-shadow: 0 8px 20px rgba(15,118,110,.35); }

/* Topbar icon scale interaction */
.icon-btn {
  transition: transform .25s cubic-bezier(.4,0,.2,1), background var(--transition), color var(--transition) !important;
}
.icon-btn:hover {
  transform: scale(1.18) !important;
  background: var(--primary-100) !important;
  color: var(--primary) !important;
}
.icon-btn:active { transform: scale(1.05) !important; }

/* Centered action bar for issuance + inventory pages */
.section-action-bar {
  display: flex; align-items: center; justify-content: center; gap: 16px;
  flex-wrap: wrap;
  padding: 16px;
  background: linear-gradient(90deg, var(--surface) 0%, var(--surface-2) 50%, var(--surface) 100%);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  margin: 0 auto 18px;
  max-width: 720px;
  box-shadow: var(--shadow-sm);
}
.section-action-bar .btn {
  padding: 13px 26px;
  font-size: 14px;
  font-weight: 700;
  min-width: 200px;
}
@media (max-width: 600px) {
  .section-action-bar { padding: 12px 10px; }
  .section-action-bar .btn { min-width: 0; flex: 1; padding: 10px 12px; font-size: 13px; }
}

/* Stronger labels everywhere */
.stat-card .label, .label, .rep-stat-label, .dash-bigcard-label { font-weight: 700 !important; }
.stat-card .value, .value, .rep-stat-value, .dash-bigcard-value { font-weight: 900 !important; letter-spacing: -.5px !important; }

/* ========================= AUTOSAVE INDICATOR ========================= */
.autosave-indicator {
  position: fixed;
  bottom: 16px; left: 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 8px 14px;
  border-radius: 999px;
  box-shadow: var(--shadow);
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  display: flex; align-items: center; gap: 8px;
  z-index: 90;
  opacity: 0;
  transition: opacity .3s;
}
.autosave-indicator.show { opacity: 1; }
.autosave-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--success);
  animation: savePulse 1s ease;
}
@keyframes savePulse {
  0% { transform: scale(0); }
  50% { transform: scale(1.5); }
  100% { transform: scale(1); }
}

/* Home FAB button on every page */
.home-fab {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 56px; height: 56px;
  border-radius: 50%;
  background: var(--grad-primary);
  color: #fff;
  display: grid; place-items: center;
  box-shadow: 0 8px 24px rgba(15,118,110,.4);
  cursor: pointer;
  z-index: 80;
  transition: all .3s;
}
.home-fab:hover { transform: scale(1.12) rotate(-10deg); box-shadow: 0 12px 30px rgba(15,118,110,.55); }
.home-fab:active { transform: scale(1.05); }
.home-fab svg { width: 26px; height: 26px; }

/* Reciter player */
.reciter-bar {
  position: fixed;
  bottom: 16px;
  right: 96px;
  background: linear-gradient(135deg, #064e3b 0%, #047857 100%);
  color: #fff;
  padding: 8px 14px;
  border-radius: 999px;
  display: flex; align-items: center; gap: 10px;
  box-shadow: 0 6px 16px rgba(4,120,87,.4);
  z-index: 80;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: all .3s;
}
.reciter-bar:hover { transform: scale(1.05); }
.reciter-bar .pulse-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #fbbf24;
}
.reciter-bar.playing .pulse-dot { animation: notifPulse 1.2s ease-in-out infinite; }

/* ========================= TOPBAR HOME BUTTON (centered) ========================= */
.topbar-home-btn {
  background: var(--grad-primary) !important;
  color: #fff !important;
  width: 44px !important; height: 44px !important;
  border-radius: 12px !important;
  box-shadow: 0 4px 12px rgba(31,41,55,.35);
  transition: all .25s cubic-bezier(.4,0,.2,1);
}
.topbar-home-btn:hover {
  transform: translateY(-2px) scale(1.05);
  box-shadow: 0 8px 18px rgba(31,41,55,.45);
}
.topbar-home-btn:active { transform: translateY(0) scale(1.0); }
.topbar-home-btn svg { color: #fff; }

/* Wallet button */
.topbar-wallet-btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 6px 14px 6px 8px;
  background: linear-gradient(135deg, var(--primary-50), #fff);
  border: 1.5px solid var(--primary);
  border-radius: 999px;
  cursor: pointer;
  transition: transform .2s, box-shadow .2s, background .2s;
  box-shadow: 0 2px 8px rgba(13,148,136,.12);
  font-family: inherit;
}
.topbar-wallet-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 16px rgba(13,148,136,.25);
  background: linear-gradient(135deg, var(--primary-100), var(--primary-50));
}
.topbar-wallet-btn:active { transform: translateY(0); }
.topbar-wallet-btn .wallet-icon {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  display: grid; place-items: center;
  flex-shrink: 0;
  box-shadow: 0 2px 6px rgba(13,148,136,.4);
}
.topbar-wallet-btn .wallet-icon svg {
  width: 16px; height: 16px;
  color: #fff;
}
.topbar-wallet-btn .wallet-meta {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  line-height: 1.15;
}
.topbar-wallet-btn .wallet-label {
  font-size: 10px;
  color: var(--text-muted);
  font-weight: 600;
}
.topbar-wallet-btn .wallet-amount {
  font-size: 13px;
  font-weight: 800;
  color: var(--primary-dark);
  white-space: nowrap;
}
[data-theme="dark"] .topbar-wallet-btn {
  background: rgba(20,184,166,.10);
  border-color: rgba(45,212,191,.45);
  box-shadow: 0 2px 8px rgba(0,0,0,.3);
}
[data-theme="dark"] .topbar-wallet-btn:hover {
  background: rgba(20,184,166,.18);
  box-shadow: 0 6px 16px rgba(20,184,166,.35);
}
[data-theme="dark"] .topbar-wallet-btn .wallet-label { color: rgba(255,255,255,.7); }
[data-theme="dark"] .topbar-wallet-btn .wallet-amount { color: #2dd4bf; }

/* Wallet pulse animation when value changes */
.topbar-wallet-btn.wallet-flash .wallet-icon {
  animation: wallet-flash .6s cubic-bezier(.4,0,.2,1);
}
@keyframes wallet-flash {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.18); box-shadow: 0 0 0 8px rgba(20,184,166,.25); }
  100% { transform: scale(1); }
}

@media (max-width: 768px) {
  .topbar-wallet-btn .wallet-meta { display: none; }
  .topbar-wallet-btn { padding: 6px; }
}

/* ========================= RECITER INLINE (next to search) ========================= */
.reciter-inline {
  display: flex; align-items: center; gap: 8px;
  background: linear-gradient(135deg, #064e3b 0%, #047857 100%);
  color: #fff;
  padding: 8px 14px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: all .25s cubic-bezier(.4,0,.2,1);
  box-shadow: 0 4px 12px rgba(4,120,87,.35);
  white-space: nowrap;
  user-select: none;
}
.reciter-inline:hover { transform: translateY(-2px) scale(1.03); box-shadow: 0 6px 16px rgba(4,120,87,.5); }
.reciter-inline:active { transform: translateY(0) scale(1.0); }
.reciter-inline .pulse-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #fbbf24;
}
.reciter-inline.playing .pulse-dot { animation: notifPulse 1.2s ease-in-out infinite; }

/* Hide reciter inline label on small screens, keep just the dot */
@media (max-width: 900px) {
  .reciter-inline { padding: 8px 10px; }
  #reciter-label-inline { display: none; }
}
@media (max-width: 700px) {
  .topbar-home-btn { width: 38px !important; height: 38px !important; }
}

/* ========================= SUPPLIERS UI ========================= */
.sup-tabs {
  display: flex; gap: 6px;
  margin-bottom: 14px;
  background: var(--surface);
  padding: 6px;
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
  flex-wrap: wrap;
}
.sup-tab {
  flex: 1; min-width: 160px;
  padding: 10px 16px;
  border-radius: var(--radius);
  background: transparent;
  color: var(--text-muted);
  font-size: 13px;
  font-weight: 700;
  transition: all .25s cubic-bezier(.4,0,.2,1);
  cursor: pointer;
  white-space: nowrap;
}
.sup-tab:hover { background: var(--surface-2); color: var(--text); }
.sup-tab.active {
  background: var(--grad-primary);
  color: #fff;
  box-shadow: 0 4px 12px rgba(31,41,55,.3);
}
.sup-cat-chip {
  display: inline-block;
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 700;
  border: 1px solid;
  white-space: nowrap;
}


.logo-upload-section {
  display: flex; gap: 20px; align-items: center;
  padding: 18px; margin-bottom: 22px;
  background: linear-gradient(135deg, var(--primary-50) 0%, transparent 100%);
  border: 1.5px dashed var(--border-strong);
  border-radius: var(--radius-lg);
  flex-wrap: wrap;
}
.logo-upload-preview {
  width: 140px; height: 140px;
  border-radius: var(--radius-lg);
  background: var(--surface);
  border: 1.5px solid var(--border);
  display: grid; place-items: center;
  overflow: hidden;
  flex-shrink: 0;
  box-shadow: var(--shadow-sm);
}
.logo-upload-preview img {
  width: 100%; height: 100%;
  object-fit: contain;
  padding: 8px;
}
.logo-placeholder {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  color: var(--text-soft);
  font-size: 12px;
  font-weight: 600;
}
.logo-upload-actions {
  display: flex; flex-direction: column; gap: 10px;
  flex: 1; min-width: 200px;
}
.logo-hint {
  font-size: 12px;
  color: var(--text-muted);
  line-height: 1.7;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 12px;
  margin-top: 4px;
}
@media (max-width: 600px) {
  .logo-upload-section { padding: 14px; gap: 14px; }
  .logo-upload-preview { width: 110px; height: 110px; }
}

/* ========================= REPORTS LAYOUT ========================= */
.reports-layout {
  display: grid;
  grid-template-columns: 220px 1fr;
  gap: 18px;
  align-items: start;
}
.reports-tabs-sidebar {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 10px;
  display: flex; flex-direction: column; gap: 4px;
  position: sticky; top: calc(var(--banner-h) + var(--topbar-h) + 16px);
  box-shadow: var(--shadow-sm);
}
.rep-tab {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius);
  background: transparent;
  color: var(--text);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  text-align: right;
  border: 1.5px solid transparent;
  transition: all var(--transition);
}
.rep-tab:hover { background: var(--surface-2); }
.rep-tab.active {
  background: var(--grad-primary);
  color: #fff;
  box-shadow: 0 4px 12px rgba(15,118,110,.3);
  transform: translateX(-2px);
}
.rep-tab-icon { font-size: 18px; }

.reports-main {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.report-toolbar {
  padding: 14px 18px;
  background: var(--surface-2);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
}
.report-toolbar-title { font-size: 16px; font-weight: 800; }
.report-toolbar-controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.report-toolbar-controls .form-control { padding: 6px 10px; font-size: 13px; }

.report-content { padding: 20px; }

/* Stat cards (modern gradient cards in reports) */
.rep-cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 14px;
  margin-bottom: 20px;
}
.rep-stat-card {
  border-radius: var(--radius-lg);
  padding: 18px;
  color: #fff;
  position: relative; overflow: hidden;
  box-shadow: 0 6px 18px rgba(0,0,0,.08);
  transition: transform .25s, box-shadow .25s;
}
.rep-stat-card:hover { transform: translateY(-3px); box-shadow: 0 12px 28px rgba(0,0,0,.14); }
.rep-stat-card::after {
  content: ''; position: absolute; top: -30%; right: -30%; width: 160%; height: 160%;
  background: radial-gradient(circle, rgba(255,255,255,.15), transparent 50%);
  pointer-events: none;
}
.rep-stat-icon { font-size: 26px; margin-bottom: 8px; filter: drop-shadow(0 2px 4px rgba(0,0,0,.2)); }
.rep-stat-label { font-size: 12px; opacity: .9; font-weight: 600; }
.rep-stat-value { font-size: 22px; font-weight: 800; margin-top: 4px; letter-spacing: -.5px; }
.rep-stat-sub { font-size: 11px; opacity: .85; margin-top: 4px; }

.grad-teal { background: linear-gradient(135deg, #0f766e 0%, #14b8a6 100%); }
.grad-green { background: linear-gradient(135deg, #059669 0%, #10b981 100%); }
.grad-sky { background: linear-gradient(135deg, #0284c7 0%, #38bdf8 100%); }
.grad-orange { background: linear-gradient(135deg, #d97706 0%, #f59e0b 100%); }
.grad-red { background: linear-gradient(135deg, #dc2626 0%, #ef4444 100%); }
.grad-purple { background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%); }
.grad-pink { background: linear-gradient(135deg, #db2777 0%, #ec4899 100%); }

.rep-two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 18px;
}
@media (max-width: 900px) { .rep-two-col { grid-template-columns: 1fr; } }

.rep-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  margin-bottom: 16px;
}
.rep-panel-header {
  padding: 12px 16px;
  background: linear-gradient(90deg, var(--primary-50) 0%, transparent 100%);
  border-bottom: 1px solid var(--border);
}
.rep-panel-header h4 { margin: 0; font-size: 14px; font-weight: 800; }
.rep-panel-body { padding: 16px; }
.rep-empty { padding: 24px; text-align: center; color: var(--text-muted); font-size: 13px; }
.rep-empty-card {
  padding: 60px 20px; text-align: center; background: var(--surface-2); border-radius: var(--radius-lg);
}
.rep-empty-icon { font-size: 56px; margin-bottom: 14px; opacity: .4; }
.rep-empty-card h3 { font-size: 16px; margin-bottom: 6px; }
.rep-empty-card p { color: var(--text-muted); font-size: 13px; }
.rep-empty-cell { text-align: center; color: var(--text-muted); padding: 30px !important; }

/* Reports table */
.rep-table {
  width: 100%; border-collapse: collapse;
}
.rep-table th {
  text-align: right;
  padding: 11px 14px;
  background: var(--surface-2);
  color: var(--text-muted);
  font-weight: 700;
  font-size: 12px;
  border-bottom: 2px solid var(--border);
  position: sticky; top: 0;
}
.rep-table td {
  padding: 11px 14px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  vertical-align: middle;
}
.rep-table tr:hover td { background: var(--surface-2); }
.rep-cell-sub { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
.rep-table tr.rep-totals td {
  background: linear-gradient(90deg, rgba(245,158,11,.15), rgba(245,158,11,.05));
  font-weight: 800; border-top: 2px solid var(--warning);
  font-size: 14px;
}

.rep-table-simple { width: 100%; border-collapse: collapse; }
.rep-table-simple td { padding: 10px 8px; border-bottom: 1px dashed var(--border); font-size: 13px; }
.rep-table-simple td:last-child { text-align: left; font-weight: 700; }
.rep-row-total td { background: var(--surface-2); font-weight: 700; }
.rep-row-grand td { background: var(--primary-50); font-size: 15px !important; border-top: 2px solid var(--primary); border-bottom: 2px solid var(--primary) !important; }

/* Ranking rows */
.rep-rank-row {
  display: grid;
  grid-template-columns: 32px 1fr auto;
  gap: 10px; align-items: center;
  padding: 10px 8px;
  border-bottom: 1px dashed var(--border);
  transition: background .25s;
}
.rep-rank-row:last-child { border-bottom: none; }
.rep-rank-row:hover { background: var(--surface-2); }
.rep-rank-num {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--grad-primary);
  color: #fff;
  display: grid; place-items: center;
  font-weight: 800; font-size: 13px;
}
.rep-rank-info .rep-rank-name { font-weight: 700; font-size: 13px; }
.rep-rank-info .rep-rank-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.rep-rank-val { font-weight: 800; color: var(--success); font-size: 14px; }

/* Bar rows for distributions */
.rep-bar-row { margin-bottom: 12px; }
.rep-bar-label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; font-size: 12px; }
.rep-bar-label span { color: var(--text-muted); font-size: 11px; }
.rep-bar-track {
  height: 10px; background: var(--surface-2); border-radius: 999px; overflow: hidden;
  border: 1px solid var(--border);
}
.rep-bar-fill {
  height: 100%; background: var(--grad-primary);
  border-radius: 999px;
  transition: width .6s;
}
.rep-bar-pct { font-size: 10px; color: var(--text-muted); margin-top: 2px; text-align: left; }

/* ============== CATEGORY BREAKDOWN (issuances report) ============== */
.cat-summary-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 12px;
}
.cat-summary-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 16px;
  padding: 14px;
  position: relative;
  overflow: hidden;
  transition: all .25s;
  border-inline-start: 4px solid var(--cat-color, #64748b);
}
.cat-summary-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(15,23,42,.08);
  border-color: var(--cat-color, var(--primary));
}
.cat-summary-head {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 12px;
}
.cat-summary-icon {
  width: 40px; height: 40px;
  border-radius: 12px;
  display: grid; place-items: center;
  font-size: 20px;
  color: white;
  flex-shrink: 0;
  box-shadow: 0 4px 12px rgba(0,0,0,.10), inset 0 1px 0 rgba(255,255,255,.25);
}
.cat-summary-title { flex: 1; min-width: 0; }
.cat-summary-name {
  font-size: 14px; font-weight: 900;
  color: var(--text);
  letter-spacing: -0.2px;
  line-height: 1.2;
}
.cat-summary-meta {
  font-size: 11px; font-weight: 600;
  color: var(--text-muted);
  margin-top: 2px;
}
.cat-summary-share {
  font-size: 14px; font-weight: 900;
  color: var(--cat-color, var(--text));
  background: color-mix(in srgb, var(--cat-color, #64748b) 12%, transparent);
  padding: 4px 10px;
  border-radius: 999px;
}
.cat-summary-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 10px;
}
.cat-stat {
  display: flex; flex-direction: column; gap: 2px;
}
.cat-stat-lbl {
  font-size: 10.5px; font-weight: 700;
  color: var(--text-soft);
  letter-spacing: .3px;
}
.cat-stat-val {
  font-size: 18px; font-weight: 900;
  color: var(--text);
  letter-spacing: -0.4px;
  line-height: 1.1;
}
.cat-stat-money { color: var(--cat-color, var(--success)); }
.cat-progress-track {
  height: 6px;
  background: color-mix(in srgb, var(--cat-color, #64748b) 12%, var(--surface-2));
  border-radius: 999px;
  overflow: hidden;
}
.cat-progress-fill {
  height: 100%;
  border-radius: 999px;
  transition: width .8s cubic-bezier(.34,1.56,.64,1);
}

/* === Detail products under each category === */
.cat-detail-section {
  margin-bottom: 16px;
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}
.cat-detail-section:last-child { margin-bottom: 0; }
.cat-detail-header {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  background: color-mix(in srgb, var(--cat-color, #64748b) 10%, var(--surface));
  border-bottom: 1px solid var(--border);
}
[data-theme="dark"] .cat-detail-header {
  background: color-mix(in srgb, var(--cat-color, #64748b) 18%, var(--surface));
}
.cat-detail-icon {
  width: 28px; height: 28px;
  border-radius: 8px;
  display: grid; place-items: center;
  font-size: 14px;
  color: white;
  flex-shrink: 0;
}
.cat-detail-name {
  flex: 1;
  font-size: 13px; font-weight: 800;
  color: var(--cat-color, var(--text));
  letter-spacing: -0.2px;
}
.cat-detail-total {
  font-size: 12.5px;
  font-weight: 800;
  color: var(--text);
  white-space: nowrap;
}
.cat-detail-total small {
  font-size: 10.5px;
  color: var(--text-muted);
  font-weight: 600;
}
.cat-detail-products {
  display: flex; flex-direction: column;
  background: var(--surface);
}
.cat-product-row {
  display: grid;
  grid-template-columns: minmax(180px, 1.5fr) minmax(100px, 2fr) auto;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  border-top: 1px solid var(--border);
}
.cat-product-row:first-child { border-top: none; }
.cat-product-row:hover { background: color-mix(in srgb, var(--cat-color, #64748b) 4%, transparent); }
.cat-product-name {
  display: flex; align-items: center; gap: 8px;
  min-width: 0;
}
.cat-product-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.cat-product-name b {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}
.cat-product-name small {
  font-size: 10.5px;
  color: var(--text-muted);
  font-weight: 600;
  white-space: nowrap;
}
.cat-product-bar-wrap { width: 100%; }
.cat-product-bar {
  height: 6px;
  background: var(--surface-2);
  border-radius: 999px;
  overflow: hidden;
}
.cat-product-bar-fill {
  height: 100%;
  border-radius: 999px;
  transition: width .6s ease;
}
.cat-product-stats {
  display: flex; flex-direction: column; align-items: flex-end;
  white-space: nowrap;
}
.cat-product-qty {
  font-size: 13.5px;
  font-weight: 900;
  color: var(--text);
  letter-spacing: -0.3px;
}
.cat-product-money {
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 700;
  margin-top: 1px;
}

/* === Grand total footer === */
.rep-grand-total {
  margin-top: 14px;
  background: linear-gradient(135deg, rgba(16,185,129,.06), rgba(124,58,237,.04));
  border: 1.5px solid rgba(16,185,129,.30);
  border-radius: 16px;
  overflow: hidden;
}
[data-theme="dark"] .rep-grand-total {
  background: linear-gradient(135deg, rgba(16,185,129,.12), rgba(124,58,237,.08));
  border-color: rgba(16,185,129,.35);
}
.rep-grand-header {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 18px;
  background: linear-gradient(135deg, #047857, #10b981);
  color: white;
  font-size: 15px;
  font-weight: 900;
  letter-spacing: -0.2px;
}
.rep-grand-icon { font-size: 20px; }
.rep-grand-body { padding: 14px 18px; }
.rep-grand-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 9px 0;
  border-bottom: 1px dashed var(--border);
  font-size: 13px;
}
.rep-grand-cat { display: inline-flex; align-items: center; gap: 6px; font-weight: 700; }
.rep-grand-cat b { font-weight: 800; }
.rep-grand-vals {
  display: inline-flex; align-items: center; gap: 8px;
  font-weight: 700;
  color: var(--text);
}
.rep-grand-qty {
  background: rgba(15,23,42,.06);
  padding: 3px 10px;
  border-radius: 999px;
  font-size: 12px;
}
[data-theme="dark"] .rep-grand-qty { background: rgba(255,255,255,.06); }
.rep-grand-sep { color: var(--text-soft); }
.rep-grand-money { color: var(--success); font-weight: 800; }
.rep-grand-final {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 0 4px;
  border-top: 2px solid var(--success);
  margin-top: 6px;
  font-size: 16px;
}
.rep-grand-final-lbl {
  font-weight: 900;
  color: var(--text);
  letter-spacing: -0.3px;
}
.rep-grand-final-vals {
  display: inline-flex; align-items: center; gap: 10px;
}
.rep-grand-final-qty {
  background: linear-gradient(135deg, #047857, #10b981);
  color: white;
  padding: 6px 14px;
  border-radius: 999px;
  font-size: 14px;
  font-weight: 900;
  box-shadow: 0 4px 12px rgba(5,150,105,.25);
}
.rep-grand-final-money {
  font-size: 20px;
  font-weight: 900;
  letter-spacing: -0.6px;
  background: linear-gradient(135deg, #047857, #10b981);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.rep-grand-insight {
  margin-top: 10px;
  padding: 10px 14px;
  background: rgba(245,158,11,.10);
  border-inline-start: 3px solid #f59e0b;
  border-radius: 8px;
  font-size: 12.5px;
  color: var(--text);
  line-height: 1.6;
}
[data-theme="dark"] .rep-grand-insight {
  background: rgba(245,158,11,.15);
}
.rep-grand-insight b { color: #c2410c; font-weight: 800; }
[data-theme="dark"] .rep-grand-insight b { color: #fbbf24; }

/* Category pill in operations table */
.cat-pill {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 9px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 700;
  white-space: nowrap;
}

/* ============== LIVE PROFIT PANEL (issuance form) ============== */
.profit-panel {
  background: linear-gradient(135deg, rgba(16,185,129,.06), rgba(124,58,237,.04));
  border: 1.5px solid rgba(16,185,129,.25);
  border-radius: 14px;
  padding: 14px;
  animation: profitFadeIn .3s ease-out;
}
[data-theme="dark"] .profit-panel {
  background: linear-gradient(135deg, rgba(16,185,129,.10), rgba(124,58,237,.06));
  border-color: rgba(16,185,129,.30);
}
@keyframes profitFadeIn {
  from { opacity: 0; transform: translateY(-4px); }
  to   { opacity: 1; transform: translateY(0); }
}
.profit-panel-header {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 10px;
}
.profit-panel-icon { font-size: 18px; }
.profit-panel-title {
  font-size: 13.5px; font-weight: 800;
  color: var(--text);
  letter-spacing: -0.2px;
}
.profit-panel-badge {
  margin-inline-start: auto;
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 11.5px;
  font-weight: 800;
  letter-spacing: -0.1px;
}
.profit-panel-badge.badge-success {
  background: linear-gradient(135deg, #10b981, #047857);
  color: white;
  box-shadow: 0 2px 8px rgba(5,150,105,.30);
}
.profit-panel-badge.badge-warning {
  background: linear-gradient(135deg, #f59e0b, #c2410c);
  color: white;
  box-shadow: 0 2px 8px rgba(234,88,12,.30);
}
.profit-panel-badge.badge-loss {
  background: linear-gradient(135deg, #ef4444, #991b1b);
  color: white;
  box-shadow: 0 2px 8px rgba(220,38,38,.35);
}

.profit-rows {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 10px;
}
.profit-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 9px 14px;
  border-bottom: 1px dashed var(--border);
  font-size: 13px;
}
.profit-row:last-child { border-bottom: none; }
.profit-row-label {
  color: var(--text-muted);
  font-weight: 600;
}
.profit-row-val {
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.2px;
}
.profit-row-final {
  background: rgba(15,23,42,.03);
  padding: 12px 14px;
  font-size: 14px;
}
[data-theme="dark"] .profit-row-final {
  background: rgba(255,255,255,.03);
}
.profit-row-final .profit-row-label {
  color: var(--text);
  font-weight: 800;
}
.profit-row-final .profit-row-val {
  font-size: 18px;
  font-weight: 900;
  letter-spacing: -0.5px;
}
.profit-row-final.profit-positive { background: rgba(16,185,129,.08); }
.profit-row-final.profit-positive .profit-row-val { color: #059669; }
.profit-row-final.profit-warning  { background: rgba(245,158,11,.10); }
.profit-row-final.profit-warning  .profit-row-val { color: #c2410c; }
.profit-row-final.profit-loss     { background: rgba(220,38,38,.10); }
.profit-row-final.profit-loss     .profit-row-val { color: #b91c1c; }
[data-theme="dark"] .profit-row-final.profit-positive .profit-row-val { color: #34d399; }
[data-theme="dark"] .profit-row-final.profit-warning  .profit-row-val { color: #fbbf24; }
[data-theme="dark"] .profit-row-final.profit-loss     .profit-row-val { color: #fca5a5; }

.profit-margin-bar {
  position: relative;
  height: 22px;
  background: var(--surface-2);
  border-radius: 999px;
  overflow: hidden;
  margin-bottom: 10px;
  border: 1px solid var(--border);
}
.profit-margin-fill {
  height: 100%;
  background: linear-gradient(90deg, #10b981, #047857);
  border-radius: 999px;
  transition: width .5s ease, background .3s;
}
.profit-margin-text {
  position: absolute;
  inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 11.5px;
  font-weight: 800;
  color: var(--text);

}

.cf-out .cf-summary-val { color: #b91c1c; }

.cf-chart {

}
