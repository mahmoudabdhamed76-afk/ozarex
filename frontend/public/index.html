/* =========================================================
   EDIT ISSUANCE — safe edit
   - Quantity can be changed (auto-adjusts stock and balance)
   - Customer cannot be changed (would mess up payments)
   - Product cannot be changed (different stock tracking)
========================================================= */
function editIssuance(id) {
  const i = (DB.data.issuances||[]).find(x => x.id === id);
  if (!i) return;

  promptAuditReason({
    title: 'سبب تعديل صرف الورق',
    description: `تعديل عملية صرف #${i.number} - ${i.productName}`,
    suggestedReasons: [
      'تصحيح كمية الصرف',
      'تعديل السعر',
      'تصحيح التاريخ',
      'تحديث الملاحظات'
    ]
  }).then(reason => {
    window._pendingAuditReason = reason;
    _showEditIssuanceModal(i);
  }).catch(() => {});
}

function _showEditIssuanceModal(i) {
  const c = DB.data.customers.find(x => x.id === i.customerId);
  const p = DB.data.products.find(x => x.id === i.productId);
  // Available stock = current stock + this issuance's qty (since we'll revert it before re-applying)
  const availableStock = (p ? p.quantity : 0) + i.quantity;

  openModal(`✏️ تعديل صرف ورق #${i.number}`, `
    <form id="edit-issuance-form">
      <div style="padding:10px 14px;background:rgba(245,158,11,.10);border-inline-start:3px solid #f59e0b;border-radius:8px;margin-bottom:14px;font-size:12.5px;color:var(--text)">
        ⚠️ <b>ملاحظة:</b> لا يمكن تغيير المركز أو نوع الورق. لو محتاج تغيير دول، احذف العملية وأنشئ واحدة جديدة.
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>المركز</label>
          <input class="form-control" value="${escapeHtml(c?c.name:'-')}" readonly style="background:var(--surface-2)">
        </div>
        <div class="form-group">
          <label>الصنف</label>
          <input class="form-control" value="${escapeHtml(i.productName||'-')}" readonly style="background:var(--surface-2)">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>التاريخ *</label>
          <input class="form-control" type="date" name="date" value="${i.date}" required>
        </div>
        <div class="form-group">
          <label>المخزون المتاح</label>
          <input class="form-control" value="${fmt(availableStock)} ${escapeHtml(p?p.unit||'':'')}" readonly style="background:var(--surface-2);color:var(--success);font-weight:800">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>الكمية *</label>
          <input class="form-control" type="number" step="any" min="0.01" max="${availableStock}" name="quantity" id="ei2-qty" value="${i.quantity}" required oninput="recalcEditIssuanceTotal()">
          <small style="color:var(--text-muted);font-size:11px">الحد الأقصى: ${fmt(availableStock)}</small>
        </div>
        <div class="form-group">
          <label>السعر للوحدة *</label>
          <input class="form-control" type="number" step="0.01" min="0" name="unitPrice" id="ei2-price" value="${i.unitPrice||0}" required oninput="recalcEditIssuanceTotal()">
        </div>
      </div>

      <div style="padding:14px;background:var(--bg-soft);border-radius:10px;margin:10px 0;font-size:15px">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span><b>الإجمالي الجديد:</b></span>
          <b id="ei2-total-display" style="font-size:22px;color:var(--success)">${fmtCurrency(i.total||0)}</b>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--text-muted);margin-top:4px">
          <span>الإجمالي القديم: ${fmtCurrency(i.total||0)}</span>
          <span id="ei2-diff" style="font-weight:700"></span>
        </div>
      </div>

      <input type="hidden" name="_issuanceId" value="${i.id}">
    </form>
  `, `
    <button class="btn btn-secondary" onclick="closeModal();delete window._pendingAuditReason">إلغاء</button>
    <button class="btn btn-primary" onclick="saveEditedIssuance()">💾 حفظ التعديلات</button>
  `, 'large');
}

function recalcEditIssuanceTotal() {
  const qty = parseFloat(document.getElementById('ei2-qty').value) || 0;
  const price = parseFloat(document.getElementById('ei2-price').value) || 0;
  const newTotal = qty * price;
  const issuanceId = document.querySelector('#edit-issuance-form input[name="_issuanceId"]').value;
  const i = (DB.data.issuances||[]).find(x => x.id === issuanceId);
  const oldTotal = i ? (i.total || 0) : 0;
  const diff = newTotal - oldTotal;
  document.getElementById('ei2-total-display').textContent = fmtCurrency(newTotal);
  const diffEl = document.getElementById('ei2-diff');
  if (diffEl) {
    if (Math.abs(diff) < 0.01) {
      diffEl.textContent = 'بدون تغيير';
      diffEl.style.color = 'var(--text-muted)';
    } else if (diff > 0) {
      diffEl.textContent = `▲ زيادة ${fmtCurrency(diff)}`;
      diffEl.style.color = 'var(--danger)';
    } else {
      diffEl.textContent = `▼ نقصان ${fmtCurrency(Math.abs(diff))}`;
      diffEl.style.color = 'var(--success)';
    }
  }
}

function saveEditedIssuance() {
  const form = document.getElementById('edit-issuance-form');
  const issuanceId = form._issuanceId.value;
  const i = (DB.data.issuances||[]).find(x => x.id === issuanceId);
  if (!i) { toast('عملية الصرف غير موجودة', 'error'); return; }

  const newQty = parseFloat(form.quantity.value) || 0;
  const newPrice = parseFloat(form.unitPrice.value) || 0;
  const newDate = form.date.value;
  if (newQty <= 0 || newPrice < 0) { toast('قيم غير صحيحة', 'error'); return; }

  const p = DB.data.products.find(x => x.id === i.productId);
  if (!p) { toast('المنتج غير موجود', 'error'); return; }

  // Check stock: (current stock + old qty being returned) must be >= new qty
  const availableAfterRevert = p.quantity + i.quantity;
  if (newQty > availableAfterRevert) {
    toast(`الكمية المطلوبة (${fmt(newQty)}) أكبر من المتاح (${fmt(availableAfterRevert)})`, 'error');
    return;
  }

  const before = JSON.parse(JSON.stringify(i));
  const c = DB.data.customers.find(x => x.id === i.customerId);

  // Revert old stock & balance
  p.quantity += i.quantity;
  if (c) {
    const oldRemaining = (i.total || 0) - (i.paid || 0);
    c.balance = Math.max(0, c.balance - oldRemaining);
  }

  // Apply new values
  const newTotal = newQty * newPrice;
  i.quantity = newQty;
  i.unitPrice = newPrice;
  i.total = newTotal;
  i.date = newDate;
  i.status = (i.paid||0) >= newTotal ? 'paid' : (i.paid||0) > 0 ? 'partial' : 'unpaid';
  i.updatedAt = Date.now();

  // Apply new stock deduction & balance
  p.quantity -= newQty;
  if (c) {
    const newRemaining = newTotal - (i.paid || 0);
    c.balance += newRemaining;
  }

  // Update linked invoice (if any) to match
  if (i.invoiceId) {
    const inv = DB.data.invoices.find(x => x.id === i.invoiceId);
    if (inv && inv.items && inv.items.length === 1) {
      inv.items[0].qty = newQty;
      inv.items[0].price = newPrice;
      inv.items[0].total = newTotal;
      inv.subtotal = newTotal;
      inv.total = newTotal;
      inv.date = newDate;
      inv.status = i.status;
      inv.updatedAt = Date.now();
    }
  }

  // Update related stock move
  const move = (DB.data.stockMoves||[]).find(m => (m.reference||'').includes(`صرف ورق #${i.number}`) || (m.note||'').includes(`صرف ورق #${i.number}`));
  if (move) {
    move.quantity = newQty;
    move.date = newDate;
  }

  DB.save();
  logAudit({
    operation: 'edit',
    table: 'issuances',
    recordId: i.id,
    recordLabel: `صرف #${i.number} - ${c?c.name:'-'} - ${i.productName}`,
    before, after: JSON.parse(JSON.stringify(i)),
    reason: window._pendingAuditReason || ''
  });
  delete window._pendingAuditReason;
  closeModal();
  playTone('save');
  toast(`✓ تم تحديث عملية الصرف #${i.number}`);
  renderIssuances();
  renderSidebar();
  updateNotifBadge();
}

function deleteIssuance(id) {
  const i = (DB.data.issuances||[]).find(x => x.id === id);
  if (!i) return;
  promptAuditReason({
    title: 'سبب حذف عملية الصرف',
    description: `حذف صرف ورق #${i.number} (${fmt(i.quantity)} ${i.unit||''} - ${fmtCurrency(i.total)}) عملية حساسة وتتطلب توثيق`,
    suggestedReasons: [
      'صرف مكرر بالخطأ',
      'إلغاء طلب من المركز',
      'تصحيح خطأ في الإدخال',
      'استبدال بصرف جديد بكمية مختلفة'
    ]
  }).then(reason => {
    confirmDialog(`هل أنت متأكد من حذف عملية صرف الورق #${i.number}؟
سيتم:
- إرجاع الكمية للمخزن (${fmt(i.quantity)})
- خصم المبلغ من رصيد المركز (${fmtCurrency(i.total - (i.paid||0))})
- حذف الفاتورة المرتبطة والمدفوعات`, () => {
      const before = JSON.parse(JSON.stringify(i));
      const product = DB.data.products.find(p => p.id === i.productId);
      if (product) product.quantity += i.quantity;
      DB.data.stockMoves = (DB.data.stockMoves||[]).filter(m => !(m.reference||'').includes(`صرف ورق #${i.number}`));
      const customer = DB.data.customers.find(c => c.id === i.customerId);
      if (customer) {
        const owed = i.total - (i.paid||0);
        customer.balance = Math.max(0, (customer.balance||0) - owed);
      }
      DB.data.payments = DB.data.payments.filter(p => p.issuanceId !== i.id);
      if (i.invoiceId) {
        DB.data.invoices = DB.data.invoices.filter(inv => inv.id !== i.invoiceId);
      }
      DB.data.issuances = DB.data.issuances.filter(x => x.id !== id);
      DB.save();
      logAudit({
        operation: 'delete', table: 'issuances',
        recordId: id,
        recordLabel: `صرف #${i.number} - ${i.customerName} - ${i.productName}`,
        before, after: null, reason
      });
      playTone('delete');
      toast('تم حذف العملية وإرجاع الكميات');
      renderIssuances();
      renderSidebar();
      updateNotifBadge();
    });
  }).catch(() => {});
}

function bt_findInvoice(num) {
  if (!num) return;
  const inv = DB.data.invoices.find(x => String(x.number) === String(num).trim());
  const info = document.getElementById('bt-inv-info');
  if (!info) return;
  if (inv) {
    const c = DB.data.customers.find(x=>x.id===inv.customerId);
    info.innerHTML = `✓ <b style="color:var(--success)">${escapeHtml(c?c.name:'-')} - ${fmtCurrency(inv.total)} - متبقي ${fmtCurrency(inv.total-inv.paid)}</b>`;
    document.querySelector('#bt-form [name="invoiceId"]').value = inv.id;
    const custSel = document.getElementById('bt-customer');
    if (custSel) custSel.value = inv.customerId;
    document.getElementById('bt-remaining').value = (inv.total - inv.paid).toFixed(2);
  } else {
    info.innerHTML = `<span style="color:var(--danger)">✗ لا توجد فاتورة برقم #${escapeHtml(num)}</span>`;
  }
}

function bt_calcRemaining() {
  const remaining = parseFloat(document.getElementById('bt-remaining').value) || 0;
  const status = document.getElementById('bt-status-display');
  if (!status) return;
  status.style.display = 'block';
  if (remaining <= 0) {
    status.style.background = 'linear-gradient(135deg,#ecfdf5,#d1fae5)';
    status.style.color = '#065f46';

function saveBankTransfer(id) {
  const fd = new FormData(document.getElementById('bt-form'));
  const d = Object.fromEntries(fd);
  d.amount = parseFloat(d.amount) || 0;
  d.remaining = parseFloat(d.remaining) || 0;
  if (!d.customerId) { toast('اختر المركز / العميل', 'error'); return; }
  if (!d.amount || d.amount <= 0) { toast('أدخل مبلغ التحويل', 'error'); return; }
  const customer = DB.data.customers.find(c => c.id === d.customerId);
  d.customerName = customer ? customer.name : '';

  if (id) {
    const t = DB.data.bankTransfers.find(x=>x.id===id);
    if (t) Object.assign(t, d);
  } else {
    DB.data.bankTransfers.push({
      id: 'bt_' + uid(),
      ...d,
      createdAt: Date.now()
    });
  }
  DB.save();
  closeModal();
  playTone('save');
  celebrate();
  toast(id ? '✓ تم تحديث التحويل البنكي' : '🏦 تم تسجيل التحويل البنكي', 'success');
  renderTransfersPage();
}

function deleteBankTransfer(id) {
  const t = DB.data.bankTransfers.find(x=>x.id===id);
  if (!t) return;
  confirmDialog(`حذف التحويل بقيمة ${fmtCurrency(t.amount)} من "${t.customerName}"؟`, () => {
    DB.data.bankTransfers = DB.data.bankTransfers.filter(x=>x.id!==id);
    DB.save();
    playTone('delete');
    toast('تم حذف التحويل');
    renderTransfersPage();
  });
}

function exportBankTransfersCSV() {
  if (!DB.data.bankTransfers || DB.data.bankTransfers.length === 0) {
    toast('لا توجد تحويلات للتصدير', 'info');
    return;
  }
  const rows = [['التاريخ','رقم الفاتورة','المركز','المبلغ المحول','المتبقي','البنك','المحوّل','المرجع','ملاحظات']];
  DB.data.bankTransfers.forEach(t => {
    rows.push([t.date, t.invoiceNumber||'', t.customerName||'', t.amount||0, t.remaining||0, t.bankName||'', t.depositor||'', t.reference||'', t.note||'']);
  });
  const csv = rows.map(r => r.map(cell => {
    const s = String(cell == null ? '' : cell);
    return s.includes(',')||s.includes('"')||s.includes('\n') ? '"' + s.replace(/"/g,'""') + '"' : s;
  }).join(',')).join('\r\n');
  const blob = new Blob(['\uFEFF' + csv], { type:'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `bank-transfers_${todayStr()}.csv`; a.click();
  URL.revokeObjectURL(url);
  toast('تم تصدير ملف Excel');
}

  { v:'paper',     l:'ورق وكرتون',          c:'#0891b2' },

];

function getSupplierCategory(v) { return SUPPLIER_CATEGORIES.find(c => c.v === v) || SUPPLIER_CATEGORIES[6]; }

/* ---------- Smart computed metrics per supplier ---------- */
function supplierMetrics(supplierId) {
  const purchases = (DB.data.expenses || []).filter(e => e.supplierId === supplierId && e.kind === 'purchase');
  const payments = (DB.data.supplierPayments || []).filter(p => p.supplierId === supplierId);
  const totalPurchases = purchases.reduce((s,p)=> s + (p.amount||0), 0);
  const totalPaid = payments.reduce((s,p)=> s + (p.amount||0), 0);
  const sup = DB.data.suppliers.find(x => x.id === supplierId);
  const openingBalance = sup ? (sup.openingBalance || 0) : 0;
  // balance = (we owe them) = openingBalance + totalPurchases - totalPaid
  const balance = openingBalance + totalPurchases - totalPaid;
  const lastPurchase = purchases.sort((a,b)=>b.createdAt-a.createdAt)[0];
  const lastPayment = payments.sort((a,b)=>b.createdAt-a.createdAt)[0];
  return {
    totalPurchases, totalPaid, balance, openingBalance,
    purchasesCount: purchases.length,
    paymentsCount: payments.length,
    lastPurchaseDate: lastPurchase ? lastPurchase.date : null,
    lastPaymentDate: lastPayment ? lastPayment.date : null
  };
}

function renderSupplierTabBody() {
  const body = document.getElementById('sup-tab-body');

  else if (supplierTab === 'purchases') body.innerHTML = renderPurchasesListHTML();
  else if (supplierTab === 'payments') body.innerHTML = renderSupplierPaymentsListHTML();
  wireSupplierTabHandlers();
}

function wireSupplierTabHandlers() {
  if (supplierTab === 'list') {
    const s = document.getElementById('sup-search');
    if (s) s.addEventListener('input', e => { supplierFilters.search = e.target.value; renderSupplierTabBody(); document.getElementById('sup-search').focus(); });
    const cat = document.getElementById('sup-cat');
    if (cat) cat.addEventListener('change', e => { supplierFilters.category = e.target.value; renderSupplierTabBody(); });
    const st = document.getElementById('sup-status');
    if (st) st.addEventListener('change', e => { supplierFilters.status = e.target.value; renderSupplierTabBody(); });
  } else if (supplierTab === 'purchases') {
    const s = document.getElementById('pur-search');
    if (s) s.addEventListener('input', e => { purchaseFilters.search = e.target.value; renderSupplierTabBody(); document.getElementById('pur-search').focus(); });
    const sup = document.getElementById('pur-supplier');
    if (sup) sup.addEventListener('change', e => { purchaseFilters.supplierId = e.target.value; renderSupplierTabBody(); });
    const f = document.getElementById('pur-from'); if (f) f.addEventListener('change', e => { purchaseFilters.from = e.target.value; renderSupplierTabBody(); });
    const t = document.getElementById('pur-to'); if (t) t.addEventListener('change', e => { purchaseFilters.to = e.target.value; renderSupplierTabBody(); });
  } else if (supplierTab === 'payments') {
    const s = document.getElementById('sp-search');
    if (s) s.addEventListener('input', e => { supplierPaymentFilters.search = e.target.value; renderSupplierTabBody(); document.getElementById('sp-search').focus(); });
    const sup = document.getElementById('sp-supplier');
    if (sup) sup.addEventListener('change', e => { supplierPaymentFilters.supplierId = e.target.value; renderSupplierTabBody(); });
    const f = document.getElementById('sp-from'); if (f) f.addEventListener('change', e => { supplierPaymentFilters.from = e.target.value; renderSupplierTabBody(); });
    const t = document.getElementById('sp-to'); if (t) t.addEventListener('change', e => { supplierPaymentFilters.to = e.target.value; renderSupplierTabBody(); });
  }
}

/* ---------- Supplier form (add/edit) ---------- */

  const catOptions = SUPPLIER_CATEGORIES.map(c => `<option value="${c.v}" ${s.category===c.v?'selected':''}>${c.l}</option>`).join('');

  openModal(id ? '✏ تعديل بيانات المورد' : '🏭 إضافة مورد جديد', `

        <div class="form-group">
          <label>البريد الإلكتروني</label>
          <input class="form-control" type="email" name="email" value="${escapeHtml(s.email||'')}" placeholder="optional@example.com">

  ['sup-pl-name','sup-pl-price'].forEach(elId => {
    const el = document.getElementById(elId);
    if (el) el.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); addSupPriceItem(); } });
  });
}

function addSupPriceItem() {
  const name  = document.getElementById('sup-pl-name').value.trim();
  const cat   = document.getElementById('sup-pl-cat').value;
  const price = parseFloat(document.getElementById('sup-pl-price').value) || 0;
  const unit  = document.getElementById('sup-pl-unit').value;
  if (!name) { toast('اكتب اسم الصنف', 'warning'); return; }
  if (price <= 0) { toast('السعر لازم يكون أكبر من صفر', 'warning'); return; }
  if (!window._supPriceStaging) window._supPriceStaging = [];
  window._supPriceStaging.push({ name, category: cat, price, unit, createdAt: Date.now() });
  // Reset inputs (keep category sticky for quick batch entry)
  document.getElementById('sup-pl-name').value = '';
  document.getElementById('sup-pl-price').value = '';
  document.getElementById('sup-pl-name').focus();
  renderSupPriceItems();
}

function removeSupPriceItem(idx) {
  if (!window._supPriceStaging) return;
  window._supPriceStaging.splice(idx, 1);
  renderSupPriceItems();
}

function renderSupPriceItems() {
  const host = document.getElementById('sup-pl-list');
  if (!host) return;
  const items = window._supPriceStaging || [];
  const cur = (DB.data.settings.currency || 'جنيه');
  const curShort = cur === 'جنيه' ? 'ج.م' : cur === 'ريال' ? 'ر.س' : cur === 'درهم' ? 'د.إ' : cur.slice(0, 3);

  if (items.length === 0) {
    host.innerHTML = `
      <div class="sup-pl-empty">
        <span class="sup-pl-empty-icon">📋</span>
        <span>لسه مفيش أصناف — ضيف الصنف الأول من فوق</span>
      </div>`;
    return;
  }

  // Group by category
  const groups = {};
  items.forEach((it, idx) => {
    const k = it.category || 'other';
    if (!groups[k]) groups[k] = [];
    groups[k].push({ ...it, _idx: idx });
  });
  const order = Object.keys(groups).sort((a,b) => {
    const ai = PRICE_CATEGORIES.findIndex(c => c.v === a);
    const bi = PRICE_CATEGORIES.findIndex(c => c.v === b);
    return ai - bi;
  });

  host.innerHTML = `
    <div class="sup-pl-summary">📦 إجمالي: <b>${items.length}</b> صنف في <b>${order.length}</b> فئة</div>
    ${order.map(k => {
      const cat = getPriceCategory(k);
      const its = groups[k];
      return `
        <div class="sup-pl-group" style="--cat-color:${cat.c}">
          <div class="sup-pl-group-head">
            <span class="sup-pl-cat-icon">${cat.icon}</span>
            <span class="sup-pl-cat-label">${cat.l}</span>
            <span class="sup-pl-cat-count">${its.length}</span>
          </div>
          ${its.map(it => `
            <div class="sup-pl-row">
              <span class="sup-pl-row-name">${escapeHtml(it.name)}</span>
              <span class="sup-pl-row-price">${fmt(it.price).split('.')[0]} <small>${curShort}/${escapeHtml(it.unit||'وحدة')}</small></span>
              <button type="button" class="sup-pl-row-rm" onclick="removeSupPriceItem(${it._idx})" title="حذف">✕</button>
            </div>
          `).join('')}
        </div>
      `;
    }).join('')}
  `;
}

function saveSupplier(id) {
  const fd = new FormData(document.getElementById('sup-form'));
  const d = Object.fromEntries(fd);
  if (!d.name || !d.name.trim()) { toast('اسم المورد مطلوب', 'error'); return; }
  d.openingBalance = parseFloat(d.openingBalance) || 0;
  const stagedList = (window._supPriceStaging || []).slice();
  let before = null;
  let record;
  if (id) {
    const s = DB.data.suppliers.find(x=>x.id===id);
    if (!s) return;
    before = JSON.parse(JSON.stringify(s));
    Object.assign(s, d);
    s.priceList = stagedList;
    record = s;
  } else {
    record = { id:'sup_'+uid(), ...d, priceList: stagedList, createdAt: Date.now() };
    DB.data.suppliers.push(record);
  }
  delete window._supPriceStaging;
  DB.save();
  logAudit({
    operation: id ? 'edit' : 'add', table: 'suppliers',
    recordId: record.id, recordLabel: record.name,
    before, after: JSON.parse(JSON.stringify(record)),
    reason: window._pendingAuditReason || ''
  });
  delete window._pendingAuditReason;
  closeModal();
  playTone('save');
  toast(id ? `تم تحديث بيانات المورد (${stagedList.length} صنف في القائمة)` : `تم إضافة المورد ✓ (${stagedList.length} صنف في القائمة)`);
  renderSuppliers();
  renderSidebar();
}

function deleteSupplier(id) {
  const s = DB.data.suppliers.find(x=>x.id===id);
  if (!s) return;
  const hasPurchases = (DB.data.expenses||[]).some(e => e.supplierId === id && e.kind === 'purchase');
  const hasPayments = (DB.data.supplierPayments||[]).some(p => p.supplierId === id);
  if (hasPurchases || hasPayments) {
    toast('لا يمكن حذف مورد له فواتير أو سدادات. احذفها أولاً.', 'error');
    return;
  }
  confirmDialog(`هل أنت متأكد من حذف المورد "${s.name}"؟`, () => {
    const before = JSON.parse(JSON.stringify(s));
    DB.data.suppliers = DB.data.suppliers.filter(x=>x.id!==id);
    DB.save();
    logAudit({
      operation: 'delete', table: 'suppliers',
      recordId: id, recordLabel: s.name,
      before, after: null, reason: 'حذف مورد'
    });
    toast('تم حذف المورد');
    renderSuppliers();
    renderSidebar();
  });
}

function getPriceCategory(v) {

          </div>

/* When supplier changes, load their price list into the products dropdown */
function onPurchaseSupplierChange() {
  const sid = document.getElementById('pur-supplier-select').value;
  const itemsSection = document.getElementById('pur-items-section');
  const hint = document.getElementById('pur-supplier-hint');
  const productSel = document.getElementById('pur-add-product');
  if (!productSel) return;

  if (!sid) {
    if (itemsSection) itemsSection.style.display = 'none';
    if (hint) hint.style.display = 'none';
    return;
  }

  const s = DB.data.suppliers.find(x => x.id === sid);
  const priceList = (s && s.priceList) ? s.priceList : [];

  if (priceList.length === 0) {
    if (itemsSection) itemsSection.style.display = 'none';
    if (hint) {
      hint.style.display = 'block';
      hint.innerHTML = `⚠️ هذا المورد ليس لديه قائمة أسعار. <a href="javascript:void(0)" onclick="closeModal();setTimeout(()=>openSupplierForm('${sid}'),200)" style="color:var(--primary);font-weight:700">إضافة قائمة الأسعار</a>`;
    }
    return;
  }

  // Build dropdown grouped by category
  if (hint) hint.style.display = 'none';
  if (itemsSection) itemsSection.style.display = 'block';

  const groups = {};
  priceList.forEach((it, idx) => {
    const k = it.category || 'other';
    if (!groups[k]) groups[k] = [];
    groups[k].push({ ...it, _idx: idx });
  });
  const orderedCats = Object.keys(groups).sort((a, b) => {
    const ai = PRICE_CATEGORIES.findIndex(c => c.v === a);
    const bi = PRICE_CATEGORIES.findIndex(c => c.v === b);
    return ai - bi;
  });

  const cur = (DB.data.settings.currency || 'جنيه');
  const curShort = cur === 'جنيه' ? 'ج.م' : cur === 'ريال' ? 'ر.س' : cur === 'درهم' ? 'د.إ' : cur.slice(0, 3);

  productSel.innerHTML = `<option value="">— اختار صنف من قائمة المورد —</option>` +
    orderedCats.map(k => {
      const cat = getPriceCategory(k);
      return `<optgroup label="${cat.icon} ${cat.l}">` +
        groups[k].map(it =>
          `<option value="${it._idx}" data-price="${it.price}" data-name="${escapeHtml(it.name)}" data-unit="${escapeHtml(it.unit||'وحدة')}" data-cat="${k}">${escapeHtml(it.name)} — ${fmt(it.price).split('.')[0]} ${curShort}/${escapeHtml(it.unit||'وحدة')}</option>`
        ).join('') +
      `</optgroup>`;
    }).join('');

  // When user picks a product, auto-fill price
  productSel.onchange = () => {
    const opt = productSel.options[productSel.selectedIndex];
    const priceField = document.getElementById('pur-add-price');
    const qtyField = document.getElementById('pur-add-qty');
    if (opt && opt.value) {
      priceField.value = opt.dataset.price;
      if (!qtyField.value) qtyField.value = 1;
      qtyField.focus();
      qtyField.select();
    }
  };
}

function addPurchaseItem() {
  const sel = document.getElementById('pur-add-product');
  const opt = sel.options[sel.selectedIndex];
  const qty = parseFloat(document.getElementById('pur-add-qty').value) || 0;
  const price = parseFloat(document.getElementById('pur-add-price').value) || 0;

  if (!opt || !opt.value) { toast('اختار صنف أولاً', 'warning'); return; }
  if (qty <= 0) { toast('الكمية لازم تكون أكبر من صفر', 'warning'); return; }
  if (price <= 0) { toast('السعر لازم يكون أكبر من صفر', 'warning'); return; }

  if (!window._purItemsStaging) window._purItemsStaging = [];
  window._purItemsStaging.push({
    name: opt.dataset.name,
    category: opt.dataset.cat,
    unit: opt.dataset.unit,
    qty, price,
    total: qty * price
  });

  // Reset
  sel.value = '';
  document.getElementById('pur-add-qty').value = '';
  document.getElementById('pur-add-price').value = '';
  sel.focus();
  renderPurchaseItemsTable();
  recalcPurchaseTotal();
}

function removePurchaseItem(idx) {
  if (!window._purItemsStaging) return;
  window._purItemsStaging.splice(idx, 1);
  renderPurchaseItemsTable();
  recalcPurchaseTotal();
}

function renderPurchaseItemsTable() {
  const host = document.getElementById('pur-items-table');
  if (!host) return;
  const items = window._purItemsStaging || [];
  const cur = (DB.data.settings.currency || 'جنيه');
  const curShort = cur === 'جنيه' ? 'ج.م' : cur === 'ريال' ? 'ر.س' : cur === 'درهم' ? 'د.إ' : cur.slice(0, 3);

  if (items.length === 0) {
    host.innerHTML = `<div class="pur-items-empty">📭 لسه مفيش أصناف — اختار صنف من فوق</div>`;
    return;
  }
  const grand = items.reduce((s, it) => s + (it.total || 0), 0);
  host.innerHTML = `
    <div class="pur-items-table-wrap">
      <table class="pur-items-tbl">
        <thead>
          <tr>
            <th>الصنف</th>
            <th>الكمية</th>
            <th>السعر</th>
            <th>الإجمالي</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          ${items.map((it, idx) => {
            const cat = getPriceCategory(it.category);
            return `<tr>
              <td>
                <span class="pur-it-cat-dot" style="background:${cat.c}"></span>
                <b>${escapeHtml(it.name)}</b>
                <small style="color:var(--text-muted)">${escapeHtml(it.unit||'وحدة')}</small>
              </td>
              <td>${fmt(it.qty)}</td>
              <td>${fmt(it.price).split('.')[0]} ${curShort}</td>
              <td><b style="color:var(--primary-dark)">${fmt(it.total).split('.')[0]} ${curShort}</b></td>
              <td><button type="button" class="sup-pl-row-rm" onclick="removePurchaseItem(${idx})">✕</button></td>
            </tr>`;
          }).join('')}
        </tbody>
        <tfoot>
          <tr>
            <td colspan="3" style="text-align:start"><b>الإجمالي الكلي:</b></td>
            <td colspan="2"><b style="font-size:16px;color:var(--success)">${fmt(grand).split('.')[0]} ${curShort}</b></td>
          </tr>
        </tfoot>
      </table>

}

function recalcPurchaseTotal() {
  const items = window._purItemsStaging || [];
  if (items.length === 0) return;
  const grand = items.reduce((s, it) => s + (it.total || 0), 0);
  const amountField = document.getElementById('pur-total-amount');
  const hint = document.getElementById('pur-amount-hint');
  const manual = document.getElementById('pur-manual-block');
  if (amountField) {
    amountField.value = grand.toFixed(2);
    amountField.readOnly = true;
    amountField.style.background = 'var(--tint-mint)';
    amountField.style.fontWeight = '900';
  }
  if (hint) hint.style.display = 'block';
  // Auto-generate description from items
  const desc = items.map(it => `${it.name} (${fmt(it.qty)} ${it.unit||'وحدة'} × ${fmt(it.price).split('.')[0]})`).join(' • ');
  const descField = document.querySelector('#pur-form textarea[name="description"]');
  if (descField && !descField.dataset.userEdited) {
    descField.value = desc;
  }
  // Hide manual desc block when items are used
  if (manual) manual.style.display = 'none';
}

function togglePurchaseManual() {
  // Clear items and switch to manual entry
  window._purItemsStaging = [];
  renderPurchaseItemsTable();
  const amountField = document.getElementById('pur-total-amount');
  const hint = document.getElementById('pur-amount-hint');
  const manual = document.getElementById('pur-manual-block');
  if (amountField) {
    amountField.readOnly = false;
    amountField.style.background = '';
    amountField.style.fontWeight = '';
    amountField.value = '0';
  }
  if (hint) hint.style.display = 'none';
  if (manual) manual.style.display = 'block';
  const itemsSection = document.getElementById('pur-items-section');
  if (itemsSection) itemsSection.style.display = 'none';
}

/* =========================================================
   PURCHASE INVOICE ATTACHMENT HELPERS
========================================================= */
function formatFileSize(bytes) {
  if (!bytes) return '0 B';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
}

function onPurchaseAttachmentSelect(event) {
  const file = event.target.files && event.target.files[0];
  if (!file) return;

  const MAX_SIZE = 5 * 1024 * 1024; // 5 MB
  if (file.size > MAX_SIZE) {
    toast(`الملف كبير جداً (${formatFileSize(file.size)}). الحد الأقصى 5MB`, 'error');
    event.target.value = '';
    return;
  }

  const allowedTypes = ['image/jpeg', 'image/png', 'image/webp', 'image/jpg', 'application/pdf'];
  if (!allowedTypes.includes(file.type)) {
    toast('نوع الملف غير مدعوم. استخدم: JPG، PNG، WEBP، أو PDF', 'error');
    event.target.value = '';
    return;
  }

  const reader = new FileReader();
  reader.onload = (e) => {
    const attachment = {
      name: file.name,
      type: file.type,
      size: file.size,
      data: e.target.result, // base64 data URL
      uploadedAt: Date.now()
    };
    window._purAttachmentStaging = attachment;
    refreshPurchaseAttachmentUI(attachment);
    toast(`✓ تم رفع "${file.name}" (${formatFileSize(file.size)})`, 'success');
  };
  reader.onerror = () => {
    toast('خطأ في قراءة الملف', 'error');
  };
  reader.readAsDataURL(file);
}

function savePurchase(id) {
  const fd = new FormData(document.getElementById('pur-form'));
  const d = Object.fromEntries(fd);
  d.amount = parseFloat(d.amount) || 0;
  d.number = parseInt(d.number) || 0;
  if (!d.supplierId) { toast('اختر المورد', 'error'); return; }
  if (!d.description || !d.description.trim()) { toast('وصف الفاتورة مطلوب', 'error'); return; }
  if (d.amount <= 0) { toast('المبلغ يجب أن يكون أكبر من صفر', 'error'); return; }
  const sup = DB.data.suppliers.find(s => s.id === d.supplierId);
  if (!sup) { toast('المورد غير موجود', 'error'); return; }
  d.supplierName = sup.name;
  d.kind = 'purchase';
  // Attach items from staging
  d.items = (window._purItemsStaging || []).slice();
  delete window._purItemsStaging;
  // Attach file from staging (if any)
  if (window._purAttachmentStaging) {
    d.attachment = window._purAttachmentStaging;
  } else {
    d.attachment = null;
  }
  delete window._purAttachmentStaging;
  // Cleanup form-only field
  delete d._attachmentData;

  // Note: expenses array stores purchases too, with kind='purchase'
  if (id) {
    const oldP = (DB.data.expenses||[]).find(x => x.id === id);
    if (!oldP) return;
    // Remove old auto-payment if existed (we recreate based on new method)
    if (oldP.autoPaymentId) {
      DB.data.supplierPayments = (DB.data.supplierPayments||[]).filter(pp => pp.id !== oldP.autoPaymentId);
    }
    Object.assign(oldP, d);
    delete oldP.autoPaymentId;
    // If non-credit, create auto payment
    if (d.paymentMethod !== 'credit') {
      const autoPay = createAutoSupplierPayment(oldP);
      oldP.autoPaymentId = autoPay.id;
    }
  } else {
    DB.data.counters.purchase = (DB.data.counters.purchase || 1000) + 1;
    const purchaseObj = { id: 'pur_'+uid(), ...d, createdAt: Date.now() };
    DB.data.expenses.push(purchaseObj);
    // If non-credit, create matching supplier payment so balances stay consistent
    if (d.paymentMethod !== 'credit') {
      const autoPay = createAutoSupplierPayment(purchaseObj);
      purchaseObj.autoPaymentId = autoPay.id;
    }
  }
  DB.save();
  closeModal();
  playTone('save'); toast(id ? 'تم تحديث الفاتورة' : 'تم تسجيل فاتورة الشراء ✓');
  renderSuppliers();
  renderSidebar(); // refresh suppliers badge count
}

  const grp = document.getElementById('pur-duedate-group');

}

/* ---------- Supplier payment due-date reminders ---------- */
// Purchases that are credit, still partially/fully owed, with a dueDate that passed
function getOverdueSupplierPurchases() {
  const today = todayStr();
  return (DB.data.expenses || [])
    .filter(e => e.kind === 'purchase' && e.paymentMethod === 'credit' && e.dueDate && e.dueDate < today)
    .map(e => ({
      ...e,
      daysOverdue: Math.floor((new Date(today) - new Date(e.dueDate)) / 86400000)
    }))
    .sort((a, b) => b.daysOverdue - a.daysOverdue);
}

// Credit purchases with dueDate within the next 7 days
function getDueSoonSupplierPurchases() {
  const today = todayStr();
  const d = new Date();
  d.setDate(d.getDate() + 7);
  const cutoff = d.toISOString().slice(0, 10);
  return (DB.data.expenses || [])
    .filter(e => e.kind === 'purchase' && e.paymentMethod === 'credit' && e.dueDate && e.dueDate >= today && e.dueDate <= cutoff)
    .map(e => ({
      ...e,
      daysUntil: Math.floor((new Date(e.dueDate) - new Date(today)) / 86400000)
    }))
    .sort((a, b) => a.daysUntil - b.daysUntil);
}

function createAutoSupplierPayment(purchaseObj) {
  if (!DB.data.supplierPayments) DB.data.supplierPayments = [];
  const pay = {
    id: 'sp_'+uid(),
    supplierId: purchaseObj.supplierId,
    supplierName: purchaseObj.supplierName,
    date: purchaseObj.date,
    amount: purchaseObj.amount,
    method: purchaseObj.paymentMethod,
    reference: purchaseObj.reference || '',
    note: `سداد مباشر — فاتورة شراء #${purchaseObj.number}`,
    autoFromPurchaseId: purchaseObj.id,
    createdAt: Date.now()
  };
  DB.data.supplierPayments.push(pay);
  return pay;
}

function deletePurchase(id) {
  const p = (DB.data.expenses||[]).find(x => x.id === id && x.kind === 'purchase');
  if (!p) return;
  confirmDialog(`هل تريد حذف فاتورة الشراء #${p.number}؟`, () => {
    // Also remove its auto-payment if any
    if (p.autoPaymentId) {
      DB.data.supplierPayments = (DB.data.supplierPayments||[]).filter(pp => pp.id !== p.autoPaymentId);
    }
    DB.data.expenses = DB.data.expenses.filter(x => x.id !== id);
    DB.save();
    toast('تم حذف الفاتورة');
    renderSuppliers();
    renderSidebar();
  });
}

/* ---------- Supplier payment form ---------- */
function openSupplierPaymentForm(id, presetSupplierId) {
  if (DB.data.suppliers.length === 0) {
    toast('أضف مورد أولاً', 'error');
    return;
  }
  const p = id ? (DB.data.supplierPayments||[]).find(x=>x.id===id) : {
    date: todayStr(),
    supplierId: presetSupplierId || '',
    supplierName: '',
    amount: 0,
    method: 'transfer',
    reference: '',
    note: ''
  };
  if (!p) return;
  const supplierOptions = DB.data.suppliers.map(s => {
    const m = supplierMetrics(s.id);
    return `<option value="${s.id}" ${p.supplierId===s.id?'selected':''}>${escapeHtml(s.name)} — مستحق: ${fmtCurrency(m.balance)}</option>`;
  }).join('');
  const methodOptions = PURCHASE_PAYMENT_METHODS.filter(m=>m.v!=='credit').map(m => `<option value="${m.v}" ${p.method===m.v?'selected':''}>${m.l}</option>`).join('');

  const supForBalance = p.supplierId ? supplierMetrics(p.supplierId) : null;

  openModal(id ? '✏ تعديل سداد' : '💸 سداد لمورد', `
    <form id="sp-form">
      <div class="form-row">
        <div class="form-group">
          <label>التاريخ *</label>
          <input class="form-control" type="date" name="date" value="${p.date}" required>
        </div>
        <div class="form-group">
          <label>طريقة الدفع *</label>
          <select class="form-control" name="method" required onchange="onSupPayMethodChange()" id="sp-method">${methodOptions}</select>
        </div>
      </div>
      <div class="form-group">
        <label>المورد *</label>
        <select class="form-control" name="supplierId" required onchange="updateSupplierBalanceHint(this.value)">
          <option value="">— اختر مورد —</option>
          ${supplierOptions}
        </select>
        <div id="sup-balance-hint" style="margin-top:8px;font-size:12px;color:var(--text-muted)">
          ${supForBalance ? `الرصيد الحالي المستحق: <b style="color:${supForBalance.balance>0?'var(--danger)':'var(--success)'}">${fmtCurrency(supForBalance.balance)}</b>` : ''}
        </div>
      </div>
      <div class="form-group">
        <label>المبلغ المدفوع *</label>
        <input class="form-control" type="number" name="amount" value="${p.amount||0}" step="0.01" min="0.01" required>
      </div>

      <!-- Beneficiary (المستفيد) — to whom the money is actually sent -->
      <div class="sp-beneficiary" id="sp-beneficiary-box">
        <div class="sp-beneficiary-head">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <span>تفاصيل المستفيد (المسدّد له)</span>
        </div>
        <div class="form-row">
          <div class="form-group" style="margin-bottom:10px">
            <label>اسم المستفيد</label>
            <input class="form-control" name="beneficiaryName" value="${escapeHtml(p.beneficiaryName||'')}" placeholder="اسم الشخص أو الجهة المسدّد لها">
          </div>
          <div class="form-group" style="margin-bottom:10px">
            <label>رقم الحساب / الموبايل / المحفظة</label>
            <input class="form-control" name="beneficiaryAccount" value="${escapeHtml(p.beneficiaryAccount||'')}" placeholder="IBAN / رقم حساب / رقم محفظة">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group" style="margin-bottom:0">
            <label>البنك / المحفظة</label>
            <input class="form-control" name="beneficiaryBank" value="${escapeHtml(p.beneficiaryBank||'')}" placeholder="مثال: CIB / NBE / فودافون كاش">
          </div>
          <div class="form-group" style="margin-bottom:0">
            <label>المرجع (رقم تحويل / رقم شيك)</label>
            <input class="form-control" name="reference" value="${escapeHtml(p.reference||'')}" placeholder="رقم العملية">
          </div>
        </div>
      </div>

      <div class="form-group" style="margin-top:14px">
        <label>ملاحظات</label>
        <textarea class="form-control" name="note" rows="3" placeholder="أي تفاصيل إضافية عن السداد...">${escapeHtml(p.note||'')}</textarea>
      </div>
    </form>
  `, `
    <button class="btn btn-ghost" onclick="closeModal()">إلغاء</button>
    <button class="btn btn-primary" onclick="saveSupplierPayment('${id||''}')">${id?'💾 حفظ التعديلات':'✓ تسجيل السداد'}</button>
  `);
}

/* Show/hide beneficiary box based on payment method.
   Beneficiary details only make sense for transfer/check/wallet, not cash. */
function onSupPayMethodChange() {
  const sel = document.getElementById('sp-method');
  const box = document.getElementById('sp-beneficiary-box');
  if (!sel || !box) return;
  const v = sel.value;
  // Show for everything except plain cash
  if (v === 'cash' || v === 'كاش') {
    box.classList.add('sp-beneficiary-collapsed');
  } else {
    box.classList.remove('sp-beneficiary-collapsed');
  }
}

function updateSupplierBalanceHint(supplierId) {
  const hint = document.getElementById('sup-balance-hint');
  if (!hint) return;
  if (!supplierId) { hint.innerHTML = ''; return; }
  const m = supplierMetrics(supplierId);
  hint.innerHTML = `الرصيد الحالي المستحق: <b style="color:${m.balance>0?'var(--danger)':'var(--success)'}">${fmtCurrency(m.balance)}</b>`;
}

function saveSupplierPayment(id) {
  const fd = new FormData(document.getElementById('sp-form'));
  const d = Object.fromEntries(fd);
  d.amount = parseFloat(d.amount) || 0;
  if (!d.supplierId) { toast('اختر المورد', 'error'); return; }
  if (d.amount <= 0) { toast('المبلغ يجب أن يكون أكبر من صفر', 'error'); return; }
  const sup = DB.data.suppliers.find(s => s.id === d.supplierId);
  if (!sup) { toast('المورد غير موجود', 'error'); return; }
  d.supplierName = sup.name;

  if (!DB.data.supplierPayments) DB.data.supplierPayments = [];
  if (id) {
    const old = DB.data.supplierPayments.find(p => p.id === id);
    if (!old) return;
    Object.assign(old, d);
  } else {
    DB.data.supplierPayments.push({ id: 'sp_'+uid(), ...d, createdAt: Date.now() });
  }
  DB.save();
  closeModal();
  playTone('collect'); toast(id ? 'تم تحديث السداد' : 'تم تسجيل السداد ✓');
  renderSuppliers();
  renderSidebar();
}

function deleteSupplierPayment(id) {
  const p = (DB.data.supplierPayments||[]).find(x=>x.id===id);
  if (!p) return;
  if (p.autoFromPurchaseId) {
    toast('هذا السداد تلقائي من فاتورة شراء. احذف الفاتورة بدلاً منه.', 'error');
    return;
  }
  confirmDialog(`هل تريد حذف هذا السداد؟ (${fmtCurrency(p.amount)})`, () => {
    DB.data.supplierPayments = DB.data.supplierPayments.filter(x=>x.id!==id);
    DB.save();
    toast('تم حذف السداد');
    renderSuppliers();
    renderSidebar();
  });
}

/* ---------- Supplier statement (account view) ---------- */
function viewSupplierStatement(id) {
  const s = DB.data.suppliers.find(x=>x.id===id);
  if (!s) return;
  const cat = getSupplierCategory(s.category);
  const purchases = (DB.data.expenses||[]).filter(e => e.kind === 'purchase' && e.supplierId === id);
  const payments = (DB.data.supplierPayments||[]).filter(p => p.supplierId === id);

  const txs = [];
  if ((s.openingBalance || 0) > 0) {
    txs.push({
      date: '—',
      type: 'رصيد افتتاحي',
      ref: '',
      debit: s.openingBalance,
      credit: 0,
      ts: 0
    });
  }
  purchases.forEach(p => txs.push({
    date: p.date,
    type: 'فاتورة شراء',
    ref: `#${p.number} — ${p.description||''}`,
    debit: p.amount,
    credit: 0,
    ts: p.createdAt
  }));
  payments.forEach(p => {
    const method = PURCHASE_PAYMENT_METHODS.find(m=>m.v===p.method);
    txs.push({
      date: p.date,
      type: 'سداد',
      ref: `${method?method.l:p.method} ${p.reference?'— '+p.reference:''}`,
      debit: 0,
      credit: p.amount,
      ts: p.createdAt
    });
  });
  txs.sort((a,b) => a.ts - b.ts);

  let running = 0;
  const txsWithRunning = txs.map(t => {
    running += t.debit - t.credit;
    return { ...t, running };
  });

  const totalDebit = txsWithRunning.reduce((s,t)=>s+t.debit,0);
  const totalCredit = txsWithRunning.reduce((s,t)=>s+t.credit,0);
  const finalBalance = totalDebit - totalCredit;

  openModal(`📋 كشف حساب — ${escapeHtml(s.name)}`, `
    <div style="background:linear-gradient(135deg,${cat.c}10,transparent);border:1.5px solid ${cat.c}30;border-radius:12px;padding:16px;margin-bottom:16px">
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;font-size:13px">
        <div><b>الاسم:</b> ${escapeHtml(s.name)}</div>
        <div><b>الجهة:</b> ${escapeHtml(s.company||'-')}</div>
        <div><b>الهاتف:</b> ${escapeHtml(s.phone||'-')}</div>
        <div><b>البريد:</b> ${escapeHtml(s.email||'-')}</div>
        <div><b>الفئة:</b> <span style="color:${cat.c};font-weight:700">${cat.l}</span></div>
        <div><b>الرقم الضريبي:</b> ${escapeHtml(s.taxNumber||'-')}</div>
        <div style="grid-column:1/-1"><b>العنوان:</b> ${escapeHtml(s.address||'-')}</div>
        ${s.notes ? `<div style="grid-column:1/-1"><b>ملاحظات:</b> ${escapeHtml(s.notes)}</div>` : ''}
      </div>
    </div>

    <div class="kpi-bar" style="margin-bottom:14px">
      <div class="kpi"><div class="l">مدين (مشتريات)</div><div class="v" style="color:var(--danger)">${fmtCurrency(totalDebit)}</div></div>
      <div class="kpi"><div class="l">دائن (مدفوع)</div><div class="v" style="color:var(--success)">${fmtCurrency(totalCredit)}</div></div>
      <div class="kpi"><div class="l">الرصيد النهائي</div><div class="v" style="color:${finalBalance>0?'var(--danger)':'var(--success)'};font-size:20px">${fmtCurrency(finalBalance)}</div></div>
    </div>

    <div class="table-scroll" style="max-height:380px">
      <table class="data-table">
        <thead>
          <tr>
            <th>التاريخ</th>
            <th>النوع</th>
            <th>المرجع</th>
            <th>مدين</th>
            <th>دائن</th>
            <th>الرصيد</th>
          </tr>
        </thead>
        <tbody>
          ${txsWithRunning.length === 0 ? '<tr><td colspan="6" style="text-align:center;padding:30px;color:var(--text-muted)">لا توجد معاملات لهذا المورد بعد</td></tr>' :
            txsWithRunning.map(t => `<tr>
              <td>${t.date}</td>
              <td><span class="badge-status ${t.type==='سداد'?'badge-paid':t.type==='رصيد افتتاحي'?'badge-info':'badge-unpaid'}">${t.type}</span></td>
              <td style="font-size:12px">${escapeHtml(t.ref)}</td>
              <td>${t.debit > 0 ? '<b style="color:var(--danger)">'+fmtCurrency(t.debit)+'</b>' : '-'}</td>
              <td>${t.credit > 0 ? '<b style="color:var(--success)">'+fmtCurrency(t.credit)+'</b>' : '-'}</td>
              <td><b style="color:${t.running>0?'var(--danger)':t.running<0?'var(--success)':'var(--text)'}">${fmtCurrency(t.running)}</b></td>
            </tr>`).join('')
          }
        </tbody>
      </table>
    </div>
  `, `
    <button class="btn btn-ghost" onclick="closeModal()">إغلاق</button>
    <button class="btn btn-secondary" onclick="printSupplierStatement('${id}')">🖨 طباعة</button>
    <button class="btn btn-primary" onclick="openPurchaseForm(null,'${id}')">📝 فاتورة شراء</button>
    <button class="btn btn-success" onclick="openSupplierPaymentForm(null,'${id}')">💸 سداد</button>
  `, 'large');
}

/* ---------- Print supplier statement ---------- */
function printSupplierStatement(id) {
  const s = DB.data.suppliers.find(x=>x.id===id);
  if (!s) return;
  const cat = getSupplierCategory(s.category);
  const settings = DB.data.settings;
  const purchases = (DB.data.expenses||[]).filter(e => e.kind === 'purchase' && e.supplierId === id);
  const payments = (DB.data.supplierPayments||[]).filter(p => p.supplierId === id);

  const txs = [];
  if ((s.openingBalance || 0) > 0) {
    txs.push({ date:'—', type:'رصيد افتتاحي', ref:'', debit:s.openingBalance, credit:0, ts:0 });
  }
  purchases.forEach(p => txs.push({
    date: p.date, type: 'فاتورة شراء', ref:`#${p.number} — ${p.description||''}`, debit: p.amount, credit: 0, ts: p.createdAt
  }));
  payments.forEach(p => {
    const method = PURCHASE_PAYMENT_METHODS.find(m=>m.v===p.method);
    txs.push({ date: p.date, type:'سداد', ref:`${method?method.l:p.method} ${p.reference?'— '+p.reference:''}`, debit:0, credit: p.amount, ts: p.createdAt });
  });
  txs.sort((a,b)=>a.ts-b.ts);
  let running = 0;
  const rows = txs.map(t => { running += t.debit - t.credit; return {...t, running}; });
  const totalDebit = rows.reduce((s,t)=>s+t.debit,0);
  const totalCredit = rows.reduce((s,t)=>s+t.credit,0);
  const finalBalance = totalDebit - totalCredit;

  const w = window.open('', '_blank', 'width=900,height=700');
  w.document.write(`<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><title>كشف حساب — ${escapeHtml(s.name)}</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      *{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}
      body{padding:30px;background:white;color:#0a0a0a}
      .wrap{max-width:900px;margin:0 auto}
      .top{border-bottom:3px solid #000;padding-bottom:14px;margin-bottom:18px;text-align:center}
      .top .logo{display:block;margin:0 auto 10px;max-height:80px;max-width:220px;object-fit:contain}
      .top h1{font-size:26px;font-weight:900}
      .top .info{font-size:11px;color:#525252;margin-top:6px}
      .title{background:#000;color:#fff;padding:10px 18px;text-align:center;font-size:16px;font-weight:800;border-radius:6px;margin-bottom:14px}
      .sup-info{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:12px 14px;border:2px solid #000;border-radius:8px;margin-bottom:14px;font-size:12px}
      .sup-info b{color:#0a0a0a}
      .summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
      .summary .box{border:2px solid #000;border-radius:8px;padding:10px 14px;text-align:center}
      .summary .l{font-size:11px;color:#525252;font-weight:700}
      .summary .v{font-size:18px;font-weight:900;margin-top:4px}
      table{width:100%;border-collapse:collapse;border:2px solid #000;font-size:12px}
      table th{background:#000;color:#fff;padding:9px;text-align:right;font-weight:700}
      table td{padding:8px 10px;border-bottom:1px solid #d4d4d4}
      table tr:nth-child(even) td{background:#f5f5f5}
      .footer{margin-top:30px;text-align:center;color:#525252;font-size:11px;border-top:2px solid #000;padding-top:10px}
      @media print{body{padding:18px}@page{margin:12mm}}
    </style></head><body>
    <div class="wrap">
      <div class="top">
        ${settings.companyLogo ? `<img class="logo" src="${settings.companyLogo}" alt="شعار">` : ''}
        <h1>${escapeHtml(settings.companyName||'الشركة')}</h1>
        <div class="info">${settings.companyAddress?escapeHtml(settings.companyAddress)+' • ':''}${settings.companyPhone?'📞 '+escapeHtml(settings.companyPhone):''}${settings.taxNumber?' • سجل ضريبي: '+escapeHtml(settings.taxNumber):''}</div>
      </div>

      <div class="title">كشف حساب مورد — ${escapeHtml(s.name)}</div>

      <div class="sup-info">
        <div><b>المورد:</b> ${escapeHtml(s.name)}</div>
        <div><b>الجهة:</b> ${escapeHtml(s.company||'-')}</div>
        <div><b>الفئة:</b> ${cat.l}</div>
        <div><b>الهاتف:</b> ${escapeHtml(s.phone||'-')}</div>
        <div><b>الرقم الضريبي:</b> ${escapeHtml(s.taxNumber||'-')}</div>
        <div><b>تاريخ الطباعة:</b> ${todayStr()}</div>
        <div style="grid-column:1/-1"><b>العنوان:</b> ${escapeHtml(s.address||'-')}</div>
      </div>

      <div class="summary">
        <div class="box"><div class="l">إجمالي المشتريات</div><div class="v" style="color:#b91c1c">${fmtCurrency(totalDebit)}</div></div>
        <div class="box"><div class="l">إجمالي المدفوع</div><div class="v" style="color:#16a34a">${fmtCurrency(totalCredit)}</div></div>
        <div class="box"><div class="l">الرصيد النهائي</div><div class="v" style="color:${finalBalance>0?'#b91c1c':'#16a34a'}">${fmtCurrency(finalBalance)}</div></div>
      </div>

      <table>
        <thead>
          <tr><th>التاريخ</th><th>النوع</th><th>المرجع</th><th>مدين</th><th>دائن</th><th>الرصيد</th></tr>
        </thead>
        <tbody>
          ${rows.length === 0 ? '<tr><td colspan="6" style="text-align:center;padding:20px">لا توجد معاملات</td></tr>' :
            rows.map(t => `<tr>
              <td>${t.date}</td>
              <td>${t.type}</td>
              <td>${escapeHtml(t.ref)}</td>
              <td>${t.debit>0?fmtCurrency(t.debit):'-'}</td>
              <td>${t.credit>0?fmtCurrency(t.credit):'-'}</td>
              <td><b>${fmtCurrency(t.running)}</b></td>
            </tr>`).join('')
          }
        </tbody>
      </table>

      <div class="footer">
        كشف حساب صادر من نظام ${escapeHtml(settings.companyName||'الشركة')} — ${todayStr()}
      </div>
    </div>
    <script>window.onload = () => { window.print(); };<\/script>
    </body></html>`);
  w.document.close();
}

/* ---------- Export to Excel/CSV ---------- */
function exportSuppliersCSV() {
  if (!DB.data.suppliers || DB.data.suppliers.length === 0) {
    toast('لا يوجد موردين للتصدير', 'error'); return;
  }
  const rows = [['الاسم','الجهة','الفئة','الهاتف','البريد','العنوان','الرقم الضريبي','الرصيد الافتتاحي','إجمالي المشتريات','إجمالي المدفوع','الرصيد المستحق','عدد الفواتير','عدد السدادات','ملاحظات']];
  DB.data.suppliers.forEach(s => {
    const m = supplierMetrics(s.id);
    const cat = getSupplierCategory(s.category);
    rows.push([
      s.name, s.company||'', cat.l, s.phone||'', s.email||'', s.address||'', s.taxNumber||'',
      s.openingBalance||0, m.totalPurchases, m.totalPaid, m.balance,
      m.purchasesCount, m.paymentsCount, s.notes||''
    ]);
  });
  const csv = rows.map(r => r.map(cell => {
    const ss = String(cell == null ? '' : cell);
    return ss.includes(',')||ss.includes('"')||ss.includes('\n') ? '"' + ss.replace(/"/g,'""') + '"' : ss;
  }).join(',')).join('\r\n');
  const blob = new Blob(['\uFEFF' + csv], { type:'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `suppliers_${todayStr()}.csv`; a.click();
  URL.revokeObjectURL(url);
  toast('تم تصدير ملف Excel ✓');
}
