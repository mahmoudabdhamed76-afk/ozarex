version: "3.8"

services:
  emdadx-erp:
    container_name: emdadx-erp
    build: .
    image: emdadx-erp:latest
    restart: unless-stopped
    ports:
      - "8787:8787"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=8787
      - HOST=0.0.0.0
      - TZ=Africa/Cairo
      # APP_PATH controls where the app is served.
      # For Synology/local Docker: '/EmdadX-ERP' (default)
      # For Railway/clouds with custom domain: leave empty -> ''
      - APP_PATH=/EmdadX-ERP
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8787/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
